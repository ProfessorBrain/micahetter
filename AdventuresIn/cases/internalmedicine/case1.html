<html lang="en">
<head>
  <meta charset="utf-8" />

  <style>
    :root {
      --paper: #ffffff;
      --ink: #f8f5ef;
      --ink-soft: rgba(255, 255, 255, 0.8);
      --black: #050505;
      --red: #ff2d22;
      --orange: #ff9d17;
      --yellow: #ffd62c;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      height: 100%;
      min-height: 100%;
      overflow: hidden;
      background:
        radial-gradient(circle at top, rgba(255, 214, 44, 0.16), transparent 34%),
        linear-gradient(180deg, #ffffff 0%, #fff9ef 55%, #fff4d9 100%);
      color: var(--black);
      font-family: "Source Sans 3", "Segoe UI", sans-serif;
    }

    body.has-medicine-shell .imApp {
      padding-top: 8rem;
    }

    body.has-medicine-shell.medicineEmbedded .imApp {
      padding-top: 1.5rem;
    }

    .imApp {
      height: 100dvh;
      min-height: 100dvh;
      padding: 2rem 1rem 2rem;
      overflow: hidden;
    }

    .imStage {
      max-width: 62rem;
      height: 100%;
      min-height: 0;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .imBanner {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto;
      padding: 0.7rem 1.5rem;
      border-radius: 999px;
      background: var(--red);
      color: var(--paper);
      font-family: "Adventures Benguiat", "Fraunces", Georgia, serif;
      font-size: clamp(1rem, 1.6vw, 1.35rem);
      letter-spacing: 0.05em;
      text-align: center;
      box-shadow: 0 18px 38px rgba(255, 45, 34, 0.2);
    }

    .imBannerWrap {
      display: flex;
      justify-content: center;
    }

    .imFrame {
      position: relative;
      flex: 1 1 auto;
      min-height: 0;
      border-radius: 2rem;
      background: var(--black);
      padding: 2rem 1.5rem 1.5rem;
      overflow-y: auto;
      overscroll-behavior: contain;
      scrollbar-gutter: stable;
      border: 3px solid var(--orange);
      box-shadow:
        0 0 0 7px var(--yellow),
        0 0 0 12px var(--orange),
        0 26px 60px rgba(0, 0, 0, 0.22);
      color: var(--ink);
    }

    .imFrame::before,
    .imFrame::after {
      content: "";
      position: absolute;
      inset: 10px;
      border-radius: 1.45rem;
      pointer-events: none;
    }

    .imFrame::before {
      border: 1px solid rgba(255, 214, 44, 0.24);
    }

    .imFrame::after {
      inset: auto 1.2rem 1.2rem;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255, 214, 44, 0.4), transparent);
    }

    .imFrame::-webkit-scrollbar {
      width: 12px;
    }

    .imFrame::-webkit-scrollbar-thumb {
      background: linear-gradient(180deg, rgba(255, 214, 44, 0.9), rgba(255, 157, 23, 0.88), rgba(255, 45, 34, 0.84));
      border: 3px solid rgba(0, 0, 0, 0);
      border-radius: 999px;
      background-clip: padding-box;
    }

    .sceneEyebrow {
      margin: 0;
      color: var(--red);
      font-size: 0.9rem;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    .sceneTitle {
      margin: 0.45rem 0 0;
      font-family: "Adventures Benguiat", "Fraunces", Georgia, serif;
      font-size: clamp(2rem, 4vw, 3.1rem);
      line-height: 0.95;
      color: var(--paper);
    }

    .sceneStep {
      margin: 0.65rem 0 0;
      color: var(--yellow);
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.04em;
    }

    .sceneMeta {
      display: flex;
      flex-wrap: wrap;
      gap: 0.55rem;
      margin: 1.1rem 0 0;
    }

    .sceneMeta span {
      border: 1px solid rgba(255, 157, 23, 0.34);
      border-radius: 999px;
      padding: 0.38rem 0.75rem;
      color: var(--paper);
      background: rgba(255, 255, 255, 0.04);
      font-size: 0.94rem;
    }

    .sceneBody {
      margin-top: 1.5rem;
      font-size: clamp(1.02rem, 2.3vw, 1.22rem);
      line-height: 1.72;
    }

    .sceneBody p {
      margin: 0 0 1rem;
    }

    .sceneBody p:last-child {
      margin-bottom: 0;
    }

    .sceneBullets {
      margin: 1rem 0 0;
      padding-left: 1.35rem;
      color: var(--ink);
      line-height: 1.65;
    }

    .sceneBullets.isHidden {
      display: none;
    }

    .sceneBullets li + li {
      margin-top: 0.65rem;
    }

    .sceneOptions {
      display: grid;
      gap: 0.8rem;
      margin-top: 1.8rem;
    }

    .sceneOption {
      width: 100%;
      border: 1px solid rgba(255, 157, 23, 0.42);
      border-radius: 1.15rem;
      background:
        linear-gradient(180deg, rgba(255, 214, 44, 0.12), rgba(255, 45, 34, 0.08) 40%, rgba(255, 255, 255, 0.02)),
        rgba(0, 0, 0, 0.96);
      color: var(--paper);
      padding: 1rem 1.05rem;
      font: inherit;
      font-size: 1rem;
      font-weight: 700;
      line-height: 1.45;
      text-align: left;
      cursor: pointer;
      transition: transform 180ms ease, border-color 180ms ease, background 180ms ease;
    }

    .sceneOption:hover {
      transform: translateY(-1px);
      border-color: rgba(255, 214, 44, 0.74);
      background:
        linear-gradient(180deg, rgba(255, 214, 44, 0.18), rgba(255, 45, 34, 0.11) 40%, rgba(255, 255, 255, 0.03)),
        rgba(0, 0, 0, 1);
    }
    .sceneOption:focus-visible {
      outline: 3px solid rgba(255, 214, 44, 0.45);
      outline-offset: 3px;
    }

    .reflectionBox {
      margin-top: 1.25rem;
      padding: 1rem 1rem 0.3rem;
      border-radius: 1.2rem;
      border: 1px solid rgba(255, 214, 44, 0.24);
      background: rgba(255, 255, 255, 0.04);
    }

    .reflectionBox h2 {
      margin: 0 0 0.75rem;
      color: var(--yellow);
      font-family: "Adventures Benguiat", "Fraunces", Georgia, serif;
      font-size: 1.6rem;
      line-height: 1;
    }

    @media (max-width: 720px) {
      .imApp {
        padding: 1rem 0.8rem 1.15rem;
      }

      .imFrame {
        border-radius: 1.4rem;
        padding: 1.45rem 1rem 1rem;
        box-shadow:
          0 0 0 5px var(--yellow),
          0 0 0 9px var(--orange),
          0 16px 32px rgba(0, 0, 0, 0.18);
      }

      .imFrame::before {
        inset: 8px;
      }

      .sceneOption {
        padding: 0.95rem 0.9rem;
      }
    }
  </style>

            "Next likely steps after transfer: repeat CBC, type and screen, consideration of transfusion, hemodynamic reassessment, and evaluation for the bleeding source."
          ],
          reflection: "In a postmenopausal adult, iron deficiency anemia is gastrointestinal blood loss until proven otherwise.",
          options: [
            { label: "Play the case again", next: "start" }
          ]
        }
      };

      const sceneEyebrow = document.getElementById("sceneEyebrow");
      const sceneTitle = document.getElementById("sceneTitle");
      const sceneStep = document.getElementById("sceneStep");
      const sceneBody = document.getElementById("sceneBody");
      const sceneBullets = document.getElementById("sceneBullets");
      const sceneOptions = document.getElementById("sceneOptions");

      function renderScene(sceneId) {
        const scene = scenes[sceneId];
        if (!scene) {
          return;
        }

        sceneEyebrow.textContent = scene.eyebrow || "";
        sceneTitle.textContent = scene.title || "";
        sceneStep.textContent = scene.step || "";
        sceneBody.innerHTML = (scene.body || []).map(function (paragraph) {
          return "<p>" + paragraph + "</p>";
        }).join("");

        if (scene.reflection) {
          sceneBody.innerHTML += '<div class="reflectionBox"><h2>Take-home pearl</h2><p>' + scene.reflection + '</p></div>';
        }

        if (scene.bullets && scene.bullets.length) {
          sceneBullets.classList.remove("isHidden");
          sceneBullets.innerHTML = scene.bullets.map(function (item) {
            return "<li>" + item + "</li>";
          }).join("");
        } else {
          sceneBullets.classList.add("isHidden");
          sceneBullets.innerHTML = "";
        }

        sceneOptions.innerHTML = "";
        (scene.options || []).forEach(function (option) {
          const button = document.createElement("button");
          button.type = "button";
          button.className = "sceneOption";
          button.textContent = option.label;
          button.addEventListener("click", function () {
            renderScene(option.next);
          });
          sceneOptions.appendChild(button);
        });

        window.scrollTo(0, 0);
      }
renderScene("start");
    })();
  </script>
</body>
</html>
