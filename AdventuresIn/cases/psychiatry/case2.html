<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="adventures-case-title" content="Low Again" />
  <meta name="adventures-case-subtitle" content="Medication planning" />
  <title>Adventures in Medicine - Psychiatry - Case 2</title>
  <style>
    :root {
      --paper: #ffffff;
      --ink: #f8f5ef;
      --black: #050505;
      --red: #ff2d22;
      --orange: #ff9d17;
      --yellow: #ffd62c;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      height: 100%;
      min-height: 100%;
      overflow: hidden;
      background:
        radial-gradient(circle at top, rgba(255, 214, 44, 0.16), transparent 34%),
        linear-gradient(180deg, #ffffff 0%, #fff9ef 55%, #fff4d9 100%);
      color: var(--black);
      font-family: "Source Sans 3", "Segoe UI", sans-serif;
    }

    body.has-medicine-shell .caseApp {
      padding-top: 8rem;
    }

    body.has-medicine-shell.medicineEmbedded .caseApp {
      padding-top: 1.5rem;
    }

    .caseApp {
      height: 100dvh;
      min-height: 100dvh;
      padding: 2rem 1rem 2rem;
      overflow: hidden;
    }

    .caseStage {
      max-width: 62rem;
      height: 100%;
      min-height: 0;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .caseBannerWrap {
      display: flex;
      justify-content: center;
    }

    .caseBanner {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto;
      padding: 0.7rem 1.5rem;
      border-radius: 999px;
      background: var(--red);
      border: 2px solid var(--paper);
      color: var(--paper);
      font-family: "Adventures Benguiat", "Fraunces", Georgia, serif;
      font-size: clamp(1rem, 1.6vw, 1.35rem);
      letter-spacing: 0.05em;
      text-align: center;
      box-shadow:
        0 0 0 2px var(--black),
        0 18px 38px rgba(255, 45, 34, 0.2);
    }

    .caseFrame {
      position: relative;
      display: flex;
      flex-direction: column;
      flex: 1 1 auto;
      min-height: 0;
      border-radius: 2rem;
      background: var(--black);
      padding: 2rem 1.5rem 1.6rem;
      overflow-y: auto;
      overscroll-behavior: contain;
      scrollbar-gutter: stable;
      border: 3px solid var(--orange);
      box-shadow:
        0 0 0 7px var(--yellow),
        0 0 0 12px var(--orange),
        0 26px 60px rgba(0, 0, 0, 0.22);
      color: var(--ink);
    }

    .caseFrame::before,
    .caseFrame::after {
      content: "";
      position: absolute;
      inset: 10px;
      border-radius: 1.45rem;
      pointer-events: none;
    }

    .caseFrame::before {
      border: 1px solid rgba(255, 214, 44, 0.24);
    }

    .caseFrame::after {
      inset: auto 1.2rem 1.2rem;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255, 214, 44, 0.4), transparent);
    }

    .caseFrame::-webkit-scrollbar {
      width: 12px;
    }

    .caseFrame::-webkit-scrollbar-thumb {
      background: linear-gradient(180deg, rgba(255, 214, 44, 0.9), rgba(255, 157, 23, 0.88), rgba(255, 45, 34, 0.84));
      border: 3px solid rgba(0, 0, 0, 0);
      border-radius: 999px;
      background-clip: padding-box;
    }

    .sceneTitle {
      margin: 0;
      font-family: "Adventures Benguiat", "Fraunces", Georgia, serif;
      font-size: clamp(1.45rem, 2.35vw, 2.05rem);
      line-height: 0.95;
      color: var(--paper);
    }

    .sceneBody {
      margin-top: 1.5rem;
      font-size: clamp(1.02rem, 2.3vw, 1.22rem);
      line-height: 1.72;
    }

    .sceneBody p {
      margin: 0 0 1rem;
    }

    .sceneBody p:last-child {
      margin-bottom: 0;
    }

    .sceneBullets {
      margin: 1rem 0 0;
      padding-left: 1.35rem;
      color: var(--ink);
      line-height: 1.65;
    }

    .sceneBullets.isHidden {
      display: none;
    }

    .sceneBullets li + li {
      margin-top: 0.65rem;
    }

    .sceneOptions {
      display: grid;
      gap: 0.8rem;
      margin-top: 1.8rem;
    }

    .sceneFooter {
      display: flex;
      justify-content: flex-start;
      margin-top: auto;
      padding-top: 1.2rem;
    }

    .sceneOption {
      width: 100%;
      border: 1px solid rgba(255, 157, 23, 0.42);
      border-radius: 1.15rem;
      background:
        linear-gradient(180deg, rgba(255, 214, 44, 0.12), rgba(255, 45, 34, 0.08) 40%, rgba(255, 255, 255, 0.02)),
        rgba(0, 0, 0, 0.96);
      color: var(--paper);
      padding: 1rem 1.05rem;
      font: inherit;
      font-size: 1rem;
      font-weight: 700;
      line-height: 1.45;
      text-align: left;
      cursor: pointer;
      transition: transform 180ms ease, border-color 180ms ease, background 180ms ease;
    }

    .sceneOption:hover {
      transform: translateY(-1px);
      border-color: rgba(255, 214, 44, 0.74);
      background:
        linear-gradient(180deg, rgba(255, 214, 44, 0.18), rgba(255, 45, 34, 0.11) 40%, rgba(255, 255, 255, 0.03)),
        rgba(0, 0, 0, 1);
    }

    .sceneOption:focus-visible {
      outline: 3px solid rgba(255, 214, 44, 0.45);
      outline-offset: 3px;
    }

    .backButton {
      border: 1px solid rgba(255, 157, 23, 0.5);
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.94);
      color: var(--paper);
      min-width: 3.2rem;
      min-height: 3.2rem;
      padding: 0.7rem;
      font: inherit;
      font-size: 1.4rem;
      font-weight: 700;
      line-height: 1;
      cursor: pointer;
      transition: transform 180ms ease, border-color 180ms ease, opacity 180ms ease;
    }

    .backButton:hover:not(:disabled) {
      transform: translateY(-1px);
      border-color: rgba(255, 214, 44, 0.78);
    }

    .backButton:focus-visible {
      outline: 3px solid rgba(255, 214, 44, 0.45);
      outline-offset: 3px;
    }

    .backButton:disabled {
      cursor: not-allowed;
      opacity: 0.42;
      border-color: rgba(255, 157, 23, 0.22);
    }

    .reflectionBox {
      margin-top: 1.25rem;
      padding: 1rem 1rem 0.3rem;
      border-radius: 1.2rem;
      border: 1px solid rgba(255, 214, 44, 0.24);
      background: rgba(255, 255, 255, 0.04);
    }

    .reflectionBox h2 {
      margin: 0 0 0.75rem;
      color: var(--yellow);
      font-family: "Adventures Benguiat", "Fraunces", Georgia, serif;
      font-size: 1.6rem;
      line-height: 1;
    }

    @media (max-width: 720px) {
      .caseApp {
        padding: 1rem 0.8rem 1.15rem;
      }

      .caseFrame {
        border-radius: 1.4rem;
        padding: 1.45rem 1rem 1.05rem;
        box-shadow:
          0 0 0 5px var(--yellow),
          0 0 0 9px var(--orange),
          0 16px 32px rgba(0, 0, 0, 0.18);
      }

      .caseFrame::before {
        inset: 8px;
      }

      .sceneOption {
        padding: 0.95rem 0.9rem;
      }
    }
  </style>
  <script src="../../adventures-case-shell.js" defer></script>
</head>
<body>
  <noscript>This case requires JavaScript in order to present its interactive choices.</noscript>

  <main class="caseApp">
    <div class="caseStage">
      <div class="caseBannerWrap">
        <div class="caseBanner">ADVENTURES IN PSYCHIATRY</div>
      </div>

      <section class="caseFrame" aria-live="polite">
        <h1 class="sceneTitle" id="sceneTitle">Case 2: Low Again</h1>
        <div class="sceneBody" id="sceneBody"></div>
        <ul class="sceneBullets isHidden" id="sceneBullets"></ul>
        <div class="sceneOptions" id="sceneOptions"></div>
        <div class="sceneFooter">
          <button type="button" class="backButton" id="backButton" aria-label="Go back" disabled>&larr;</button>
        </div>
      </section>
    </div>
  </main>

  <script>
    (function () {
      const initialState = {
        safetyAsked: false,
        medHistoryDeep: false,
        seizureClarified: false,
        weightConcernAsked: false
      };
      const state = {
        safetyAsked: initialState.safetyAsked,
        medHistoryDeep: initialState.medHistoryDeep,
        seizureClarified: initialState.seizureClarified,
        weightConcernAsked: initialState.weightConcernAsked
      };
      const historyStack = [];
      let currentSceneId = null;

      const scenes = {
        start: {
          onEnter: function () {
            state.safetyAsked = false;
            state.medHistoryDeep = false;
            state.seizureClarified = false;
            state.weightConcernAsked = false;
          },
          title: "Case 2: Low Again",
          body: [
            "You are seeing Jordan, 34, for a first visit. They report feeling low again.",
            "This case is about recognizing a recurrent depressive episode, ruling out competing explanations including common medical contributors, and choosing an antidepressant that actually fits the patient's history and comorbidities.",
            "The challenge is not just naming depression. It is choosing a medication plan that respects prior response, sexual side effects, blood pressure, seizure history, weight concerns, and the need to stay sharp at work."
          ],
          options: [
            { label: "Begin the encounter", next: "step1" }
          ]
        },
        step1: {
          title: "How do you begin the encounter?",
          body: [
            "Jordan sits slumped in the chair and makes only brief eye contact. The opening will set the tone for everything that follows."
          ],
          options: [
            { label: "Ask, 'What brought you in today?'", next: "step1A" },
            { label: "Say, 'Hi, I am your clinician today. What name do you prefer to go by?'", next: "step1B" },
            { label: "Say, 'So your depression is back again?'", next: "step1C" },
            { label: "Look at the chart and say, 'Give me a second to catch up on your history.'", next: "step1D" }
          ]
        },
        step1A: {
          title: "Reasonable, but not ideal.",
          body: [
            "This is a workable opening, but skipping introductions can feel abrupt and less respectful.",
            "You can recover from it, but the cleaner move is to establish rapport first and then open the history."
          ],
          options: [
            { label: "Continue", next: "step2" }
          ]
        },
        step1B: {
          title: "This is the best opening.",
          body: [
            "You introduce yourself, confirm Jordan's name and pronouns, and create enough rapport to move into a sensitive interview.",
            "That makes it easier to gather a fuller history before you start narrowing the differential."
          ],
          options: [
            { label: "Continue", next: "step2" }
          ]
        },
        step1C: {
          title: "You labeled the problem too early.",
          body: [
            "Calling it depression before hearing the story risks anchoring both you and Jordan.",
            "It may also make the patient feel boxed into a diagnosis they did not choose themselves."
          ],
          options: [
            { label: "Continue", next: "step2" }
          ]
        },
        step1D: {
          title: "Chart review matters, but not here.",
          body: [
            "Reviewing the chart is important, but ideally that happens before you enter the encounter.",
            "Doing it during the greeting can make you appear distracted right when you most need presence."
          ],
          options: [
            { label: "Continue", next: "step2" }
          ]
        },
        step2: {
          title: "How do you explore further?",
          body: [
            "Jordan says, 'I have just been feeling really low again. I am dragging at work, and it feels like last time.'",
            "You need the next question that opens the story instead of flattening it too quickly."
          ],
          options: [
            { label: "Say, 'Tell me more about what feeling low has been like for you.'", next: "step2A" },
            { label: "Say, 'How long has this been happening?'", next: "step2B" },
            { label: "Say, 'Is this mostly about work stress?'", next: "step2C" },
            { label: "Say, 'On a scale of 1 to 10 how bad is the depression?'", next: "step2D" }
          ]
        },
        step2A: {
          title: "This is the strongest follow-up.",
          body: [
            "Open-ended phrasing lets Jordan describe symptoms in their own terms before you reduce them to categories.",
            "That usually gives you the best starting point for both diagnosis and treatment planning."
          ],
          options: [
            { label: "Continue", next: "step3" }
          ]
        },
        step2B: {
          title: "Useful, but a little too narrow.",
          body: [
            "Duration matters, but you are moving to timeline before fully understanding the experience itself.",
            "You will still get useful information, but the broader entry point would have been stronger."
          ],
          options: [
            { label: "Continue", next: "step3" }
          ]
        },
        step2C: {
          title: "You anchored too quickly.",
          body: [
            "Work stress may matter, but jumping to a single explanation this early can narrow both your thinking and the patient's story."
          ],
          options: [
            { label: "Continue", next: "step3" }
          ]
        },
        step2D: {
          title: "A number is not the same as a history.",
          body: [
            "Severity scales can help later, but opening with a score risks compressing a complex syndrome into one number before you understand it."
          ],
          options: [
            { label: "Continue", next: "step3" }
          ]
        },
        step3: {
          title: "What do you ask next?",
          body: [
            "Jordan tells you this has been going on for a few months. They are tired, cannot think straight, do not enjoy anything, and have started calling in sick.",
            "Now you need the question that best clarifies the syndrome."
          ],
          options: [
            { label: "Ask about sleep, appetite, energy, concentration, interest, and psychomotor changes.", next: "step3A" },
            { label: "Ask about substance use.", next: "step3B" },
            { label: "Ask only about anxiety and panic attacks.", next: "step3C" },
            { label: "Ask detailed questions about childhood.", next: "step3D" }
          ]
        },
        step3A: {
          title: "This is the right structure.",
          body: [
            "You perform a structured depressive symptom review.",
            "Jordan reports insomnia with early morning awakening, low appetite with some weight loss, very low energy, impaired concentration, and markedly decreased interest in hobbies. That pattern supports a major depressive episode."
          ],
          options: [
            { label: "Continue", next: "step4" }
          ]
        },
        step3B: {
          title: "Important, but not first.",
          body: [
            "Substance use matters, but you have not yet confirmed the full depressive syndrome.",
            "The symptom structure still needs to come first."
          ],
          options: [
            { label: "Continue", next: "step4" }
          ]
        },
        step3C: {
          title: "Too narrow for this moment.",
          body: [
            "Anxiety and panic may be present, but focusing only there risks missing the full depressive picture that is driving the visit."
          ],
          options: [
            { label: "Continue", next: "step4" }
          ]
        },
        step3D: {
          title: "You moved too far from the immediate problem.",
          body: [
            "Deep psychosocial history can matter, but it is not the priority before you establish the current syndrome and what it is doing to Jordan's life."
          ],
          options: [
            { label: "Continue", next: "step4" }
          ]
        },
        step4: {
          title: "What is the most useful next step?",
          body: [
            "Jordan's symptoms have been present most days for about four months. Work attendance is slipping, social contact has narrowed, and chores are piling up.",
            "At this point you know you are dealing with a recurrent major depressive episode. Now you need the next move that most improves safety and treatment planning."
          ],
          options: [
            {
              label: "Ask about thoughts of death, not wanting to live, or harming themself.",
              effect: function () {
                state.safetyAsked = true;
              },
              next: "step4A"
            },
            { label: "Ask about previous antidepressant medication trials.", next: "step4B" },
            { label: "Immediately start talking about medication options.", next: "step4C" },
            { label: "Ask in detail about relationship conflicts.", next: "step4D" }
          ]
        },
        step4A: {
          title: "This is important and appropriate.",
          body: [
            "You ask directly about death wishes, not wanting to be alive, and suicidal thinking.",
            "Jordan says they have not had thoughts of killing themself, but sometimes think they would not mind not waking up. That is a death wish rather than clear suicidal ideation, and it needs documentation plus follow-up."
          ],
          options: [
            { label: "Now review prior medication history", next: "step5" }
          ]
        },
        step4B: {
          title: "This is the strongest move for medication planning.",
          body: [
            "For recurrent depression, past response and past side effects often matter more than simply picking another generic first-line option.",
            "You still need direct safety questions before the visit ends, but this is the right pivot for choosing a medication well."
          ],
          options: [
            { label: "Continue", next: "step5" }
          ]
        },
        step4C: {
          title: "You are moving too fast.",
          body: [
            "Talking about medication before clarifying prior trials, side effects, and safety issues leaves you vulnerable to a poorly tailored plan."
          ],
          options: [
            { label: "Continue", next: "step5" }
          ]
        },
        step4D: {
          title: "Not the next priority.",
          body: [
            "Relationships may matter, but they are not more urgent than medication history and direct safety assessment in a recurrent depressive episode."
          ],
          options: [
            { label: "Continue", next: "step5" }
          ]
        },
        step5: {
          title: "What do you clarify about prior treatment?",
          body: [
            "You ask about previous antidepressants.",
            "Jordan tells you escitalopram helped a lot at first and then seemed to stop working. Fluoxetine helped for a while and then also faded. Both caused major sexual side effects."
          ],
          options: [
            {
              label: "Ask more about any other medication trials or side effects.",
              effect: function () {
                state.medHistoryDeep = true;
              },
              next: "step5A"
            },
            { label: "Ask about substance use now.", next: "step5B" },
            { label: "Ask about medical history including blood pressure and other conditions.", next: "step5C" },
            { label: "Skip straight to suggesting a different SSRI.", next: "step5D" }
          ]
        },
        step5A: {
          title: "This gives you the most useful detail.",
          body: [
            "Jordan says sertraline was also tried briefly, but it made them feel wired and the sexual side effects were awful.",
            "Now you know multiple SSRIs have caused sexual dysfunction and that the class keeps losing usefulness over time. Jordan is understandably reluctant to try just another SSRI."
          ],
          options: [
            { label: "Continue", next: "step6" }
          ]
        },
        step5B: {
          title: "Helpful, but not the main issue.",
          body: [
            "Jordan drinks socially and does not use illicit drugs.",
            "That matters, but you still need the more targeted medication and medical history that will actually shape antidepressant selection."
          ],
          options: [
            { label: "Continue", next: "step6" }
          ]
        },
        step5C: {
          title: "Relevant, but you skipped an important layer.",
          body: [
            "Medical history will matter a lot, but you have not yet fully closed the loop on past antidepressant side effects and class failure."
          ],
          options: [
            { label: "Continue", next: "step6" }
          ]
        },
        step5D: {
          title: "That would repeat known problems.",
          body: [
            "Suggesting another SSRI right now ignores both the fading benefit and the major sexual side effects Jordan has already experienced across the class."
          ],
          options: [
            { label: "Continue", next: "step6" }
          ]
        },
        step6: {
          title: "What matters most before choosing a medication?",
          body: [
            "You shift to medical history and common rule-outs.",
            "Jordan has hypertension treated with lisinopril. They had a generalized seizure after a head injury in college, were told they have a seizure disorder, and still take levetiracetam. Their BMI is in the low 30s.",
            "You order a CBC, CMP, TSH, B12, and folate. The TSH returns normal, so hypothyroidism is unlikely to explain the current symptoms."
          ],
          options: [
            {
              label: "Ask specifically about concerns around weight and appetite.",
              effect: function () {
                state.weightConcernAsked = true;
              },
              next: "step6A"
            },
            { label: "Ask about chronic pain and neuropathy.", next: "step6B" },
            {
              label: "Ask how the seizure history has been recently and confirm current seizure control.",
              effect: function () {
                state.seizureClarified = true;
              },
              next: "step6C"
            },
            { label: "Ask only whether they smoke cigarettes.", next: "step6D" }
          ]
        },
        step6A: {
          title: "Useful, but not the single highest-stakes detail.",
          body: [
            "Jordan says weight changes matter a lot to them. They are already uncomfortable with their current weight and do not want a medication that makes that worse.",
            "That is helpful, but the seizure history remains the most important contraindication to clarify before you prescribe."
          ],
          options: [
            { label: "Continue", next: "step7" }
          ]
        },
        step6B: {
          title: "That would matter in a different case.",
          body: [
            "Duloxetine can be attractive when chronic pain or neuropathy are prominent, but Jordan denies chronic pain symptoms.",
            "This line of questioning does not do much to improve the fit of your medication choice here."
          ],
          options: [
            { label: "Continue", next: "step7" }
          ]
        },
        step6C: {
          title: "This is the most important clarification.",
          body: [
            "You confirm Jordan has not had recent seizures and remains on levetiracetam, but the diagnosis of seizure disorder still stands.",
            "That immediately rules bupropion out as a safe option and sharply improves your medication shortlist."
          ],
          options: [
            { label: "Continue", next: "step7" }
          ]
        },
        step6D: {
          title: "Too minor for the moment.",
          body: [
            "Smoking status has some pharmacology relevance, but it is far less important here than seizure history, blood pressure, weight concerns, and prior sexual side effects."
          ],
          options: [
            { label: "Continue", next: "step7" }
          ]
        },
        step7: {
          title: "What final practical detail do you still need?",
          body: [
            "You ask about sleep.",
            "Jordan says they have trouble falling asleep, wake up early, feel exhausted during the day, and cannot afford to be heavily sedated because their job requires them to stay sharp.",
            "Now the key picture is clear: recurrent depression, prior SSRI failure and sexual dysfunction, hypertension, seizure disorder, weight concerns, insomnia, and a need for daytime alertness."
          ],
          options: [
            { label: "Move to medication selection", next: "step8" }
          ]
        },
        step8: function () {
          const intro = [];
          if (!state.safetyAsked) {
            intro.push("You have enough information to choose a medication, but note that you still need to ask directly about death wishes or suicidal ideation before the visit is complete.");
          } else {
            intro.push("You have already addressed emotional safety directly, so the remaining task is to choose the cleanest medication fit.");
          }

          intro.push("Jordan has recurrent major depressive disorder. Multiple SSRIs helped at first and then lost effect while causing major sexual dysfunction. Blood pressure already matters. Weight already matters. Seizure history makes bupropion unsafe. TSH is normal, so hypothyroidism has been appropriately ruled out.");

          return {
            title: "Which antidepressant fits best?",
            body: intro,
            bullets: [
              "Vortioxetine can help mood and cognitive symptoms with relatively low sexual side effects and little impact on weight or blood pressure.",
              "Vilazodone is also a strong option when sexual side effects, weight, and blood pressure matter, though early activation can be an issue.",
              "Several other agents are plausible in the abstract but poorly matched once you really integrate Jordan's priorities and comorbidities."
            ],
            options: [
              { label: "Choose bupropion.", next: "choiceBupropion" },
              { label: "Choose venlafaxine.", next: "choiceVenlafaxine" },
              { label: "Choose duloxetine.", next: "choiceDuloxetine" },
              { label: "Choose sertraline.", next: "choiceSertraline" },
              { label: "Choose paroxetine.", next: "choiceParoxetine" },
              { label: "Choose mirtazapine.", next: "choiceMirtazapine" },
              { label: "Choose vortioxetine.", next: "choiceVortioxetine" },
              { label: "Choose vilazodone.", next: "choiceVilazodone" }
            ]
          };
        },
        choiceBupropion: {
          title: "Bupropion looks attractive until the contraindication becomes central.",
          body: [
            "Pros: it can help energy and concentration, usually causes little sexual dysfunction, and does not tend to cause weight gain.",
            "Major problem: bupropion lowers seizure threshold and is contraindicated in patients with a seizure disorder.",
            "Jordan has a documented seizure disorder and remains on levetiracetam. That makes this choice dangerous, not just imperfect."
          ],
          options: [
            { label: "See outcome", next: "endingBupropion" }
          ]
        },
        choiceVenlafaxine: {
          title: "Venlafaxine treats depression, but the fit is poor.",
          body: [
            "Venlafaxine can be effective, especially when anxiety rides along, but it tends to increase blood pressure, can worsen insomnia, and often carries sexual side effects.",
            "Jordan already has hypertension, insomnia, and strong sexual side-effect sensitivity. Those details make the match worse than it first appears."

      const sceneTitle = document.getElementById("sceneTitle");
      const sceneBody = document.getElementById("sceneBody");
      const sceneBullets = document.getElementById("sceneBullets");
      const sceneOptions = document.getElementById("sceneOptions");
      const caseFrame = document.querySelector(".caseFrame");
      const backButton = document.getElementById("backButton");

      function snapshotState() {
        return {
          safetyAsked: state.safetyAsked,
          medHistoryDeep: state.medHistoryDeep,
          seizureClarified: state.seizureClarified,
          weightConcernAsked: state.weightConcernAsked
        };
      }

      function restoreState(snapshot) {
        state.safetyAsked = snapshot.safetyAsked;
        state.medHistoryDeep = snapshot.medHistoryDeep;
        state.seizureClarified = snapshot.seizureClarified;
        state.weightConcernAsked = snapshot.weightConcernAsked;
      }

      function resetState() {
        restoreState(initialState);
      }

      function syncBackButton() {
        backButton.disabled = historyStack.length === 0;
      }

      function getScene(sceneId) {
        const scene = scenes[sceneId];
        if (typeof scene === "function") {
          return scene();
        }
        return scene;
      }

      function navigateTo(option) {
        if (!option) {
          return;
        }

        if (option.resetHistory) {
          historyStack.length = 0;
          resetState();
        } else if (currentSceneId) {
          historyStack.push({
            sceneId: currentSceneId,
            state: snapshotState()
          });
        }

        if (typeof option.effect === "function") {
          option.effect();
        }

        const nextScene = typeof option.next === "function" ? option.next() : option.next;
        if (!nextScene) {
          return;
        }

        renderScene(nextScene);
      }

      function renderBody(paragraphs, reflection) {
        sceneBody.innerHTML = "";
        (paragraphs || []).forEach(function (paragraph) {
          const p = document.createElement("p");
          p.textContent = paragraph;
          sceneBody.appendChild(p);
        });

        if (reflection) {
          const reflectionBox = document.createElement("div");
          reflectionBox.className = "reflectionBox";

          const heading = document.createElement("h2");
          heading.textContent = "Take-home pearl";
          reflectionBox.appendChild(heading);

          const paragraph = document.createElement("p");
          paragraph.textContent = reflection;
          reflectionBox.appendChild(paragraph);

          sceneBody.appendChild(reflectionBox);
        }
      }

      function renderBullets(items) {
        sceneBullets.innerHTML = "";

        if (!items || !items.length) {
          sceneBullets.classList.add("isHidden");
          return;
        }

        sceneBullets.classList.remove("isHidden");
        items.forEach(function (item) {
          const li = document.createElement("li");
          li.textContent = item;
          sceneBullets.appendChild(li);
        });
      }

      function renderScene(sceneId) {
        const scene = getScene(sceneId);
        if (!scene) {
          return;
        }

        if (typeof scene.onEnter === "function") {
          scene.onEnter();
        }

        sceneTitle.textContent = scene.title || "";
        renderBody(scene.body, scene.reflection);
        renderBullets(scene.bullets);

        sceneOptions.innerHTML = "";
        currentSceneId = sceneId;
        (scene.options || []).forEach(function (option) {
          const button = document.createElement("button");
          button.type = "button";
          button.className = "sceneOption";
          button.textContent = option.label;
          button.addEventListener("click", function () {
            navigateTo(option);
          });
          sceneOptions.appendChild(button);
        });

        syncBackButton();
        if (caseFrame) {
          caseFrame.scrollTop = 0;
        }
      }

      backButton.addEventListener("click", function () {
        const previousEntry = historyStack.pop();
        if (!previousEntry) {
          syncBackButton();
          return;
        }

        restoreState(previousEntry.state);
        renderScene(previousEntry.sceneId);
      });

      renderScene("start");
    })();
  </script>
