          "label": "Try to \"break the ice\" by insisting she answer simple questions out loud to prove she can speak",
          "next": "Step1B"
        },
        {
          "label": "Use a diagnostic label early (e.g., autism/ODD) and speak mainly to the parent while Leila listens",

        {

        "Leila's shoulders drop a fraction. She pulls a small notebook from her backpack and holds it on her lap.",

        "\"Let's start with patterns-where she can talk, where she can't, and when this began. We'll also make sure we rule out hearing or language issues, and then we can build a plan with school.\"",

        }

        "\"I want to talk but my throat locks.\"",
        "The pattern is increasingly consistent with Selective Mutism, often linked to social anxiety."
      ],
      "bullets": [],
      "options": [
        {
          "label": "Decide on next steps for confirmation, school collaboration, and treatment planning",
          "next": "Step3"
        }
      ]
    },

      "options": [
        {

      "title": "Step 3A",
      "body": [
        "You choose a conservative, single-approach approach: a generic referral and reassurance that she'll \"grow out of it.\" A speech-language evaluation is reasonable-but it becomes the only plan.",

      ],

      "options": [
        {
          "label": "Reflect on how a narrow plan can miss the core mechanism in Selective Mutism (anxiety + avoidance) and delay recovery",

      ]

      "title": "Step 3B",

        "School collaboration: predictable scripts, no cold-calling, alternative response formats at first, and a 504/IEP-style support plan.",
        "Consider SSRI only if severity is high or progress is stalled, as an adjunct to therapy."
