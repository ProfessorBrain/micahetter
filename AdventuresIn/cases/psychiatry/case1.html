<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="adventures-case-title" content="Feeling Down" />
  <meta name="adventures-case-subtitle" content="PCP setting" />
  <title>Adventures in Medicine - Psychiatry - Case 1</title>
  <style>
    :root {
      --paper: #ffffff;
      --ink: #f8f5ef;
      --ink-soft: rgba(255, 255, 255, 0.8);
      --black: #050505;
      --red: #ff2d22;
      --orange: #ff9d17;
      --yellow: #ffd62c;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      height: 100%;
      min-height: 100%;
      overflow: hidden;
      background:
        radial-gradient(circle at top, rgba(255, 214, 44, 0.16), transparent 34%),
        linear-gradient(180deg, #ffffff 0%, #fff9ef 55%, #fff4d9 100%);
      color: var(--black);
      font-family: "Source Sans 3", "Segoe UI", sans-serif;
    }

    body.has-medicine-shell .caseApp {
      padding-top: 8rem;
    }

    body.has-medicine-shell.medicineEmbedded .caseApp {
      padding-top: 1.5rem;
    }

    .caseApp {
      height: 100dvh;
      min-height: 100dvh;
      padding: 2rem 1rem 2rem;
      overflow: hidden;
    }

    .caseStage {
      max-width: 62rem;
      height: 100%;
      min-height: 0;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .caseBannerWrap {
      display: flex;
      justify-content: center;
    }

    .caseBanner {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto;
      padding: 0.7rem 1.5rem;
      border-radius: 999px;
      background: var(--red);
      border: 2px solid var(--paper);
      color: var(--paper);
      font-family: "Adventures Benguiat", "Fraunces", Georgia, serif;
      font-size: clamp(1rem, 1.6vw, 1.35rem);
      letter-spacing: 0.05em;
      text-align: center;
      box-shadow:
        0 0 0 2px var(--black),
        0 18px 38px rgba(255, 45, 34, 0.2);
    }

    .caseFrame {
      position: relative;
      display: flex;
      flex-direction: column;
      flex: 1 1 auto;
      min-height: 0;
      border-radius: 2rem;
      background: var(--black);
      padding: 2rem 1.5rem 1.6rem;
      overflow-y: auto;
      overscroll-behavior: contain;
      scrollbar-gutter: stable;
      border: 3px solid var(--orange);
      box-shadow:
        0 0 0 7px var(--yellow),
        0 0 0 12px var(--orange),
        0 26px 60px rgba(0, 0, 0, 0.22);
      color: var(--ink);
    }

    .caseFrame::before,
    .caseFrame::after {
      content: "";
      position: absolute;
      inset: 10px;
      border-radius: 1.45rem;
      pointer-events: none;
    }

    .caseFrame::before {
      border: 1px solid rgba(255, 214, 44, 0.24);
    }

    .caseFrame::after {
      inset: auto 1.2rem 1.2rem;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255, 214, 44, 0.4), transparent);
    }

    .caseFrame::-webkit-scrollbar {
      width: 12px;
    }

    .caseFrame::-webkit-scrollbar-thumb {
      background: linear-gradient(180deg, rgba(255, 214, 44, 0.9), rgba(255, 157, 23, 0.88), rgba(255, 45, 34, 0.84));
      border: 3px solid rgba(0, 0, 0, 0);
      border-radius: 999px;
      background-clip: padding-box;
    }
    .sceneTitle {
      margin: 0;
      font-family: "Adventures Benguiat", "Fraunces", Georgia, serif;
      font-size: clamp(1.45rem, 2.35vw, 2.05rem);
      line-height: 0.95;
      color: var(--paper);
    }

    .sceneBody {
      margin-top: 1.5rem;
      font-size: clamp(1.02rem, 2.3vw, 1.22rem);
      line-height: 1.72;
    }

    .sceneBody p {
      margin: 0 0 1rem;
    }

    .sceneBody p:last-child {
      margin-bottom: 0;
    }

    .sceneBullets {
      margin: 1rem 0 0;
      padding-left: 1.35rem;
      color: var(--ink);
      line-height: 1.65;
    }

    .sceneBullets.isHidden {
      display: none;
    }

    .sceneBullets li + li {
      margin-top: 0.65rem;
    }

    .sceneOptions {
      display: grid;
      gap: 0.8rem;
      margin-top: 1.8rem;
    }

    .sceneFooter {
      display: flex;
      justify-content: flex-start;
      margin-top: auto;
      padding-top: 1.2rem;
    }

    .sceneOption {
      width: 100%;
      border: 1px solid rgba(255, 157, 23, 0.42);
      border-radius: 1.15rem;
      background:
        linear-gradient(180deg, rgba(255, 214, 44, 0.12), rgba(255, 45, 34, 0.08) 40%, rgba(255, 255, 255, 0.02)),
        rgba(0, 0, 0, 0.96);
      color: var(--paper);
      padding: 1rem 1.05rem;
      font: inherit;
      font-size: 1rem;
      font-weight: 700;
      line-height: 1.45;
      text-align: left;
      cursor: pointer;
      transition: transform 180ms ease, border-color 180ms ease, background 180ms ease;
    }

    .sceneOption:hover {
      transform: translateY(-1px);
      border-color: rgba(255, 214, 44, 0.74);
      background:
        linear-gradient(180deg, rgba(255, 214, 44, 0.18), rgba(255, 45, 34, 0.11) 40%, rgba(255, 255, 255, 0.03)),
        rgba(0, 0, 0, 1);
    }

    .sceneOption:focus-visible {
      outline: 3px solid rgba(255, 214, 44, 0.45);
      outline-offset: 3px;
    }

    .backButton {
      border: 1px solid rgba(255, 157, 23, 0.5);
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.94);
      color: var(--paper);
      min-width: 3.2rem;
      min-height: 3.2rem;
      padding: 0.7rem;
      font: inherit;
      font-size: 1.4rem;
      font-weight: 700;
      line-height: 1;
      cursor: pointer;
      transition: transform 180ms ease, border-color 180ms ease, opacity 180ms ease;
    }

    .backButton:hover:not(:disabled) {
      transform: translateY(-1px);
      border-color: rgba(255, 214, 44, 0.78);
    }

    .backButton:focus-visible {
      outline: 3px solid rgba(255, 214, 44, 0.45);
      outline-offset: 3px;
    }

    .backButton:disabled {
      cursor: not-allowed;
      opacity: 0.42;
      border-color: rgba(255, 157, 23, 0.22);
    }

    .reflectionBox {
      margin-top: 1.25rem;
      padding: 1rem 1rem 0.3rem;
      border-radius: 1.2rem;
      border: 1px solid rgba(255, 214, 44, 0.24);
      background: rgba(255, 255, 255, 0.04);
    }

    .reflectionBox h2 {
      margin: 0 0 0.75rem;
      color: var(--yellow);
      font-family: "Adventures Benguiat", "Fraunces", Georgia, serif;
      font-size: 1.6rem;
      line-height: 1;
    }

    @media (max-width: 720px) {
      .caseApp {
        padding: 1rem 0.8rem 1.15rem;
      }

      .caseFrame {
        border-radius: 1.4rem;
        padding: 1.45rem 1rem 1.05rem;
        box-shadow:
          0 0 0 5px var(--yellow),
          0 0 0 9px var(--orange),
          0 16px 32px rgba(0, 0, 0, 0.18);
      }

      .caseFrame::before {
        inset: 8px;
      }

      .sceneOption {
        padding: 0.95rem 0.9rem;
      }
    }
  </style>
  <script src="../../adventures-case-shell.js" defer></script>
</head>
<body>
  <noscript>This case requires JavaScript in order to present its interactive choices.</noscript>

  <main class="caseApp">
    <div class="caseStage">
      <div class="caseBannerWrap">
        <div class="caseBanner">ADVENTURES IN PSYCHIATRY</div>
      </div>

      <section class="caseFrame" aria-live="polite">
        <h1 class="sceneTitle" id="sceneTitle">Case 1: Feeling Down</h1>
        <div class="sceneBody" id="sceneBody"></div>
        <ul class="sceneBullets isHidden" id="sceneBullets"></ul>
        <div class="sceneOptions" id="sceneOptions"></div>
        <div class="sceneFooter">
          <button type="button" class="backButton" id="backButton" aria-label="Go back" disabled>&larr;</button>
        </div>
      </section>
    </div>
  </main>

  <script>
    (function () {
      const initialState = {
        ruleoutsDone: false,
        safetyStatus: "none"
      };
      const defaultMeta = ["32-year-old patient", "low mood and fatigue", "outpatient PCP visit"];
      const diagnosticMeta = ["depression interview", "medical ruleouts", "risk assessment"];
      const treatmentMeta = ["treatment planning", "follow-up", "reflective feedback"];

      const state = {
        ruleoutsDone: initialState.ruleoutsDone,
        safetyStatus: initialState.safetyStatus
      };
      const historyStack = [];
      let currentSceneId = null;

      const scenes = {
        start: {
          onEnter: function () {
            state.ruleoutsDone = false;
            state.safetyStatus = "none";
          },
          eyebrow: "Adventures in Psychiatry",
          title: "Case 1: Feeling Down",
          step: "PCP setting",
          meta: defaultMeta,
          body: [
            "You are a medical student seeing Sam, 32, in an outpatient primary care clinic.",
            "Sam presents for a first visit with the chief complaint of feeling down. The task is not just to recognize depression, but to interview carefully, avoid premature closure, and notice what still needs to be ruled out before you finalize a plan.",
            "Your choices shape what gets uncovered and what gets missed."
          ],
          options: [
            { label: "Begin the encounter", next: "step1" }
          ]
        },
        step1: {
          eyebrow: "Step 1",
          title: "How would you best begin this encounter?",
          step: "Start with rapport before interpretation",
          meta: defaultMeta,
          body: [
            "Sam is meeting you for the first time. The way you open the visit will shape trust and the quality of the history that follows."
          ],
          options: [
            { label: "Ask Sam what brought them into the office.", next: "step1A" },
            { label: "Introduce yourself and ask for the patient's name.", next: "step1B" },
            { label: "Introduce yourself and say, 'It sounds like you came in for depression?'", next: "step1C" },
            { label: "Introduce yourself and review the chart before beginning the exam.", next: "step1D" }
          ]
        },
        step1A: {
          eyebrow: "Step 1 feedback",
          title: "Reasonable, but not quite ideal.",
          step: "Introductions still matter first",
          meta: defaultMeta,
          body: [
            "This is a workable opening, but introductions should usually come first to establish rapport and confirm identity.",
            "Starting with 'what brings you in?' before introducing yourself can feel abrupt."
          ],
          options: [
            { label: "Continue to Step 2", next: "step2" }
          ]
        },
        step1B: {
          eyebrow: "Step 1 feedback",
          title: "This is the best opening.",
          step: "Identity, rapport, then symptoms",
          meta: defaultMeta,
          body: [
            "Strong choice. You introduce yourself, confirm Sam's name and pronouns, and create enough safety to move into a sensitive interview."
          ],
          options: [
            { label: "Continue to Step 2", next: "step2" }
          ]
        },
        step1C: {
          eyebrow: "Step 1 feedback",
          title: "You labeled the problem too early.",
          step: "Avoid diagnostic framing before the story",
          meta: defaultMeta,
          body: [
            "You introduced yourself, but you also assumed a diagnosis from very little data.",
            "Calling it depression this early can bias both you and the patient."
          ],
          options: [
            { label: "Continue to Step 2", next: "step2" }
          ]
        },
        step1D: {
          eyebrow: "Step 1 feedback",
          title: "Chart review belongs before the room, not during the greeting.",
          step: "Presence matters at the start",
          meta: defaultMeta,
          body: [
            "Reviewing the chart is important, but doing it while greeting Sam risks signaling distraction.",
            "You can recover, but the opening could have been cleaner."
          ],
          options: [
            { label: "Continue to Step 2", next: "step2" }
          ]
        },
        step2: {
          eyebrow: "Step 2",
          title: "How would you best begin the history?",
          step: "Let the patient define the problem first",
          meta: defaultMeta,
          body: [
            "After introductions, Sam says, 'I've just been feeling really down and tired.'",
            "You need a question that opens the problem rather than shrinking it too quickly."
          ],
          options: [
            { label: "'I see the chart says you came in because you were feeling down. Tell me more in your own words.'", next: "step2A" },
            { label: "'So you've been feeling down? How long has that been going on?'", next: "step2B" },
            { label: "'What does it mean when you say you're feeling down?'", next: "step2C" },
            { label: "'It sounds like your energy has been low. How long has that been going on?'", next: "step2D" }
          ]
        },
        step2A: {
          eyebrow: "Step 2 feedback",
          title: "This is the strongest history opener.",
          step: "Open-ended and patient centered",
          meta: defaultMeta,
          body: [
            "You invite Sam to describe the problem in their own words, which usually reveals the most important concerns before you narrow the interview."
          ],
          options: [
            { label: "Continue to Step 3", next: "step3" }
          ]
        },
        step2B: {
          eyebrow: "Step 2 feedback",
          title: "Reasonable, but a little too narrow.",
          step: "Duration matters after definition",
          meta: defaultMeta,
          body: [
            "This gets useful information, but it pushes toward timeline before you fully understand what 'down' means for Sam."
          ],
          options: [
            { label: "Continue to Step 3", next: "step3" }
          ]
        },
        step2C: {
          eyebrow: "Step 2 feedback",
          title: "Acceptable, but still narrower than needed.",
          step: "Clarification is not the same as full opening",
          meta: defaultMeta,
          body: [
            "Clarifying language can help, but 'tell me more' would usually give you a fuller entry point into the history."
          ],
          options: [
            { label: "Continue to Step 3", next: "step3" }
          ]
        },
        step2D: {
          eyebrow: "Step 2 feedback",
          title: "You inserted your own assumption.",
          step: "Do not put symptoms in the patient's mouth",
          meta: defaultMeta,
          body: [
            "Leading with low energy before Sam has confirmed it can shape the answer and narrow the rest of the visit."
          ],
          options: [
            { label: "Continue to Step 3", next: "step3" }
          ]
        },
        step3: {
          eyebrow: "Step 3",
          title: "What is your next step?",
          step: "Frame severity and functional impact",
          meta: diagnosticMeta,
          body: [
            "Sam says, 'I've been feeling down for a while. It's affecting my concentration, and I'm tired most of the time.'",
            "You now need the next question that most improves diagnostic clarity."
          ],
          options: [
            { label: "Ask how long this has been going on and how it has affected Sam's life and functioning.", next: "step3B" },
            { label: "Ask about appetite or weight changes.", next: "step3A" },
            { label: "Ask whether this is mostly related to work stress.", next: "step3C" },
            { label: "Ask about periods of unusually high energy or very little sleep.", next: "step3D" }
          ]
        },
        step3A: {
          eyebrow: "Step 3 feedback",
          title: "You jumped to one symptom too soon.",
          step: "Do not lose the overall syndrome",
          meta: diagnosticMeta,
          body: [
            "Appetite and weight matter, but focusing on a single symptom now can make you lose the larger picture of duration and impairment."
          ],
          options: [
            { label: "Continue to Step 4", next: "step4" }
          ]
        },
        step3B: {
          eyebrow: "Step 3 feedback",
          title: "This is the best next step.",
          step: "Duration and function shape diagnosis",
          meta: diagnosticMeta,
          body: [
            "Exactly. Duration and functional impact help distinguish a passing reaction from a depressive syndrome and set up the rest of the interview well."
          ],
          options: [
            { label: "Continue to Step 4", next: "step4" }
          ]
        },
        step3C: {
          eyebrow: "Step 3 feedback",
          title: "You anchored to one explanation too quickly.",
          step: "Stress can matter without becoming the whole case",
          meta: diagnosticMeta,
          body: [
            "Work stress may be relevant, but assuming it is the main driver too early can narrow your thinking before you establish the syndrome."
          ],
          options: [
            { label: "Continue to Step 4", next: "step4" }
          ]
        },
        step3D: {
          eyebrow: "Step 3 feedback",
          title: "Important question, but not first.",
          step: "Basic depressive assessment comes before branching screens",
          meta: diagnosticMeta,
          body: [
            "Bipolar screening matters, but pursuing it before you have finished a basic depression interview can confuse the patient and derail the structure of the visit."
          ],
          options: [
            { label: "Continue to Step 4", next: "step4" }
          ]
        },
        step4: {
          eyebrow: "Step 4",
          title: "What is the next best diagnostic move?",
          step: "Do a systematic symptom review",
          meta: diagnosticMeta,
          body: [
            "You now know the symptoms have lasted for months and have affected work and social life.",
            "The next task is to assess the syndrome more systematically before you commit to treatment."
          ],
          options: [
            { label: "Ask about depressive symptoms such as sleep, appetite, energy, concentration, interest, and psychomotor change.", next: "step4A" },
            { label: "Ask whether Sam has been diagnosed with depression before.", next: "step4B" },
            { label: "Tell Sam this sounds like depression and begin discussing treatment now.", next: "step4C" },
            { label: "Explore childhood and early experiences in depth.", next: "step4D" }
          ]
        },
        step4A: {
          eyebrow: "Step 4 feedback",
          title: "This is the right diagnostic pivot.",
          step: "Now you have a syndrome, not just a complaint",
          meta: diagnosticMeta,
          body: [
            "You review sleep, appetite, energy, concentration, and interest. Sam reports insomnia, low appetite, low energy, poor concentration, and reduced enjoyment of activities.",
            "At this point, a major depressive episode is becoming much more likely."
          ],
          options: [
            { label: "Continue to Step 5", next: "step5" }
          ]
        },
        step4B: {
          eyebrow: "Step 4 feedback",
          title: "Past labels do not replace current assessment.",
          step: "A prior diagnosis is supporting data, not the diagnosis itself",
          meta: diagnosticMeta,
          body: [
            "Prior diagnoses can help, but relying on them too heavily can create diagnostic inertia and miss what is different this time."
          ],
          options: [
            { label: "Continue to Step 5", next: "step5" }
          ]
        },
        step4C: {
          eyebrow: "Step 4 feedback",
          title: "You moved too quickly into treatment.",
          step: "Confirm before you conclude",
          meta: diagnosticMeta,
          body: [
            "Starting treatment discussion before you confirm symptoms and consider contributors risks both misdiagnosis and missed context."
          ],
          options: [
            { label: "Continue to Step 5", next: "step5" }
          ]
        },
        step4D: {
          eyebrow: "Step 4 feedback",
          title: "That history can wait.",
          step: "Current syndrome first, deep background second",
          meta: diagnosticMeta,
          body: [
            "A detailed psychosocial history may become valuable later, but right now the priority is still the current depressive syndrome and what else could be contributing to it."
          ],
          options: [
            { label: "Continue to Step 5", next: "step5" }
          ]
        },
        step5: {
          eyebrow: "Step 5",
          title: "What do you do next?",
          step: "Rule out common contributors before you close the loop",
          meta: diagnosticMeta,
          body: [
            "By now you have a convincing depressive picture: low mood, low interest, sleep disturbance, appetite change, low energy, poor concentration, and clear functional decline.",
            "You still need to decide how carefully you will evaluate contributors before finalizing the diagnosis."
          ],
          options: [
            { label: "Ask about substance use in a neutral, nonjudgmental way.", next: "step5Substances" },
            { label: "Order basic labs to look for medical contributors such as thyroid disease, anemia, B12 deficiency, or metabolic illness.", next: "step5Labs", effect: function () { state.ruleoutsDone = true; } },
            { label: "Skip further ruleouts and decide this is major depression based on history alone.", next: "step5SkipRuleouts", effect: function () { state.ruleoutsDone = false; } }
          ]
        },
        step5Substances: {
          eyebrow: "Step 5 feedback",
          title: "This is a useful piece of the ruleout work.",
          step: "Still not the whole job",
          meta: diagnosticMeta,
          body: [
            "You ask about alcohol, medications, and other substances in a neutral way. Sam denies alcohol or drug use.",
            "Substances seem less likely, but you still need to decide whether to do basic medical ruleouts."
          ],
          options: [
            { label: "Order basic labs to look for medical contributors.", next: "step5Labs", effect: function () { state.ruleoutsDone = true; } },
            { label: "Move ahead without labs.", next: "step5SkipRuleouts", effect: function () { state.ruleoutsDone = false; } }
          ]
        },
        step5Labs: {
          eyebrow: "Step 5 feedback",
          title: "You kept the differential disciplined.",
          step: "Psychiatric diagnosis still benefits from medical thinking",
          meta: diagnosticMeta,
          body: [
            "You order CBC, CMP, thyroid studies, B12, and folate. The results return normal.",
            "That does not make the depression less real. It simply means you are not ignoring common medical contributors while making the diagnosis."
          ],
          options: [
            { label: "Before finalizing your plan, choose what to focus on next.", next: "step6Focus" }
          ]
        },
        step5SkipRuleouts: {
          eyebrow: "Step 5 feedback",
          title: "You have enough to suspect depression, but not enough to close the file.",
          step: "The missing step may matter later",
          meta: diagnosticMeta,
          body: [
            "The history is certainly compatible with a depressive episode, but skipping basic medical ruleouts leaves an avoidable blind spot in the assessment."
          ],
          options: [
            { label: "Before finalizing your plan, choose what to focus on next.", next: "step6Focus" }
          ]
        },
        step6Focus: function () {
          return {
            eyebrow: "Step 6",
            title: "What do you choose to focus on next?",
            step: state.ruleoutsDone ? "Now assess risk before treatment" : "Risk still matters, even if ruleouts were skipped",
            meta: ["risk assessment", state.ruleoutsDone ? "labs completed" : "labs skipped", "treatment planning"],
            body: [
              state.ruleoutsDone
                ? "You are close to moving into treatment planning. There is still one major area that can change the safety of everything that follows."
                : "You are close to treatment planning, but you have not done medical ruleouts. There is still one major area that can change the safety of everything that follows.",
              "Time is limited. What do you make sure to address before the visit moves on?"
            ],
            options: [
              { label: "Ask whether Sam has had any thoughts about death, not wanting to be alive, or harming themself.", next: "step6AskSI" },
              { label: "Explore in more detail how this has affected work, relationships, and coping strategies.", next: "step6Function", effect: function () { state.safetyStatus = "none"; } },
              { label: "Begin discussing treatment options and preferences in depth.", next: "step6MoveToTreatment", effect: function () { state.safetyStatus = "none"; } },
              { label: "Offer reassurance, summarize what you have heard, and end the visit for now.", next: "ending8", effect: function () { state.safetyStatus = "none"; } }
            ]
          };
        },
        step6AskSI: {
          eyebrow: "Risk clarification",
          title: "Sam gives an important answer.",
          step: "Death wish is not the same as suicidal ideation",
          meta: ["safety assessment", "death wish", "clarify risk"],
          body: [
            "You ask directly and calmly whether Sam has had thoughts about death or not wanting to be alive.",
            "Sam pauses and says, 'Sometimes I just wish I would not wake up.'",
            "That is a death wish: wanting to be dead or not wake up. It is not yet the same as suicidal ideation, which means thoughts of killing oneself."
          ],
          options: [
            { label: "Acknowledge the death wish and move on to treatment planning.", next: "step7", effect: function () { state.safetyStatus = "deathwish"; } },
            { label: "Ask more specifically whether Sam has had thoughts of killing themself or ending their life.", next: "step6ProbeSI" }
          ]
        },
        step6ProbeSI: {
          eyebrow: "Risk clarification",
          title: "Now the risk picture is more accurate.",
          step: "Specific questions change the assessment",
          meta: ["safety assessment", "suicidal ideation", "safety planning"],
          body: [
            "When you ask more specifically about thoughts of killing themself, Sam hesitates and then says the thought has been there sometimes, though there is no current plan or intent.",
            "This is suicidal ideation. You discuss how to stay safe, what to do if the thoughts worsen, and how to reach urgent help."
          ],
          options: [
            { label: "Proceed to treatment planning with risk more clearly identified.", next: "step7", effect: function () { state.safetyStatus = "si"; } }
          ]
        },
        step6Function: {
          eyebrow: "Step 6 feedback",
          title: "You learned more about function, but you missed the safety turn.",
          step: "Context helps, but not at the expense of risk assessment",
          meta: ["functioning", "coping", "safety not assessed"],
          body: [
            "You get richer information about work, relationships, and coping, but the visit time is now largely spent.",
            "You never come back to direct questions about death wish or suicidal ideation."
          ],
          options: [
            { label: "Move into treatment planning.", next: "step7" }
          ]
        },
        step6MoveToTreatment: {
          eyebrow: "Step 6 feedback",
          title: "You skipped the most important unresolved question.",
          step: "Treatment planning does not replace risk assessment",
          meta: ["treatment discussion", "safety not assessed", "assessment incomplete"],
          body: [
            "You move into treatment preferences and next-step logistics without ever directly asking about thoughts of death or killing oneself.",
            "The plan may sound thoughtful, but the risk picture is incomplete."
          ],
          options: [
            { label: "Continue to treatment planning.", next: "step7" }
          ]
        },
        step7: function () {
          let introTitle = "Which treatment do you propose?";
          let introStep = "Choose a treatment plan that matches what you actually assessed.";
          let introBody = [];

          if (state.safetyStatus === "si") {
            introBody = [
              "Sam has disclosed suicidal ideation without current plan or intent. You have already discussed immediate safety and crisis steps.",
              state.ruleoutsDone
                ? "Now you need an evidence-based treatment plan with close follow-up."
                : "Now you need an evidence-based treatment plan, but you are still carrying the blind spot of skipped medical ruleouts."
            ];
          } else if (state.safetyStatus === "deathwish") {
            introBody = [
              "You have identified a death wish but you did not establish that suicidal ideation is absent. You know there is meaningful distress, but the risk picture is only partially defined.",
              state.ruleoutsDone
                ? "You still need a treatment plan with explicit follow-up and ongoing check-ins."
                : "You still need a treatment plan, but the assessment is incomplete both medically and from a risk standpoint."
            ];
          } else {
            introBody = [
              "You are now planning treatment without having directly asked about death wish or suicidal ideation.",
              "Whatever treatment you choose, that omission changes the safety of the plan."
            ];
          }

          return {
            eyebrow: "Step 7",
            title: introTitle,
            step: introStep,
            meta: treatmentMeta,
            body: introBody,
            options: [
              { label: "Recommend a combination of SSRI plus psychotherapy with structured follow-up.", next: function () { return resolveEnding("combo"); } },
              { label: "Recommend an SSRI alone with close follow-up and a low threshold to add therapy.", next: function () { return resolveEnding("ssri"); } },
              { label: "Recommend psychotherapy alone with close follow-up and clear criteria for adding medication.", next: function () { return resolveEnding("therapy"); } },
              { label: "Recommend supplements and vague lifestyle measures instead of evidence-based treatment.", next: function () { return resolveEnding("supplements"); } }
            ]
          };
        },
        ending1: {
          eyebrow: "Clinical Reflection",
          title: "Supported remission and a well-built assessment",
          step: "Best overall path",
          meta: ["evidence-based treatment", "risk addressed", "medical ruleouts done"],
          body: [
            "You combined evidence-based treatment with calm, explicit risk inquiry and basic medical ruleouts.",
            "Over the next several months, Sam's mood, sleep, appetite, concentration, and energy all improve. The earlier expressions of wanting not to wake up resolve, and later check-ins about suicidal ideation remain negative."
          ],
          bullets: [
            "What you did well: established rapport, structured the depressive interview, ruled out common medical contributors, and asked directly about death wish and suicidal ideation.",
            "Why this path worked: you balanced psychiatric reasoning with ordinary medical discipline and treated safety questions as routine clinical care, not as an afterthought.",
            "Teaching pearl: direct suicide-risk questions do not put ideas in a patient's head. They make the assessment safer and more accurate."
          ],
          reflection: "In depression visits, empathy is not enough by itself. Good care also means naming risk directly and ruling out common medical contributors.",
          options: [
            { label: "Play the case again", next: "start", resetHistory: true }
          ]
        },
        ending2: function () {
          return {
            eyebrow: "Clinical Reflection",
            title: "Good care, but slower improvement",
            step: "Reasonable outcome with one missing treatment modality",
            meta: ["single-modality treatment", "risk addressed", "follow-up matters"],
            body: [
              "Sam improves with treatment, but the recovery is slower and less complete than it might have been with a combined approach.",
              "Because you did address safety directly, you are able to monitor distress over time and adjust the plan when needed."
            ],
            bullets: [
              "What you did well: you asked directly about death wish or suicidal ideation and built follow-up around what you learned.",
              "What limited the outcome: one treatment modality can work, but combined treatment is often more effective for moderate depression.",
              state.ruleoutsDone
                ? "What you protected against: basic lab work kept you from missing common medical contributors."
                : "Residual risk: even though the psychiatric plan was reasonable, you still skipped a basic medical screen."
            ],
            reflection: "Single-modality care can help, but treatment planning works best when it is paired with a full assessment of risk and contributors.",
            options: [
              { label: "Play the case again", next: "start", resetHistory: true }
            ]
          };
        },
        ending5: {
          eyebrow: "Clinical Reflection",
          title: "You addressed emotional safety but missed the medical contributor",
          step: "Psychiatric reasoning needs medical discipline too",
          meta: ["risk addressed", "labs skipped", "diagnostic blind spot"],
          body: [
            "You handled the emotional assessment thoughtfully, but you never obtained basic labs.",
            "Months later, another clinician checks thyroid studies and finds significant hypothyroidism. With thyroid treatment, Sam's mood and energy improve further."
          ],
          bullets: [
            "What you did well: you clarified death wish or suicidal ideation and did not leave the risk conversation vague.",
            "What you missed: common medical contributors still matter, even when the story sounds highly psychiatric.",
            "Teaching pearl: psychiatric care and medical ruleouts are not competing tasks. In many outpatient cases, they are both standard care."
          ],
          reflection: "A good psychiatric interview is stronger when it still behaves like good medicine.",
          options: [
            { label: "Play the case again", next: "start", resetHistory: true }
          ]
        },
        ending7: {
          eyebrow: "Clinical Reflection",
          title: "Undertreatment and persistent impairment",
          step: "Supportive language is not enough",
          meta: ["undertreatment", "ongoing symptoms", "missed opportunity"],
          body: [
            "You considered many aspects of Sam's experience, but you recommended supplements and vague lifestyle changes instead of evidence-based treatment for moderate depression.",
            "Sam's symptoms persist or worsen, functioning keeps slipping, and care eventually has to be rebuilt elsewhere."
          ],
          bullets: [
            "What was missing: a concrete evidence-based treatment recommendation with follow-up.",
            "Why this matters: even a strong assessment does not help enough if the treatment plan is too weak for the severity of illness.",
            "Teaching pearl: reflective feedback should not blur into therapeutic passivity."
          ],
          reflection: "Naming the problem well still has to be followed by treating it well.",
          options: [
            { label: "Play the case again", next: "start", resetHistory: true }
          ]
        },
        ending8: {
          eyebrow: "Clinical Reflection",
          title: "Missed suicide risk and emergency presentation",
          step: "The most serious missed branch",
          meta: ["safety missed", "high-stakes consequence", "serious clinical error"],
          body: [
            "Over the next few months, Sam's depression deepens. Because your visit never included a direct question about death wish, not wanting to be alive, or killing oneself, the risk picture remained invisible in the chart and in your plan.",
            "One evening, after a particularly difficult day at work and an argument with a roommate, Sam attempts suicide and is brought to the emergency department."
          ],
          bullets: [
            "What was missed: there was no explicit suicide-risk assessment, no risk formulation, and no safety plan.",
            "Why the path worsened: treatment planning and empathy do not substitute for a direct risk question.",
            "Teaching pearl: ending a depression visit without ever asking about thoughts of death or killing oneself is a serious clinical error."
          ],
          reflection: "In depression care, the question you avoid may be the question that most changes the outcome.",
          options: [
            { label: "Play the case again", next: "start", resetHistory: true }
          ]
        }
      };

      const caseFrame = document.querySelector(".caseFrame");
      const sceneTitle = document.getElementById("sceneTitle");
      const sceneBody = document.getElementById("sceneBody");
      const sceneBullets = document.getElementById("sceneBullets");
      const sceneOptions = document.getElementById("sceneOptions");
      const backButton = document.getElementById("backButton");

      function snapshotState() {
        return {
          ruleoutsDone: state.ruleoutsDone,
          safetyStatus: state.safetyStatus
        };
      }

      function restoreState(snapshot) {
        state.ruleoutsDone = snapshot.ruleoutsDone;
        state.safetyStatus = snapshot.safetyStatus;
      }

      function resetState() {
        restoreState(initialState);
      }

      function syncBackButton() {
        backButton.disabled = historyStack.length === 0;
      }

      function resolveEnding(treatmentChoice) {
        if (treatmentChoice === "supplements") {
          return "ending7";
        }
        if (state.safetyStatus === "none") {
          return "ending8";
        }
        if (!state.ruleoutsDone) {
          return "ending5";
        }
        if (treatmentChoice === "combo") {
          return "ending1";
        }
        return "ending2";
      }

      function getScene(sceneId) {
        const scene = scenes[sceneId];
        if (typeof scene === "function") {
          return scene();
        }
        return scene;
      }

      function navigateTo(option) {
        if (!option) {
          return;
        }

        if (option && option.resetHistory) {
          historyStack.length = 0;
          resetState();
        } else if (currentSceneId) {
          historyStack.push({
            sceneId: currentSceneId,
            state: snapshotState()
          });
        }

        if (typeof option.effect === "function") {
          option.effect();
        }

        const nextScene = typeof option.next === "function" ? option.next() : option.next;
        if (!nextScene) {
          return;
        }

        renderScene(nextScene);
      }

      function renderScene(sceneId) {
        const scene = getScene(sceneId);
        if (!scene) {
          return;
        }

        if (typeof scene.onEnter === "function") {
          scene.onEnter();
        }

        sceneTitle.textContent = scene.title || "";

        sceneBody.innerHTML = (scene.body || []).map(function (paragraph) {
          return "<p>" + paragraph + "</p>";
        }).join("");

        if (scene.reflection) {
          sceneBody.innerHTML += '<div class="reflectionBox"><h2>Take-home pearl</h2><p>' + scene.reflection + '</p></div>';
        }

        if (scene.bullets && scene.bullets.length) {
          sceneBullets.classList.remove("isHidden");
          sceneBullets.innerHTML = scene.bullets.map(function (item) {
            return "<li>" + item + "</li>";
          }).join("");
        } else {
          sceneBullets.classList.add("isHidden");
          sceneBullets.innerHTML = "";
        }

        sceneOptions.innerHTML = "";
        currentSceneId = sceneId;
        (scene.options || []).forEach(function (option) {
          const button = document.createElement("button");
          button.type = "button";
          button.className = "sceneOption";
          button.textContent = option.label;
          button.addEventListener("click", function () {
            navigateTo(option);
          });
          sceneOptions.appendChild(button);
        });

        syncBackButton();
        if (caseFrame) {
          caseFrame.scrollTop = 0;
        }
      }

      backButton.addEventListener("click", function () {
        const previousEntry = historyStack.pop();
        if (!previousEntry) {
          syncBackButton();
          return;
        }

        restoreState(previousEntry.state);
        renderScene(previousEntry.sceneId);
      });

      renderScene("start");
    })();
  </script>
</body>
</html>
