<!doctype html>
<html lang="en">
<head>
<link rel="icon" type="image/png" sizes="32x32" href="favicon.png?v=2">
<link rel="shortcut icon" type="image/png" href="favicon.png?v=2">
<link rel="apple-touch-icon" href="favicon.png?v=2">
<meta name="theme-color" content="#ffffff">

  <meta charset="utf-8"/>
  <title>EEG Machine</title>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <meta name="description" content="Interactive EEG waveform explorer for learning normal rhythms, sleep stages, artifacts, and pathology patterns."/>
  <style>
/* Quiz panel styles */
#quizPanel{position:fixed;top:64px;right:8px;width:320px;max-width:38vw;background:rgba(255,255,255,.95);border:1px solid rgba(0,0,0,.12);border-radius:12px;padding:12px;box-shadow:0 6px 18px rgba(0,0,0,.14);display:none; z-index:9999;}
#quizPanel h2{font-size:1.05rem;margin:.2rem 0 .4rem;font-weight:700}
.tutorial-panel{position:fixed;top:64px;right:8px;width:min(36rem, calc(100vw - 1rem));max-width:42vw;background:rgba(255,255,255,.97);border:1px solid rgba(0,0,0,.12);border-radius:12px;padding:12px;box-shadow:0 6px 18px rgba(0,0,0,.14);display:none;z-index:9999;max-height:min(80dvh, calc(100dvh - 5rem));overflow:auto}
.tutorial-header{display:flex;align-items:flex-start;justify-content:space-between;gap:.6rem;margin:.1rem 0 .35rem}
.tutorial-panel h2{font-size:1.05rem;margin:.1rem 0 0;font-weight:700}
.tutorial-meta{display:flex;align-items:flex-start;justify-content:flex-end;gap:.35rem;margin:0 0 .1rem auto;min-width:max-content}
.tutorial-toggle{display:inline-flex;align-items:center;justify-content:center;padding:.24rem .62rem;border-radius:999px;border:1px solid rgba(0,0,0,.16);background:#fff;font-size:12px;font-weight:700;letter-spacing:.02em}
.tutorial-toggle.active{background:#eef6ff;border-color:#9fbff2;color:#204b87}
.tutorial-progress{font-size:12px;opacity:.72;margin-bottom:.55rem}
.tutorial-step-card{border-top:1px dashed rgba(0,0,0,.15);padding-top:.65rem}
.tutorial-step-title{font-size:14px;font-weight:700;margin-bottom:.25rem}
.tutorial-prompt{font-size:13px;line-height:1.4;margin-bottom:.45rem}
.tutorial-answer{font-size:13px;line-height:1.4;padding:.45rem .55rem;border-radius:8px;background:#eef6ff;border:1px solid #c9dcfb;margin:.35rem 0 .55rem}
.tutorial-explanation{font-size:13px;line-height:1.45;color:#22313b}
.tutorial-note{font-size:12px;line-height:1.35;color:#576673;margin-top:.45rem}
.tutorial-case-focus{margin:.15rem 0 .55rem}
.tutorial-controls{display:flex;gap:.5rem;flex-wrap:wrap;margin-top:.75rem}
.tutorial-aux{display:flex;gap:.45rem;flex-wrap:wrap;margin-top:.55rem}
.tutorial-choice-row{display:flex;flex-wrap:wrap;gap:.45rem;margin:.45rem 0 .6rem}
.tutorial-choice{padding:.3rem .65rem;border-radius:999px;border:1px solid rgba(0,0,0,.18);background:#fff;cursor:pointer;font-size:12px}
.tutorial-choice.active{background:#eef5ff;border-color:#6aa1ff}
.tutorial-choice.correct{background:#e7f8ea;border-color:#4db569}
.tutorial-choice.wrong{background:#fde7ea;border-color:#e05757}
.tutorial-choice.neutral{background:#f0f2f4;border-color:#97a6b3;color:#465562}
.quiz-step{margin:.6rem 0;border-top:1px dashed rgba(0,0,0,.15);padding-top:.5rem}
.quiz-pills{display:flex;flex-wrap:wrap;gap:.4rem}
.quiz-pill{padding:.28rem .6rem;border-radius:999px;border:1px solid rgba(0,0,0,.2);background:#fff;cursor:pointer;font-size:.9rem}
.quiz-pill.active{background:#eef5ff;border-color:#6aa1ff}
.quiz-pill.correct{background:#e7f8ea;border-color:#4db569}
.quiz-pill.wrong{background:#fde7ea;border-color:#e05757}
#quizBanner{position:absolute;top:10px;right:50%;transform:translateX(50%);background:#0c8;color:#fff;padding:.5rem .8rem;border-radius:.6rem;display:none;box-shadow:0 8px 24px rgba(0,0,0,.2);font-weight:700; z-index:10000;}
#quizControls{display:flex;gap:.5rem;margin-top:.6rem;flex-wrap:wrap}

/* Stronger Options button */
button.options-strong{
  padding: .45rem .8rem;
  border-radius: .6rem;
  border: 2px solid rgba(0,0,0,.2);
  background: rgba(255,255,255,.85);
  font-weight: 600;
  box-shadow: 0 1px 2px rgba(0,0,0,.06);
  transition: transform .06s ease, box-shadow .12s ease, background .12s ease;
}
button.options-strong:hover{
  transform: translateY(-1px);
  box-shadow: 0 3px 10px rgba(0,0,0,.12);
  background: rgba(255,255,255,.95);
}
button.options-strong:active{
  transform: translateY(0);
  box-shadow: 0 1px 2px rgba(0,0,0,.08);
}

    :root { 
      --bg:#e9f7e6;
      --grid-major:#2b6f2b;
      --grid-minor:#a9d6a6;
      --trace-blue:#1d49d8;
      --trace-red:#c42424;
      --trace-black:#000000;
      --text:#0b1b12;
      --panel:#f3fbf1;
      --panel-border:#b8d9b3;
      --ui-font-size:clamp(13px, 0.28vw + 12px, 16px);
      --ui-label-size:clamp(11px, 0.2vw + 10.5px, 13px);
      --topbar-gap:clamp(.45rem, 1vw, .8rem);
      --topbar-pad-x:clamp(.55rem, 1.4vw, 1rem);
      --topbar-pad-y:clamp(.45rem, .8vw, .75rem);
    }
    html,body{height:100%;margin:0;background:var(--bg);color:var(--text);font:var(--ui-font-size)/1.25 system-ui,Segoe UI,Roboto,Arial}
    body{display:flex;flex-direction:column}
    #topbar{display:flex;flex-direction:row;flex-wrap:wrap;gap:var(--topbar-gap);align-items:flex-end;padding:var(--topbar-pad-y) var(--topbar-pad-x);border-bottom:1px solid var(--panel-border);background:var(--panel);position:sticky;top:0;z-index:2}
    #topbarToggle{display:none;font-weight:600}
    .ctrl{display:flex;flex-direction:column;gap:.25rem;min-width:clamp(8.5rem, 12vw, 11rem);flex:0 1 auto}
    .ctrl label{font-size:var(--ui-label-size);opacity:.8;display:block}
    select{background:#fff;color:var(--text);border:1px solid var(--panel-border);border-radius:6px;padding:.4rem .55rem;max-width:100%;min-height:2.2rem;font:inherit}
    button{background:#fff;color:var(--text);border:1px solid var(--panel-border);border-radius:6px;padding:.35rem .6rem;cursor:pointer;white-space:nowrap}
    button:hover{filter:brightness(0.98)}
    fieldset{border:1px solid var(--panel-border);border-radius:8px;padding:.35rem .5rem}
    legend{font-size:var(--ui-label-size);opacity:.85;padding:0 .25rem}
    .radio{display:flex;gap:.75rem;align-items:center;flex-wrap:wrap}
    .mini{font-size:var(--ui-label-size);padding:.25rem .45rem;border-radius:6px}
    .pill{background:#fff;border:1px solid var(--panel-border);border-radius:999px;padding:.2rem .5rem;font-size:var(--ui-label-size);color:#245f24}
    #wrap{position:relative;flex:1;min-height:0}
    #c{width:100%;height:100%;display:block}
    #err{position:absolute;left:8px;bottom:8px;background:#ffefef;border:1px solid #e6b0b0;border-radius:8px;padding:.35rem .55rem;font-size:var(--ui-label-size);display:none;color:#7b1b1b}
    .popover{position:fixed;top:56px;right:12px;background:#fff;border:1px solid var(--panel-border);border-radius:8px;padding:.5rem .75rem;box-shadow:0 8px 24px rgba(0,0,0,.08);display:none;z-index:3}
    .popover.open{display:block}
    /* Intro modal */
    .modal{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.25);z-index:5}
    .modal[hidden]{display:none}
    .modal-card{background:#fff;border:1px solid var(--panel-border);border-radius:12px;box-shadow:0 12px 28px rgba(0,0,0,.18);max-width:42rem;width:min(94vw,42rem);max-height:min(86dvh,42rem);overflow:auto;padding:clamp(.9rem, 2vw, 1.2rem) clamp(1rem, 2.4vw, 1.3rem)}
    .modal-card h1{margin:0 0 .25rem 0;font-size:clamp(1.15rem, 1.1vw + .8rem, 1.5rem)}
    .modal-card p{margin:.25rem 0;line-height:1.35}
    .modal-card .sub{opacity:.8;font-size:var(--ui-label-size)}
    .modal-actions{display:flex;justify-content:flex-end;gap:.5rem;margin-top:.75rem}
  </style>

<style id="quiz-style-patch">
.quiz-pill.correct { font-weight: 700; color: #0a0; }
.quiz-pill.wrong { color: #b00; text-decoration: line-through; }
</style>


<style id="quiz-layout-patch">
#quizPanel{ width:min(32rem, calc(100vw - 1rem)); max-width:92vw; max-height:min(78dvh, calc(100dvh - 5rem)); overflow:auto; top:clamp(4.5rem, 10vh, 6rem); right:clamp(.5rem, 1vw, .9rem); padding:clamp(.65rem, 1vw, .9rem); }
#quizPanel .panel-title{ font-size: 14px; }
.quiz-step{ margin:6px 10px; }
.quiz-step > div:first-child{ font-weight:600; margin-bottom:4px; font-size:13px; }
.quiz-pills{ display:flex; flex-wrap:wrap; gap:8px; }
.quiz-subrow{ display:flex; flex-wrap:wrap; gap:8px; margin-top:6px; align-items:flex-start; }
.quiz-subrow-label{ min-width:5.5rem; font-size:12px; font-weight:600; opacity:.72; padding-top:4px; }
.quiz-pill{ padding:2px 10px; border-radius:16px; border:1px solid rgba(0,0,0,.15); background:#f6f7f8; font-size:var(--ui-label-size); }
.quiz-pill.active{ box-shadow:0 0 0 2px rgba(0,0,0,.08) inset; }
.quiz-pill.correct{ font-weight:700; color:#0a0; }
.quiz-pill.wrong{ color:#b00; text-decoration:line-through; }
.quiz-pill.neutral{ color:#4e5a67; border-color:rgba(0,0,0,.28); background:#f0f2f4; }
</style>


<style id="topbar-nowrap-patch">
#topbar{ align-items:center; gap:var(--topbar-gap); flex-wrap:nowrap; overflow-x:auto; overflow-y:hidden; }
#topbar > .ctrl,
#topbar > #rhythmFieldset,
#topbar > .topbar-actions{ align-self:center; }
#topbar > .ctrl{ min-width:0; width:max-content; flex:0 0 auto; }
#topbar > .ctrl select{ width:auto; }
#rhythmFieldset{ flex:0 1 auto; min-width:0; margin:0; width:auto; }
#rhythmFieldset .mode-controls{ display:flex; align-items:flex-end; flex-wrap:wrap; gap:.45rem .7rem; }
#rhythmFieldset .ctrl{ min-width:0; width:max-content; flex:0 0 auto; }
#rhythmFieldset .ctrl select{ width:auto; }
#rhythmFieldset .pill{ margin:0; white-space:nowrap; }
.topbar-actions{ margin-left:auto; display:flex; gap:.4rem; align-items:center; flex-wrap:wrap; justify-content:flex-end; }
#play, #artifactsBtn, #pathologyBtn, #quizBtnTop, #tutorialBtnTop{ white-space:nowrap; flex:0 0 auto; }
#topbar select, #topbar label, #topbar button{ font-size:var(--ui-label-size); }
#topbar button{ padding:.45rem .7rem; line-height:1.1; min-height:2.2rem; font:inherit; }
#rhythmFieldset .pill{ align-self:center; }
@media (max-width: 1100px){
  #topbar{
    flex-wrap:nowrap;
    overflow-x:auto;
    overflow-y:hidden;
    gap:clamp(.35rem, .8vw, .6rem);
    padding:clamp(.35rem, .7vw, .55rem) clamp(.45rem, 1vw, .8rem);
  }
  #topbar > .ctrl{ flex:0 0 auto; width:max-content; }
  #rhythmFieldset{
    flex:0 0 auto;
    width:auto;
    padding:.28rem .45rem;
  }
  #rhythmFieldset .mode-controls{ gap:.35rem .55rem; }
  .topbar-actions{
    width:auto;
    margin-left:auto;
    gap:.35rem;
    flex-wrap:nowrap;
  }
  #topbar select,
  #topbar button{ min-height:2.05rem; }
  #topbar button{ padding:.4rem .62rem; }
}
@media (max-width: 760px){
  #topbar{ align-items:stretch; }
  #topbarToggle{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    min-height:2.2rem;
    padding:.45rem .75rem;
    flex:0 0 auto;
  }
  #topbar.topbar-mobile-collapsed{
    gap:0;
    align-items:center;
  }
  #topbar.topbar-mobile-collapsed > :not(#topbarToggle){
    display:none;
  }
  #topbar.topbar-mobile-expanded > #topbarToggle{
    margin-bottom:.2rem;
  }
  .ctrl{ min-width:0; flex:1 1 100%; }
  .ctrl select{ width:100%; }
  #rhythmFieldset{ min-width:0; }
  #rhythmFieldset .mode-controls{ gap:.35rem .55rem; }
  #rhythmFieldset .ctrl{ width:100%; flex-basis:100%; }
  #rhythmFieldset .ctrl select{ width:100%; }
  #quizPanel{ left:.5rem; right:.5rem; width:auto; max-width:none; top:auto; bottom:.5rem; max-height:min(60dvh, 28rem); }
  .tutorial-panel{ left:.5rem; right:.5rem; width:auto; max-width:none; top:auto; bottom:.5rem; max-height:min(64dvh, 32rem); }
  #quizBanner{ left:50%; right:auto; width:min(calc(100vw - 1rem), 28rem); text-align:center; transform:translateX(-50%); top:auto; bottom:.75rem; }
  .modal-card{ width:min(96vw, 36rem); max-height:min(88dvh, 36rem); }
}
</style>


<style id="pathology-align-fix">
#pathologyModal fieldset label, #artifactsModal fieldset label{ margin-left:0 !important; }
#pathologyModal .modal-card, #artifactsModal .modal-card{width:fit-content;max-width:min(94vw, 29rem)}
#tutorialSetupModal .modal-card{width:min(92vw, 24rem);max-width:24rem}
#tutorialCaseSelWrap[hidden]{display:none !important}
#artifactsModal{background:transparent;align-items:flex-start;justify-content:flex-start}
#artifactsModal .modal-card{
  position:fixed;
  top:var(--artifacts-top, 4.5rem);
  left:var(--artifacts-left, auto);
  margin:0;
  max-height:min(72dvh, 26rem);
  box-shadow:0 10px 24px rgba(0,0,0,.14);
}
#pathologyModal .pathology-actions{display:flex;flex-direction:column;align-items:flex-start;gap:.35rem;margin-top:.35rem}
#pathologyModal .pathology-action-row{display:flex;align-items:center;gap:.55rem;flex-wrap:wrap}
#pathologyModal .pathology-action{width:auto;min-width:12.75rem;max-width:100%;text-align:left;padding:.55rem .75rem;font:inherit}
#pathologyModal .pathology-duration{display:inline-flex;align-items:center;gap:.35rem;font-size:var(--ui-label-size);white-space:nowrap}
#pathologyModal .pathology-duration input{width:4.25rem;min-height:2.2rem;padding:.4rem .5rem;border:1px solid var(--panel-border);border-radius:6px;font:inherit}
#pathologyModal .pathology-duration span{opacity:.8}
#pathologyModal .pathology-action:disabled{cursor:default;opacity:.65}
#pathologyModal .pathology-action:disabled:hover{filter:none}
#artifactsModal fieldset{margin:0}
#artifactsModal .modal-card fieldset > div{min-width:max-content}
@media (max-width: 760px){
  #artifactsModal .modal-card{
    left:.5rem !important;
    right:.5rem;
    top:auto;
    bottom:.5rem;
    width:auto;
    max-width:none;
    max-height:min(60dvh, 24rem);
  }
}
</style>

</head>
<body>
  <div id="topbar">
    <button id="topbarToggle" type="button" aria-controls="topbar" aria-expanded="false">Show Controls</button>
    <div class="ctrl"><label>Montage</label>
      <select id="montageSel">
        <option value="bipolar_longitudinal" selected>Longitudinal (Double Banana)</option>
        <option value="bipolar_transverse">Transverse</option>
        <option value="referential">Reference (A1/A2; linked ears for midline)</option>
        <option value="average">Average reference (AVG)</option>
      </select>
    </div>
    <div class="ctrl"><label>Timebase (mm/sec)</label>
      <select id="timebase">
        <option value="15">15 mm/sec</option>
        <option value="30" selected>30 mm/sec</option>
        <option value="60">60 mm/sec</option>
      </select>
    </div>
    <div class="ctrl"><label>Sensitivity</label>
      <select id="sensitivity">
        <option value="3">3 uV/mm</option>
        <option value="5">5 uV/mm</option>
        <option value="7" selected>7 uV/mm</option>
        <option value="10">10 uV/mm</option>
        <option value="15">15 uV/mm</option>
      </select>
    </div>
    <fieldset id="rhythmFieldset"><legend>Rhythm / State</legend>
      <div class="mode-controls">
        <div class="ctrl">
          <label for="rhythmSel">Rhythm</label>
          <select id="rhythmSel">
            <option value="">State-driven</option>
            <option value="delta">Delta</option>
            <option value="theta">Theta</option>
            <option value="alpha">Alpha</option>
            <option value="beta">Beta</option>
          </select>
        </div>
        <div class="ctrl">
          <label for="sleepSel">Sleep / State</label>
          <select id="sleepSel">
            <option value="">Rhythm-driven</option>
            <option value="awake" selected>Awake</option>
            <option value="drowsy">Drowsy</option>
            <option value="n1">Stage 1 Sleep</option>
            <option value="n2">Stage 2 Sleep</option>
            <option value="sws">Slow Wave Sleep</option>
            <option value="rem">REM Sleep</option>
          </select>
        </div>
        <label class="pill"><input type="checkbox" id="eyesOpen"> Eyes open</label>
      </div>
    </fieldset>
    <div class="topbar-actions">
      <button id="play">Pause</button>
      <button id="pathologyBtn" class="options-strong">PATHOLOGY</button>
      <button id="artifactsBtn" class="options-strong">Artifacts</button>
      <button id="quizBtnTop" class="options-strong">Quiz</button>
      <button id="tutorialBtnTop" class="options-strong">Tutorial</button>
    </div>
  </div>

  <!-- Options modal -->
  <div id="optionsModal" class="modal" role="dialog" aria-modal="true" aria-labelledby="optionsTitle" hidden>
    <div class="modal-card">
      <h1 id="optionsTitle">Options</h1>
      <fieldset>
        <legend>Playback speed</legend>
        <div style="display:flex;align-items:center;gap:.6rem;margin-top:.25rem">
          <input id="speedSlider" type="range" min="0.25" max="5" step="0.25" value="1" style="width:260px">
          <output id="speedValue" for="speedSlider">1.00x</output>
        </div>
</fieldset>
      <fieldset>
        <legend>Realism</legend>
        <div style="display:flex;align-items:center;gap:.6rem;margin-top:.25rem">
          <input id="realismSlider" type="range" min="0" max="1" step="0.01" value="0.75" style="width:260px">
          <output id="realismValue" for="realismSlider">75%</output>
        </div>
      </fieldset>

      <div class="modal-actions">
        <button id="optionsClose">Close</button>
      </div>
    </div>
  </div>

  <!-- Artifacts modal -->
  <div id="artifactsModal" class="modal" role="dialog" aria-modal="true" aria-labelledby="artifactsTitle" hidden>
    <div class="modal-card">
      <h1 id="artifactsTitle">Artifacts</h1>
      <fieldset>
        <legend>Artifacts</legend>
        <div style="display:flex;flex-direction:column;gap:.35rem;margin-top:.25rem">
          <label><input id="blink" type="checkbox"> Eye blinks</label>
          <label><input id="chew" type="checkbox"> Chewing</label>
          <label><input id="sweat" type="checkbox"> Sweat</label>
          <label><input id="pop" type="checkbox"> Electrode pop</label>
          <label><input id="emg" type="checkbox"> EMG</label>
        </div>
      </fieldset>
      <div class="modal-actions">
        <button id="artifactsClose">Close</button>
      </div>
    </div>
  </div>

  <!-- Pathology modal -->
  <div id="pathologyModal" class="modal" role="dialog" aria-modal="true" aria-labelledby="pathologyTitle" hidden>
    <div class="modal-card">
      <h1 id="pathologyTitle">Pathology</h1>
      <fieldset>
        <legend>Potential patterns</legend>
        <div style="display:flex;flex-direction:column;gap:.35rem;margin-top:.25rem">
          <label><input id="gpd" type="checkbox"> Generalized periodic discharges (GPDs)</label>
          <label><input id="lpd" type="checkbox"> Lateralized periodic discharges (LPDs)</label>
          <div class="pathology-actions">
            <div class="pathology-action-row">
              <button id="genSz" type="button" class="pathology-action">Generalized seizure</button>
              <label class="pathology-duration" for="genSzDur">
                <input id="genSzDur" type="number" min="10" max="99" step="1" value="20" inputmode="numeric">
                <span>s</span>
              </label>
            </div>
            <div class="pathology-action-row">
              <button id="absenceSz" type="button" class="pathology-action">Absence seizure</button>
              <label class="pathology-duration" for="absenceSzDur">
                <input id="absenceSzDur" type="number" min="10" max="99" step="1" value="10" inputmode="numeric">
                <span>s</span>
              </label>
            </div>
            <div class="pathology-action-row">
              <button id="focalSz" type="button" class="pathology-action">Focal seizure</button>
              <label class="pathology-duration" for="focalSzDur">
                <input id="focalSzDur" type="number" min="10" max="99" step="1" value="10" inputmode="numeric">
                <span>s</span>
              </label>
            </div>
          </div>
        </div>
      </fieldset>
      <div class="modal-actions">
        <button id="pathologyClose">Close</button>
      </div>
    </div>
  </div>

  <!-- Tutorial setup modal -->
  <div id="tutorialSetupModal" class="modal" role="dialog" aria-modal="true" aria-labelledby="tutorialSetupTitle" hidden>
    <div class="modal-card">
      <h1 id="tutorialSetupTitle">Tutorial Setup</h1>
      <fieldset>
        <legend>Mode</legend>
        <div class="ctrl" style="min-width:0">
          <select id="tutorialModeSel" aria-label="Tutorial mode">
            <option value="guided" selected>Guided walkthrough</option>
            <option value="interactive">Interactive questions</option>
          </select>
        </div>
      </fieldset>
      <fieldset>
        <legend>Cases</legend>
        <div class="ctrl" style="min-width:0">
          <select id="tutorialCaseModeSel" aria-label="Tutorial case order">
            <option value="ordered" selected>In order</option>
            <option value="random">Random</option>
            <option value="specific">Specific case</option>
          </select>
        </div>
        <div id="tutorialCaseSelWrap" class="ctrl" style="min-width:0;margin-top:.45rem" hidden>
          <select id="tutorialCaseSel" aria-label="Specific tutorial case"></select>
        </div>
      </fieldset>
      <div class="modal-actions">
        <button id="tutorialSetupClose">Close</button>

    this.brown=0;
    this.alphaJitterBase=(this.rng()-0.5)*0.2;
    this.alphaOffset=(this.rng()-0.5)*0.8;
    this.betaOffset=(this.rng()-0.5)*5.0;
    this.thetaOffset=(this.rng()-0.5)*1.0;
    this.deltaOffset=(this.rng()-0.5)*0.45;
    this.alphaPosteriorLag=(this.rng()-0.5)*0.45;
    this.fmAlpha=this.rng()*Math.PI*2;
    this.fmBeta=this.rng()*Math.PI*2;
    this.fmTheta=this.rng()*Math.PI*2;
    this.fmDelta=this.rng()*Math.PI*2;
  }
  sample(t, opts){
    const r = region(this.name);
    const posterior = (r==='occipital' || r==='parietal');
    const R = (opts && typeof opts.realism==='number') ? opts.realism : 1;
    // Non-linear mapping: bottom half linear, top half quadratic for extra punch
    const Rnl = (R <= 0.5) ? R : (0.5 + 2*Math.pow(R-0.5, 2));
    const S3 = Math.max(0, Math.min(3*Rnl, 3));
    let A=6,B=5,T=5,D=3, noiseGain=0.78;
    switch(opts.mode){
      case 'alpha': case 'awake':
        if (r==='occipital') A = (opts.eyesOpen ? 4 : 46);
        else if (r==='parietal') A = (opts.eyesOpen ? 3 : 22);
        else if (r==='central') A = 7;
        else if (r==='frontal') A = 4;
        else A = 6;
        B = (r==='frontal') ? 10 : (r==='central' ? 8 : (r==='temporal' ? 7 : 5));
        T = (r==='temporal') ? 4.5 : (posterior ? 3.5 : 3.0);
        D = posterior ? 2.4 : 2.0;
        noiseGain = opts.eyesOpen ? 0.78 : 0.68;
        break;
      case 'beta':
        A = posterior ? (opts.eyesOpen ? 2.5 : 5.5) : 2.5;
        B = (r==='frontal') ? 22 : (r==='central' ? 16 : (r==='temporal' ? 13 : (r==='parietal' ? 9 : 7)));
        T = (r==='temporal') ? 3.8 : 2.8;
        D = 1.8;
        noiseGain = 0.82;
        break;
      case 'theta':
        A = posterior ? (opts.eyesOpen ? 2.2 : 4.2) : 2.6;
        B = (r==='frontal') ? 4.2 : 3.2;
        T = (r==='temporal') ? 23 : (r==='central' ? 19 : (r==='parietal' ? 16 : (r==='frontal' ? 13.5 : 11.5)));
        D = (r==='frontal') ? 5.0 : 4.2;
        noiseGain = 0.74;
        break;
      case 'drowsy':
        A = posterior ? (opts.eyesOpen ? 1.6 : 11.5) : 2.4;
        B = (r==='frontal') ? 2.8 : 2.2;
        T = (r==='temporal') ? 24 : (r==='central' ? 20 : (r==='parietal' ? 16 : (r==='frontal' ? 14.5 : 12.8)));
        D = (r==='frontal') ? 7.2 : (r==='central' ? 6.0 : 5.0);
        noiseGain = 0.68;
        break;
      case 'delta':
        A = 2.5; B = 2.0; T = (r==='temporal') ? 4.5 : 3.0;
        D = (r==='frontal') ? 30 : (r==='central' ? 24 : (r==='parietal' ? 19 : (r==='temporal' ? 16 : 14)));
        noiseGain = 0.58;
        break;
      case 'n1':
        A = posterior ? 1.8 : 1.3;
        B = (r==='frontal') ? 2.6 : 2.0;
        T = (r==='central') ? 19.0 : (r==='temporal' ? 17.0 : (r==='frontal' ? 15.0 : 13.5));
        D = (r==='frontal') ? 8.0 : (r==='central' ? 6.8 : 5.6);
        noiseGain = 0.66;
        break;
      case 'n2':
        A = posterior ? 1.2 : 0.9;
        B = (r==='frontal') ? 3.0 : (r==='central' ? 2.6 : 2.2);
        T = (r==='central') ? 14.0 : (r==='temporal' ? 12.4 : 10.5);
        D = (r==='frontal') ? 11.0 : (r==='central' ? 9.0 : (r==='parietal' ? 7.2 : 6.2));
        noiseGain = 0.62;
        break;
      case 'rem':
        A = posterior ? 0.9 : 0.7;
        B = (r==='frontal') ? 11.8 : (r==='central' ? 9.8 : 7.5);
        T = (r==='temporal') ? 10.8 : (r==='central' ? 9.8 : 8.0);
        D = 0.9;
        noiseGain = 0.70;
        break;
      case 'sws':
        A = 0.5; B = 0.7; T = 1.6;
        D = (r==='frontal') ? 60 : (r==='central' ? 50 : (r==='parietal' ? 38 : (r==='temporal' ? 31 : 26)));
        noiseGain = 0.34;
        break;
    }
    this.envA = lowpass(this.envA, (this.rng()-0.5)*2*S3, 0.002);
    this.envB = lowpass(this.envB, (this.rng()-0.5)*2*S3, 0.004);
    this.envT = lowpass(this.envT, (this.rng()-0.5)*2*S3, 0.003);
    this.envD = lowpass(this.envD, (this.rng()-0.5)*2*S3, 0.0015);
    const alphaBase = clampFreq((((opts.mode==='alpha' || opts.mode==='awake') ? opts.pdrHz : 9.2) + this.alphaOffset + 0.18*Math.sin(2*Math.PI*0.08*opts.clock + this.fmAlpha)), 7.5, 12.5);
    const betaBase = (opts.mode==='beta') ? 21.5 : (opts.mode==='rem' ? 17.2 : 19.0);
    const thetaBase =
      (opts.mode==='drowsy') ? 5.8 :
      (opts.mode==='n1') ? 5.3 :
      (opts.mode==='n2') ? 5.0 :
      (opts.mode==='theta') ? 5.5 : 4.9;
    const deltaBase =
      (opts.mode==='delta') ? 1.8 :
      (opts.mode==='sws') ? 1.05 :
      (opts.mode==='n2') ? 1.45 : 1.3;
    const fAlpha = posterior ? alphaBase : clampFreq(9.0 + 0.55*this.alphaOffset + 0.22*Math.sin(2*Math.PI*0.09*opts.clock + this.fmAlpha), 7.5, 11.5);
    const fBeta  = clampFreq(betaBase + this.betaOffset + 0.9*Math.sin(2*Math.PI*0.10*opts.clock + this.fmBeta), 15, 30);
    const fTheta = clampFreq(thetaBase + this.thetaOffset + 0.28*Math.sin(2*Math.PI*0.07*opts.clock + this.fmTheta), 3.5, 7.0);
    const fDelta = clampFreq(deltaBase + this.deltaOffset + 0.10*Math.sin(2*Math.PI*0.05*opts.clock + this.fmDelta), 0.5, opts.mode==='sws' ? 2.1 : 3.2);
    this.phAlpha += 2*Math.PI*fAlpha/Fs;
    this.phBeta  += 2*Math.PI*fBeta /Fs;
    this.phTheta += 2*Math.PI*fTheta/Fs;
    this.phDelta += 2*Math.PI*fDelta/Fs;
    let y = 0;
    let alphaMix = 0.14;
    if (opts.mode==='alpha' || opts.mode==='awake'){
      if (r==='occipital') alphaMix = opts.eyesOpen ? 0.42 : 0.94;
      else if (r==='parietal') alphaMix = opts.eyesOpen ? 0.24 : 0.68;
      else if (r==='central') alphaMix = 0.22;
      else alphaMix = 0.10;
    } else if (opts.mode==='beta' && posterior){
      alphaMix = 0.10;
    }
    const alphaDriver = Math.sin(opts.pdrPhase + this.alphaPosteriorLag + this.alphaJitterBase*(0.35 + 0.65*S3));
    const alphaLocal = Math.sin(this.phAlpha);
    const alphaTerm = alphaMix*alphaDriver + (1-alphaMix)*alphaLocal;
    const betaTerm = 0.82*Math.sin(this.phBeta) + 0.18*Math.sin(2*this.phBeta + 0.4*this.fmBeta);
    const thetaTerm = 0.88*Math.sin(this.phTheta) + 0.20*Math.sin(2*this.phTheta - 0.35);
    const deltaTerm = 0.90*Math.sin(this.phDelta) + 0.28*Math.sin(2*this.phDelta - 0.85);
    y += (A*(1+0.6*this.envA)) * alphaTerm;
    y += (B*(1+0.6*this.envB)) * betaTerm;
    y += (T*(1+0.6*this.envT)) * thetaTerm;
    y += (D*(1+0.6*this.envD)) * deltaTerm;
    if (opts.mode==='drowsy'){
      const eyeScale = drowsyEyeScale(this.name);
      if (eyeScale){
        const sidePhase =
          /^(Fp1|F7|F3)$/.test(this.name) ? 0.42 :
          /^(Fp2|F8|F4)$/.test(this.name) ? -0.42 : 0;
        const slowRoll =
          0.82*Math.sin(2*Math.PI*0.19*opts.clock + sidePhase) +
          0.38*Math.sin(2*Math.PI*0.095*opts.clock - 0.7*sidePhase);
        const eyeEnv = 0.74 + 0.26*Math.sin(2*Math.PI*0.026*opts.clock + this.fmTheta);
        y += 56*eyeScale*eyeEnv*slowRoll;
      }
    }
    if (opts.mode==='rem') {
      const eyeScale = remEyeScale(this.name);
      if (eyeScale){
        const sidePhase =
          /^(Fp1|F7|F3)$/.test(this.name) ? 0.78 :
          /^(Fp2|F8|F4)$/.test(this.name) ? -0.78 : 0;
        const burstEnv = Math.pow(Math.max(0, Math.sin(2*Math.PI*0.085*opts.clock + 0.8)), 2);
        const eyeHz = 0.55 + 0.08*Math.sin(2*Math.PI*0.03*opts.clock + this.fmTheta);
        const remMove =
          0.86*Math.sin(2*Math.PI*eyeHz*opts.clock + sidePhase) +
          0.30*Math.sin(2*Math.PI*1.05*opts.clock - 0.4*sidePhase);
        y += 34*eyeScale*burstEnv*remMove;
      }
      const sawScale = remSawScale(this.name);
      if (sawScale){
        const sawEnv = Math.pow(Math.max(0, Math.sin(2*Math.PI*0.075*opts.clock - 0.45)), 3);
        const sawHz = 2.4 + 0.35*Math.sin(2*Math.PI*0.028*opts.clock + this.fmBeta);
        y += 30*sawScale*sawEnv*sleepSawWave(opts.clock, sawHz, 0.35*this.fmTheta);
      }
    }
    if (opts.vertex){
      const vertexScale =
        this.name==='Cz' ? 1.00 :
        /^(C3|C4)$/.test(this.name) ? 0.58 :
        this.name==='Fz' ? 0.52 :
        /^(F3|F4)$/.test(this.name) ? 0.26 : 0;
      if (vertexScale) y += 176*vertexScale*opts.vertexShape;
    }
    if (opts.spindleEnv) {
      const spindleScale =
        this.name==='Cz' ? 1.00 :
        /^(C3|C4)$/.test(this.name) ? 0.84 :
        this.name==='Fz' ? 0.46 :
        /^(F3|F4)$/.test(this.name) ? 0.28 : 0;
      if (spindleScale){
        const fSigma = 12.6 + 0.8*Math.sin(2*Math.PI*0.06*opts.clock + this.fmBeta);
        const sigma = Math.sin(2*Math.PI*fSigma*opts.clock + 0.12*this.fmAlpha) + 0.22*Math.sin(2*Math.PI*(2*fSigma)*opts.clock - 0.3);
        y += 48*spindleScale*opts.spindleEnv*sigma;
      }
    }
    if (opts.kcShape){
      const kcScale =
        /^(Fz|F3|F4)$/.test(this.name) ? 1.00 :
        /^(Cz|C3|C4)$/.test(this.name) ? 0.82 : 0;
      if (kcScale) y += 172*kcScale*opts.kcShape;
    }
    const w = (this.rng()-0.5)*4.0*S3;
    this.brown = 0.98*this.brown + w;
    const pinkish = 0.9*this.brown + 0.1*w;
    y += noiseGain * pinkish;
    if (opts.blinkShape){
      const frontalBlinkScale = blinkScale(this.name);
      if (frontalBlinkScale > 0) y += frontalBlinkScale * (105 + 135*R) * opts.blinkShape;
    }
    if (opts.chewArtifact){
      const chewW = chewLeadWeights(this.name);
      if (chewW.left || chewW.right || chewW.motion){
        const motion = chewW.motion * (0.55*opts.chewArtifact.leftMotion + 0.55*opts.chewArtifact.rightMotion);
        const burstEnv = chewW.left*opts.chewArtifact.leftBurst + chewW.right*opts.chewArtifact.rightBurst;
        const hfLeft = Math.sin(2*Math.PI*opts.chewArtifact.hfLeft*opts.clock + this.phBeta + opts.chewArtifact.phaseLeft);
        const hfRight = Math.sin(2*Math.PI*opts.chewArtifact.hfRight*opts.clock + this.phTheta + opts.chewArtifact.phaseRight);
        const grit = 0.62*hfLeft + 0.48*Math.sin(2*Math.PI*(opts.chewArtifact.hfLeft + 8)*opts.clock + this.phAlpha);
        const muscle = (chewW.left*hfLeft + chewW.right*hfRight + grit) * burstEnv;
        y += (10 + 26*R) * motion;
        y += (16 + 54*R) * muscle;
      }
    }
    if (opts.sweatArtifact){
      const sweatW = sweatLeadWeights(this.name);
      if (sweatW.common || sweatW.left || sweatW.right){
        const drift = sweatW.common*opts.sweatArtifact.common + sweatW.left*opts.sweatArtifact.left + sweatW.right*opts.sweatArtifact.right;
        y += (42 + 160*R) * drift;
      }
    }
    if (opts.popArtifact && opts.popArtifact.electrode === this.name) y += opts.popArtifact.value;
    if (opts.emgArtifact){
      const emgW = emgLeadWeights(this.name);
      if (emgW.leftTemp || emgW.rightTemp || emgW.leftFront || emgW.rightFront || emgW.mid){
        const roughBand = (f1, f2, phaseA, phaseB, localA, localB)=>
          0.62*Math.sin(2*Math.PI*f1*opts.clock + phaseA + localA) +
          0.34*Math.sin(2*Math.PI*f2*opts.clock + phaseB + localB) +
          0.18*Math.sin(2*Math.PI*(f2 + 9)*opts.clock + 0.6*phaseA + localA);
        const leftTempCarrier = roughBand(opts.emgArtifact.leftTempF1, opts.emgArtifact.leftTempF2, opts.emgArtifact.leftTempPhase, opts.emgArtifact.commonCarrierPhase, this.phBeta, this.phTheta);
        const rightTempCarrier = roughBand(opts.emgArtifact.rightTempF1, opts.emgArtifact.rightTempF2, opts.emgArtifact.rightTempPhase, opts.emgArtifact.commonCarrierPhase, this.phTheta, this.phAlpha);
        const leftFrontCarrier = roughBand(opts.emgArtifact.leftFrontF1, opts.emgArtifact.leftFrontF2, opts.emgArtifact.leftFrontPhase, opts.emgArtifact.commonCarrierPhase, this.phAlpha, this.phDelta);
        const rightFrontCarrier = roughBand(opts.emgArtifact.rightFrontF1, opts.emgArtifact.rightFrontF2, opts.emgArtifact.rightFrontPhase, opts.emgArtifact.commonCarrierPhase, this.phDelta, this.phBeta);
        const commonCarrier = roughBand(opts.emgArtifact.commonF1, opts.emgArtifact.commonF2, opts.emgArtifact.commonCarrierPhase, opts.emgArtifact.commonCarrierPhase + 1.4, this.phTheta, this.phAlpha);
        const muscle =
          emgW.leftTemp * opts.emgArtifact.leftTemporalEnv * leftTempCarrier +
          emgW.rightTemp * opts.emgArtifact.rightTemporalEnv * rightTempCarrier +
          emgW.leftFront * opts.emgArtifact.leftFrontalEnv * leftFrontCarrier +
          emgW.rightFront * opts.emgArtifact.rightFrontalEnv * rightFrontCarrier +
          emgW.mid * opts.emgArtifact.commonEnv * commonCarrier;
        y += (18 + 56*R) * EMG_PWR * muscle;
      }
    }
    return y;
  }
}

const RHYTHM_MODES = new Set(['delta','theta','alpha','beta']);
const SLEEP_STATE_MODES = new Set(['awake','drowsy','n1','n2','sws','rem']);
const SENSITIVITY_VALUES = [3,5,7,10,15];
const MIN_SEIZURE_DURATION = 10;
const MAX_SEIZURE_DURATION = 99;
const DEFAULT_SEIZURE_DURATIONS = { generalized:20, absence:10, focal:10 };
function reconcileModeControls(){
  if (RHYTHM_MODES.has(state.mode)) {
    state.rhythmOverride = state.mode;
    if (!SLEEP_STATE_MODES.has(state.sleepState)) state.sleepState = 'awake';
  } else {
    state.sleepState = SLEEP_STATE_MODES.has(state.mode) ? state.mode : 'awake';
    state.rhythmOverride = '';
    state.mode = state.sleepState;
  }
}
function applySleepStateMode(mode){
  if (!SLEEP_STATE_MODES.has(mode)) {
    if (state.rhythmOverride) {
      state.mode = state.rhythmOverride;
      resetSleepTransientState(state.artClock);
      reseedSleepTransientTargets(state.mode);
      return;
    }
    mode = state.sleepState || 'awake';
  }
  state.sleepState = mode;
  state.rhythmOverride = '';
  state.mode = state.sleepState;
  resetSleepTransientState(state.artClock);
  reseedSleepTransientTargets(state.mode);
}
function applyRhythmOverride(mode){
  const next = RHYTHM_MODES.has(mode) ? mode : '';
  state.rhythmOverride = next;
  if (next) {
    if (!SLEEP_STATE_MODES.has(state.sleepState)) state.sleepState = 'awake';
    state.mode = next;
  } else {
    state.mode = SLEEP_STATE_MODES.has(state.sleepState) ? state.sleepState : 'awake';
  }
  resetSleepTransientState(state.artClock);
  reseedSleepTransientTargets(state.mode);
}
reconcileModeControls();

function initChannels(){
  state.channels.clear(); state.buffer.clear();
  ELECTRODES.forEach(e=>{
    state.channels.set(e, new Channel(e, state.rng));
    state.buffer.set(e, new Float32Array(Fs*state.seconds));
  });
  // Synthetic buffer for average reference
  state.buffer.set("AVG", new Float32Array(Fs*state.seconds));
  // Linked-ear helper for midline referential channels.
  state.buffer.set("AAVG", new Float32Array(Fs*state.seconds));
  state.idx = 0;
}
function resizeBuffersForSeconds(nextSeconds){
  const newSeconds = Math.max(1, Number(nextSeconds) || 10);
  const newLen = Math.max(1, Math.round(Fs * newSeconds));
  const firstBuf = state.buffer.get(ELECTRODES[0]) || state.buffer.get("AVG");
  if (!firstBuf || !state.buffer.size){
    state.seconds = newSeconds;
    initChannels();
    state.sampleCarry = 0;
    lastT = performance.now()/1000;
    return;
  }

  const validSamples = Math.max(0, Math.min(state.idx, firstBuf.length));
  const nextBuffer = new Map();
  for (const [key, oldBuf] of state.buffer.entries()){
    const newBuf = new Float32Array(newLen);
    const samplesToCopy = Math.min(validSamples, oldBuf.length, newLen);
    const startAbs = state.idx - samplesToCopy;
    for (let n=0; n<samplesToCopy; n++){
      const absIdx = startAbs + n;
      const src = ((absIdx % oldBuf.length) + oldBuf.length) % oldBuf.length;
      const dst = ((absIdx % newLen) + newLen) % newLen;
      newBuf[dst] = oldBuf[src];
    }
    nextBuffer.set(key, newBuf);
  }

  state.seconds = newSeconds;
  state.buffer = nextBuffer;
  state.sampleCarry = 0;
  lastT = performance.now()/1000;
}

function isLeftScalpElectrode(e){ return /^(Fp1|F3|C3|P3|O1|F7|T3|T5)$/.test(e); }
function referentialSpecForElectrode(e){
  if (MIDLINE_DISPLAY_ELECTRODES.has(e)) return {buffer:'AAVG', label:'LE'};
  return isLeftScalpElectrode(e) ? {buffer:'A1', label:'A1'} : {buffer:'A2', label:'A2'};
}
const AVG_ELECTRODE_SET = new Set(DISPLAY_ORDER);
const MIDLINE_LABEL_RE = /^(Fz-Cz|Cz-Pz|Fz-LE|Cz-LE|Pz-LE|Fz - AVG|Cz - AVG|Pz - AVG)$/;
const TRANSVERSE_RED_LABELS = new Set(['F3-Fz','Fz-F4','C3-Cz','Cz-C4','P3-Pz','Pz-P4']);
const TRANSVERSE_BREAKS = new Set([3,7,11,15]);
const AVERAGE_BREAKS = new Set([4,8,12,16]);
const LONGITUDINAL_BREAKS = new Set([4,8,12]);
const MONTAGE_PAIR_MAP = {
  referential: DISPLAY_ORDER.map((e) => {
    const ref = referentialSpecForElectrode(e);
    return {a:e, b:ref.buffer, label:`${e}-${ref.label}`};
  }),
  bipolar_transverse: TRANSVERSE_CHAINS.map(([a, b]) => ({a, b, label:`${a}-${b}`})),
  average: AVERAGE_ORDER.map((e) => ({a:e, b:'AVG', label:`${e} - AVG`})),
  bipolar_longitudinal: LONGITUDINAL_CHAINS.map(([a, b]) => ({a, b, label:`${a}-${b}`}))
};

function montagePairs(){
  return MONTAGE_PAIR_MAP[state.montage] || MONTAGE_PAIR_MAP.bipolar_longitudinal;
}

  // Use responsive padding with sensible minimums.
  const h = canvas.clientHeight;
  const topPad = Math.max(56, Math.floor(h*0.07));
  const bottomPad = Math.max(32, Math.floor(h*0.05));
  const isTrans = (state.montage==='bipolar_transverse');
  const useGaps = (state.montage==='bipolar_longitudinal' || isTrans || state.montage==='average');
  const defaultGap = 10;
  const extraBreaks = isTrans ? TRANSVERSE_BREAKS : (state.montage==='average' ? AVERAGE_BREAKS : LONGITUDINAL_BREAKS);
  const extraFactor = 2.2;
  let totalExtra = 0;
  for (let i=0;i<count;i++){
    if (!useGaps) continue;
    let extra = 0;
    if (i>0 && i%4===0) extra += defaultGap;
    if (extraBreaks.has(i)) extra += defaultGap*(extraFactor-1);
    totalExtra += extra;
  }
  const base = (h - topPad - bottomPad - totalExtra) / count;
  const y = []; let acc = 0;
  for (let i=0;i<count;i++){

    if (useGaps){ if (!isTrans && i>0 && i%4===0) extra += defaultGap; if (extraBreaks.has(i)) extra += defaultGap*(extraFactor-1); }
    acc += extra;
    const rowTop = topPad + i*base + acc;
    y.push(rowTop + base/2);

    const textH = ascent + descent;
    const padX = 4, padY = 2;
    const rectX = xText - padX;

          let y = y0;

            y += gpdWave(sampleClock + gpdLag(e), rng) * gpdScale(e);
          }
          if (state.pathology && state.pathology.bipds) {
            // Bilateral independent periodic discharges: render both hemispheres as independent generators.
            y += lpdWave(sampleClock + lpdLagLeft(e), rng) * lpdScaleLeft(e);
            y += lpdWave(sampleClock + 0.31 + lpdLagRight(e), rng) * lpdScaleRight(e);
          } else if (state.pathology && state.pathology.lpd) {
            y += lpdWave(sampleClock + lpdLagLeft(e), rng) * lpdScaleLeft(e);
          }
          // Inject active generalized seizure events (additive, no redraw)
          if (state.seizureEvents && state.seizureEvents.length){
            for (const ev of state.seizureEvents){
              if (!ev.done && ev.type==='generalized'){
                y += generalizedSeizure_uV(sampleClock, e, ev);
              } else if (!ev.done && ev.type==='absence'){
                const absence = absenceSeizureSample(sampleClock, e, ev);
                if (absence) y = y*absence.preserve + absence.overlay;
              }
            }
          }
          if ((state.quiz && state.quiz.active) || (state.tutorial && state.tutorial.active)){
            y = applyQuizSlowing(y, sampleClock, e);
            y += quizEpileptiformValue(sampleClock, e);
          }

          // Apply quiz/tutorial amplitude biases
          const educationalBias = currentEducationalBias();
          if (educationalBias){
            const isDisplayScalp = AVG_ELECTRODE_SET.has(e);
            const L = /^(Fp1|F3|C3|P3|O1|F7|T3|T5|Fz|Cz|Pz)$/.test(e);
            let hemiScale = 1;
            if (isDisplayScalp && educationalBias.leftScale!==1 && L) hemiScale = educationalBias.leftScale;
            if (isDisplayScalp && educationalBias.rightScale!==1 && !L) hemiScale = educationalBias.rightScale;
            const diffuseScale = isDisplayScalp ? (educationalBias.diffuseScale ?? 1) : 1;
            const focalScale = (isDisplayScalp && educationalBias.focal && educationalBias.focal[e]!==undefined) ? educationalBias.focal[e] : 1;
            y *= diffuseScale * hemiScale * focalScale;
          }
          const buf=state.buffer.get(e);
          buf[state.idx%buf.length]=y;
          // contribute to AVG if scalp electrode (exclude ears and Oz)
          if (AVG_ELECTRODE_SET.has(e)) { sum+=y; cnt++; }
          if (EAR_REFERENCE_ELECTRODES.has(e)) { refSum+=y; refCnt++; }
        }
        const avg = cnt? (sum/cnt) : 0;
        const avgBuf = state.buffer.get("AVG");
        avgBuf[state.idx%avgBuf.length] = avg;
        const linkedEar = refCnt ? (refSum/refCnt) : 0;
        const linkedEarBuf = state.buffer.get("AAVG");
        if (linkedEarBuf) linkedEarBuf[state.idx%linkedEarBuf.length] = linkedEar;
        state.idx++;
        state.artClock+=1/Fs;
      }
      // auto-uncheck and prune finished seizure events
      if (state.seizureEvents && state.seizureEvents.length){
        for (const ev of state.seizureEvents){
          if (!ev.done && state.artClock >= ev.t0 + ev.dur){
            ev.done = true;
          }
        }
        state.seizureEvents = state.seizureEvents.filter(ev => !ev.done);
        if (typeof updateSeizureActionButtons === 'function') updateSeizureActionButtons();
      }
    }
    const pairs=montagePairs(); drawGrid(pairs.length, state.seconds);
    const w=canvas.clientWidth;
    const yMids=computeRowMids(pairs.length);
    const sampleOffsets = getSampleOffsets(w, state.seconds);
    const rowH = canvas.clientHeight / pairs.length;
    const traceScale = rowH / (4 * state.uvPerDiv);
    const strokeColors = pairs.map((pair, index) => groupColor(pair.label, index));
    for(let i=0;i<pairs.length;i++){
      const {a,b}=pairs[i]; const ra=state.buffer.get(a); const rb=state.buffer.get(b); if(!ra||!rb) continue;
      const yMid=yMids[i]; ctx.beginPath(); ctx.strokeStyle=strokeColors[i]; ctx.lineWidth=1.2;
      for(let x=0;x<w;x++){ const idx=state.idx-sampleOffsets[x]; const len=ra.length; const j=((idx%len)+len)%len; const uv=ra[j]-rb[j]; const y=yMid-(uv*traceScale); if(x===0) ctx.moveTo(x,y); else ctx.lineTo(x,y); }
      ctx.stroke();
    }
    renderTutorialHighlights(pairs, yMids, rowH, w);
    renderLabels(pairs, yMids, strokeColors); errBox.style.display='none';
  }catch(e){ console.error(e); errBox.textContent='Render error: '+e.message; errBox.style.display='block'; }
  requestAnimationFrame(step);
}

function uvPerDivFromSensitivity(uVperMM){
  const v = Number(uVperMM);
  if (!Number.isFinite(v) || v <= 0) return 70;
  return v * 10;

function sensitivityValueFromUvPerDiv(uvPerDiv){
  const asUvPerMM = (Number(uvPerDiv) || 70) / 10;
  let best = SENSITIVITY_VALUES[0];
  let bestDelta = Math.abs(asUvPerMM - best);
  for (const candidate of SENSITIVITY_VALUES){
    const delta = Math.abs(asUvPerMM - candidate);
    if (delta < bestDelta){
      best = candidate;
      bestDelta = delta;
    }
  }
  return String(best);
}

function clampSeizureDuration(value, fallback){
  const base = Number.isFinite(Number(fallback)) ? Math.round(Number(fallback)) : 10;
  const v = Math.round(Number(value));
  if (!Number.isFinite(v)) return Math.max(MIN_SEIZURE_DURATION, Math.min(MAX_SEIZURE_DURATION, base));
  return Math.max(MIN_SEIZURE_DURATION, Math.min(MAX_SEIZURE_DURATION, v));
}
function syncSeizureDurationInput(id, key){

  const fallback = state.seizureDurations[key] ?? DEFAULT_SEIZURE_DURATIONS[key];
  const next = clampSeizureDuration(input ? input.value : fallback, fallback);
  state.seizureDurations[key] = next;
  if (input) input.value = String(next);
  return next;
}

function randChoice(rng, arr){ return arr[Math.floor(rng()*arr.length)] }

const QUIZ_SPEC_BASE = [
  {key:'background',   label:'Background rhythm',        options:['delta','theta','alpha','beta']},
  {key:'artifact',     label:'Artifact',                 options:['None','Eye blinks','Chewing','Sweat','EMG']},
  {key:'symmetry',     label:'Symmetry',                 options:['symmetric','asymmetric']},
  {key:'amplitude',    label:'Amplitude pattern',        options:['Normal','diffuse attenuation','focal attenuation']},
  {group:'Slowing',    parts:[
      {key:'slowingDist',  label:'Distribution', options:['None','Generalized','Focal - Left','Focal - Right']},
      {key:'slowingTempo', label:'Tempo', options:['Intermittent','Continuous']}
  ]},
  {key:'periodic',     label:'Periodic / Rhythmic',      options:['None','GPDs','LPDs']},
  {key:'sleep',        label:'Sleep',                    options:['Awake','Drowsy','Stage 1','Stage 2','SWS','REM','Unable to determine']},
  {key:'epileptiform', label:'Epileptiform discharges',  options:['none','generalized','focal']}
];

function startQuiz(){
  const rng = state.rng;
  if (!(state.quiz && state.quiz.active)){
    state.quiz.snapshot = createQuizSnapshot();
  }
  clearQuizBannerTimer();
  const banner = document.getElementById('quizBanner');
  if (banner) banner.style.display = 'none';

  // Reset quiz state
  state.quiz.active   = true;
  state.quiz.stepIndex= 0;
  state.quiz.answered = {};
  state.quiz.bias     = {leftScale:1,rightScale:1,diffuseScale:1,focal:{}};

  // Random ground truth
  const sleep      = randChoice(rng, ['Awake','Drowsy','Stage 1','Stage 2','SWS','REM']);
  const background = deriveQuizBackgroundForSleep(rng, sleep);
  const artifact   = (rng()<0.25) ? randChoice(rng, ['Eye blinks','Chewing','Sweat','EMG']) : 'None';
  const symmetry   = randChoice(rng, ['symmetric','asymmetric']);
  const amplitude  = randChoice(rng, ['Normal','diffuse attenuation','focal attenuation']);
  const slowingDist = (rng()<0.34) ? 'None' : randChoice(rng, ['Generalized','Focal - Left','Focal - Right']);
  const slowingTempo = slowingDist === 'None' ? '' : randChoice(rng, ['Intermittent','Continuous']);
  const periodic   = (rng()<0.30) ? randChoice(rng, ['GPDs','LPDs']) : 'None';
  let epileptiform = randChoice(rng, ['none','generalized','focal']);
  if (periodic !== 'None' && rng() < 0.70) epileptiform = 'none';

  let spindles='absent', kcomplexes='absent';
  if (sleep==='Stage 2'){
    spindles   = rng()<0.7 ? 'present' : 'absent';
    kcomplexes = rng()<0.7 ? 'present' : 'absent';
  }

  state.quiz.truth = {
    background, artifact, symmetry, amplitude,
    slowingDist,
    slowingTempo,
    periodic, sleep, spindles, kcomplexes, epileptiform
  };

  // Drive the simulator to match truth
  applyQuizModeFromTruth(sleep, background);

  state.pathology.gpd   = (periodic==='GPDs');
  state.pathology.lpd   = (periodic==='LPDs');
  state.pathology.bipds = false;
  state.pathology.focalSeizure = false;
  state.seizureEvents = [];
  if (state.focalSz){
    state.focalSz.active = false;
    delete state.focalSz;
  }

  state.opts = state.opts || {};
  state.opts.blink = (artifact==='Eye blinks');
  state.opts.chew  = (artifact==='Chewing');
  state.opts.sweat = (artifact==='Sweat');
  state.opts.pop   = false;
  state.opts.emg   = (artifact==='EMG');
  state.quiz.slowing = buildQuizSlowingConfig(rng, slowingDist, slowingTempo || 'Continuous');
  state.quiz.spikes = buildQuizSpikeConfig(rng, epileptiform);

  if (symmetry==='asymmetric'){
    const bias = 0.7 + 0.25*rng();
    if (rng()<0.5){ state.quiz.bias.leftScale=bias; } else { state.quiz.bias.rightScale=bias; }
  }
  if (amplitude==='diffuse attenuation'){
    state.quiz.bias.diffuseScale = 0.52 + 0.16*rng();
  }
  if (amplitude==='focal attenuation'){
    const target = randChoice(rng, ['F7','T3','T5','F8','T4','T6','F3','C3','P3','F4','C4','P4','O1','O2']);
    state.quiz.bias.focal[target]=0.55;
  }

  // --- Build the ordered spec the UI renderer consumes ---
  state.quiz.order = QUIZ_SPEC_BASE.map((step)=>{
    if (!(step.group && Array.isArray(step.parts))) return step;
    const parts = step.parts.filter((part)=> part.key !== 'slowingTempo' || slowingDist !== 'None');
    return {...step, parts};
  });

  // If stage 2, append N2 sub-steps
  if (sleep==='Stage 2'){
    state.quiz.order.push(
      {key:'spindles',   label:'N2: sleep spindles', options:['present','absent']},
      {key:'kcomplexes', label:'N2: K-complexes',    options:['present','absent']}
    );
  }
  state.quiz.questionKeys = buildQuizQuestionKeys(state.quiz.order);

  // Render UI
  buildQuizUI();
  syncControlsFromState();
  updateEyesOpenEnabled();
  updateSeizureActionButtons();

  // Show panel & hide rhythm/state controls
  const panel = document.getElementById('quizPanel');
  if (panel){ panel.style.display='block'; panel.style.zIndex='9999'; }
  const rf = document.getElementById('rhythmFieldset');
  if (rf) rf.style.display='none';

  // Close the pathology modal if open and regenerate signals
  const pm = document.getElementById('pathologyModal');
  if (pm) pm.hidden = true;
  regen();
  if (typeof updateModeButtons === 'function') updateModeButtons();
}

function buildQuizUI(){
  const stepsEl = document.getElementById('quizSteps');
  if (!stepsEl) return;
  const frag = document.createDocumentFragment();

  state.quiz.order.forEach((step)=>{
    // Grouped "Slowing" with two sub-rows
    if (step.group && Array.isArray(step.parts)){
      const container = document.createElement('div');
      container.className = 'quiz-step';

      const header = document.createElement('div');
      header.textContent = step.group;
      container.appendChild(header);

      step.parts.forEach((row, rIndex)=>{ 
        const rowWrap = document.createElement('div');
        rowWrap.className = 'quiz-subrow';
        if (row.label){
          const rowLabel = document.createElement('div');
          rowLabel.className = 'quiz-subrow-label';
          rowLabel.textContent = row.label;
          rowWrap.appendChild(rowLabel);
        }
        row.options.forEach(opt=>{
          const b = document.createElement('button');
          b.type = 'button';
          b.className='quiz-pill';
          b.textContent = opt;
          b.addEventListener('click', ()=> onAnswer(row.key, opt, b));
          rowWrap.appendChild(b);
        });
        container.appendChild(rowWrap);
      });

      frag.appendChild(container);
      return;
    }

    // Standard single-row step
    const s = document.createElement('div');
    s.className='quiz-step';

    const h = document.createElement('div');
    h.textContent = step.label;
    s.appendChild(h);

    const pills = document.createElement('div');
    pills.className='quiz-pills';

    step.options.forEach(opt=>{
      const b = document.createElement('button');
      b.type = 'button';
      b.className='quiz-pill';
      b.textContent = opt;
      b.addEventListener('click', ()=> onAnswer(step.key, opt, b));
      pills.appendChild(b);
    });

    s.appendChild(pills);
    frag.appendChild(s);
  });
  stepsEl.replaceChildren(frag);
}

function onAnswer(key, val, btn){
  // toggle active visual
  Array.from(btn.parentElement.children).forEach(el=>el.classList.remove('active', 'correct', 'wrong', 'neutral'));
  btn.classList.add('active');

  const isNeutral = (key === 'sleep' && val === 'Unable to determine');
  if (isNeutral){
    btn.classList.add('neutral');
    state.quiz.answered[key] = null;
    checkWin();
    return;
  }

  // grade
  const truth = (state.quiz.truth[key] ?? '').toString();
  const isCorrect =
    (val === truth) ||
    (key==='spindles'   && val.toLowerCase() === truth.toLowerCase()) ||
    (key==='kcomplexes' && val.toLowerCase() === truth.toLowerCase());

  btn.classList.add(isCorrect ? 'correct' : 'wrong');
  state.quiz.answered[key] = isCorrect;

  checkWin();
}

function checkWin(){
  const keys = (state.quiz.questionKeys && state.quiz.questionKeys.length)
    ? state.quiz.questionKeys
    : buildQuizQuestionKeys(state.quiz.order);
  const allAnswered = keys.length > 0 && keys.every((key) => key in state.quiz.answered);
  if (!allAnswered) return;

  const scoredKeys = keys.filter((key) => state.quiz.answered[key] !== null);
  const allCorrect  = scoredKeys.every((key) => state.quiz.answered[key] === true);
  const banner = document.getElementById('quizBanner');

  if (banner){
    clearQuizBannerTimer();
    banner.textContent = allCorrect ? 'Correct! New quiz ready.' : 'Not quite - answer all correctly.';
    banner.style.display='block';
    state.quizBannerTimer = setTimeout(()=>{
      banner.style.display='none';
      state.quizBannerTimer = null;
      if (allCorrect) startQuiz();
    }, 1600);
  }
}

function endQuiz(){
  clearQuizBannerTimer();
  state.quiz.active = false;
  state.quiz.answered = {};
  state.quiz.questionKeys = [];
  state.quiz.slowing = buildQuizSlowingConfig(state.rng || Math.random, 'None', 'Continuous');

}

function resolveTutorialHighlightWindow(canvasWidth, desiredWidthPx, desiredRightX){
  const widthPx = Math.max(24, Math.min(canvasWidth, desiredWidthPx));
  const desiredLeftX = desiredRightX - widthPx;
  const clampRange = (minX, maxX, preferredLeft)=>{
    const span = Math.max(0, maxX - minX);
    const actualWidth = Math.min(widthPx, span);
    if (actualWidth <= 0) return null;
    const x1 = Math.min(Math.max(minX, preferredLeft), maxX - actualWidth);
    return {x1, x2:x1 + actualWidth};
  };
  const baseRange = clampRange(0, canvasWidth, desiredLeftX);
  if (!tutorialPanel || tutorialPanel.style.display === 'none') return baseRange;

  const canvasRect = canvas.getBoundingClientRect();
  const panelRect = tutorialPanel.getBoundingClientRect();
  const overlapLeft = Math.max(0, panelRect.left - canvasRect.left);
  const overlapRight = Math.min(canvasWidth, panelRect.right - canvasRect.left);
  const overlapTop = Math.max(0, panelRect.top - canvasRect.top);
  const overlapBottom = Math.min(canvas.clientHeight, panelRect.bottom - canvasRect.top);
  const overlapsCanvas = overlapRight > 0 && overlapLeft < canvasWidth && overlapBottom > 0 && overlapTop < canvas.clientHeight;
  if (!overlapsCanvas) return baseRange;

  const gutter = 18;
  const visibleRanges = [];
  if (overlapLeft - gutter > 0) visibleRanges.push([0, overlapLeft - gutter]);
  if (overlapRight + gutter < canvasWidth) visibleRanges.push([overlapRight + gutter, canvasWidth]);
  if (!visibleRanges.length) return baseRange;

  const desiredCenter = (desiredLeftX + desiredRightX) * 0.5;
  let best = null;
  for (const [minX, maxX] of visibleRanges){
    const candidate = clampRange(minX, maxX, desiredLeftX);
    if (!candidate) continue;
    const center = (candidate.x1 + candidate.x2) * 0.5;
    const distance = Math.abs(center - desiredCenter);
    const width = candidate.x2 - candidate.x1;
    if (!best || distance < best.distance - 0.001 || (Math.abs(distance - best.distance) < 0.001 && width > best.width)){
      best = {...candidate, distance, width};
    }
  }
  return best || baseRange;
}
function pairMatchesTutorialHighlight(pair, spec){
  if (!pair || !spec) return false;
  if (spec.allRows) return true;
  if (Array.isArray(spec.labels) && spec.labels.includes(pair.label)) return true;
  if (spec.regex){
    const re = spec.regex instanceof RegExp ? spec.regex : new RegExp(spec.regex);
    if (re.test(pair.label)) return true;
  }
  if (Array.isArray(spec.electrodes) && spec.electrodes.length){
    return spec.electrodes.includes(pair.a) || spec.electrodes.includes(pair.b);
  }
  return false;
}
function renderTutorialHighlights(pairs, yMids, rowH, canvasWidth){
  if (!(state.tutorial && state.tutorial.active)) return;
  const spec = tutorialCurrentHighlight();
  if (!spec || !pairs || !pairs.length) return;
  const pxPerSec = canvasWidth / Math.max(0.001, state.seconds);
  const windowSec = Math.max(0.5, Math.min(state.seconds, Number(spec.windowSec) || 2.5));
  const offsetSec = Math.max(0, Math.min(Math.max(0, state.seconds - windowSec), Number(spec.offsetSecFromRight) || 0));
  const desiredWidthPx = windowSec * pxPerSec;
  const desiredRightX = Math.min(canvasWidth, canvasWidth - offsetSec * pxPerSec);
  const xRange = resolveTutorialHighlightWindow(canvasWidth, desiredWidthPx, desiredRightX);
  if (!xRange || xRange.x2 <= xRange.x1) return;
  const {x1, x2} = xRange;
  ctx.save();
  ctx.fillStyle = spec.fill || 'rgba(59, 126, 255, 0.12)';
  ctx.strokeStyle = spec.stroke || 'rgba(34, 98, 220, 0.70)';
  ctx.lineWidth = 1.25;
  ctx.shadowColor = spec.stroke || 'rgba(34, 98, 220, 0.70)';
  ctx.shadowBlur = 5;
  for (let i=0; i<pairs.length; i++){
    if (!pairMatchesTutorialHighlight(pairs[i], spec)) continue;
    const prevMid = i > 0 ? yMids[i-1] : null;
    const nextMid = i < yMids.length-1 ? yMids[i+1] : null;
    const fallbackGap = rowH || (canvas.clientHeight / Math.max(1, pairs.length));
    const top = prevMid == null
      ? Math.max(0, yMids[i] - (nextMid != null ? (nextMid - yMids[i]) * 0.55 : fallbackGap * 0.55))
      : (prevMid + yMids[i]) * 0.5;
    const bottom = nextMid == null
      ? Math.min(canvas.clientHeight, yMids[i] + (prevMid != null ? (yMids[i] - prevMid) * 0.55 : fallbackGap * 0.55))
      : (yMids[i] + nextMid) * 0.5;
    const bandH = Math.max(10, bottom - top);
    const inset = Math.min(8, Math.max(2, bandH * 0.10));
    const yTop = top + inset;
    const h = Math.max(6, bandH - inset*2);
    ctx.fillRect(x1, yTop, x2-x1, h);
    ctx.strokeRect(x1 + 0.5, yTop + 0.5, Math.max(0, x2-x1-1), Math.max(0, h-1));
  }
  ctx.restore();
}

function tutorialExplanation(step, caseData){

function tutorialAnswerBanner(step, caseData){
  if (!step || !caseData) return '';
  if (step.key === 'finalImpression') return '';
  const truth = caseData.truth ? caseData.truth[step.key] : '';
  if (state.tutorial.mode === 'guided') return `Best answer: ${truth}`;
  const response = tutorialCurrentResponse(step.key);
  if (!response) return `Best answer: ${truth}`;
  if (response.correct) return `Correct: ${truth}`;
  return `You chose ${response.selected}. Best answer: ${truth}`;
}
function tutorialCanAdvance(){
  const step = currentTutorialStep();
  if (!step) return false;
  if (step.key === 'finalImpression') return true;
  if (state.tutorial.mode === 'guided') return true;
  return tutorialStepRevealed(step);
}
function tutorialAuxCanToggleEyes(step, caseData){
  return !!(step && caseData && step.key === 'reactivity' && caseData.truth && caseData.truth.reactivity === 'present' && caseData.signal && caseData.signal.sleepDrive === 'Awake');
}
function renderTutorialUI(){
  if (!tutorialPanel) return;
  const active = !!(state.tutorial && state.tutorial.active && state.tutorial.currentCase);
  tutorialPanel.style.display = active ? 'block' : 'none';
  if (!active){
    if (tutorialMeta) tutorialMeta.replaceChildren();
    if (tutorialProgress) tutorialProgress.textContent = '';
    if (tutorialBody) tutorialBody.replaceChildren();
    updateModeButtons();
    return;
  }

  const caseData = state.tutorial.currentCase;
  const step = currentTutorialStep();
  const highlight = tutorialCurrentHighlight();
  const stepNumber = state.tutorial.stepIndex + 1;

  if (tutorialMeta){
    const frag = document.createDocumentFragment();
    if (caseData.summary){
      const caseToggle = document.createElement('button');
      caseToggle.type = 'button';
      caseToggle.className = `tutorial-toggle${state.tutorial.caseFocusOpen ? ' active' : ''}`;
      caseToggle.textContent = state.tutorial.caseFocusOpen ? 'Hide Case' : 'Reveal Case';
      caseToggle.setAttribute('aria-pressed', state.tutorial.caseFocusOpen ? 'true' : 'false');
      caseToggle.addEventListener('click', ()=>{
        state.tutorial.caseFocusOpen = !state.tutorial.caseFocusOpen;
        renderTutorialUI();
      });
      frag.appendChild(caseToggle);
    }
    tutorialMeta.replaceChildren(frag);
  }
  if (tutorialProgress){
    tutorialProgress.textContent = `Step ${stepNumber} of ${TUTORIAL_STEPS.length}: ${step ? step.title : ''}`;
  }

  if (tutorialBody){
    const frag = document.createDocumentFragment();
    const card = document.createElement('div');
    card.className = 'tutorial-step-card';
    const title = document.createElement('div');
    title.className = 'tutorial-step-title';
    title.textContent = step ? step.title : '';
    card.appendChild(title);
    const prompt = document.createElement('div');
    prompt.className = 'tutorial-prompt';
    prompt.textContent = step ? step.prompt : '';
    card.appendChild(prompt);
    if (caseData.summary && state.tutorial.caseFocusOpen){
      const summary = document.createElement('div');
      summary.className = 'tutorial-note tutorial-case-focus';
      summary.textContent = caseData.summary;
      card.appendChild(summary);
    }
    if (step && step.options && state.tutorial.mode === 'interactive'){
      const row = document.createElement('div');
      row.className = 'tutorial-choice-row';
      const response = tutorialCurrentResponse(step.key);
      const truth = caseData.truth ? caseData.truth[step.key] : '';
      step.options.forEach((opt)=>{
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'tutorial-choice';
        btn.textContent = opt;
        if (response && response.selected === opt) btn.classList.add('active');
        if (response && response.revealed){
          if (opt === truth) btn.classList.add('correct');
          if (response.selected === opt && !response.correct) btn.classList.add('wrong');
        }
        btn.addEventListener('click', ()=> onTutorialAnswer(step.key, opt));
        row.appendChild(btn);
      });
      card.appendChild(row);
    }
    if (step && (state.tutorial.mode === 'guided' || tutorialStepRevealed(step))){
      const answerText = tutorialAnswerBanner(step, caseData);
      if (answerText){
        const answer = document.createElement('div');
        answer.className = 'tutorial-answer';
        answer.textContent = answerText;
        card.appendChild(answer);
      }
      const explanation = document.createElement('div');
      explanation.className = 'tutorial-explanation';
      explanation.textContent = tutorialExplanation(step, caseData);
      card.appendChild(explanation);
    }
    if (tutorialAuxCanToggleEyes(step, caseData)){
      const aux = document.createElement('div');
      aux.className = 'tutorial-aux';
      const toggle = document.createElement('button');
      toggle.type = 'button';
      toggle.textContent = state.eyesOpen ? 'Show Eyes Closed' : 'Show Eyes Open';
      toggle.addEventListener('click', ()=>{
        if (!state.running) setPlaybackRunning(true);
        state.eyesOpen = !state.eyesOpen;
        renderTutorialUI();
      });
      aux.appendChild(toggle);
      card.appendChild(aux);
    }
    if (highlight && highlight.note){
      const note = document.createElement('div');
      note.className = 'tutorial-note';
      note.textContent = `Highlight guide: ${highlight.note}`;
      card.appendChild(note);
    }
    frag.appendChild(card);
    tutorialBody.replaceChildren(frag);
  }

  if (tutorialBackBtn) tutorialBackBtn.disabled = state.tutorial.stepIndex <= 0;
  if (tutorialNextBtn) tutorialNextBtn.disabled = state.tutorial.stepIndex >= TUTORIAL_STEPS.length-1 || !tutorialCanAdvance();
  if (tutorialNewCaseBtn) tutorialNewCaseBtn.textContent = (state.tutorial.caseMode === 'specific') ? 'Restart Case' : 'New Case';
  syncPlaybackButtons();
  updateModeButtons();
}
function tutorialSetCommonSimulatorState(caseData){
  const signal = caseData.signal || {};
  const rng = state.rng || Math.random;
  state.pathology.gpd = false;
  state.pathology.lpd = false;
  state.pathology.bipds = false;
  state.pathology.focalSeizure = false;
  state.opts = {blink:false, chew:false, sweat:false, pop:false, emg:false};
  clearActiveTutorialSeizures();
  resetTutorialEducationalState();

  applyQuizModeFromTruth(signal.sleepDrive || 'Awake', signal.backgroundDrive || 'alpha');
  if (signal.initialEyesOpen !== undefined) state.eyesOpen = !!signal.initialEyesOpen;

  if (signal.artifact === 'Eye blinks') state.opts.blink = true;
  if (signal.artifact === 'Chewing') state.opts.chew = true;
  if (signal.artifact === 'Sweat') state.opts.sweat = true;
  if (signal.artifact === 'EMG') state.opts.emg = true;

  if (signal.periodic === 'GPDs') state.pathology.gpd = true;
  if (signal.periodic === 'LPDs') state.pathology.lpd = true;
  if (signal.periodic === 'BIPDs') state.pathology.bipds = true;

  state.tutorial.slowing = buildQuizSlowingConfig(rng, signal.slowingDist || 'None', signal.slowingTempo || 'Continuous');
  state.tutorial.spikes = buildQuizSpikeConfig(rng, signal.epileptiformOverlay || 'none');
  state.tutorial.bias = createNeutralEducationalBias();
  if (signal.bias){
    state.tutorial.bias = {
      ...createNeutralEducationalBias(),
      ...signal.bias,
      focal:{...(signal.bias.focal || {})}
    };
  }
  state.tutorial.sleepFeatures = (signal.sleepDrive === 'Stage 2')
    ? {spindles: signal.spindles || 'present', kcomplexes: signal.kcomplexes || 'present'}
    : null;
}
function primeTutorialSleepFeatures(caseData){
  const signal = caseData.signal || {};
  if (signal.sleepDrive !== 'Stage 2') return;
  if (signal.kcomplexes === 'present'){
    state.kcomplex.active = true;
    state.kcomplex.t0 = 0.55;
  }
  if (signal.spindles === 'present'){
    state.spindle.active = true;
    state.spindle.t0 = signal.kcomplexes === 'present' ? 0.82 : 0.45;
    state.spindle.dur = 0.92;
  }
}
function armTutorialSeizure(caseData){
  const signal = caseData.signal || {};
  const duration = clampSeizureDuration(signal.seizureDuration || DEFAULT_SEIZURE_DURATIONS.generalized, signal.seizureDuration || DEFAULT_SEIZURE_DURATIONS.generalized);
  if (signal.seizure === 'Generalized seizure'){
    state.seizureEvents.push(makeGeneralizedSeizureEvent(state.artClock, duration));
  } else if (signal.seizure === 'Absence seizure'){
    state.seizureEvents.push(makeAbsenceSeizureEvent(state.artClock, duration));
  } else if (signal.seizure === 'Focal seizure' && typeof window.armFocalSeizure === 'function'){
    state.pathology.focalSeizure = true;
    window.armFocalSeizure(duration);
  }
}
function applyTutorialCase(caseData){
  if (tutorialPanel) tutorialPanel.style.display = 'block';
  const rf = document.getElementById('rhythmFieldset');
  if (rf) rf.style.display = 'none';
  state.tutorial.lastCaseId = caseData.caseId || null;
  state.tutorial.caseFocusOpen = false;
  state.tutorial.currentCase = caseData;
  state.tutorial.stepIndex = 0;
  state.tutorial.responses = {};
  tutorialSetCommonSimulatorState(caseData);
  setPlaybackRunning(true);
  syncControlsFromState();
  regen();
  primeTutorialSleepFeatures(caseData);
  armTutorialSeizure(caseData);
  syncControlsFromState();
  updateEyesOpenEnabled();
  updateSeizureActionButtons();
  if (pathologyModal) pathologyModal.hidden = true;
  if (artifactsModal) artifactsModal.hidden = true;
  const optionsModal = document.getElementById('optionsModal');
  if (optionsModal) optionsModal.hidden = true;
  if (TUTORIAL_SETUP_MODAL) TUTORIAL_SETUP_MODAL.hidden = true;
  renderTutorialUI();
}
function startNextTutorialCase(){
  const caseId = chooseNextTutorialCaseId();
  if (!caseId) return;
  const caseData = tutorialCloneCase(caseId);
  if (!caseData) return;
  caseData.caseId = caseId;
  applyTutorialCase(caseData);
}
function openTutorialSetup(){
  if (!TUTORIAL_SETUP_MODAL) return;
  if (pathologyModal) pathologyModal.hidden = true;
  if (artifactsModal) artifactsModal.hidden = true;
  const optionsModal = document.getElementById('optionsModal');
  if (optionsModal) optionsModal.hidden = true;
  if (tutorialModeSel) tutorialModeSel.value = (state.tutorial && state.tutorial.mode) || 'guided';
  if (tutorialCaseModeSel) tutorialCaseModeSel.value = (state.tutorial && state.tutorial.caseMode) || 'ordered';
  populateTutorialCaseSelect((state.tutorial && state.tutorial.selectedCaseId) || '');
  syncTutorialSetupCaseControls();
  TUTORIAL_SETUP_MODAL.hidden = false;
}
function startTutorial(mode, level){
  if (state.quiz && state.quiz.active) endQuiz();
  if (!(state.tutorial && state.tutorial.active)){
    state.tutorial.snapshot = createQuizSnapshot();
  }
  state.tutorial.active = true;
  state.tutorial.mode = mode || (tutorialModeSel ? tutorialModeSel.value : 'guided') || 'guided';
  state.tutorial.level = level || DEFAULT_TUTORIAL_LEVEL;
  state.tutorial.caseMode = (tutorialCaseModeSel ? tutorialCaseModeSel.value : state.tutorial.caseMode) || 'ordered';
  state.tutorial.selectedCaseId = tutorialResolveSelectedCaseId(tutorialCaseSel ? tutorialCaseSel.value : state.tutorial.selectedCaseId);
  state.tutorial.responses = {};
  clearQuizBannerTimer();
  const banner = document.getElementById('quizBanner');
  if (banner) banner.style.display = 'none';
  const quizPanel = document.getElementById('quizPanel');
  if (quizPanel) quizPanel.style.display = 'none';
  startNextTutorialCase();
  updateModeButtons();
}
function endTutorial(){
  if (!(state.tutorial && state.tutorial.active)){
    if (TUTORIAL_SETUP_MODAL) TUTORIAL_SETUP_MODAL.hidden = true;
    updateModeButtons();
    return;
  }
  state.tutorial.active = false;
  state.tutorial.currentCase = null;
  state.tutorial.stepIndex = 0;
  state.tutorial.responses = {};
  state.tutorial.caseFocusOpen = false;
  resetTutorialEducationalState();
  clearActiveTutorialSeizures();
  if (tutorialPanel) tutorialPanel.style.display = 'none';
  if (TUTORIAL_SETUP_MODAL) TUTORIAL_SETUP_MODAL.hidden = true;
  const rf = document.getElementById('rhythmFieldset');
  if (rf) rf.style.display = 'block';
  restoreQuizSnapshot(state.tutorial.snapshot);
  state.tutorial.snapshot = null;
  syncControlsFromState();
  updateEyesOpenEnabled();
  updateSeizureActionButtons();
  regen();
  renderTutorialUI();
  updateModeButtons();
}
function onTutorialAnswer(stepKey, value){
  const caseData = state.tutorial.currentCase;
  const step = tutorialStepByKey(stepKey);
  if (!caseData || !step || !caseData.truth) return;
  const truth = caseData.truth[stepKey];
  state.tutorial.responses[stepKey] = {
    selected:value,
    correct:value === truth,
    revealed:true
  };
  renderTutorialUI();
}
function tutorialGoBack(){
  if (!(state.tutorial && state.tutorial.active)) return;
  state.tutorial.stepIndex = Math.max(0, state.tutorial.stepIndex - 1);
  renderTutorialUI();
}
function tutorialGoNext(){
  if (!(state.tutorial && state.tutorial.active)) return;
  if (!tutorialCanAdvance()) return;
  state.tutorial.stepIndex = Math.min(TUTORIAL_STEPS.length - 1, state.tutorial.stepIndex + 1);
  renderTutorialUI();
}
