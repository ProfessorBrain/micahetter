<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BRAIN-out!</title>
  <style>
    :root {
      --bg: #061019;
      --panel: linear-gradient(180deg, rgba(11, 20, 35, 0.92), rgba(7, 15, 25, 0.88));
      --panel-2: rgba(8, 15, 26, 0.96);
      --line: #79ddff;
      --line-soft: rgba(121, 221, 255, 0.14);
      --accent: #ff8469;
      --accent-2: #f5cb73;
      --mint: #8af4c1;
      --text: #f4fbff;
      --muted: #9db0bf;
      --muted-2: #6f8294;
      --shadow: 0 28px 60px rgba(0, 0, 0, 0.34);
      --radius: 22px;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      color: var(--text);
      background:
        radial-gradient(circle at top, rgba(93, 167, 255, 0.18), transparent 32%),
        radial-gradient(circle at 82% 18%, rgba(255, 138, 107, 0.12), transparent 24%),
        linear-gradient(180deg, #06111b 0%, #07111a 54%, #04080f 100%);
      font-family: "Aptos", "Segoe UI", "Trebuchet MS", sans-serif;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.1;
      background-image:
        linear-gradient(rgba(134, 195, 255, 0.14) 1px, transparent 1px),
        linear-gradient(90deg, rgba(134, 195, 255, 0.14) 1px, transparent 1px);
      background-size: 26px 26px;
      mask-image: linear-gradient(180deg, rgba(0, 0, 0, 0.9), transparent);
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.07;
      background-image: url("graphics/bg-blurred-small.png");
      background-size: 320px 320px;
      background-repeat: repeat;
      mix-blend-mode: screen;
    }

    button,
    select {
      font: inherit;
    }

    button {
      cursor: pointer;
      border: 0;
      border-radius: 14px;
      padding: 0.85rem 1rem;
      color: var(--text);
      background: linear-gradient(180deg, rgba(27, 55, 80, 0.95), rgba(17, 37, 57, 0.95));
      box-shadow:
        0 10px 24px rgba(0, 0, 0, 0.18),
        inset 0 0 0 1px rgba(136, 220, 255, 0.14);
      transition: transform 0.12s ease, filter 0.12s ease;
    }

    button:hover,
    button:focus-visible {
      transform: translateY(-1px);
      filter: brightness(1.08);
      outline: none;
    }

    button.primary {
      background: linear-gradient(180deg, #ff886c, #ff6666);
      box-shadow:
        0 14px 28px rgba(255, 120, 102, 0.26),
        inset 0 0 0 1px rgba(255, 238, 222, 0.18);
    }

    button.secondary {
      background: linear-gradient(180deg, #1f8f79, #126d5f);
    }

    button.ghost {
      background: rgba(15, 31, 49, 0.82);
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.52;
      transform: none;
      filter: none;
    }

    select {
      width: 100%;
      border: 1px solid rgba(124, 214, 255, 0.2);
      border-radius: 14px;
      padding: 0.82rem 0.9rem;
      color: var(--text);
      background: rgba(8, 17, 28, 0.96);
    }

    .app {
      width: min(1280px, calc(100% - 24px));
      margin: 0 auto;
      padding: 18px 0 32px;
    }

    .hero {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      align-items: center;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }

    .title-wrap {
      display: grid;
      gap: 8px;
    }

    .hero-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .hero-actions button {
      min-width: 108px;
    }

    .eyebrow {
      display: inline-flex;
      width: fit-content;
      align-items: center;
      gap: 8px;
      padding: 0.38rem 0.62rem;
      border-radius: 999px;
      background: rgba(10, 25, 43, 0.8);
      border: 1px solid rgba(121, 221, 255, 0.14);
      color: #bfe9fb;
      font-size: 0.74rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .title-wrap h1 {
      margin: 0;
      font-size: clamp(2.3rem, 5.4vw, 4.4rem);
      letter-spacing: 0.14em;
      text-transform: uppercase;
      text-shadow: 0 0 22px rgba(89, 212, 255, 0.16);
    }

    .title-wrap p {
      margin: 0;
      max-width: 34ch;
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.35;
    }

    .layout {
      display: block;
    }

    .panel {
      background: var(--panel);
      border: 1px solid rgba(111, 196, 255, 0.1);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
    }

    .sidebar {
      padding: 14px;
      display: grid;
      gap: 10px;
      position: sticky;
      top: 14px;
    }

    .sidebar section {
      padding: 14px;
      border-radius: 18px;
      background: rgba(6, 14, 25, 0.48);
      border: 1px solid rgba(121, 221, 255, 0.08);
    }

    .sidebar h2,
    .shell-head h2,
    .overlay-card h2 {
      margin: 0 0 0.85rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-size: 0.88rem;
      color: #d4efff;
    }

    .setup-grid,
    .tips,
    .scores-list,
    .stats-list {
      display: grid;
      gap: 10px;
    }

    .field label {
      display: block;
      margin-bottom: 0.42rem;
      color: var(--muted);
      font-size: 0.74rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .button-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .sidebar .button-row button {
      flex: 1 1 110px;
    }

    .shell-head .button-row button {
      min-width: 90px;
    }

    .mini-note {
      color: var(--muted-2);
      line-height: 1.35;
      font-size: 0.82rem;
      margin: 2px 0 0;
    }

    .tips div,
    .score-row,
    .stat-row {
      padding: 0.78rem 0.82rem;
      background: rgba(8, 18, 31, 0.72);
      border-radius: 14px;
      border: 1px solid rgba(126, 214, 255, 0.08);
    }

    .tips {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .tips div {
      display: grid;
      gap: 5px;
      min-height: 70px;
    }

    .tips strong {
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #d6f2ff;
    }

    .tips code {
      width: fit-content;
      padding: 0.14rem 0.4rem;
      border-radius: 999px;
      background: rgba(121, 221, 255, 0.08);
      color: #f7fcff;
      font-size: 0.84rem;
    }

    .tips span {
      color: var(--muted);
      font-size: 0.84rem;
    }

    .score-row,
    .stat-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
    }

    .score-row strong,
    .stat-row strong {
      color: #ffdc81;
    }

    .game-column {
      display: grid;
      gap: 10px;
    }

    .hud {
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      gap: 8px;
    }

    .hud-chip {
      min-height: 64px;
      padding: 10px 12px;
      background: rgba(8, 18, 31, 0.78);
      border: 1px solid rgba(125, 214, 255, 0.08);
      border-radius: 16px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 3px;
    }

    .hud-chip span {
      font-size: 0.68rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--muted-2);
    }

    .hud-chip strong {
      font-size: 1rem;
      color: #f7fcff;
    }

    .hud-chip.effects strong {
      font-size: 0.84rem;
      color: #99ffd2;
    }

    .shell {
      overflow: hidden;
      position: relative;
    }

    .shell-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      padding: 14px 14px 0;
      flex-wrap: wrap;
    }

    .shell-head p {
      margin: 0;
      color: var(--muted);
      max-width: 34ch;
      font-size: 0.88rem;
      line-height: 1.3;
    }

    .canvas-wrap {
      position: relative;
      padding: 14px;
    }

    canvas {
      display: block;
      width: 100%;
      height: auto;
      border-radius: 20px;
      background: linear-gradient(180deg, #0b1727 0%, #08111d 100%);
      border: 1px solid rgba(112, 211, 255, 0.14);
      box-shadow:
        inset 0 0 60px rgba(48, 141, 225, 0.14),
        0 16px 36px rgba(0, 0, 0, 0.24);
      image-rendering: pixelated;
      touch-action: none;
    }

    .toast {
      position: absolute;
      top: 24px;
      right: 24px;
      max-width: min(360px, calc(100% - 48px));
      padding: 0.84rem 0.95rem;
      border-radius: 16px;
      background: rgba(10, 22, 38, 0.94);
      border: 1px solid rgba(124, 214, 255, 0.12);
      box-shadow: var(--shadow);
      pointer-events: none;
      opacity: 0;
      transform: translateY(-8px);
      transition: opacity 0.18s ease, transform 0.18s ease;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    .toast strong {
      display: block;
      margin-bottom: 0.25rem;
      color: #ffd786;
    }

    .overlay {
      position: absolute;
      inset: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 18px;
      background: rgba(4, 9, 15, 0.68);
      backdrop-filter: blur(8px);
      border-radius: 20px;
      z-index: 5;
    }

    .overlay.hidden,
    .hidden {
      display: none !important;
    }

    .overlay-card {
      width: min(760px, 100%);
      max-height: 100%;
      overflow-y: auto;
      background: var(--panel-2);
      border: 1px solid rgba(125, 214, 255, 0.12);
      border-radius: 22px;
      padding: 20px;
      box-shadow: var(--shadow);
    }

    .settings-card {
      width: min(540px, 100%);
    }

    .settings-grid {
      display: grid;
      gap: 12px;
    }

    .overlay-card p,
    .atlas-card p,
    .review-card p {
      color: #c4e7fb;
      line-height: 1.5;
    }

    .question-meta {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border-radius: 999px;
      padding: 0.34rem 0.62rem;
      background: rgba(11, 37, 59, 0.58);
      color: #bde8fd;
      border: 1px solid rgba(125, 214, 255, 0.1);
      text-transform: uppercase;
      font-size: 0.7rem;
      letter-spacing: 0.1em;
    }

    .answers,
    .atlas-grid,
    .review-list {
      display: grid;
      gap: 12px;
      margin-top: 16px;
    }

    .answers button {
      text-align: left;
      border-radius: 16px;
      padding: 0.95rem 1rem;
      background: rgba(10, 27, 47, 0.76);
      border: 1px solid rgba(123, 214, 255, 0.1);
    }

    .answers button.correct {
      background: rgba(21, 92, 61, 0.92);
    }

    .answers button.wrong {
      background: rgba(116, 37, 47, 0.92);
    }

    .explanation-box {
      margin-top: 14px;
      padding: 0.95rem 1rem;
      border-radius: 16px;
      background: rgba(8, 21, 37, 0.95);
      border: 1px solid rgba(126, 214, 255, 0.08);
    }

    .atlas-card,
    .review-card {
      border-radius: 16px;
      padding: 1rem;
      background: rgba(7, 19, 35, 0.7);
      border: 1px solid rgba(127, 214, 255, 0.08);
    }

    .atlas-card.locked {
      opacity: 0.68;
    }

    .atlas-card h3,
    .review-card h3 {
      margin: 0 0 0.55rem;
      font-size: 1rem;
    }

    .atlas-summary {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
    }

    .summary-card {
      padding: 0.92rem;
      border-radius: 16px;
      background: rgba(10, 24, 41, 0.72);
      border: 1px solid rgba(124, 214, 255, 0.08);
    }

    .summary-card strong {
      display: block;
      font-size: 1.3rem;
      color: #ffd993;
      margin-top: 0.15rem;
    }

    .mobile-controls {
      display: none;
      gap: 8px;
      padding: 0 14px 14px;
      flex-wrap: wrap;
    }

    .mobile-controls button {
      flex: 1 1 120px;
      min-height: 54px;
      border-radius: 16px;
      background: rgba(12, 29, 47, 0.94);
    }

    .footer {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      align-items: center;
      margin-top: 10px;
      color: var(--muted-2);
      font-size: 0.82rem;
      flex-wrap: wrap;
    }

    @media (max-width: 1080px) {
      .hud {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }
    }

    @media (max-width: 760px) {
      .app {
        width: min(100% - 12px, 100%);
        padding-top: 12px;
      }

      .hero {
        padding: 0 4px;
      }

      .hero-actions {
        width: 100%;
      }

      .hud {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .atlas-summary {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .mobile-controls {
        display: flex;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <section class="hero">
      <div class="title-wrap">
        <h1>BRAIN-out!</h1>
      </div>
      <div class="hero-actions">
        <button class="primary" id="startButton">Play</button>
        <button class="secondary" id="pauseButton">Pause</button>
        <button class="ghost" id="settingsButton">Settings</button>
      </div>
    </section>

    <main class="layout">
      <section class="game-column">
        <div class="hud">
          <div class="hud-chip"><span>Stage</span><strong id="hudStage">Ready</strong></div>
          <div class="hud-chip"><span>Lives</span><strong id="hudLives">3</strong></div>
          <div class="hud-chip"><span>Score</span><strong id="hudScore">0</strong></div>
          <div class="hud-chip"><span>Combo</span><strong id="hudCombo">x0</strong></div>
          <div class="hud-chip"><span>Atlas</span><strong id="hudAtlas">0 / 20</strong></div>
          <div class="hud-chip effects"><span>Active</span><strong id="hudEffects">None</strong></div>
        </div>

        <div class="shell panel">
          <div class="shell-head">
            <div>
              <h2 id="shellTitle">Ready Room</h2>
              <p id="shellSubtitle">Open Settings to change mode, tier, and topic.</p>
            </div>
          </div>

          <div class="canvas-wrap">
            <canvas id="gameCanvas" width="960" height="600" aria-label="BRAIN-out game area"></canvas>
            <div class="toast" id="toast"></div>

            <div class="overlay hidden" id="settingsOverlay">
              <div class="overlay-card settings-card">
                <div class="button-row" style="justify-content: space-between; align-items: center;">
                  <h2>Settings</h2>
                  <button class="ghost" id="closeSettingsButton">Close</button>
                </div>
                <div class="settings-grid">
                  <div class="field">
                    <label for="modeSelect">Mode</label>
                    <select id="modeSelect">
                      <option value="campaign">Campaign</option>
                      <option value="endless">Endless</option>
                    </select>
                  </div>
                  <div class="field">
                    <label for="difficultySelect">Question Tier</label>
                    <select id="difficultySelect">
                      <option value="student">Student</option>
                      <option value="resident">Resident</option>
                      <option value="physician">Physician</option>
                      <option value="mixed">Mixed</option>
                    </select>
                  </div>
                  <div class="field">
                    <label for="topicSelect">Topic</label>
                    <select id="topicSelect">
                      <option value="all">All boards topics</option>
                      <option value="stroke">Stroke</option>
                      <option value="neuroanatomy">Neuroanatomy</option>
                      <option value="epilepsy">Epilepsy</option>
                      <option value="movement">Movement</option>
                      <option value="neuromuscular">Neuromuscular</option>
                      <option value="neurocritical">Neurocritical care</option>
                      <option value="localization">Localization</option>
                      <option value="imaging">Imaging</option>
                    </select>
                  </div>
                  <div class="button-row">
                    <button class="ghost" id="openAtlasButton">Atlas</button>
                  </div>
                </div>
              </div>
            </div>

            <div class="overlay hidden" id="questionOverlay">
              <div class="overlay-card">
                <div class="question-meta">
                  <span class="pill" id="questionTier">Student</span>
                  <span class="pill" id="questionTopic">Stroke</span>
                  <span class="pill">Quiz Brick</span>
                </div>
                <h2 id="questionPrompt">Question prompt</h2>
                <p id="questionStem"></p>
                <div class="answers" id="questionAnswers"></div>
                <div class="explanation-box hidden" id="questionExplanation"></div>
                <div class="button-row" id="questionButtons">
                  <button class="ghost" id="skipQuestionButton">Skip</button>
                  <button class="primary hidden" id="continueQuestionButton">Resume Run</button>
                </div>
              </div>
            </div>

            <div class="overlay hidden" id="atlasOverlay">
              <div class="overlay-card">
                <div class="button-row" style="justify-content: space-between; align-items: center;">
                  <h2>Atlas</h2>
                  <button class="ghost" id="closeAtlasButton">Close</button>
                </div>
                <p>Correct answers unlock quick-reference cards.</p>
                <div class="atlas-summary" id="atlasSummary"></div>
                <div class="atlas-grid" id="atlasEntries"></div>
              </div>
            </div>

            <div class="overlay hidden" id="reviewOverlay">
              <div class="overlay-card">
                <h2 id="reviewTitle">Run Complete</h2>
                <p id="reviewSummary"></p>
                <div class="stats-list" id="reviewStats"></div>
                <div class="review-list" id="reviewMissed"></div>
                <div class="button-row" style="margin-top: 16px;">
                  <button class="primary" id="playAgainButton">Play Again</button>
                  <button class="ghost" id="closeReviewButton">Close Review</button>
                </div>
              </div>
            </div>
          </div>

          <div class="mobile-controls">
            <button id="mobileLeft">Left</button>
            <button id="mobileLaunch">Launch</button>
            <button id="mobileRight">Right</button>
            <button id="mobileFire">Pulse</button>
          </div>
        </div>

        <footer class="footer">
          <span>by micah etter</span>
        </footer>
      </section>
    </main>
  </div>
  <script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    ctx.imageSmoothingEnabled = false;

    const ui = {
      modeSelect: document.getElementById("modeSelect"),
      difficultySelect: document.getElementById("difficultySelect"),
      topicSelect: document.getElementById("topicSelect"),
      startButton: document.getElementById("startButton"),
      pauseButton: document.getElementById("pauseButton"),
      settingsButton: document.getElementById("settingsButton"),
      settingsOverlay: document.getElementById("settingsOverlay"),
      closeSettingsButton: document.getElementById("closeSettingsButton"),
      openAtlasButton: document.getElementById("openAtlasButton"),
      closeAtlasButton: document.getElementById("closeAtlasButton"),
      closeReviewButton: document.getElementById("closeReviewButton"),
      playAgainButton: document.getElementById("playAgainButton"),
      skipQuestionButton: document.getElementById("skipQuestionButton"),
      continueQuestionButton: document.getElementById("continueQuestionButton"),
      questionOverlay: document.getElementById("questionOverlay"),
      atlasOverlay: document.getElementById("atlasOverlay"),
      reviewOverlay: document.getElementById("reviewOverlay"),
      questionTier: document.getElementById("questionTier"),
      questionTopic: document.getElementById("questionTopic"),
      questionPrompt: document.getElementById("questionPrompt"),
      questionStem: document.getElementById("questionStem"),
      questionAnswers: document.getElementById("questionAnswers"),
      questionExplanation: document.getElementById("questionExplanation"),
      highScores: document.getElementById("highScores"),
      atlasSummary: document.getElementById("atlasSummary"),
      atlasEntries: document.getElementById("atlasEntries"),
      reviewTitle: document.getElementById("reviewTitle"),
      reviewSummary: document.getElementById("reviewSummary"),
      reviewStats: document.getElementById("reviewStats"),
      reviewMissed: document.getElementById("reviewMissed"),
      toast: document.getElementById("toast"),
      hudStage: document.getElementById("hudStage"),
      hudLives: document.getElementById("hudLives"),
      hudScore: document.getElementById("hudScore"),
      hudCombo: document.getElementById("hudCombo"),
      hudAtlas: document.getElementById("hudAtlas"),
      hudEffects: document.getElementById("hudEffects"),
      shellTitle: document.getElementById("shellTitle"),
      shellSubtitle: document.getElementById("shellSubtitle"),
      mobileLeft: document.getElementById("mobileLeft"),
      mobileRight: document.getElementById("mobileRight"),
      mobileLaunch: document.getElementById("mobileLaunch"),
      mobileFire: document.getElementById("mobileFire"),
    };

    const STORAGE_KEYS = {
      highScores: "brainout-highscores-v1",
      atlas: "brainout-knowledge-atlas-v1",
    };

    const CANVAS = { width: 960, height: 600 };
    const BRICK = { width: 88, height: 33, gap: 6 };

    const SPRITE_PATHS = {
      background: "graphics/bg-blurred-small.png",
      ball: "graphics/ball.png",
      paddle: "graphics/paddle.png",
      brickRegular: "graphics/brick-regular.png",
      brickDense: "graphics/brick-dense.png",
      brickPower: "graphics/brick-powerup.png",
      brickQuiz: "graphics/brick-quiz.png",
      brickBarrier: "graphics/brick-barrier.png",
    };

    const sprites = {};

    const TOPICS = {
      all: { label: "All boards topics", color: "#8bdcff" },
      stroke: { label: "Stroke", color: "#ff9b7f" },
      neuroanatomy: { label: "Neuroanatomy", color: "#a7ec7a" },
      epilepsy: { label: "Epilepsy", color: "#ffd36f" },
      movement: { label: "Movement", color: "#f6a7ff" },
      neuromuscular: { label: "Neuromuscular", color: "#8ff4dc" },
      neurocritical: { label: "Neurocritical care", color: "#ff7878" },
      localization: { label: "Localization", color: "#8dc6ff" },
      imaging: { label: "Imaging", color: "#c1d1ff" },
    };

    const DIFFICULTIES = {
      student: { label: "Student", color: "#7dd5ff" },

      } catch (error) {

    }

    function saveStorage(key, value) {
      try {

        return;
      }
    }

    function spriteReady(image) {
      return Boolean(image && image.complete && image.naturalWidth > 0);

    function preloadSprites() {

    function getBrickSprite(brick) {
      if (brick.kind === "dense" && brick.hp === brick.maxHp) return sprites.brickDense;
      if (brick.kind === "dense" && brick.hp < brick.maxHp) return sprites.brickRegular;
      if (brick.kind === "power") return sprites.brickPower;
      if (brick.kind === "quiz") return sprites.brickQuiz;
      if (brick.kind === "barrier") return sprites.brickBarrier;
      return sprites.brickRegular;
    }

    function getBallBaseSpeed() {
      const stageBoost = state.mode === "campaign" ? state.stageIndex * 8 : Math.min(54, (state.endlessWave - 1) * 6);
      return 340 + stageBoost;
    }

    function normalizeBall(ball, targetSpeed = getBallBaseSpeed()) {
      const magnitude = Math.hypot(ball.vx, ball.vy) || 1;
      ball.vx = (ball.vx / magnitude) * targetSpeed;
      ball.vy = (ball.vy / magnitude) * targetSpeed;
    }

    function launchBalls() {
      if (!state.running || state.paused || !state.awaitingLaunch) return;
      const speed = getBallBaseSpeed();
      state.balls.forEach((ball, index) => {
        if (ball.stuck) {
          const direction = index % 2 === 0 ? 1 : -1;
          ball.stuck = false;
          ball.vx = (120 + Math.random() * 80) * direction;
          ball.vy = -speed;
          normalizeBall(ball, speed);
        }
      });
      state.awaitingLaunch = false;
      showToast("Cortical volley", "Brain launched.");
    }

    function buildPatternBricks(pattern, theme) {
      const cols = pattern[0].length;
      const totalWidth = cols * BRICK.width + (cols - 1) * BRICK.gap;
      const startX = (CANVAS.width - totalWidth) / 2;
      const startY = 92;
      const bricks = [];
      pattern.forEach((row, rowIndex) => {
        [...row].forEach((cell, colIndex) => {
          if (cell === ".") return;
          let kind = "standard";
          let hp = 1;
          let points = 100;
          if (cell === "D") { kind = "dense"; hp = 2; points = 160; }
          if (cell === "P") { kind = "power"; points = 150; }
          if (cell === "Q") { kind = "quiz"; points = 170; }
          if (cell === "B") { kind = "barrier"; hp = 2; points = 140; }
          bricks.push({
            x: startX + colIndex * (BRICK.width + BRICK.gap),
            y: startY + rowIndex * (BRICK.height + BRICK.gap),
            w: BRICK.width,
            h: BRICK.height,
            kind,
            hp,
            maxHp: hp,
            points,
            color: theme.palette[rowIndex % theme.palette.length],
          });
        });
      });
      return bricks;
    }

    function generateEndlessPattern(wave, bossRound) {
      if (bossRound) {
        return ["..DDBBDD..", ".BBDQDBB.", "..DDDDDD.."];
      }
      const rows = clamp(4 + Math.floor((wave - 1) / 2), 4, 6);
      const cols = 10;
      const pattern = [];
      for (let row = 0; row < rows; row += 1) {
        const leftHalf = [];
        for (let col = 0; col < cols / 2; col += 1) {
          const roll = Math.random();
          let cell = "N";
          if (roll < 0.1) cell = ".";
          else if (roll < 0.2) cell = "D";
          else if (roll < 0.27) cell = "P";
          leftHalf.push(cell);
        }
        pattern.push(leftHalf.concat([...leftHalf].reverse()).join(""));
      }
      const qRow = Math.floor(Math.random() * pattern.length);
      const qCol = 4 + Math.floor(Math.random() * 2);
      const chars = pattern[qRow].split("");
      chars[qCol] = "Q";
      pattern[qRow] = chars.join("");
      return pattern;
    }

    function getEndlessTheme(wave) {
      const base = CAMPAIGN_STAGES[(wave - 1) % 4];

        boss: wave % 3 === 0,
        bossName: wave % 3 === 0 ? randomItem(["Localize the Lesion", "Board Review Beast", "Stroke Code Surge"]) : "",
        pattern: generateEndlessPattern(wave, wave % 3 === 0),

      if (name === "wide") syncPaddleWidth();
      updateHud();
    }

    function spawnMultiball() {
      if (!state.balls.length) return;
      const clones = [];
      state.balls.slice(0, 2).forEach((ball, index) => {
        const angle = index === 0 ? 0.55 : -0.55;
        const speed = getBallBaseSpeed();
        const vx = ball.vx * Math.cos(angle) - ball.vy * Math.sin(angle);
        const vy = ball.vx * Math.sin(angle) + ball.vy * Math.cos(angle);
        const clone = { x: ball.x, y: ball.y, prevX: ball.x, prevY: ball.y, vx, vy, r: ball.r, stuck: false };
        normalizeBall(clone, speed);
        clones.push(clone);
      });
      state.balls.push(...clones);
      if (state.awaitingLaunch) launchBalls();
    }

    function applyPowerUp(type, direct = false) {
      if (type === "wide") extendEffect("wide", 18000);
      if (type === "multiball") spawnMultiball();
      if (type === "slow") extendEffect("slow", 14000);
      if (type === "laser") extendEffect("laser", 16000);
      if (type === "sticky") extendEffect("sticky", 18000);
      if (type === "life") state.lives = Math.min(7, state.lives + 1);
      if (type === "shield") state.shieldCharges = Math.min(4, state.shieldCharges + 1);
      if (direct) state.score += 60;
      showToast(POWER_UPS[type].name, type === "wide" ? "Synaptic paddle widened." : "Upgrade collected.");
      updateHud();
    }

    function getDropPool() {
      const pool = ["wide", "slow", "sticky", "laser", "shield", "life", "multiball"];
      return state.permanent.paddleTier > 1 ? pool.concat(["laser", "multiball"]) : pool;
    }

    function spawnDrop(x, y, forcedType = null) {
      state.drops.push({ x, y, vy: 120, type: forcedType || randomItem(getDropPool()), size: 14 });
    }

    function stripOneReward() {
      const activeEntries = Object.entries(state.activeEffects).filter(([, until]) => until > nowMs());
      if (activeEntries.length) {
        activeEntries.sort((a, b) => b[1] - a[1]);
        const [effectName] = activeEntries[0];
        delete state.activeEffects[effectName];
        if (effectName === "wide") syncPaddleWidth();
        updateHud();
        return POWER_UPS[effectName] ? POWER_UPS[effectName].name : "Upgrade";
      }
      if (state.shieldCharges > 0) {
        state.shieldCharges -= 1;
        updateHud();
        return POWER_UPS.shield.name;
      }
      if (state.permanent.paddleTier > 0) {
        state.permanent.paddleTier -= 1;
        state.permanent.dropBoost = Math.max(0, state.permanent.dropBoost - 1);
        state.permanent.scoreBonus = Math.max(0, state.permanent.scoreBonus - 0.05);
        syncPaddleWidth();
        updateHud();
        return "Knowledge Rank";
      }
      return null;
    }

    function unlockAtlas(question) {
      if (!atlasProgress.includes(question.id)) {
        atlasProgress.push(question.id);
        saveStorage(STORAGE_KEYS.atlas, atlasProgress);
        state.atlasUnlockedThisRun += 1;
      }
      renderAtlas();
      updateHud();
    }

    function getQuestionPool() {
      const difficultyFilter = state.difficulty === "mixed" ? () => true : (question) => question.difficulty === state.difficulty;
      const topicFilter = state.topic === "all" ? () => true : (question) => question.topic === state.topic;
      let pool = QUESTION_BANK.filter((question) => difficultyFilter(question) && topicFilter(question));
      if (!pool.length && state.topic !== "all") pool = QUESTION_BANK.filter((question) => difficultyFilter(question));
      if (!pool.length && state.difficulty !== "mixed") pool = QUESTION_BANK.filter((question) => topicFilter(question));
      return pool.length ? pool : QUESTION_BANK.slice();
    }

    function chooseQuestion() {
      const pool = getQuestionPool();
      const unseen = pool.filter((question) => !state.shownQuestions.includes(question.id));
      const chosen = unseen.length ? randomItem(unseen) : randomItem(pool);
      state.shownQuestions.push(chosen.id);
      return chosen;
    }

    function triggerQuestion() {
      if (!state.running) return;
      state.currentQuestion = chooseQuestion();
      state.paused = true;
      state.pauseReason = "question";
      renderQuestion();
    }

    function renderQuestion() {
      const question = state.currentQuestion;
      if (!question) return;
      ui.questionTier.textContent = DIFFICULTIES[question.difficulty].label;
      ui.questionTier.style.color = DIFFICULTIES[question.difficulty].color;
      ui.questionTopic.textContent = TOPICS[question.topic].label;
      ui.questionTopic.style.color = TOPICS[question.topic].color;
      ui.questionPrompt.textContent = question.prompt;
      ui.questionStem.textContent = question.stem;
      ui.questionAnswers.innerHTML = "";
      ui.questionExplanation.classList.add("hidden");
      ui.questionExplanation.innerHTML = "";
      ui.continueQuestionButton.classList.add("hidden");
      ui.skipQuestionButton.classList.remove("hidden");
      question.choices.forEach((choice, index) => {
        const button = document.createElement("button");
        button.textContent = String.fromCharCode(65 + index) + ". " + choice;
        button.addEventListener("click", () => answerQuestion(index));
        ui.questionAnswers.appendChild(button);
      });
      ui.questionOverlay.classList.remove("hidden");
    }

    function answerQuestion(index) {
      const question = state.currentQuestion;
      if (!question) return;
      const buttons = [...ui.questionAnswers.querySelectorAll("button")];
      buttons.forEach((button, buttonIndex) => {
        button.disabled = true;
        if (buttonIndex === question.answer) button.classList.add("correct");
        else if (buttonIndex === index) button.classList.add("wrong");
      });
      const correct = index === question.answer;
      ui.questionExplanation.classList.remove("hidden");
      if (correct) {
        state.stats.correct += 1;
        state.score += 420 + state.stats.correct * 45;
        unlockAtlas(question);
        if (state.stats.correct % 2 === 0) {
          state.permanent.paddleTier = clamp(state.permanent.paddleTier + 1, 0, 3);
          state.permanent.dropBoost = clamp(state.permanent.dropBoost + 1, 0, 3);
          state.permanent.scoreBonus = Math.min(0.25, state.permanent.scoreBonus + 0.05);
        }
        const rewardType = randomItem(getDropPool());
        applyPowerUp(rewardType, true);
        ui.questionExplanation.innerHTML = "<strong>Correct.</strong> " + question.explanation + "<br><br><strong>Reward:</strong> " + POWER_UPS[rewardType].name + (state.stats.correct % 2 === 0 ? " plus a permanent paddle rank up." : ".");
      } else {
        state.stats.wrong += 1;
        const removed = stripOneReward();
        state.missedQuestions.push(question);
        ui.questionExplanation.innerHTML = "<strong>Missed.</strong> Correct answer: " + question.choices[question.answer] + ". " + question.explanation + (removed ? "<br><br><strong>Penalty:</strong> Lost " + removed + "." : "<br><br><strong>Penalty:</strong> No active upgrade to remove.");
      }
      updateHud();
      ui.skipQuestionButton.classList.add("hidden");
      ui.continueQuestionButton.classList.remove("hidden");
      renderAtlas();
    }

    function skipQuestion() {
      if (!state.currentQuestion) return;
      state.stats.skipped += 1;
      ui.questionOverlay.classList.add("hidden");
      state.currentQuestion = null;
      state.paused = false;
      state.pauseReason = "";
    }

    function closeQuestion() {
      ui.questionOverlay.classList.add("hidden");
      state.currentQuestion = null;
      state.paused = false;
      state.pauseReason = "";
      updateHud();
    }

    function openAtlas() {
      renderAtlas();
      ui.atlasOverlay.classList.remove("hidden");
      if (state.running && !state.paused) {
        state.paused = true;
        state.pauseReason = "atlas";
      }
    }

    function closeAtlas() {
      ui.atlasOverlay.classList.add("hidden");
      if (state.pauseReason === "atlas") {
        state.paused = false;
        state.pauseReason = "";
      }
    }

    function openSettings() {
      if (state.pauseReason === "question" || state.pauseReason === "review") {
        return;
      }
      ui.settingsOverlay.classList.remove("hidden");
      if (state.running && !state.paused) {
        state.paused = true;
        state.pauseReason = "settings";
      }
    }

    function closeSettings() {
      ui.settingsOverlay.classList.add("hidden");
      if (state.pauseReason === "settings") {
        state.paused = false;
        state.pauseReason = "";
      }
    }

    function renderAtlas() {
      const unlockedSet = new Set(atlasProgress);
      const studentCount = QUESTION_BANK.filter((question) => question.difficulty === "student" && unlockedSet.has(question.id)).length;
      const residentCount = QUESTION_BANK.filter((question) => question.difficulty === "resident" && unlockedSet.has(question.id)).length;
      const physicianCount = QUESTION_BANK.filter((question) => question.difficulty === "physician" && unlockedSet.has(question.id)).length;
      ui.atlasSummary.innerHTML = `
        <div class="summary-card">Unlocked<strong>${unlockedSet.size}</strong></div>
        <div class="summary-card">Student<strong>${studentCount}</strong></div>
        <div class="summary-card">Resident<strong>${residentCount}</strong></div>
        <div class="summary-card">Physician<strong>${physicianCount}</strong></div>
      `;
      ui.atlasEntries.innerHTML = "";
      QUESTION_BANK.forEach((question) => {
        const unlocked = unlockedSet.has(question.id);
        const card = document.createElement("article");
        card.className = "atlas-card" + (unlocked ? "" : " locked");
        card.innerHTML = `
          <div class="question-meta">
            <span class="pill">${DIFFICULTIES[question.difficulty].label}</span>
            <span class="pill">${TOPICS[question.topic].label}</span>
          </div>
          <h3>${unlocked ? question.prompt : "Locked synapse entry"}</h3>
          <p>${unlocked ? question.stem : "Answer the matching quiz brick to unlock."}</p>
          <p>${unlocked ? "<strong>Key:</strong> " + question.choices[question.answer] + ". " + question.explanation : ""}</p>
        `;
        ui.atlasEntries.appendChild(card);
      });
    }

    function renderHighScores() {
      if (!ui.highScores) {
        return;
      }
      if (!highScores.length) {
        ui.highScores.innerHTML = '<div class="score-row"><span>No runs yet</span><strong>Play</strong></div>';
        return;
      }
      ui.highScores.innerHTML = "";
      highScores.slice(0, 8).forEach((entry, index) => {
        const row = document.createElement("div");
        row.className = "score-row";
        row.innerHTML = `<span>#${index + 1} ${entry.mode} / ${entry.difficulty} / ${entry.topic}</span><strong>${Math.round(entry.score).toLocaleString()}</strong>`;
        ui.highScores.appendChild(row);
      });
    }

    function saveHighScore(score) {
      highScores.push({ score, mode: state.mode, difficulty: state.difficulty, topic: state.topic, date: new Date().toISOString() });
      highScores.sort((a, b) => b.score - a.score);
      highScores = highScores.slice(0, 10);
      saveStorage(STORAGE_KEYS.highScores, highScores);
      renderHighScores();
    }

    function fireLaser() {
      if (!state.running || state.paused || !isEffectActive("laser") || state.awaitingLaunch) return;
      if (state.laserCooldown > 0) return;
      state.lasers.push(
        { x: state.paddle.x + 18, y: state.paddle.y, vy: -760 },
        { x: state.paddle.x + state.paddle.width - 18, y: state.paddle.y, vy: -760 },
      );
      state.laserCooldown = 0.32;
      showToast("TMS Pulse", "Laser volley fired.");
    }

    function loseLife() {
      state.lives -= 1;
      state.combo = 0;
      state.comboWindow = 0;
      if (state.lives <= 0) {
        finishRun(false);
        return;
      }
      syncPaddleWidth();
      resetBalls();
      setBanner("Neural setback", "Life lost. Relaunch when ready.", 2200);
      updateHud();
    }

    function finishRun(wonCampaign) {
      state.running = false;
      state.paused = true;
      state.pauseReason = "review";
      state.reviewOpen = true;
      const timeSeconds = Math.round((state.elapsed || 0) / 1000);
      const bonus = state.lives * 220 + state.stats.correct * 160 + state.stats.longestCombo * 25 + state.stats.bosses * 350 + timeSeconds * 4;
      state.score += bonus;
      saveHighScore(state.score);
      updateHud();
      ui.reviewTitle.textContent = wonCampaign ? "Campaign Cleared" : "Run Complete";
      ui.reviewSummary.textContent = wonCampaign
        ? "Full campaign clear."
        : "Review stats and missed questions.";
      ui.reviewStats.innerHTML = `
        <div class="stat-row"><span>Final score</span><strong>${Math.round(state.score).toLocaleString()}</strong></div>
        <div class="stat-row"><span>Bricks cleared</span><strong>${state.stats.bricks}</strong></div>
        <div class="stat-row"><span>Correct answers</span><strong>${state.stats.correct}</strong></div>
        <div class="stat-row"><span>Missed answers</span><strong>${state.stats.wrong}</strong></div>
        <div class="stat-row"><span>Longest combo</span><strong>x${state.stats.longestCombo}</strong></div>
        <div class="stat-row"><span>Boss rounds cleared</span><strong>${state.stats.bosses}</strong></div>
      `;
      ui.reviewMissed.innerHTML = "";
      if (!state.missedQuestions.length) {
        const card = document.createElement("article");
        card.className = "review-card";
        card.innerHTML = "<h3>Clean sheet</h3><p>No missed questions this run.</p>";
        ui.reviewMissed.appendChild(card);
      } else {
        state.missedQuestions.forEach((question) => {
          const card = document.createElement("article");
          card.className = "review-card";
          card.innerHTML = `
            <div class="question-meta">
              <span class="pill">${DIFFICULTIES[question.difficulty].label}</span>
              <span class="pill">${TOPICS[question.topic].label}</span>
            </div>
            <h3>${question.prompt}</h3>
            <p>${question.stem}</p>
            <p><strong>Correct answer:</strong> ${question.choices[question.answer]}</p>
            <p>${question.explanation}</p>
          `;
          ui.reviewMissed.appendChild(card);
        });
      }
      ui.reviewOverlay.classList.remove("hidden");
    }

    function checkStageClear() {
      const remainingBricks = state.bricks.length > 0;
      if (state.boss && state.boss.hp > 0) {
        if (!remainingBricks) setBanner(state.boss.name, "Boss exposed. Keep the pressure on.", 1200);
        return;
      }
      if (remainingBricks) return;
      if (state.mode === "campaign") {
        if (state.stageIndex >= CAMPAIGN_STAGES.length - 1) {
          finishRun(true);
        } else {
          const token = state.runToken;
          state.stageIndex += 1;
          state.paused = true;
          state.pauseReason = "transition";
          setBanner("Stage clear", "Advancing to the next neuro zone.", 2200);
          setTimeout(() => {
            if (!state.reviewOpen && state.running && token === state.runToken) {
              state.paused = false;
              state.pauseReason = "";
              buildStage();
            }
          }, 1300);
        }
      } else {
        const token = state.runToken;
        state.endlessWave += 1;
        state.paused = true;
        state.pauseReason = "transition";
        setBanner("Wave clear", "Endless escalation incoming.", 2000);
        setTimeout(() => {
          if (!state.reviewOpen && state.running && token === state.runToken) {
            state.paused = false;
            state.pauseReason = "";
            buildStage();
          }
        }, 1200);
      }
    }

    function checkBossDefeat() {
      if (state.boss && state.boss.hp <= 0) {
        state.boss = null;
        state.score += 900;
        state.stats.bosses += 1;
        setBanner("Boss down", "Lesion neutralized.", 2400);
        checkStageClear();
      }
    }

    function hitBoss() {
      if (!state.boss) return;
      state.boss.hp -= 1;
      state.boss.flashUntil = nowMs() + 120;
      state.score += 95;
      if (state.boss.rewardThresholds.has(state.boss.hp)) {
        state.boss.rewardThresholds.delete(state.boss.hp);
        spawnDrop(state.boss.x + state.boss.w / 2, state.boss.y + state.boss.h, randomItem(["shield", "laser", "multiball", "wide"]));
      }
      checkBossDefeat();
      updateHud();
    }

    function updateBoss(dt) {
      if (!state.boss) return;
      state.boss.x += state.boss.vx * dt;
      if (state.boss.x <= 24 || state.boss.x + state.boss.w >= CANVAS.width - 24) state.boss.vx *= -1;
      if (nowMs() >= state.boss.nextHazard) {
        state.hazards.push({ x: state.boss.x + 24 + Math.random() * (state.boss.w - 48), y: state.boss.y + state.boss.h, vy: 170, r: 8 });
        state.boss.nextHazard = nowMs() + 2200;
      }
    }

    function updateHazards(dt) {
      state.hazards = state.hazards.filter((hazard) => {
        hazard.y += hazard.vy * dt;
        const hitPaddle = hazard.y + hazard.r >= state.paddle.y && hazard.y - hazard.r <= state.paddle.y + state.paddle.height && hazard.x >= state.paddle.x && hazard.x <= state.paddle.x + state.paddle.width;
        if (hitPaddle) {
          const removed = stripOneReward();
          showToast("Vascular debris", removed ? "Lost " + removed + "." : "No active upgrade to strip.");
          return false;
        }
        return hazard.y < CANVAS.height + 20;
      });
    }

    function updateDrops(dt) {
      state.drops = state.drops.filter((drop) => {
        drop.y += drop.vy * dt;
        const caught = drop.y + drop.size >= state.paddle.y && drop.y - drop.size <= state.paddle.y + state.paddle.height && drop.x >= state.paddle.x && drop.x <= state.paddle.x + state.paddle.width;
        if (caught) {
          applyPowerUp(drop.type);
          return false;
        }
        return drop.y < CANVAS.height + 30;
      });
    }

    function updateLasers(dt) {
      state.lasers = state.lasers.filter((laser) => {
        laser.y += laser.vy * dt;
        for (let index = state.bricks.length - 1; index >= 0; index -= 1) {
          const brick = state.bricks[index];
          if (laser.x >= brick.x && laser.x <= brick.x + brick.w && laser.y >= brick.y && laser.y <= brick.y + brick.h) {
            brick.hp -= 1;
            if (brick.hp <= 0) {
              state.bricks.splice(index, 1);
              onBrickDestroyed(brick);
            }
            return false;
          }
        }
        if (state.boss && laser.x >= state.boss.x && laser.x <= state.boss.x + state.boss.w && laser.y >= state.boss.y && laser.y <= state.boss.y + state.boss.h) {
          hitBoss();
          return false;
        }
        return laser.y > -20;
      });
    }

    function brickBreakPoints(brick) {
      const comboBonus = 1 + Math.min(0.9, state.combo * 0.08);
      const knowledgeBonus = 1 + state.permanent.scoreBonus;
      return Math.round(brick.points * comboBonus * knowledgeBonus);
    }

    function getParticleColor(brick) {
      if (brick.kind === "power") return "#ffd36f";
      if (brick.kind === "quiz") return "#d08bff";
      if (brick.kind === "barrier") return "#d7d9df";
      if (brick.kind === "dense") return "#7fd9ff";
      return brick.color || "#86dfff";
    }

    function spawnBrickBurst(brick) {
      const count = brick.kind === "barrier" ? 14 : 10;
      const color = getParticleColor(brick);
      for (let index = 0; index < count; index += 1) {
        const angle = (Math.PI * 2 * index) / count + Math.random() * 0.35;
        const speed = 55 + Math.random() * 130;
        const life = 0.42 + Math.random() * 0.22;
        state.particles.push({
          x: brick.x + brick.w / 2,
          y: brick.y + brick.h / 2,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed - 20,
          life,
          maxLife: life,
          size: 4 + Math.random() * 7,
          color,
        });
      }
    }

    function onBrickDestroyed(brick) {
      state.stats.bricks += 1;
      state.combo = state.comboWindow > 0 ? state.combo + 1 : 1;
      state.comboWindow = 2.7;
      state.stats.longestCombo = Math.max(state.stats.longestCombo, state.combo);
      state.score += brickBreakPoints(brick);
      spawnBrickBurst(brick);
      const chance = clamp(0.17 + state.permanent.dropBoost * 0.05, 0.17, 0.36);
      if (brick.kind === "power") spawnDrop(brick.x + brick.w / 2, brick.y + brick.h / 2);
      else if (Math.random() < chance) spawnDrop(brick.x + brick.w / 2, brick.y + brick.h / 2);
      if (brick.kind === "quiz") triggerQuestion();
      updateHud();
      checkStageClear();
    }

    function updateParticles(dt) {
      state.particles = state.particles.filter((particle) => {
        particle.life -= dt;
        particle.x += particle.vx * dt;
        particle.y += particle.vy * dt;
        particle.vy += 180 * dt;
        particle.vx *= 0.985;
        return particle.life > 0;
      });
    }

    function updatePaddle(dt) {
      if (!state.paddle) return;
      let move = 0;
      if (input.left) move -= 1;
      if (input.right) move += 1;
      if (move !== 0) state.paddle.x += move * state.paddle.speed * dt;
      else if (state.usingPointer) state.paddle.x += (state.pointerX - state.paddle.width / 2 - state.paddle.x) * Math.min(1, dt * 16);
      state.paddle.x = clamp(state.paddle.x, 0, CANVAS.width - state.paddle.width);
      state.balls.forEach((ball, index) => {
        if (ball.stuck) {
          ball.x = state.paddle.x + state.paddle.width / 2 + (index * 18 - 9);
          ball.y = state.paddle.y - ball.r - 2;
        }
      });
    }

    function handlePaddleBounce(ball) {
      const impact = (ball.x - (state.paddle.x + state.paddle.width / 2)) / (state.paddle.width / 2);
      const speed = getBallBaseSpeed();
      ball.vx = clamp(impact * speed * 0.95, -speed * 0.96, speed * 0.96);
      ball.vy = -Math.abs(speed - Math.abs(ball.vx) * 0.24);
      normalizeBall(ball, speed);
      if (isEffectActive("sticky")) {
        ball.stuck = true;
        state.awaitingLaunch = true;
      }
      state.combo = 0;
      state.comboWindow = 0;
    }

    function ballHitsBrick(ball, brick) {
      const closestX = clamp(ball.x, brick.x, brick.x + brick.w);
      const closestY = clamp(ball.y, brick.y, brick.y + brick.h);
      const dx = ball.x - closestX;
      const dy = ball.y - closestY;
      return dx * dx + dy * dy <= ball.r * ball.r;
    }

    function bounceOffRect(ball, rect) {
      const fromTop = ball.prevY + ball.r <= rect.y;
      const fromBottom = ball.prevY - ball.r >= rect.y + rect.h;
      if (fromTop) ball.vy = -Math.abs(ball.vy);
      else if (fromBottom) ball.vy = Math.abs(ball.vy);
      else ball.vx *= -1;
    }

    function updateBalls(dt) {
      const nextBalls = [];
      state.balls.forEach((ball) => {
        if (ball.stuck) {
          nextBalls.push(ball);
          return;
        }
        ball.prevX = ball.x;
        ball.prevY = ball.y;
        ball.x += ball.vx * dt;
        ball.y += ball.vy * dt;
        if (ball.x - ball.r <= 0) { ball.x = ball.r; ball.vx = Math.abs(ball.vx); }
        else if (ball.x + ball.r >= CANVAS.width) { ball.x = CANVAS.width - ball.r; ball.vx = -Math.abs(ball.vx); }
        if (ball.y - ball.r <= 0) { ball.y = ball.r; ball.vy = Math.abs(ball.vy); }
        if (ball.y + ball.r >= state.paddle.y && ball.y - ball.r <= state.paddle.y + state.paddle.height && ball.x >= state.paddle.x && ball.x <= state.paddle.x + state.paddle.width && ball.vy > 0) {
          handlePaddleBounce(ball);
        }
        let brickHit = false;
        for (let index = state.bricks.length - 1; index >= 0; index -= 1) {
          const brick = state.bricks[index];
          if (ballHitsBrick(ball, brick)) {
            bounceOffRect(ball, brick);
            brick.hp -= 1;
            brickHit = true;
            if (brick.hp <= 0) {
              state.bricks.splice(index, 1);
              onBrickDestroyed(brick);
            }
            break;
          }
        }
        if (!brickHit && state.boss && ballHitsBrick(ball, state.boss)) {
          bounceOffRect(ball, state.boss);
          hitBoss();
        }
        if (ball.y - ball.r > CANVAS.height) {
          if (state.shieldCharges > 0) {
            state.shieldCharges -= 1;
            ball.y = CANVAS.height - 28;
            ball.vy = -Math.abs(ball.vy);
            updateHud();
            showToast("Dura Shield", "Bottom barrier absorbed the hit.");
            nextBalls.push(ball);
            return;
          }
          return;
        }
        nextBalls.push(ball);
      });
      state.balls = nextBalls;
      if (!state.balls.length && state.running) loseLife();
    }

    function updateEffects() {
      let widthChanged = false;
      Object.entries(state.activeEffects).forEach(([name, until]) => {
        if (until <= nowMs()) {
          delete state.activeEffects[name];
          if (name === "wide") widthChanged = true;
        }
      });
      if (widthChanged) syncPaddleWidth();
    }

    function update(dt) {
      if (!state.running) return;
      state.elapsed = nowMs() - state.startTime;
      updateEffects();
      updateHud();
      hideToastIfNeeded();
      if (state.paused) return;
      const worldDt = dt * (isEffectActive("slow") ? 0.74 : 1);
      if (state.comboWindow > 0) {
        state.comboWindow = Math.max(0, state.comboWindow - dt);
        if (state.comboWindow === 0) state.combo = 0;
      }
      state.laserCooldown = Math.max(0, state.laserCooldown - dt);
      updatePaddle(worldDt);
      updateBoss(worldDt);
      updateHazards(worldDt);
      updateDrops(worldDt);
      updateLasers(worldDt);
      updateParticles(worldDt);
      updateBalls(worldDt);
    }

    function hexToRgba(hex, alpha) {
      const sanitized = hex.replace("#", "");
      const value = sanitized.length === 3 ? sanitized.split("").map((char) => char + char).join("") : sanitized;
      const int = parseInt(value, 16);
      const r = (int >> 16) & 255;
      const g = (int >> 8) & 255;
      const b = int & 255;
      return "rgba(" + r + ", " + g + ", " + b + ", " + alpha + ")";
    }

    function drawBackground() {
      const gradient = ctx.createLinearGradient(0, 0, 0, CANVAS.height);
      gradient.addColorStop(0, "#091521");
      gradient.addColorStop(1, "#050c15");
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, CANVAS.width, CANVAS.height);

      if (spriteReady(sprites.background)) {
        const tile = 240;
        const driftX = ((state.elapsed || 0) * 0.005) % tile;
        const driftY = ((state.elapsed || 0) * 0.0025) % tile;
        ctx.save();
        ctx.globalAlpha = 0.18;
        for (let x = -tile; x < CANVAS.width + tile; x += tile) {
          for (let y = -tile; y < CANVAS.height + tile; y += tile) {
            ctx.drawImage(sprites.background, x - driftX, y - driftY, tile, tile);
          }
        }
        ctx.restore();
      }

      state.stars.forEach((star) => {
        star.y += star.speed * 0.016;
        if (star.y > CANVAS.height) {
          star.y = -4;
          star.x = Math.random() * CANVAS.width;
        }
        ctx.fillStyle = "rgba(151, 218, 255, " + star.alpha + ")";
        ctx.fillRect(star.x, star.y, star.size, star.size);
      });
      ctx.save();
      ctx.globalAlpha = 0.13;
      ctx.strokeStyle = state.stageTheme.palette[0];
      ctx.lineWidth = 2;
      for (let x = 40; x < CANVAS.width; x += 120) {
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x + 12, CANVAS.height);
        ctx.stroke();
      }
      ctx.restore();
    }

    function drawBrainBall(ball) {
      if (spriteReady(sprites.ball)) {
        const size = ball.r * 2.55;
        ctx.save();
        ctx.shadowColor = "rgba(110, 218, 255, 0.28)";
        ctx.shadowBlur = 16;
        ctx.drawImage(sprites.ball, ball.x - size / 2, ball.y - size / 2, size, size);
        ctx.restore();
        return;
      }
      ctx.save();
      ctx.translate(ball.x, ball.y);
      ctx.fillStyle = "#ffb6c5";
      ctx.beginPath();
      ctx.arc(0, 0, ball.r, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = "#d15c88";
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(-5, -3);
      ctx.quadraticCurveTo(-1, -8, 2, -3);
      ctx.quadraticCurveTo(5, 1, 0, 5);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(-3, 4);
      ctx.quadraticCurveTo(-1, 1, 2, 4);
      ctx.stroke();
      ctx.restore();
    }

    function drawPaddle() {
      if (!state.paddle) return;
      const { x, y, width, height } = state.paddle;
      if (spriteReady(sprites.paddle)) {
        const spriteW = width + 18;
        const spriteH = spriteW * (64 / 280);
        const spriteX = x - (spriteW - width) / 2;
        const spriteY = y - (spriteH - height) / 2 - 5;
        ctx.save();
        ctx.shadowColor = "rgba(97, 212, 255, 0.28)";
        ctx.shadowBlur = 18;
        ctx.drawImage(sprites.paddle, spriteX, spriteY, spriteW, spriteH);
        ctx.restore();
        if (isEffectActive("laser")) {
          ctx.save();
          ctx.fillStyle = "#ff97a8";
          ctx.fillRect(x + 10, y - 10, 6, 10);
          ctx.fillRect(x + width - 16, y - 10, 6, 10);
          ctx.restore();
        }
        return;
      }
      ctx.save();
      ctx.fillStyle = "#1c4f70";
      ctx.fillRect(x, y, width, height);
      ctx.fillStyle = "#77f0b7";
      ctx.fillRect(x + 4, y + 3, width - 8, 4);
      ctx.fillStyle = "#ffde7a";
      ctx.fillRect(x + 8, y + height - 5, width - 16, 2);
      if (isEffectActive("laser")) {
        ctx.fillStyle = "#ff7f95";
        ctx.fillRect(x + 8, y - 5, 8, 6);
        ctx.fillRect(x + width - 16, y - 5, 8, 6);
      }
      ctx.restore();
    }

    function drawBricks() {
      state.bricks.forEach((brick) => {
        const sprite = getBrickSprite(brick);
        if (spriteReady(sprite)) {
          ctx.save();
          ctx.shadowColor = "rgba(98, 209, 255, 0.14)";
          ctx.shadowBlur = brick.kind === "quiz" || brick.kind === "power" ? 12 : 6;
          ctx.drawImage(sprite, brick.x, brick.y, brick.w, brick.h);
          if (brick.hp < brick.maxHp) {
            ctx.fillStyle = "rgba(255, 255, 255, 0.14)";
            ctx.fillRect(brick.x + 6, brick.y + brick.h - 9, brick.w - 12, 3);
          }
          ctx.restore();
          return;
        }
        const alpha = brick.kind === "barrier" ? 0.95 : 0.86;
        ctx.fillStyle = hexToRgba(brick.color, alpha);
        ctx.fillRect(brick.x, brick.y, brick.w, brick.h);
        ctx.fillStyle = "rgba(255,255,255,0.18)";
        ctx.fillRect(brick.x + 4, brick.y + 4, brick.w - 8, 4);
        if (brick.hp > 1) {
          ctx.strokeStyle = "rgba(255,255,255,0.35)";
          ctx.strokeRect(brick.x + 2, brick.y + 2, brick.w - 4, brick.h - 4);
        }
        ctx.fillStyle = "#08121d";
        ctx.font = "bold 12px monospace";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        const labelKind = brick.kind === "dense" && brick.hp < brick.maxHp ? "standard" : brick.kind;
        const label = labelKind === "quiz" ? "?" : labelKind === "power" ? "+" : labelKind === "dense" ? "II" : labelKind === "barrier" ? "B" : "";
        if (label) ctx.fillText(label, brick.x + brick.w / 2, brick.y + brick.h / 2 + 1);
      });
    }

    function drawParticles() {
      state.particles.forEach((particle) => {
        const alpha = Math.max(0, particle.life / particle.maxLife);
        ctx.save();
        ctx.globalAlpha = alpha;
        ctx.fillStyle = particle.color;
        ctx.shadowColor = particle.color;
        ctx.shadowBlur = 12;
        ctx.fillRect(particle.x - particle.size / 2, particle.y - particle.size / 2, particle.size, particle.size);
        ctx.restore();
      });
    }

    function drawBoss() {
      if (!state.boss) return;
      const boss = state.boss;
      if (spriteReady(sprites.brickBarrier)) {
        ctx.save();
        ctx.shadowColor = "rgba(121, 221, 255, 0.18)";
        ctx.shadowBlur = 20;
        ctx.drawImage(sprites.brickBarrier, boss.x, boss.y, boss.w, boss.h);
        if (spriteReady(sprites.ball)) {
          const coreSize = Math.min(40, boss.h - 6);
          ctx.drawImage(sprites.ball, boss.x + boss.w / 2 - coreSize / 2, boss.y + boss.h / 2 - coreSize / 2 + 2, coreSize, coreSize);
        }
        if (nowMs() < boss.flashUntil) {
          ctx.fillStyle = "rgba(255, 223, 147, 0.22)";
          ctx.fillRect(boss.x + 4, boss.y + 4, boss.w - 8, boss.h - 8);
        }
        ctx.restore();
        ctx.fillStyle = "#0a1622";
        ctx.fillRect(boss.x, boss.y - 14, boss.w, 8);
        ctx.fillStyle = "#74f0b6";
        ctx.fillRect(boss.x, boss.y - 14, (boss.hp / boss.maxHp) * boss.w, 8);
        return;
      }
      ctx.save();
      ctx.fillStyle = nowMs() < boss.flashUntil ? "#ffd37d" : "#ff7c75";
      ctx.fillRect(boss.x, boss.y, boss.w, boss.h);
      ctx.fillStyle = "rgba(255,255,255,0.18)";
      ctx.fillRect(boss.x + 6, boss.y + 6, boss.w - 12, 6);
      ctx.fillStyle = "#1d0b12";
      ctx.fillRect(boss.x + 36, boss.y + 18, 18, 14);
      ctx.fillRect(boss.x + boss.w - 54, boss.y + 18, 18, 14);
      ctx.fillRect(boss.x + 68, boss.y + 34, boss.w - 136, 8);
      ctx.fillStyle = "#0a1622";
      ctx.fillRect(boss.x, boss.y - 14, boss.w, 8);
      ctx.fillStyle = "#74f0b6";
      ctx.fillRect(boss.x, boss.y - 14, (boss.hp / boss.maxHp) * boss.w, 8);
      ctx.restore();
    }

    function drawDrops() {
      state.drops.forEach((drop) => {
        const config = POWER_UPS[drop.type];
        ctx.save();
        ctx.fillStyle = config.color;
        ctx.fillRect(drop.x - drop.size, drop.y - drop.size, drop.size * 2, drop.size * 2);
        ctx.fillStyle = "#061019";
        ctx.font = "bold 14px monospace";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText(config.symbol, drop.x, drop.y + 1);
        ctx.restore();
      });
    }

    function drawLasers() {
      ctx.save();
      ctx.fillStyle = "#ff8ca5";
      state.lasers.forEach((laser) => ctx.fillRect(laser.x - 2, laser.y - 12, 4, 18));
      ctx.restore();
    }

    function drawHazards() {
      ctx.save();
      state.hazards.forEach((hazard) => {
        ctx.fillStyle = "#ff7777";
        ctx.beginPath();
        ctx.arc(hazard.x, hazard.y, hazard.r, 0, Math.PI * 2);
        ctx.fill();
      });
      ctx.restore();
    }

    function drawShield() {
      if (state.shieldCharges <= 0) return;
      ctx.save();
      ctx.strokeStyle = "rgba(124, 255, 248, 0.7)";
      ctx.lineWidth = 4;
      ctx.beginPath();
      ctx.moveTo(18, CANVAS.height - 8);
      ctx.lineTo(CANVAS.width - 18, CANVAS.height - 8);
      ctx.stroke();
      ctx.restore();
    }

    function drawBanner() {
      if (!state.banner || state.banner.until < nowMs()) return;
      ctx.save();
      ctx.fillStyle = "rgba(8, 18, 31, 0.84)";
      ctx.fillRect(CANVAS.width / 2 - 210, CANVAS.height / 2 - 48, 420, 96);
      ctx.strokeStyle = "rgba(125, 214, 255, 0.22)";
      ctx.lineWidth = 2;
      ctx.strokeRect(CANVAS.width / 2 - 210, CANVAS.height / 2 - 48, 420, 96);
      ctx.textAlign = "center";
      ctx.fillStyle = "#ffe08e";
      ctx.font = "bold 24px monospace";
      ctx.fillText(state.banner.title, CANVAS.width / 2, CANVAS.height / 2 - 10);
      ctx.fillStyle = "#d3f1ff";
      ctx.font = "16px monospace";
      ctx.fillText(state.banner.subtitle, CANVAS.width / 2, CANVAS.height / 2 + 18);
      ctx.restore();
    }

    function drawPausedLabel() {
      if (!state.paused || state.pauseReason === "question" || state.pauseReason === "review" || state.pauseReason === "atlas") return;
      ctx.save();
      ctx.fillStyle = "rgba(4, 10, 16, 0.45)";
      ctx.fillRect(0, 0, CANVAS.width, CANVAS.height);
      ctx.fillStyle = "#ffdd87";
      ctx.textAlign = "center";
      ctx.font = "bold 28px monospace";
      ctx.fillText("PAUSED", CANVAS.width / 2, CANVAS.height / 2);
      ctx.restore();
    }

    function drawReadyPrompt() {
      if (state.running || state.reviewOpen) return;
      ctx.save();
      ctx.fillStyle = "rgba(8, 18, 31, 0.84)";
      ctx.fillRect(CANVAS.width / 2 - 250, CANVAS.height / 2 - 64, 500, 128);
      ctx.strokeStyle = "rgba(125, 214, 255, 0.22)";
      ctx.lineWidth = 2;
      ctx.strokeRect(CANVAS.width / 2 - 250, CANVAS.height / 2 - 64, 500, 128);
      ctx.textAlign = "center";
      ctx.fillStyle = "#ffe18d";
      ctx.font = "bold 26px monospace";
      ctx.fillText("BRAIN-out!", CANVAS.width / 2, CANVAS.height / 2 - 16);
      ctx.fillStyle = "#d1efff";
      ctx.font = "15px monospace";
      ctx.fillText("Press Play or open Settings.", CANVAS.width / 2, CANVAS.height / 2 + 20);
      ctx.restore();
    }

    function draw() {
      drawBackground();
      drawBricks();
      drawParticles();
      drawBoss();
      drawDrops();
      drawLasers();
      drawHazards();
      drawShield();
      drawPaddle();
      state.balls.forEach(drawBrainBall);
      drawBanner();
      drawPausedLabel();
      drawReadyPrompt();
    }

    function pointerToCanvas(event) {
      const rect = canvas.getBoundingClientRect();
      const clientX = event.touches ? event.touches[0].clientX : event.clientX;
      const clientY = event.touches ? event.touches[0].clientY : event.clientY;
      return {
        x: ((clientX - rect.left) / rect.width) * CANVAS.width,
        y: ((clientY - rect.top) / rect.height) * CANVAS.height,
      };
    }

    function bindHold(button, direction) {
      const start = () => { input[direction] = true; };
      const stop = () => { input[direction] = false; };
      ["mousedown", "touchstart"].forEach((eventName) => button.addEventListener(eventName, start, { passive: true }));
      ["mouseup", "mouseleave", "touchend", "touchcancel"].forEach((eventName) => button.addEventListener(eventName, stop, { passive: true }));
    }

    function registerEvents() {
      ui.startButton.addEventListener("click", startRun);
      ui.pauseButton.addEventListener("click", () => {
        if (!state.running || state.pauseReason === "question" || state.pauseReason === "review" || state.pauseReason === "settings" || state.pauseReason === "atlas") return;
        state.paused = !state.paused;
        state.pauseReason = state.paused ? "manual" : "";
      });
      ui.settingsButton.addEventListener("click", openSettings);
      ui.closeSettingsButton.addEventListener("click", closeSettings);
      ui.openAtlasButton.addEventListener("click", () => {
        closeSettings();
        openAtlas();
      });
      ui.closeAtlasButton.addEventListener("click", closeAtlas);
      ui.skipQuestionButton.addEventListener("click", skipQuestion);
      ui.continueQuestionButton.addEventListener("click", closeQuestion);
      ui.closeReviewButton.addEventListener("click", () => {
        ui.reviewOverlay.classList.add("hidden");
        state.reviewOpen = false;
        state.paused = false;
        state.pauseReason = "";
      });
      ui.playAgainButton.addEventListener("click", () => {
        ui.reviewOverlay.classList.add("hidden");
        state.reviewOpen = false;
        startRun();
      });

      document.addEventListener("keydown", (event) => {
        if (event.key === "ArrowLeft" || event.key.toLowerCase() === "a") input.left = true;
        if (event.key === "ArrowRight" || event.key.toLowerCase() === "d") input.right = true;
        if (event.key === " " || event.key === "Spacebar") {
          event.preventDefault();
          launchBalls();
        }
        if (event.key.toLowerCase() === "f") fireLaser();
        if (event.key.toLowerCase() === "p") {
          if (state.running && state.pauseReason !== "question" && state.pauseReason !== "review" && state.pauseReason !== "settings" && state.pauseReason !== "atlas") {
            state.paused = !state.paused;
            state.pauseReason = state.paused ? "manual" : "";
          }
        }
      });

      document.addEventListener("keyup", (event) => {
        if (event.key === "ArrowLeft" || event.key.toLowerCase() === "a") input.left = false;
        if (event.key === "ArrowRight" || event.key.toLowerCase() === "d") input.right = false;
      });

      canvas.addEventListener("mousemove", (event) => {
        const point = pointerToCanvas(event);
        state.pointerX = point.x;
        state.usingPointer = true;
      });
      canvas.addEventListener("mouseleave", () => { state.usingPointer = false; });
      canvas.addEventListener("click", () => {
        if (!state.running) return;
        if (state.awaitingLaunch) launchBalls();
        else fireLaser();
      });

      canvas.addEventListener("touchstart", (event) => {
        event.preventDefault();
        const point = pointerToCanvas(event);
        state.pointerX = point.x;
        state.usingPointer = true;
        if (state.awaitingLaunch) launchBalls();
      }, { passive: false });
      canvas.addEventListener("touchmove", (event) => {
        event.preventDefault();
        const point = pointerToCanvas(event);
        state.pointerX = point.x;
        state.usingPointer = true;
      }, { passive: false });
      canvas.addEventListener("touchend", () => { state.usingPointer = false; });

      bindHold(ui.mobileLeft, "left");
      bindHold(ui.mobileRight, "right");
      ui.mobileLaunch.addEventListener("click", launchBalls);
      ui.mobileFire.addEventListener("click", fireLaser);
    }

    function gameLoop(timestamp) {
      if (!state.lastFrame) state.lastFrame = timestamp;
      const dt = Math.min(0.032, (timestamp - state.lastFrame) / 1000);
      state.lastFrame = timestamp;
      update(dt);
      draw();
      requestAnimationFrame(gameLoop);
    }

    function bootstrap() {
      highScores = loadStorage(STORAGE_KEYS.highScores, []);
      atlasProgress = loadStorage(STORAGE_KEYS.atlas, []);
      preloadSprites();
      createStars();
      initPaddle();
      resetBalls();
      renderHighScores();
      renderAtlas();
      updateHud();
      registerEvents();
      requestAnimationFrame(gameLoop);
      setBanner("BRAIN-out!", "Select mode, tier, and topic. Then launch.", 2400);
    }

    bootstrap();
  </script>
</body>
</html>
