<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BRAIN-out!</title>
  <link rel="icon" type="image/png" href="graphics/favicon.png">
  <link rel="apple-touch-icon" href="graphics/favicon.png">
  <style>
    :root {
      --bg: #061019;
      --panel: linear-gradient(180deg, rgba(11, 20, 35, 0.92), rgba(7, 15, 25, 0.88));
      --panel-2: rgba(8, 15, 26, 0.96);
      --canvas-max-height: 600px;
      --desktop-playfield-width: 960px;
      --line: #79ddff;
      --line-soft: rgba(121, 221, 255, 0.14);
      --accent: #ff8469;
      --accent-2: #f5cb73;
      --mint: #8af4c1;
      --text: #f4fbff;
      --muted: #9db0bf;
      --muted-2: #6f8294;
      --shadow: 0 28px 60px rgba(0, 0, 0, 0.34);
      --radius: 22px;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      color: var(--text);
      background:
        radial-gradient(circle at top, rgba(93, 167, 255, 0.18), transparent 32%),
        radial-gradient(circle at 82% 18%, rgba(255, 138, 107, 0.12), transparent 24%),
        linear-gradient(180deg, #06111b 0%, #07111a 54%, #04080f 100%);
      font-family: "Aptos", "Segoe UI", "Trebuchet MS", sans-serif;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.1;
      background-image:
        linear-gradient(rgba(134, 195, 255, 0.14) 1px, transparent 1px),
        linear-gradient(90deg, rgba(134, 195, 255, 0.14) 1px, transparent 1px);
      background-size: 26px 26px;
      mask-image: linear-gradient(180deg, rgba(0, 0, 0, 0.9), transparent);
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.07;
      background-image: url("graphics/bg-blurred-small.png");
      background-size: 320px 320px;
      background-repeat: repeat;
      mix-blend-mode: screen;
    }

    button,
    select {
      font: inherit;
    }

    button {
      cursor: pointer;
      border: 0;
      border-radius: 14px;
      padding: 0.85rem 1rem;
      color: var(--text);
      background: linear-gradient(180deg, rgba(27, 55, 80, 0.95), rgba(17, 37, 57, 0.95));
      box-shadow:
        0 10px 24px rgba(0, 0, 0, 0.18),
        inset 0 0 0 1px rgba(136, 220, 255, 0.14);
      transition: transform 0.12s ease, filter 0.12s ease;
    }

    button:hover,
    button:focus-visible {
      transform: translateY(-1px);
      filter: brightness(1.08);
      outline: none;
    }

    button.primary {
      background: linear-gradient(180deg, #ff886c, #ff6666);
      box-shadow:
        0 14px 28px rgba(255, 120, 102, 0.26),
        inset 0 0 0 1px rgba(255, 238, 222, 0.18);
    }

    button.secondary {
      background: linear-gradient(180deg, #1f8f79, #126d5f);
    }

    button.ghost {
      background: rgba(15, 31, 49, 0.82);
    }

    .visually-hidden {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.52;
      transform: none;
      filter: none;
    }

    select {
      width: 100%;
      border: 1px solid rgba(124, 214, 255, 0.2);
      border-radius: 14px;
      padding: 0.82rem 0.9rem;
      color: var(--text);
      background: rgba(8, 17, 28, 0.96);
    }

    .app {
      width: min(1280px, calc(100% - 24px));
      margin: 0 auto;
      padding: 18px 0 32px;
    }

    body[data-device="desktop"] {
      overflow: hidden;
    }

    body[data-device="desktop"] .app {
      min-height: 100svh;
      display: flex;
      flex-direction: column;
      padding: 10px 0 12px;
    }

    body[data-device="desktop"] .layout {
      flex: 1;
    }

    body[data-device="desktop"] .hero {
      width: min(100%, var(--desktop-playfield-width));
      margin-left: auto;
      margin-right: auto;
      margin-bottom: 8px;
    }

    body[data-device="desktop"] .brand-logo {
      max-width: min(34vw, 420px);
      max-height: 88px;
    }

    body[data-device="desktop"] .game-column {
      width: min(100%, var(--desktop-playfield-width));
      margin: 0 auto;
      gap: 8px;
    }

    .hero {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      align-items: center;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }

    .title-wrap {
      display: flex;
      align-items: center;
    }

    .hero-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .hero-actions button {
      min-width: 108px;
    }

    #startButton,
    #pauseButton,
    #settingsButton {
      min-width: clamp(148px, 14vw, 178px);
      min-width: 0;
      width: clamp(148px, 14vw, 178px);
      aspect-ratio: 1086 / 335;
      padding: 0;
      border-radius: 0;
      box-shadow: none;
      color: transparent;
    }

    #startButton {
      background: transparent url("graphics/play.png") center / 100% 100% no-repeat;
      filter: drop-shadow(0 10px 18px rgba(24, 185, 104, 0.2));
    }

    #pauseButton {
      background: transparent url("graphics/pause.png") center / 100% 100% no-repeat;
      box-shadow: none;
      filter: drop-shadow(0 10px 18px rgba(24, 185, 104, 0.2));
    }

    #settingsButton {
      background: transparent url("graphics/settings.png") center / 100% 100% no-repeat;
      box-shadow: none;
      filter: drop-shadow(0 10px 18px rgba(190, 205, 214, 0.18));
    }

    #startButton:hover,
    #startButton:focus-visible,
    #settingsButton:hover,
    #settingsButton:focus-visible,
    #pauseButton:hover,
    #pauseButton:focus-visible {
      filter: brightness(1.05) drop-shadow(0 12px 20px rgba(32, 209, 124, 0.3));
    }

    .eyebrow {
      display: inline-flex;
      width: fit-content;
      align-items: center;
      gap: 8px;
      padding: 0.38rem 0.62rem;
      border-radius: 999px;
      background: rgba(10, 25, 43, 0.8);
      border: 1px solid rgba(121, 221, 255, 0.14);
      color: #bfe9fb;
      font-size: 0.74rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .brand-logo-wrap {
      margin: 0;
      line-height: 0;
    }

    .brand-logo {
      display: block;
      width: auto;
      height: auto;
      max-width: min(100%, 360px);
      max-height: 72px;
      min-width: 0;
      filter: drop-shadow(0 12px 24px rgba(0, 0, 0, 0.28));
    }

    .title-wrap p {
      margin: 0;
      max-width: 34ch;
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.35;
    }

    .layout {
      display: block;
    }

    .panel {
      background: var(--panel);
      border: 1px solid rgba(111, 196, 255, 0.1);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
    }

    .sidebar {
      padding: 14px;
      display: grid;
      gap: 10px;
      position: sticky;
      top: 14px;
    }

    .sidebar section {
      padding: 14px;
      border-radius: 18px;
      background: rgba(6, 14, 25, 0.48);
      border: 1px solid rgba(121, 221, 255, 0.08);
    }

    .sidebar h2,
    .shell-head h2,
    .overlay-card h2 {
      margin: 0 0 0.85rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-size: 0.88rem;
      color: #d4efff;
    }

    .setup-grid,
    .tips,
    .scores-list,
    .stats-list {
      display: grid;
      gap: 10px;
    }

    .field label {
      display: block;
      margin-bottom: 0.42rem;
      color: var(--muted);
      font-size: 0.74rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .button-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .sidebar .button-row button {
      flex: 1 1 110px;
    }

    .shell-head .button-row button {
      min-width: 90px;
    }

    .mini-note {
      color: var(--muted-2);
      line-height: 1.35;
      font-size: 0.82rem;
      margin: 2px 0 0;
    }

    .tips div,
    .score-row,
    .stat-row {
      padding: 0.78rem 0.82rem;
      background: rgba(8, 18, 31, 0.72);
      border-radius: 14px;
      border: 1px solid rgba(126, 214, 255, 0.08);
    }

    .tips {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .tips div {
      display: grid;
      gap: 5px;
      min-height: 70px;
    }

    .tips strong {
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #d6f2ff;
    }

    .tips code {
      width: fit-content;
      padding: 0.14rem 0.4rem;
      border-radius: 999px;
      background: rgba(121, 221, 255, 0.08);
      color: #f7fcff;
      font-size: 0.84rem;
    }

    .tips span {
      color: var(--muted);
      font-size: 0.84rem;
    }

    .score-row,
    .stat-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
    }

    .score-row strong,
    .stat-row strong {
      color: #ffdc81;
    }

    .game-column {
      display: grid;
      gap: 10px;
    }

    .hud {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 8px;
    }

    .hud-chip {
      position: relative;
      overflow: hidden;
      min-height: 66px;
      padding: 10px 12px;
      background:
        linear-gradient(180deg, rgba(18, 35, 58, 0.92) 0%, rgba(8, 18, 31, 0.9) 100%);
      border: 1px solid rgba(125, 214, 255, 0.24);
      border-radius: 16px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 3px;
      box-shadow:
        inset 0 0 0 1px rgba(169, 233, 255, 0.08),
        inset 0 -10px 20px rgba(0, 0, 0, 0.18),
        0 0 0 1px rgba(37, 112, 171, 0.22),
        0 10px 24px rgba(2, 9, 18, 0.22),
        0 0 28px rgba(72, 169, 255, 0.08);
    }

    .hud-chip::before {
      content: "";
      position: absolute;
      inset: 1px;
      border-radius: 15px;
      border: 1px solid rgba(192, 239, 255, 0.08);
      pointer-events: none;
    }

    .hud-chip::after {
      content: "";
      position: absolute;
      left: 12px;
      right: 12px;
      top: 1px;
      height: 16px;
      border-radius: 0 0 12px 12px;
      background: linear-gradient(180deg, rgba(214, 245, 255, 0.18), rgba(214, 245, 255, 0));
      opacity: 0.95;
      pointer-events: none;
    }

    .hud-chip span {
      font-size: 0.68rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: rgba(184, 221, 240, 0.88);
      text-shadow: 0 0 10px rgba(111, 203, 255, 0.16);
    }

    .hud-chip strong {
      font-size: 1rem;
      color: #f7fcff;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      text-shadow: 0 0 18px rgba(114, 210, 255, 0.18);
    }

    .hud-chip.effects {
      border-color: rgba(108, 244, 196, 0.28);
      box-shadow:
        inset 0 0 0 1px rgba(192, 255, 225, 0.08),
        inset 0 -10px 20px rgba(0, 0, 0, 0.18),
        0 0 0 1px rgba(44, 128, 109, 0.22),
        0 10px 24px rgba(2, 9, 18, 0.22),
        0 0 28px rgba(108, 244, 196, 0.1);
    }

    .hud-chip.effects strong {
      font-size: 0.84rem;
      color: #99ffd2;
      text-shadow: 0 0 18px rgba(108, 244, 196, 0.22);
    }

    .shell {
      overflow: hidden;
      position: relative;
    }

    .shell-head {
      display: none;
    }

    .shell-head p {
      margin: 0;
      color: var(--muted);
      max-width: 34ch;
      font-size: 0.88rem;
      line-height: 1.3;
    }

    .canvas-wrap {
      position: relative;
      padding: 0;
    }

    body[data-device="desktop"] .canvas-wrap {
      padding: 0;
    }

    canvas {
      display: block;
      width: 100%;
      height: auto;
      border-radius: 20px;
      background: linear-gradient(180deg, #0b1727 0%, #08111d 100%);
      border: 1px solid rgba(112, 211, 255, 0.14);
      box-shadow:
        inset 0 0 60px rgba(48, 141, 225, 0.14),
        0 16px 36px rgba(0, 0, 0, 0.24);
      image-rendering: pixelated;
      touch-action: none;
    }

    body[data-device="desktop"] canvas {
      width: 100%;
      max-height: var(--canvas-max-height);
    }

    body[data-device="mobile"] canvas {
      width: 100%;
      max-height: none;
    }

    .toast {
      position: absolute;
      top: 24px;
      right: 24px;
      max-width: min(360px, calc(100% - 48px));
      padding: 0.84rem 0.95rem;
      border-radius: 16px;
      background: rgba(10, 22, 38, 0.94);
      border: 1px solid rgba(124, 214, 255, 0.12);
      box-shadow: var(--shadow);
      pointer-events: none;
      opacity: 0;
      transform: translateY(-8px);
      transition: opacity 0.18s ease, transform 0.18s ease;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    .toast strong {
      display: block;
      margin-bottom: 0.25rem;
      color: #ffd786;
    }

    .overlay {
      position: absolute;
      inset: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 18px;
      background: rgba(4, 9, 15, 0.68);
      backdrop-filter: blur(8px);
      border-radius: 20px;
      z-index: 5;
    }

    .overlay.hidden,
    .hidden {
      display: none !important;
    }

    .overlay-card {
      width: min(760px, 100%);
      max-height: 100%;
      overflow-y: auto;
      background: var(--panel-2);
      border: 1px solid rgba(125, 214, 255, 0.12);
      border-radius: 22px;
      padding: 20px;
      box-shadow: var(--shadow);
    }

    .settings-card {
      width: min(540px, 100%);
    }

    .settings-grid {
      display: grid;
      gap: 12px;
    }

    .audio-toggle-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .audio-toggle {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 0.9rem 1rem;
      border-radius: 16px;
      background: rgba(10, 24, 41, 0.72);
      border: 1px solid rgba(124, 214, 255, 0.12);
      box-shadow: inset 0 0 0 1px rgba(198, 238, 255, 0.04);
    }

    .audio-toggle-copy {
      display: grid;
      gap: 3px;
    }

    .audio-toggle-copy span {
      font-size: 0.68rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--muted-2);
    }

    .audio-toggle-copy strong {
      font-size: 0.95rem;
      color: #f7fcff;
      font-weight: 700;
    }

    .toggle-switch {
      position: relative;
      flex: 0 0 auto;
      width: 58px;
      height: 32px;
    }

    .toggle-switch input {
      position: absolute;
      inset: 0;
      opacity: 0;
      margin: 0;
      cursor: pointer;
    }

    .toggle-slider {
      position: absolute;
      inset: 0;
      border-radius: 999px;
      background: rgba(33, 58, 80, 0.9);
      border: 1px solid rgba(124, 214, 255, 0.18);
      box-shadow: inset 0 0 0 1px rgba(204, 240, 255, 0.04);
      transition: background 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
    }

    .toggle-slider::before {
      content: "";
      position: absolute;
      width: 24px;
      height: 24px;
      top: 3px;
      left: 3px;
      border-radius: 50%;
      background: linear-gradient(180deg, #f2fbff, #a7d9ee);
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.26);
      transition: transform 0.2s ease;
    }

    .toggle-switch input:checked + .toggle-slider {
      background: linear-gradient(180deg, rgba(39, 160, 118, 0.95), rgba(22, 109, 78, 0.95));
      border-color: rgba(121, 255, 206, 0.36);
      box-shadow:
        inset 0 0 0 1px rgba(224, 255, 244, 0.08),
        0 0 20px rgba(60, 214, 154, 0.18);
    }

    .toggle-switch input:checked + .toggle-slider::before {
      transform: translateX(26px);
    }

    .toggle-switch input:focus-visible + .toggle-slider {
      outline: 2px solid rgba(125, 214, 255, 0.4);
      outline-offset: 2px;
    }

    .settings-atlas-row {
      display: flex;
      gap: 10px;
      align-items: stretch;
      flex-wrap: wrap;
    }

    .settings-atlas-card {
      flex: 1 1 180px;
      padding: 0.9rem 1rem;
      border-radius: 16px;
      background: rgba(10, 24, 41, 0.72);
      border: 1px solid rgba(124, 214, 255, 0.08);
      display: grid;
      gap: 4px;
    }

    .settings-atlas-card span {
      font-size: 0.68rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--muted-2);
    }

    .settings-atlas-card strong {
      font-size: 1.05rem;
      color: #f7fcff;
    }

    .overlay-card p,
    .atlas-card p,
    .review-card p {
      color: #c4e7fb;
      line-height: 1.5;
    }

    #questionOverlay {
      inset: 10px;
      padding: 12px;
    }

    .question-card {
      width: min(860px, 100%);
      max-height: 100%;
      padding: 16px 18px;
      display: grid;
      gap: 10px;
      overflow: hidden;
    }

    .question-card h2,
    .question-card p {
      margin: 0;
    }

    .question-card h2 {
      font-size: 1.12rem;
      line-height: 1.18;
    }

    .question-card .question-meta {
      margin-bottom: 2px;
    }

    #questionStem {
      font-size: 0.95rem;
      line-height: 1.4;
    }

    .question-meta {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border-radius: 999px;
      padding: 0.34rem 0.62rem;
      background: rgba(11, 37, 59, 0.58);
      color: #bde8fd;
      border: 1px solid rgba(125, 214, 255, 0.1);
      text-transform: uppercase;
      font-size: 0.7rem;
      letter-spacing: 0.1em;
    }

    .answers,
    .atlas-grid,
    .review-list {
      display: grid;
      gap: 12px;
      margin-top: 16px;
    }

    .question-card .answers {
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-top: 2px;
    }

    .answers button {
      text-align: left;
      border-radius: 16px;
      padding: 0.95rem 1rem;
      background: rgba(10, 27, 47, 0.76);
      border: 1px solid rgba(123, 214, 255, 0.1);
    }

    .question-card .answers button {
      min-height: 72px;
      padding: 0.78rem 0.9rem;
      display: flex;
      align-items: center;
      font-size: 0.93rem;
      line-height: 1.35;
    }

    .answers button.correct {
      background: rgba(21, 92, 61, 0.92);
    }

    .answers button.wrong {
      background: rgba(116, 37, 47, 0.92);
    }

    .explanation-box {
      margin-top: 14px;
      padding: 0.95rem 1rem;
      border-radius: 16px;
      background: rgba(8, 21, 37, 0.95);
      border: 1px solid rgba(126, 214, 255, 0.08);
    }

    .question-card .explanation-box {
      margin-top: 0;
      max-height: 128px;
      overflow-y: auto;
    }

    .question-card .button-row {
      margin-top: 0;
      justify-content: flex-end;
    }

    .atlas-card,
    .review-card {
      border-radius: 16px;
      padding: 1rem;
      background: rgba(7, 19, 35, 0.7);
      border: 1px solid rgba(127, 214, 255, 0.08);
    }

    .atlas-card.locked {
      opacity: 0.68;
    }

    .atlas-card h3,
    .review-card h3 {
      margin: 0 0 0.55rem;
      font-size: 1rem;
    }

    .atlas-summary {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
    }

    .summary-card {
      padding: 0.92rem;
      border-radius: 16px;
      background: rgba(10, 24, 41, 0.72);
      border: 1px solid rgba(124, 214, 255, 0.08);
    }

    .summary-card strong {
      display: block;
      font-size: 1.3rem;
      color: #ffd993;
      margin-top: 0.15rem;
    }

    .mobile-controls {
      display: none;
      gap: 8px;
      padding: 0 14px 14px;
      flex-wrap: wrap;
    }

    body[data-device="mobile"] .mobile-controls {
      display: flex;
    }

    .mobile-controls button {
      flex: 1 1 120px;
      min-height: 54px;
      border-radius: 16px;
      background: rgba(12, 29, 47, 0.94);
    }

    .footer {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      align-items: center;
      margin-top: 10px;
      color: var(--muted-2);
      font-size: 0.82rem;
      flex-wrap: wrap;
    }

    @media (max-width: 1080px) {
      .hud {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }
    }

    @media (max-width: 760px) {
      .app {
        width: min(100% - 12px, 100%);
        padding-top: 12px;
      }

      .hero {
        padding: 0 4px;

      } catch (error) {
        return fallback;
      }
    }

    function saveStorage(key, value) {
      try {
        localStorage.setItem(key, JSON.stringify(value));
      } catch (error) {
        return;
      }
    }

    function normalizeAudioPreferences(value) {
      return {
        sfx: value && typeof value.sfx === "boolean" ? value.sfx : true,
        music: value && typeof value.music === "boolean" ? value.music : true,
      };
    }

    function syncAudioControls() {
      ui.sfxToggle.checked = audioPreferences.sfx;
      ui.musicToggle.checked = audioPreferences.music;
    }

    function saveAudioPreferences() {
      saveStorage(STORAGE_KEYS.audio, audioPreferences);
    }

    function unlockAudio() {
      if (audioUnlocked) return;
      audioUnlocked = true;
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function randomItem(array) {
      return array[Math.floor(Math.random() * array.length)];
    }

    function shuffleInPlace(array) {
      for (let index = array.length - 1; index > 0; index -= 1) {
        const swapIndex = Math.floor(Math.random() * (index + 1));
        [array[index], array[swapIndex]] = [array[swapIndex], array[index]];
      }
      return array;
    }

    function nowMs() {
      return performance.now();
    }

    function detectDeviceMode() {
      const coarsePointer = window.matchMedia("(pointer: coarse)").matches || window.matchMedia("(hover: none)").matches;
      const narrowViewport = window.innerWidth <= 820;
      return coarsePointer || narrowViewport ? "mobile" : "desktop";
    }

    function applyResponsiveLayout() {
      responsiveLayoutRaf = 0;
      const mode = detectDeviceMode();
      document.body.dataset.device = mode;

      const app = document.querySelector(".app");
      const hero = document.querySelector(".hero");
      const hud = document.querySelector(".hud");
      const shellHead = document.querySelector(".shell-head");
      const footer = document.querySelector(".footer");
      const mobileControls = document.querySelector(".mobile-controls");
      if (!app) {
        return;
      }

      const appStyles = getComputedStyle(app);
      const paddingTop = parseFloat(appStyles.paddingTop) || 0;
      const paddingBottom = parseFloat(appStyles.paddingBottom) || 0;
      const aspectRatio = CANVAS.width / CANVAS.height;
      const heroHeight = hero ? hero.offsetHeight : 0;
      const hudHeight = hud ? hud.offsetHeight : 0;
      const shellHeadHeight = shellHead ? shellHead.offsetHeight : 0;
      const footerHeight = footer ? footer.offsetHeight : 0;
      const mobileControlsHeight = mode === "mobile" && mobileControls ? mobileControls.offsetHeight : 0;
      const buffer = mode === "desktop" ? 44 : 72;
      const availableHeight = clamp(
        window.innerHeight - heroHeight - hudHeight - shellHeadHeight - footerHeight - mobileControlsHeight - paddingTop - paddingBottom - buffer,
        mode === "desktop" ? 300 : 240,
        mode === "desktop" ? 760 : 560
      );

      document.documentElement.style.setProperty("--canvas-max-height", availableHeight + "px");
      document.documentElement.style.setProperty("--desktop-playfield-width", Math.round(availableHeight * aspectRatio) + "px");
    }

    function scheduleResponsiveLayout() {
      if (responsiveLayoutRaf) {
        cancelAnimationFrame(responsiveLayoutRaf);
      }
      responsiveLayoutRaf = requestAnimationFrame(applyResponsiveLayout);
    }

    function createSprite(src) {
      const image = new Image();
      image.decoding = "async";
      image.src = src;
      return image;
    }

    function spriteReady(image) {
      return Boolean(image && image.complete && image.naturalWidth > 0);
    }

    function preloadSprites() {
      Object.entries(SPRITE_PATHS).forEach(([key, src]) => {
        sprites[key] = createSprite(src);
      });
    }

    function createAudioPool(src, size = 5) {
      return Array.from({ length: size }, () => {
        const audio = new Audio(src);
        audio.preload = "auto";
        return audio;
      });
    }

    function preloadAudio() {
      Object.entries(SOUND_PATHS).forEach(([key, src]) => {
        audioPools[key] = createAudioPool(src);
      });
      musicTrack = new Audio(MUSIC_PATH);
      musicTrack.preload = "auto";
      musicTrack.loop = true;
      musicTrack.volume = 0.34;
    }

    function playSound(name, volume = 0.38) {
      if (!audioPreferences.sfx || !audioUnlocked) {
        return;
      }
      const pool = audioPools[name];
      if (!pool || !pool.length) {
        return;
      }

      const available = pool.find((audio) => audio.paused || audio.ended);
      const sound = available || new Audio(SOUND_PATHS[name]);
      sound.volume = volume;

      try {
        sound.currentTime = 0;
        const playPromise = sound.play();
        if (playPromise && typeof playPromise.catch === "function") {
          playPromise.catch(() => {});
        }
      } catch (error) {
        return;
      }
    }

    function shouldPlayMusic() {
      return Boolean(
        musicTrack &&
        audioUnlocked &&
        audioPreferences.music &&
        state.running &&
        state.musicStarted &&
        !state.paused &&
        !state.reviewOpen
      );
    }

    function syncMusicPlayback(forceAttempt = false) {
      if (!musicTrack) {
        return;
      }

      if (!shouldPlayMusic()) {
        if (!musicTrack.paused) {
          musicTrack.pause();
        }
        musicPlayRequested = false;
        return;
      }

      if (!forceAttempt && (musicPlayRequested || !musicTrack.paused)) {
        return;
      }

      try {
        musicTrack.volume = 0.34;
        musicPlayRequested = true;
        const playPromise = musicTrack.play();
        if (playPromise && typeof playPromise.catch === "function") {
          playPromise.then(() => {
            musicPlayRequested = false;
          }).catch(() => {
            musicPlayRequested = false;
          });
        } else {
          musicPlayRequested = false;
        }
      } catch (error) {
        musicPlayRequested = false;
        return;
      }
    }

    function getBrickSprite(brick) {
      if (brick.kind === "dense" && brick.hp === brick.maxHp) return sprites.brickDense;
      if (brick.kind === "dense" && brick.hp < brick.maxHp) return sprites.brickRegular;
      if (brick.kind === "power") return sprites.brickPower;
      if (brick.kind === "quiz") return sprites.brickQuiz;
      if (brick.kind === "barrier") return sprites.brickBarrier;
      return sprites.brickRegular;
    }

    function syncPaddleWidth() {

    function createBall(stuck = true) {
      const centerX = state.paddle.x + state.paddle.width / 2;
      return { x: centerX, y: state.paddle.y - 12, prevX: centerX, prevY: state.paddle.y - 12, vx: 165, vy: -330, r: 10, stuck, angle: 0, spin: 0 };

    function resetBalls() {

    function getBallBaseSpeed() {
      const stageBoost = state.mode === "campaign" ? state.stageIndex * 8 : Math.min(54, (state.endlessWave - 1) * 6);
      return 340 + stageBoost;
    }

    function normalizeBall(ball, targetSpeed = getBallBaseSpeed()) {
      const magnitude = Math.hypot(ball.vx, ball.vy) || 1;
      ball.vx = (ball.vx / magnitude) * targetSpeed;
      ball.vy = (ball.vy / magnitude) * targetSpeed;
    }

    function updateBallSpin(ball) {
      const speed = Math.hypot(ball.vx, ball.vy) || getBallBaseSpeed();
      const direction = Math.sign(ball.vx) || (ball.spin >= 0 ? 1 : -1) || 1;
      ball.spin = direction * clamp(speed / 42, 4.5, 10.5);
    }

    function launchBalls() {
      if (!state.running || state.paused || !state.awaitingLaunch) return;
      const speed = getBallBaseSpeed();
      state.balls.forEach((ball, index) => {
        if (ball.stuck) {
          const direction = index % 2 === 0 ? 1 : -1;
          ball.stuck = false;
          ball.vx = (120 + Math.random() * 80) * direction;
          ball.vy = -speed;
          normalizeBall(ball, speed);
          updateBallSpin(ball);
        }
      });
      state.awaitingLaunch = false;
      state.musicStarted = true;
      syncMusicPlayback(true);
      showToast("Cortical volley", "Brain launched.");
    }

    function boostQuizPattern(pattern, multiplier = QUIZ_BRICK_MULTIPLIER) {
      const grid = pattern.map((row) => row.split(""));
      const quizCells = [];
      const candidates = [];
      const centerRow = (grid.length - 1) / 2;
      const centerCol = (grid[0].length - 1) / 2;

      grid.forEach((row, rowIndex) => {
        row.forEach((cell, colIndex) => {
          if (cell === "Q") {
            quizCells.push({ rowIndex, colIndex });
            return;
          }
          if (cell !== "N" && cell !== "D" && cell !== "P") return;
          candidates.push({ rowIndex, colIndex, cell });
        });
      });

      const baseQuizCount = Math.max(1, quizCells.length);
      const targetCount = Math.min(quizCells.length + candidates.length, Math.round(baseQuizCount * multiplier));
      const needed = Math.max(0, targetCount - quizCells.length);
      if (!needed) return pattern.slice();

      const typePriority = { N: 0, D: 1, P: 2 };
      const selectedQuizCells = quizCells.slice();
      const remaining = candidates.slice();

      function getSpacingMetrics(cell) {
        if (!selectedQuizCells.length) {
          const centerDistance = Math.hypot((cell.colIndex - centerCol) * 1.1, (cell.rowIndex - centerRow) * 1.35);
          return { minDistance: centerDistance, nearCount: 0, rowCrowding: 0, centerDistance };
        }

        let minDistance = Infinity;
        let nearCount = 0;
        let rowCrowding = 0;
        selectedQuizCells.forEach((quiz) => {
          const rowDelta = Math.abs(cell.rowIndex - quiz.rowIndex);
          const colDelta = Math.abs(cell.colIndex - quiz.colIndex);
          const distance = Math.hypot(colDelta * 1.1, rowDelta * 1.35);
          minDistance = Math.min(minDistance, distance);
          if (rowDelta <= 1 && colDelta <= 1) nearCount += 1;
          if (rowDelta === 0 || (rowDelta === 1 && colDelta <= 2)) rowCrowding += 1;
        });
        const centerDistance = Math.hypot((cell.colIndex - centerCol) * 1.1, (cell.rowIndex - centerRow) * 1.35);
        return { minDistance, nearCount, rowCrowding, centerDistance };
      }

      for (let index = 0; index < needed && remaining.length; index += 1) {
        let bestIndex = 0;
        let bestMetrics = getSpacingMetrics(remaining[0]);

        for (let candidateIndex = 1; candidateIndex < remaining.length; candidateIndex += 1) {
          const candidate = remaining[candidateIndex];
          const candidateMetrics = getSpacingMetrics(candidate);
          const currentBest = remaining[bestIndex];

          const shouldReplace = candidateMetrics.nearCount < bestMetrics.nearCount
            || (candidateMetrics.nearCount === bestMetrics.nearCount && candidateMetrics.rowCrowding < bestMetrics.rowCrowding)
            || (candidateMetrics.nearCount === bestMetrics.nearCount && candidateMetrics.rowCrowding === bestMetrics.rowCrowding && candidateMetrics.minDistance > bestMetrics.minDistance)
            || (candidateMetrics.nearCount === bestMetrics.nearCount && candidateMetrics.rowCrowding === bestMetrics.rowCrowding && candidateMetrics.minDistance === bestMetrics.minDistance && typePriority[candidate.cell] < typePriority[currentBest.cell])
            || (candidateMetrics.nearCount === bestMetrics.nearCount && candidateMetrics.rowCrowding === bestMetrics.rowCrowding && candidateMetrics.minDistance === bestMetrics.minDistance && typePriority[candidate.cell] === typePriority[currentBest.cell] && candidateMetrics.centerDistance > bestMetrics.centerDistance);

          if (shouldReplace) {
            bestIndex = candidateIndex;
            bestMetrics = candidateMetrics;
          }
        }

        const [chosen] = remaining.splice(bestIndex, 1);
        grid[chosen.rowIndex][chosen.colIndex] = "Q";
        selectedQuizCells.push(chosen);
      }

      return grid.map((row) => row.join(""));
    }

    function getQuizBrickMultiplier() {
      if (state.mode === "campaign") {
        return CAMPAIGN_QUIZ_START_MULTIPLIER + state.stageIndex * CAMPAIGN_QUIZ_STAGE_STEP;
      }
      return QUIZ_BRICK_MULTIPLIER;
    }

    function buildPatternBricks(pattern, theme) {
      const cols = pattern[0].length;
      const totalWidth = cols * BRICK.width + (cols - 1) * BRICK.gap;
      const startX = (CANVAS.width - totalWidth) / 2;
      const startY = 92;
      const bricks = [];
      pattern.forEach((row, rowIndex) => {
        [...row].forEach((cell, colIndex) => {
          if (cell === ".") return;
          let kind = "standard";
          let hp = 1;
          let points = 100;
          if (cell === "D") { kind = "dense"; hp = 2; points = 160; }
          if (cell === "P") { kind = "power"; points = 150; }
          if (cell === "Q") { kind = "quiz"; points = 170; }
          if (cell === "B") { kind = "barrier"; hp = 2; points = 140; }
          bricks.push({
            x: startX + colIndex * (BRICK.width + BRICK.gap),
            y: startY + rowIndex * (BRICK.height + BRICK.gap),
            w: BRICK.width,
            h: BRICK.height,
            kind,
            hp,
            maxHp: hp,
            points,
            color: theme.palette[rowIndex % theme.palette.length],
          });
        });
      });
      return bricks;
    }

    function generateEndlessPattern(wave, bossRound) {
      if (bossRound) {
        return ["..DDBBDD..", ".BBDQDBB.", "..DDDDDD.."];
      }
      const rows = clamp(4 + Math.floor((wave - 1) / 2), 4, 6);
      const cols = 10;
      const pattern = [];
      for (let row = 0; row < rows; row += 1) {
        const leftHalf = [];
        for (let col = 0; col < cols / 2; col += 1) {
          const roll = Math.random();
          let cell = "N";
          if (roll < 0.1) cell = ".";
          else if (roll < 0.2) cell = "D";
          else if (roll < 0.27) cell = "P";
          leftHalf.push(cell);
        }
        pattern.push(leftHalf.concat([...leftHalf].reverse()).join(""));
      }
      const qRow = Math.floor(Math.random() * pattern.length);
      const qCol = 4 + Math.floor(Math.random() * 2);
      const chars = pattern[qRow].split("");
      chars[qCol] = "Q";
      pattern[qRow] = chars.join("");
      return pattern;
    }

    function getEndlessTheme(wave) {
      const base = CAMPAIGN_STAGES[(wave - 1) % 4];
      return {
        name: base.name + " Wave " + wave,
        subtitle: "Endless escalation.",
        palette: base.palette,
        boss: wave % 3 === 0,
        bossName: wave % 3 === 0 ? randomItem(["Localize the Lesion", "Board Review Beast", "Stroke Code Surge"]) : "",
        pattern: generateEndlessPattern(wave, wave % 3 === 0),
      };
    }

    function createBoss(theme) {

      };

    function buildStage(showBanner = true) {

      state.stageTheme = theme;
      state.stageLabel = state.mode === "campaign"
        ? "Stage " + (state.stageIndex + 1)
        : "Wave " + state.endlessWave;
      state.bricks = buildPatternBricks(boostedPattern, theme);
      state.drops = [];
      state.lasers = [];
      state.hazards = [];
      state.boss = theme.boss ? createBoss(theme) : null;
      state.laserCooldown = 0;
      if (!state.paddle) initPaddle();
      state.paddle.x = CANVAS.width / 2 - state.paddle.width / 2;
      resetBalls();

    }

      const active = [];
