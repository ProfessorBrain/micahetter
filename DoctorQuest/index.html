            ${quiz.options.map((option, index) => `<button type="button" class="option" data-answer="${index}">${escapeHtml(option)}</button>`).join("")}
          </div>
          <p class="hint" id="quizHint" style="display:none"></p>
          <div class="modal-actions"><button type="button" class="primary-action" id="quizSubmit" disabled>Answer</button></div>
        </section>
      `);

      setMinigameAutowin(() => finishQuiz(id));

      let selected = null;
      document.querySelectorAll(".option").forEach(button => {
        button.addEventListener("click", () => {
          selected = Number(button.dataset.answer);
          document.querySelectorAll(".option").forEach(item => item.classList.remove("selected"));
          button.classList.add("selected");
          document.getElementById("quizSubmit").disabled = false;
          document.getElementById("quizHint").style.display = "none";
        });
      });

      document.getElementById("quizSubmit").addEventListener("click", () => {
        if (selected === quiz.answer) {
          finishQuiz(id);
        } else {
          const hint = document.getElementById("quizHint");
          hint.textContent = quiz.hint;
          hint.style.display = "block";
        }
      });
    }

    function handleGrab(id) {
      if (id === "patient") {
        requestPhysicalExam();
        return;
      }
      if (id === "bedsideTable") {
        if (has(state.findings, "motorWeakness")) {
          setMessage("The walking video has been reviewed and its functional motor findings are charted.");
          return;
        }
        if (has(state.inventory, "patientPhone")) {
          setMessage("The charged phone contains the walking video. Select it and click the patient, or drag it onto the patient, to interpret the motor pattern.");
          return;
        }
        setMessage("The bedside phone battery is dead. Check the patient belongings for a charger.");
        return;
      }
      if (id === "belongings") {
        addInventory("phoneCharger");
        setMessage("You find a phone charger in the patient's bag.");
        return;
      }
      if (id === "sink") {
        washHands();
        return;
      }
      if (id === "drawer") {
        if (has(state.completed, "safetyPinFound")) {
          setMessage(has(state.findings, "spinothalamic")
            ? "The safety pin has already been used for the completed sensory examination."
            : "The safety pin is already in inventory.");
          return;
        }
        markCompleted("safetyPinFound");
        addInventory("safetyPin");
        setMessage("You open the supply drawer and take a clean safety pin for careful pinprick comparison.");
        return;
      }
      if (id === "fridge") {
        if (has(state.completed, "icePackFound")) {
          setMessage(has(state.findings, "spinothalamic")
            ? "The ice pack has already been used for the completed sensory examination."
            : "The ice pack is already in inventory.");
          return;
        }
        markCompleted("icePackFound");
        addInventory("icePack");
        setMessage("You open the refrigerator and take a wrapped ice pack for temperature testing.");
        return;
      }
      if (id === "cart") {
        if (!has(state.completed, "examTools")) {
          setMessage("The exam cart is locked. Select THINK, then click it to start the five-question neurology access test.");
          return;
        }
        addInventory("hammer");
        addInventory("tuningFork");
        markCompleted("outletRevealed");
        setMessage("You collect the reflex hammer and tuning fork. Moving the cart also reveals an outlet for the patient's phone.");
        return;
      }
      if (id === "monitor") {
        addFinding("vitals");
        setMessage("You activate the monitor controls. Vitals are stable, which leaves the long-tract mystery in the spotlight.");
        return;
      }
      if (id === "cabinet") {
        if (!has(state.completed, "soapRefillFound")) {
          markCompleted("soapRefillFound");
          addInventory("soapRefill");
          setMessage("You find a soap refill behind the cotton jars.");
          return;
        }
        setMessage("The upper cabinet contains routine supplies. The soap refill was the needed item here.");
        return;
      }
      if (id === "ct") {
        if (!has(state.completed, "ctSafety")) {
          setMessage("Imaging order requires localization. Select THINK to start the imaging puzzle.");
          return;
        }
        openMRI();
        return;
      }
      if (id === "phone") {
        if (!finalReady()) {
          setMessage("You lift the wall phone, but the attending requests a confirmed imaging diagnosis before the big call.");
          return;
        }
        setMessage("You present the final diagnosis and disposition. Case 01 is complete.");
        return;
      }
      if (id === "door") {
        setMessage("The ward door is locked. Future specialty rooms are not available yet.");
      }
    }

    function inventoryName(itemId) {
      return inventoryCatalog[itemId] ? inventoryCatalog[itemId][0] : "That item";
    }

    function genericInventoryUse(itemId, hotspotId) {
      setMessage(inventoryName(itemId) + " is not useful with the " + (hotspotLabels[hotspotId] || "hotspot") + ".");
    }

    function handleInventoryUse(itemId, hotspotId) {
      if (!itemId || !has(state.inventory, itemId)) return;

      if (hotspotId === "door") {
        setMessage("Using " + inventoryName(itemId) + " on the ward door has no effect. Future specialty rooms are not available yet.");
        return;
      }

      if (hotspotId === "phone") {
        if (finalReady()) {
          setMessage("You bring the confirmed diagnosis to the attending phone. Case 01 is complete.");
        } else {
          setMessage("The attending wants a confirmed diagnosis from the imaging report first.");
        }
        return;
      }

      if (itemId === "soapRefill") {
        if (hotspotId === "sink") {
          installSoapRefill();
          removeInventory(itemId);
          return;
        }
        if (hotspotId === "patient") {
          setMessage("The patient declines to be examined with a soap cartridge. Try the sink.");
          return;
        }
      }

      if (itemId === "phoneCharger") {
        if (hotspotId === "cart") {
          if (!has(state.completed, "outletRevealed")) {
            markCompleted("outletRevealed");
            setMessage("You move the cart and reveal an outlet. Connect the charger to the phone.");
            return;
          }
          markCompleted("phoneCharged");
          addInventory("patientPhone");
          removeInventory(itemId);
          setMessage("You route the charger from the outlet to the bedside phone. The phone powers on; its walking video is ready to review with the patient.");
          return;
        }
        if (hotspotId === "bedsideTable") {
          if (!has(state.completed, "outletRevealed")) {
            setMessage("The charger fits the phone, but the battery needs power. Move the exam cart to find the outlet.");
            return;
          }
          markCompleted("phoneCharged");
          addInventory("patientPhone");
          removeInventory(itemId);
          setMessage("You connect the charger to the bedside phone. Its walking video is ready to review with the patient.");
          return;
        }
      }

      if (itemId === "patientPhone") {
        if (hotspotId === "patient") {
          addFinding("collateralPhone");
          addFinding("motorWeakness");
          markCompleted("videoMotorAssessment");
          removeInventory(itemId);
          setMessage("You review the walking video with the patient. It shows a left stiff-legged gait with foot drag, providing functional evidence of an upper motor neuron pattern when formal graded power is limited by pain and guarding.");
          return;
        }
      }

      if (itemId === "hammer") {
        if (hotspotId === "patient") {
          if (!requireHandHygiene()) return;
          runNeurologicExam("reflex");
          return;
        }
        if (hotspotId === "cabinet") {
          setMessage("Use the reflex hammer on the patient, not the cabinet.");
          return;
        }
      }

      if (itemId === "tuningFork") {
        if (hotspotId === "patient") {
          if (!requireHandHygiene()) return;
          openSensoryGame();
          return;
        }
      }

      if (itemId === "safetyPin" || itemId === "icePack") {
        if (hotspotId === "patient") {
          if (!requireHandHygiene()) return;
          openSensoryGame();
          return;
        }
      }

      if (itemId === "icePack") {
        if (hotspotId === "sink") {
          setMessage("The ice pack is already prepared as a wrapped cold stimulus; use it on the patient during sensory testing.");
          return;
        }
      }

      if (hotspotId === "ct") {
        if (!has(state.findings, "localization")) {
          setMessage("Imaging order requires localization before MRI review.");
          return;
        }
        if (!has(state.completed, "ctSafety")) {
          openQuiz("ctSafety");
          return;
        }
        openMRI();
        return;
      }

      genericInventoryUse(itemId, hotspotId);
    }

    function setInventoryDragTarget(target) {
      if (inventoryDrag.target === target) return;
      if (inventoryDrag.target) inventoryDrag.target.classList.remove("drop-target");
      inventoryDrag.target = target;
      if (inventoryDrag.target) inventoryDrag.target.classList.add("drop-target");
    }

    function hotspotFromPoint(x, y) {
      const element = document.elementFromPoint(x, y);
      return element ? element.closest("[data-hotspot]") : null;
    }

    function positionDragGhost(x, y) {
      const ghost = document.getElementById("dragGhost");
      ghost.style.left = x + "px";
      ghost.style.top = y + "px";
    }

    function startInventoryDragVisuals(itemId, source, x, y) {
      clearSelectedInventory();
      inventoryDrag.active = true;
      inventoryDrag.itemId = itemId;
      inventoryDrag.source = source;
      source.classList.add("dragging");
      document.querySelector(".game-root").classList.add("inventory-dragging");
      const ghost = document.getElementById("dragGhost");
      ghost.replaceChildren();
      ghost.classList.add("has-visual");
      const label = document.createElement("span");
      label.textContent = inventoryName(itemId);
      ghost.append(createInventoryVisual(itemId, "drag-ghost"), label);
      ghost.classList.add("visible");
      positionDragGhost(x, y);
    }

    function clearInventoryDragVisuals() {
      document.querySelector(".game-root").classList.remove("inventory-dragging");
      document.querySelectorAll(".inventory-item.dragging").forEach(item => item.classList.remove("dragging"));
      document.querySelectorAll(".hotspot.drop-target").forEach(item => item.classList.remove("drop-target"));
      const ghost = document.getElementById("dragGhost");
      ghost.classList.remove("visible");
      ghost.classList.remove("has-visual");
      ghost.replaceChildren();
      inventoryDrag.target = null;
    }

    function resetInventoryPointerDrag() {
      inventoryDrag.itemId = "";
      inventoryDrag.pointerId = null;
      inventoryDrag.source = null;
      inventoryDrag.startX = 0;
      inventoryDrag.startY = 0;
      inventoryDrag.active = false;
    }

    function beginInventoryPointer(event, itemId, source) {
      if (event.button !== undefined && event.button !== 0) return;
      inventoryDrag.itemId = itemId;
      inventoryDrag.pointerId = event.pointerId;
      inventoryDrag.source = source;
      inventoryDrag.startX = event.clientX;
      inventoryDrag.startY = event.clientY;
      inventoryDrag.active = false;
      source.setPointerCapture?.(event.pointerId);
      document.addEventListener("pointermove", moveInventoryPointer, { passive: false });
      document.addEventListener("pointerup", endInventoryPointer, { passive: false });
      document.addEventListener("pointercancel", cancelInventoryPointer, { passive: false });
    }

    function moveInventoryPointer(event) {
      if (event.pointerId !== inventoryDrag.pointerId || !inventoryDrag.itemId) return;
      const distance = Math.hypot(event.clientX - inventoryDrag.startX, event.clientY - inventoryDrag.startY);
      if (!inventoryDrag.active && distance < 6) return;
      event.preventDefault();
      if (!inventoryDrag.active) {
        startInventoryDragVisuals(inventoryDrag.itemId, inventoryDrag.source, event.clientX, event.clientY);
      }
      positionDragGhost(event.clientX, event.clientY);
      setInventoryDragTarget(hotspotFromPoint(event.clientX, event.clientY));
    }

    function endInventoryPointer(event) {
      if (event.pointerId !== inventoryDrag.pointerId) return;
      document.removeEventListener("pointermove", moveInventoryPointer);
      document.removeEventListener("pointerup", endInventoryPointer);
      document.removeEventListener("pointercancel", cancelInventoryPointer);
      const itemId = inventoryDrag.itemId;
      const target = inventoryDrag.active ? hotspotFromPoint(event.clientX, event.clientY) : null;
      if (inventoryDrag.active) {
        event.preventDefault();
        inventoryDrag.suppressClick = true;
        setTimeout(() => { inventoryDrag.suppressClick = false; }, 0);
        clearInventoryDragVisuals();
        if (target) handleInventoryUse(itemId, target.dataset.hotspot);
        else setMessage("You keep " + inventoryName(itemId) + " in the inventory shelf.");
      }
      resetInventoryPointerDrag();
    }

    function cancelInventoryPointer() {
      document.removeEventListener("pointermove", moveInventoryPointer);
      document.removeEventListener("pointerup", endInventoryPointer);
      document.removeEventListener("pointercancel", cancelInventoryPointer);
      clearInventoryDragVisuals();
      resetInventoryPointerDrag();
    }

    function beginNativeInventoryDrag(event, itemId, source) {
      inventoryDrag.itemId = itemId;
      inventoryDrag.source = source;
      inventoryDrag.suppressClick = true;
      event.dataTransfer.effectAllowed = "move";
      event.dataTransfer.setData("text/plain", itemId);
      startInventoryDragVisuals(itemId, source, event.clientX || inventoryDrag.startX, event.clientY || inventoryDrag.startY);
      setTimeout(() => { inventoryDrag.suppressClick = false; }, 0);
    }

    function handleHotspot(id) {
      if (state.selectedInventoryId) {
        const itemId = state.selectedInventoryId;
        clearSelectedInventory();
        handleInventoryUse(itemId, id);
        return;
      }

      if (state.mode === "grab") {
        handleGrab(id);
        return;
      }

      if (id === "patient") {
        if (state.mode === "talk") {
          openPatientHistory();
          return;
        }
        if (state.mode === "think") {
          requestPhysicalExam();
          return;
        }
        if (state.mode === "auscultate") {
          requestPhysicalExam();
          return;
        }
        setMessage("The patient is awake and worried about progressive left-leg weakness.");
        return;
      }

      if (state.mode === "auscultate") {
        setMessage("Use the stethoscope on the patient to auscultate.");
        return;
      }

      if (id === "bedsideTable") {
        if (has(state.findings, "motorWeakness")) {
          setMessage("The walking video has been reviewed. Its functional motor findings are available in Chart Review.");
          return;
        }
        if (has(state.inventory, "patientPhone")) {
          setMessage("The charged phone contains the walking video. Drag it from inventory onto the patient to interpret the motor pattern.");
          return;
        }
        if (state.mode === "talk") {
          setMessage(has(state.completed, "phoneCharged")
            ? "The walking video is ready to review with the patient."
            : "The bedside table holds a phone with a dead battery.");
          return;
        }
        if (state.mode === "think") {
          setMessage(has(state.completed, "phoneCharged")
            ? "Use the charged phone on the patient to interpret gait as functional motor evidence."
            : "Functional motor interpretation is locked until the phone is charged. Find power, then review the walking video.");
          return;
        }
        setMessage(has(state.completed, "phoneCharged")
          ? "The charged phone is ready for walking-video review."
          : "An uncharged patient phone is on the bedside table. It may contain useful collateral history.");
        return;
      }

      if (id === "belongings") {
        if (state.mode === "talk") {
          setMessage("The patient says, \"My charger might be in there.\"");
          return;
        }
        if (state.mode === "think") {
          setMessage("The phone needs power before collateral history is available. Check the belongings bag for a charger.");
          return;
        }
        setMessage("A coat and leather bag sit on the chair. Select GRAB to search them for the phone charger.");
        return;
      }

      if (id === "sink") {
        if (state.mode === "talk") {
          setMessage("Use the sink for hand hygiene before the exam.");
          return;
        }
        if (state.mode === "think") {
          setMessage(has(state.completed, "soapInstalled")
            ? "Soap and water are available for hand hygiene before the neurologic exam."
            : "The dispenser is empty. Search the supply cabinet for a refill.");
          return;
        }
        washHands();
        return;
      }

      if (id === "drawer") {
        if (has(state.completed, "safetyPinFound")) {
          setMessage(has(state.findings, "spinothalamic")
            ? "The pinprick portion of the sensory examination is complete."
            : "The clean safety pin from this drawer is in inventory.");
          return;
        }
        setMessage(state.mode === "think"
          ? "A clean safety pin would provide a controlled sharp stimulus for pinprick comparison. Select GRAB to search the drawer."
          : "The under-counter supply drawer may contain a pinprick tool. Select GRAB to open it.");
        return;
      }

      if (id === "fridge") {
        if (has(state.completed, "icePackFound")) {
          setMessage(has(state.findings, "spinothalamic")
            ? "The temperature portion of the sensory examination is complete."
            : "The wrapped ice pack from this refrigerator is in inventory.");
          return;
        }
        setMessage(state.mode === "think"
          ? "A cold stimulus is required for temperature comparison. Select GRAB to check the refrigerator."
          : "A small clinical refrigerator sits beneath the counter. Select GRAB to open it.");
        return;
      }

      if (id === "cart") {
        if (state.mode === "think") {
          if (!has(state.completed, "examTools")) openCartQuiz();
          else {
            markCompleted("outletRevealed");
            setMessage("The exam cart is open. Reflex hammer and tuning fork are available; an outlet is visible behind the cart.");
          }
          return;
        }
        setMessage("The exam cart has tools inside, a rapid-fire quiz lock on its screen, and possibly an outlet behind it. This is a THINK or GRAB problem.");
        return;
      }

      if (id === "monitor") {
        addFinding("vitals");
        setMessage("The monitor shows stable vitals. Useful, but the mystery is written in long tracts.");
        return;
      }

      if (id === "cabinet") {
        if (!has(state.completed, "soapRefillFound")) {
          setMessage("The cabinet contains supply jars. Use GRAB to search for the soap refill.");
          return;
        }
        setMessage("The upper cabinet contains routine supplies, but no additional case-relevant equipment.");
        return;
      }

      if (id === "ct") {
        if (!has(state.findings, "localization")) {
          setMessage("The imaging software displays: Localize first.");
          return;
        }
        if (state.mode === "think") {
          if (!has(state.completed, "ctSafety")) {
            openQuiz("ctSafety");
            return;
          }
          openMRI();
          return;
        }
        setMessage("Use THINK on the imaging software to make a localization-driven imaging decision.");
        return;
      }

      if (id === "phone") {
        if (!finalReady()) {
          setMessage("The attending says over the wall phone: 'Bring me the confirmed diagnosis from the imaging report.'");
          return;
        }
        setMessage("You present the final diagnosis and disposition. Case 01 is complete.");
        return;
      }

      if (id === "door") {
        setMessage("Future specialty rooms are not available yet.");
      }
    }

    function physicalExamActionKey(actionId) {
      return "physicalExam:" + actionId;
    }

    function physicalExamSystemDone(system) {
      if (system.id === "neurologic") {
        return ["mentalStatus", "cranialNerves", "motorWeakness", "reflexes", "dorsalColumn", "spinothalamic", "coordination", "collateralPhone"]
          .every(findingId => has(state.findings, findingId));
      }
      return system.actions.every(actionId => has(state.completed, physicalExamActionKey(actionId)));
    }

    function neurologicExamDone(examId) {
      if (examId === "mentalStatus") return has(state.findings, "mentalStatus");
      if (examId === "cranialNerves") return has(state.findings, "cranialNerves");
      if (examId === "motor") return has(state.findings, "motorWeakness");
      if (examId === "sensory") return ["lightTouch", "dorsalColumn", "spinothalamic"].every(id => has(state.findings, id));
      if (examId === "reflex") return has(state.findings, "reflexes");
      if (examId === "coordination") return has(state.findings, "coordination");
      if (examId === "gait") return has(state.findings, "collateralPhone");
      if (examId === "sensoryLevel") return has(state.findings, "sensoryLevel");
      if (examId === "localization") return has(state.findings, "localization");
      return false;
    }

    function openExam(systemId) {
      const system = physicalExamSystems.find(item => item.id === systemId) || null;
      const neurologicActions = [
        ["mentalStatus", "Mental Status", "Attention, orientation, language, and behavior."],
        ["cranialNerves", "Cranial Nerves", "Focused examination of cranial nerves II-XII."],
        ["motor", "Motor Exam", "Interpret functional motor evidence from the walking video."],
        ["sensory", "Sensory Exam", "Complete the five-modality sensory testing game."],
        ["reflex", "Reflexes", "Test the patellar reflex with the timing game."],
        ["coordination", "Coordination", "Assess appendicular coordination without mistaking weakness for dysmetria."],
        ["gait", "Gait", "Review the recorded gait because walking at bedside is unsafe."]
      ];

      let panelMarkup;
      if (!system) {
        panelMarkup = `
          <div class="physical-exam-heading"><h3>Examination Systems</h3></div>
          <p class="physical-exam-intro">Choose a system for a focused physical examination.</p>
          <div class="exam-system-grid">
            ${physicalExamSystems.map(item => `
              <button type="button" class="exam-system-button${physicalExamSystemDone(item) ? " done" : ""}" data-exam-system="${item.id}">
                <strong>${escapeHtml(item.label)}</strong>
                <span>${escapeHtml(item.detail)}</span>
              </button>
            `).join("")}
          </div>
        `;
      } else if (system.id === "neurologic") {
        panelMarkup = `
          <div class="physical-exam-heading">
            <button type="button" class="exam-menu-back" data-exam-back aria-label="Back to examination systems" title="Back to systems">&#8592;</button>
            <h3>Neurologic Examination</h3>
          </div>
          <p class="physical-exam-intro">${escapeHtml(system.intro)}</p>
          <div class="neuro-exam-grid">
            ${neurologicActions.map(([id, label, detail]) => `
              <button type="button" class="exam-action-button${neurologicExamDone(id) ? " done" : ""}" data-neuro-exam="${id}">
                <strong>${escapeHtml(label)}</strong>
                <span>${escapeHtml(detail)}</span>
              </button>
            `).join("")}
          </div>
        `;
      } else {
        panelMarkup = `
          <div class="physical-exam-heading">
            <button type="button" class="exam-menu-back" data-exam-back aria-label="Back to examination systems" title="Back to systems">&#8592;</button>
            <h3>${escapeHtml(system.label)} Examination</h3>
          </div>
          <p class="physical-exam-intro">${escapeHtml(system.intro)}</p>
          <div class="exam-system-grid">
            ${system.actions.map(actionId => {
              const action = physicalExamActions[actionId];
              const done = has(state.completed, physicalExamActionKey(actionId));
              return `
                <button type="button" class="exam-action-button${done ? " done" : ""}" data-general-exam="${actionId}">
                  <strong>${escapeHtml(action.label)}</strong>
                  <span>${escapeHtml(action.detail)}</span>
                </button>
              `;
            }).join("")}
          </div>
        `;
      }

      openModal(`
        <section class="modal-card physical-exam-card" role="dialog" aria-modal="true" aria-labelledby="physicalExamTitle">
          <div class="modal-header"><h2 id="physicalExamTitle">Physical Examination</h2><button type="button" data-close aria-label="Close">X</button></div>
          <div class="physical-exam-layout">
            <div class="physical-exam-portrait"><img src="assets/patient-portrait.png" alt="Portrait of the patient"></div>
            <section class="physical-exam-panel">${panelMarkup}</section>
          </div>
        </section>
      `);

      document.querySelectorAll("[data-exam-system]").forEach(button => {
        button.addEventListener("click", () => openExam(button.dataset.examSystem));
      });
      document.querySelectorAll("[data-exam-back]").forEach(button => {
        button.addEventListener("click", () => openExam());
      });
      document.querySelectorAll("[data-general-exam]").forEach(button => {
        button.addEventListener("click", () => runPhysicalExamAction(system.id, button.dataset.generalExam, button));
      });
      document.querySelectorAll("[data-neuro-exam]").forEach(button => {
        button.addEventListener("click", () => runNeurologicExam(button.dataset.neuroExam, button));
      });

      const firstControl = document.querySelector("[data-exam-system], [data-exam-back]");
      if (firstControl) firstControl.focus();
    }

    function recordPhysicalExamAction(systemId, actionId) {
      const system = physicalExamSystems.find(item => item.id === systemId);
      const action = physicalExamActions[actionId];
      if (!system || !action || !system.actions.includes(actionId)) return null;

      const completionId = physicalExamActionKey(actionId);
      if (!has(state.completed, completionId)) {
        markCompleted(completionId);
        logAction("Examined " + system.label + ": " + action.label);
      }

      const systemComplete = system.actions.every(id => has(state.completed, physicalExamActionKey(id)));
      if (systemComplete && system.findingId) addFinding(system.findingId);
      return { system, action, systemComplete };
    }

    function runPhysicalExamAction(systemId, actionId, button) {
      if (!requireHandHygiene()) {
        closeModal();
        return;
      }
      const system = physicalExamSystems.find(item => item.id === systemId);
      const action = physicalExamActions[actionId];
      if (!system || !action || !system.actions.includes(actionId)) return;

      if (!has(state.completed, physicalExamActionKey(actionId))) {
        if (actionId === "pupils") {
          openPupilInspectionGame();
          return;
        }
        if (actionId === "earsNose") {
          openEarNoseInspectionGame();
          return;
        }
      }

      const recorded = recordPhysicalExamAction(systemId, actionId);
      if (!recorded) return;
      if (button) button.classList.add("done");
      setMessage(recorded.action.result + (recorded.systemComplete ? " " + recorded.system.label + " examination complete." : ""));
    }

    function openPupilInspectionGame() {
      const canvasWidth = 900;
      const canvasHeight = 600;
      const targetMinimum = 0.36;
      const targetMaximum = 0.60;
      const stableGoal = 5;
      const dilationRate = 0.15;
      const constrictRate = 0.27;
      let pupilSize = 0.75;
      const eyeCenters = { right: { x: 260, y: 338 }, left: { x: 637, y: 338 } };
      let shining = false;
      let litEye = "right";
      let pointerId = null;
      let pointer = { x: 450, y: 510 };
      let stableTime = 0;
      let lastFrameTime = null;
      let finished = false;

      openModal(`
        <section class="modal-card pupil-card" id="pupilGame" role="dialog" aria-modal="true" aria-labelledby="pupilTitle">
          <div class="modal-header"><h2 id="pupilTitle">Pupil and Eye Inspection</h2><button type="button" data-close aria-label="Close">X</button></div>
          <p>Press and hold over either eye to shine the light. Pulse and alternate the light until both pupil edges remain inside the green bands.</p>
          <div class="pupil-hud" aria-live="polite">
            <div class="pupil-progress" aria-hidden="true"><span class="pupil-progress-fill" id="pupilProgressFill"></span></div>
            <span class="pupil-progress-text" id="pupilProgressText">Stable 0.0 / 5.0 s</span>
          </div>
          <div class="pupil-stage" id="pupilStage">
            <img src="assets/pupil-exam.png" alt="Close-up of the patient's eyes">
            <canvas id="pupilCanvas" width="900" height="600" tabindex="0" aria-describedby="pupilStatus" aria-label="Two-eye pupillary light response game"></canvas>
          </div>
          <p class="pupil-status" id="pupilStatus" aria-live="polite">Light off: both pupils are dilating.</p>
        </section>
      `);

      document.querySelector(".game-root").classList.add("pupil-testing");
      const canvas = document.getElementById("pupilCanvas");
      const context = canvas.getContext("2d");
      const progressFill = document.getElementById("pupilProgressFill");
      const progressText = document.getElementById("pupilProgressText");
      const status = document.getElementById("pupilStatus");

      function clamp(value, minimum, maximum) {
        return Math.max(minimum, Math.min(maximum, value));
      }

      function pupilInZone(value) {
        return value >= targetMinimum && value <= targetMaximum;
      }

      function pupilRadius(value) {
        return 8 + (value * 32);
      }

      function drawPixelPupil(center, radius) {
        const pixelSize = 4;
        const snappedRadius = Math.max(pixelSize, Math.round(radius / pixelSize) * pixelSize);
        const cellRadius = Math.ceil(snappedRadius / pixelSize);
        context.fillStyle = "#10131b";

        for (let row = -cellRadius; row <= cellRadius; row += 1) {
          for (let column = -cellRadius; column <= cellRadius; column += 1) {
            const offsetX = column * pixelSize;
            const offsetY = row * pixelSize;
            if ((offsetX * offsetX) + (offsetY * offsetY) > snappedRadius * snappedRadius) continue;
            context.fillRect(center.x + offsetX - (pixelSize / 2), center.y + offsetY - (pixelSize / 2), pixelSize, pixelSize);
          }
        }
      }

      function pointerPosition(event) {
        const bounds = canvas.getBoundingClientRect();
        return {
          x: clamp(((event.clientX - bounds.left) / bounds.width) * canvasWidth, 0, canvasWidth),
          y: clamp(((event.clientY - bounds.top) / bounds.height) * canvasHeight, 0, canvasHeight)
        };
      }

      function drawLightBeam() {
        if (!shining) return;
        const center = eyeCenters[litEye];
        const gradient = context.createRadialGradient(center.x, center.y, 10, center.x, center.y, 150);
        gradient.addColorStop(0, "rgba(255,247,184,0.52)");
        gradient.addColorStop(1, "rgba(255,222,97,0)");
        context.fillStyle = gradient;
        context.beginPath();
        context.arc(center.x, center.y, 150, 0, Math.PI * 2);
        context.fill();

        context.fillStyle = "rgba(255,233,137,0.22)";
        context.beginPath();
        context.moveTo(pointer.x, pointer.y);
        context.lineTo(center.x - 76, center.y - 42);
        context.lineTo(center.x + 76, center.y + 42);
        context.closePath();
        context.fill();
      }

      function drawEye(side, label) {
        const center = eyeCenters[side];
        const value = pupilSize;
        const inZone = pupilInZone(value);
        const isDirect = shining && litEye === side;
        const isConsensual = shining && litEye !== side;

        context.save();
        const lowerRadius = pupilRadius(targetMinimum);
        const upperRadius = pupilRadius(targetMaximum);
        const targetRadius = (lowerRadius + upperRadius) / 2;
        const targetWidth = upperRadius - lowerRadius;
        context.strokeStyle = "rgba(20,48,28,0.92)";
        context.lineWidth = targetWidth + 5;
        context.beginPath();
        context.arc(center.x, center.y, targetRadius, 0, Math.PI * 2);
        context.stroke();
        context.strokeStyle = inZone ? "rgba(143,255,146,0.96)" : "rgba(105,232,111,0.82)";
        context.lineWidth = targetWidth;
        context.beginPath();
        context.arc(center.x, center.y, targetRadius, 0, Math.PI * 2);
        context.stroke();

        drawPixelPupil(center, pupilRadius(value));

        context.setLineDash([5, 4]);
        context.strokeStyle = "rgba(171,255,173,0.94)";
        context.lineWidth = 2;
        context.beginPath();
        context.arc(center.x, center.y, lowerRadius, 0, Math.PI * 2);
        context.stroke();
        context.beginPath();
        context.arc(center.x, center.y, upperRadius, 0, Math.PI * 2);
        context.stroke();
        context.setLineDash([]);

        context.fillStyle = "rgba(255,255,255,0.88)";
        context.fillRect(center.x - 10, center.y - 13, 6, 6);

        const responseLabel = isDirect ? "DIRECT" : isConsensual ? "CONSENSUAL" : "";
        if (responseLabel) {
          context.fillStyle = "rgba(33,25,35,0.8)";
          context.fillRect(center.x - 75, 425, 150, 29);
          context.font = "bold 14px 'Courier New', monospace";
          context.textAlign = "center";
          context.fillStyle = isDirect ? "#ffe175" : "#b8e0d2";
          context.fillText(label + ": " + responseLabel, center.x, 445);
        }
        context.restore();
      }

      function drawFlashlight() {
        context.save();
        context.font = "34px 'Segoe UI Emoji', sans-serif";
        context.textAlign = "center";
        context.textBaseline = "middle";
        context.shadowColor = "rgba(0,0,0,0.65)";
        context.shadowOffsetX = 3;
        context.shadowOffsetY = 3;
        context.fillText("\u{1F526}", pointer.x, pointer.y);
        context.restore();
      }

      function drawGame() {
        context.clearRect(0, 0, canvasWidth, canvasHeight);
        drawLightBeam();
        drawEye("right", "RIGHT EYE");
        drawEye("left", "LEFT EYE");
        drawFlashlight();
      }

      function updateHud() {
        const progress = Math.min(1, stableTime / stableGoal);
        progressFill.style.width = (progress * 100) + "%";
        progressText.textContent = "Stable " + stableTime.toFixed(1) + " / " + stableGoal.toFixed(1) + " s";

        const bothInZone = pupilInZone(pupilSize);
        status.className = "pupil-status" + (bothInZone ? " in-zone" : "");
        if (bothInZone) {
          status.textContent = "Both pupils are in the green zone. Keep the response stable.";
        } else if (shining) {
          status.textContent = "Light on the " + litEye + " eye: both pupils constrict together, directly here and consensually in the other eye.";
        } else {
          status.textContent = "Light off: both pupils are dilating.";
        }
      }

      function stopPupilAnimation() {
        if (state.pupilFrame) {
          cancelAnimationFrame(state.pupilFrame);
          state.pupilFrame = null;
        }
      }

      function finishPupilGame() {
        if (finished) return;
        finished = true;
        shining = false;
        stableTime = stableGoal;
        setMinigameAutowin(null);
        stopPupilAnimation();
        progressFill.style.width = "100%";
        progressText.textContent = "Stable 5.0 / 5.0 s";
        status.className = "pupil-status success";
        status.textContent = "Both pupils constrict directly and consensually, then redilate symmetrically.";
        drawGame();
        playSfx("success");

        setTimeout(() => {
          if (!document.getElementById("pupilGame")) return;
          const recorded = recordPhysicalExamAction("heent", "pupils");
          closeModal();
          if (!recorded) return;
          setMessage(recorded.action.result + (recorded.systemComplete ? " " + recorded.system.label + " examination complete." : ""));
        }, 900);
      }

      function pupilTick(frameTime) {
        if (finished) return;
        if (lastFrameTime === null) lastFrameTime = frameTime;
        const elapsedSeconds = Math.min((frameTime - lastFrameTime) / 1000, 0.08);
        lastFrameTime = frameTime;

        if (shining) {
          pupilSize -= constrictRate * elapsedSeconds;
        } else {
          pupilSize += dilationRate * elapsedSeconds;
        }
        pupilSize = clamp(pupilSize, 0.08, 0.96);

        if (pupilInZone(pupilSize)) stableTime += elapsedSeconds;
        else stableTime = 0;

        updateHud();
        drawGame();
        if (stableTime >= stableGoal) {
          finishPupilGame();
          return;
        }
        state.pupilFrame = requestAnimationFrame(pupilTick);
      }

      function updatePointer(event) {
        pointer = pointerPosition(event);
        if (shining) litEye = pointer.x < canvasWidth / 2 ? "right" : "left";
      }

      function beginLight(event) {
        if (event.button !== 0 || finished) return;
        event.preventDefault();
        pointerId = event.pointerId;
        updatePointer(event);
        shining = true;
        litEye = pointer.x < canvasWidth / 2 ? "right" : "left";
        canvas.setPointerCapture(pointerId);
      }

      function endLight(event) {
        if (event.pointerId !== pointerId) return;
        shining = false;
        if (canvas.hasPointerCapture(pointerId)) canvas.releasePointerCapture(pointerId);
        pointerId = null;
      }

      canvas.addEventListener("pointerdown", beginLight);
      canvas.addEventListener("pointermove", updatePointer);
      canvas.addEventListener("pointerup", endLight);
      canvas.addEventListener("pointercancel", endLight);
      canvas.addEventListener("lostpointercapture", () => {
        shining = false;
        pointerId = null;
      });

      setMinigameAutowin(finishPupilGame);
      updateHud();
      drawGame();
      state.pupilFrame = requestAnimationFrame(pupilTick);
      canvas.focus({ preventScroll: true });
    }

    function openEarNoseInspectionGame() {
      const orifices = [
        { id: "rightEar", label: "Patient's right ear" },
        { id: "leftEar", label: "Patient's left ear" },
        { id: "rightNostril", label: "Patient's right nostril" },
        { id: "leftNostril", label: "Patient's left nostril" }
      ];
      let finished = false;

      if (!state.orificeAssignments) {
        const earQuestionId = Math.random() < 0.5 ? "rightEar" : "leftEar";
        const noseQuestionId = Math.random() < 0.5 ? "rightNostril" : "leftNostril";
        const remaining = orifices.map(item => item.id).filter(id => id !== earQuestionId && id !== noseQuestionId);
        if (Math.random() < 0.5) remaining.reverse();
        state.orificeAssignments = {
          [earQuestionId]: {
            kind: "question",
            bank: "ear",
            index: Math.floor(Math.random() * orificeQuestionBank.ear.length)
          },
          [noseQuestionId]: {
            kind: "question",
            bank: "nose",
            index: Math.floor(Math.random() * orificeQuestionBank.nose.length)
          },
          [remaining[0]]: { kind: "empty" },
          [remaining[1]]: { kind: "egg" }
        };
      }

      openModal(`
        <section class="modal-card orifice-card" id="orificeGame" role="dialog" aria-modal="true" aria-labelledby="orificeTitle">
          <div class="modal-header"><h2 id="orificeTitle">Ears and Nose Inspection</h2><button type="button" data-close aria-label="Close">X</button></div>
          <p>Inspect both ears and both nostrils. Two openings contain clinical questions; the remaining findings are less predictable.</p>
          <div class="orifice-progress-line">
            <span id="orificeProgressText">Examined 0 / 4</span>
            <div class="orifice-progress-pips" id="orificeProgressPips" aria-hidden="true"><span></span><span></span><span></span><span></span></div>
          </div>
          <div class="orifice-scene" aria-label="Front-facing view of the patient">
            <img src="assets/fronton.png" alt="Front-facing portrait of the patient">
            <button type="button" class="orifice-hotspot" data-orifice="rightEar" style="left:34.2%;top:37.2%;width:7.4%;height:16.5%" aria-label="Inspect the patient's right ear" title="Right ear"></button>
            <button type="button" class="orifice-hotspot" data-orifice="leftEar" style="left:59.2%;top:37.2%;width:7.4%;height:16.5%" aria-label="Inspect the patient's left ear" title="Left ear"></button>
            <button type="button" class="orifice-hotspot" data-orifice="rightNostril" style="left:46.1%;top:47.3%;width:5.2%;height:7.2%" aria-label="Inspect the patient's right nostril" title="Right nostril"></button>
            <button type="button" class="orifice-hotspot" data-orifice="leftNostril" style="left:51.2%;top:47.3%;width:5.2%;height:7.2%" aria-label="Inspect the patient's left nostril" title="Left nostril"></button>
          </div>
          <section class="orifice-panel" id="orificePanel" aria-live="polite"></section>
        </section>
      `);

      const panel = document.getElementById("orificePanel");
      const hotspotButtons = Array.from(document.querySelectorAll("[data-orifice]"));

      function completionKey(orificeId) {
        return "orifice:" + orificeId;
      }

      function examinedCount() {
        return orifices.filter(item => has(state.completed, completionKey(item.id))).length;
      }

      function updateOrificeProgress() {
        const count = examinedCount();
        document.getElementById("orificeProgressText").textContent = "Examined " + count + " / 4";
        document.querySelectorAll("#orificeProgressPips span").forEach((pip, index) => pip.classList.toggle("lit", index < count));
        hotspotButtons.forEach(button => {
          const examined = has(state.completed, completionKey(button.dataset.orifice));
          button.classList.toggle("examined", examined);
          button.setAttribute("aria-pressed", String(examined));
        });
      }

      function bindBackButton() {
        const backButton = document.getElementById("orificeBack");
        if (backButton) backButton.addEventListener("click", renderHomePanel);
      }

      function renderHomePanel() {
        panel.innerHTML = `
          <h3>Choose an opening</h3>
          <p>Select an ear or nostril on the portrait to inspect it.</p>
        `;
      }

      function renderResult(title, text, extraMarkup = "") {
        panel.innerHTML = `
          <h3>${escapeHtml(title)}</h3>
          ${extraMarkup}
          <p>${escapeHtml(text)}</p>
          <div class="orifice-panel-actions"><button type="button" class="primary-action" id="orificeBack">Back to Face</button></div>
        `;
        bindBackButton();
      }

      function finishOrificeGame() {
        if (finished) return;
        finished = true;
        setMinigameAutowin(null);
        orifices.forEach(item => markCompleted(completionKey(item.id)));
        addInventory("mysteryEgg");
        updateOrificeProgress();
        hotspotButtons.forEach(button => { button.disabled = true; });
        panel.innerHTML = `
          <h3>Inspection complete</h3>
          <p>Canals and nasal passages are patent without an acute abnormality. The mystery egg remains unexplained.</p>
        `;
        playSfx("success");

        setTimeout(() => {
          if (!document.getElementById("orificeGame")) return;
          const recorded = recordPhysicalExamAction("heent", "earsNose");
          closeModal();
          if (!recorded) return;
          setMessage(recorded.action.result + " A mystery egg was also added to inventory." + (recorded.systemComplete ? " " + recorded.system.label + " examination complete." : ""));
        }, 900);
      }

      function markOrificeExamined(orificeId) {
        markCompleted(completionKey(orificeId));
        updateOrificeProgress();
        if (examinedCount() >= orifices.length) {
          finishOrificeGame();
          return true;
        }
        return false;
      }

      function renderQuestion(orifice, assignment) {
        const question = orificeQuestionBank[assignment.bank][assignment.index];
        panel.innerHTML = `
          <h3>${escapeHtml(orifice.label)}</h3>
          <p>${escapeHtml(question.prompt)}</p>
          <div class="orifice-answer-grid">
            ${question.options.map((option, index) => `<button type="button" class="orifice-answer" data-orifice-answer="${index}">${escapeHtml(option)}</button>`).join("")}
          </div>
          <p id="orificeQuestionFeedback" hidden></p>
        `;

        const answerButtons = Array.from(panel.querySelectorAll("[data-orifice-answer]"));
        answerButtons.forEach(button => {
          button.addEventListener("click", () => {
            const answerIndex = Number(button.dataset.orificeAnswer);
            const feedback = document.getElementById("orificeQuestionFeedback");
            if (answerIndex !== question.answer) {
              button.classList.add("wrong");
              feedback.hidden = false;
              feedback.textContent = "Not quite. Inspect the finding and try again.";
              return;
            }

            answerButtons.forEach(item => { item.disabled = true; });
            button.classList.add("correct");
            playSfx("success");
            if (markOrificeExamined(orifice.id)) return;
            renderResult(orifice.label, "Correct. " + question.explanation);
          });
        });
      }

      function inspectOrifice(orificeId) {
        if (finished) return;
        const orifice = orifices.find(item => item.id === orificeId);
        const assignment = state.orificeAssignments[orificeId];
        if (!orifice || !assignment) return;

        if (has(state.completed, completionKey(orificeId))) {
          renderResult(orifice.label, "This opening has already been inspected and documented.");
          return;
        }

        if (assignment.kind === "question") {
          renderQuestion(orifice, assignment);
          return;
        }

        if (assignment.kind === "egg") {
          addInventory("mysteryEgg");
          if (markOrificeExamined(orificeId)) return;
          renderResult(
            orifice.label,
            "Against all reasonable HEENT precedent, a small mystery egg is present. This is not a standard otoscopic or rhinoscopic finding.",
            `<div class="mystery-egg-reveal"><span aria-hidden="true">&#129370;</span>Mystery Egg acquired</div>`
          );
          return;
        }

        if (markOrificeExamined(orificeId)) return;
        renderResult(orifice.label, "Nothing unusual. Patent, unremarkable, and notably egg-free.");
      }

      hotspotButtons.forEach(button => button.addEventListener("click", () => inspectOrifice(button.dataset.orifice)));
      setMinigameAutowin(finishOrificeGame);
      updateOrificeProgress();
      renderHomePanel();
      if (examinedCount() >= orifices.length) finishOrificeGame();
      else hotspotButtons[0].focus();
    }

    function motorVideoGuidance() {
      if (has(state.findings, "motorWeakness")) {
        return "The walking video documents a left stiff-legged gait with foot drag, providing functional upper motor neuron evidence. Formal graded power remains limited by pain and guarding.";
      }
      if (has(state.inventory, "patientPhone")) {
        return "Formal graded power is limited by pain and guarding. Drag the Charged Phone from inventory onto the patient to interpret the recorded gait as functional motor evidence.";
      }
      if (has(state.completed, "phoneCharged")) {
        return "The phone is charged. Retrieve its walking video and use it on the patient to complete the functional motor assessment.";
      }
      return "Formal graded power is limited by pain and guarding. The patient reports a walking video on her dead phone; find the charger in her belongings, reveal an outlet, and charge the phone.";
    }

    function runNeurologicExam(exam, button) {
      if (!requireHandHygiene()) {
        closeModal();
        return;
      }

      if (exam === "mentalStatus") {
        addFinding("mentalStatus");
        if (button) button.classList.add("done");
        setMessage("The patient is alert, attentive, fully oriented, and provides a coherent history without aphasia or neglect.");
        return;
      }
      if (exam === "cranialNerves") {
        if (has(state.findings, "cranialNerves")) {
          setMessage("The focused cranial nerve screen is already documented as normal.");
          return;
        }
        openCranialNerveGame();
        return;
      }
      if (exam === "motor") {
        markCompleted("motorVideoPrompted");
        setMessage(motorVideoGuidance());
        return;
      }
      if (exam === "sensory") {
        openSensoryGame();
        return;
      }
      if (exam === "reflex") {
        if (has(state.findings, "reflexes")) {
          setMessage("The left patellar reflex is already documented as brisk after three accurate tendon strikes.");
          return;
        }
        if (!has(state.inventory, "hammer")) {
          setMessage("Find the reflex hammer in the exam cart before testing reflexes.");
          return;
        }
        openReflexGame();
        return;
      }
      if (exam === "coordination") {
        addFinding("coordination");
        if (button) button.classList.add("done");
        setMessage("Finger-to-nose and right heel-to-shin are accurate. Left heel-to-shin is limited by weakness without clear dysmetria.");
        return;
      }
      if (exam === "gait") {
        markCompleted("motorVideoPrompted");
        setMessage(motorVideoGuidance());
        return;
      }
      if (exam === "sensoryLevel") {
        openSensoryLevel();
        return;
      }
      if (exam === "localization") openLocalization();
    }

    function openCranialNerveGame() {
      const canvasWidth = 960;
      const canvasHeight = 640;
      const traceWidth = 12;
      const coverageRadius = 9;
      const requiredCoverage = 0.9;
      const sampleSpacing = 4;
      const targetSegments = [
        { label: "left vertical bar", start: { x: 270, y: 165 }, end: { x: 270, y: 475 } },
        { label: "crossbar", start: { x: 270, y: 320 }, end: { x: 690, y: 320 } },
        { label: "right vertical bar", start: { x: 690, y: 165 }, end: { x: 690, y: 475 } }
      ];
      const strokes = [];
      let activeStroke = null;
      let drawing = false;
      let finished = false;

      openModal(`
        <section class="modal-card cranial-card" id="cranialGame" role="dialog" aria-modal="true" aria-labelledby="cranialTitle">
          <div class="modal-header"><h2 id="cranialTitle">Cranial Nerve Screen: Follow My Finger</h2><button type="button" data-close aria-label="Close">X</button></div>
          <p>Click and hold anywhere to draw a red line over the dotted H. Release and resume as often as needed.</p>
          <div class="cranial-stage" id="cranialStage">
            <canvas class="cranial-guide-layer" id="cranialGuideCanvas" width="960" height="640" aria-hidden="true"></canvas>
            <canvas class="cranial-draw-layer" id="cranialCanvas" width="960" height="640" tabindex="0" aria-describedby="cranialFeedback" aria-label="Draw red lines over the dotted H"></canvas>
          </div>
          <p class="cranial-feedback" id="cranialFeedback" aria-live="polite" hidden></p>
          <div class="cranial-actions"><button type="button" class="primary-action" id="cranialSubmit">Submit</button></div>
        </section>
      `);

      const guideCanvas = document.getElementById("cranialGuideCanvas");
      const guideContext = guideCanvas.getContext("2d");
      const canvas = document.getElementById("cranialCanvas");
      const context = canvas.getContext("2d");
      const feedback = document.getElementById("cranialFeedback");
      const submitButton = document.getElementById("cranialSubmit");

      function pointerPosition(event) {
        const bounds = canvas.getBoundingClientRect();
        return {
          x: ((event.clientX - bounds.left) / bounds.width) * canvasWidth,
          y: ((event.clientY - bounds.top) / bounds.height) * canvasHeight
        };
      }

      function drawGuide() {
        guideContext.clearRect(0, 0, canvasWidth, canvasHeight);
        guideContext.save();
        guideContext.strokeStyle = "rgba(255,243,191,0.94)";
        guideContext.lineWidth = 5;
        guideContext.setLineDash([11, 10]);
        guideContext.shadowColor = "rgba(33,25,35,0.9)";
        guideContext.shadowOffsetX = 3;
        guideContext.shadowOffsetY = 3;
        guideContext.beginPath();
        targetSegments.forEach(segment => {
          guideContext.moveTo(segment.start.x, segment.start.y);
          guideContext.lineTo(segment.end.x, segment.end.y);
        });
        guideContext.stroke();
        guideContext.restore();
      }

      function drawTracePoint(point) {
        context.save();
        context.fillStyle = "rgba(207,48,43,0.9)";
        context.beginPath();
        context.arc(point.x, point.y, traceWidth / 2, 0, Math.PI * 2);
        context.fill();
        context.restore();
      }

      function drawTraceSegment(start, end) {
        context.save();
        context.strokeStyle = "rgba(207,48,43,0.9)";
        context.lineWidth = traceWidth;
        context.lineCap = "round";
        context.lineJoin = "round";
        context.beginPath();
        context.moveTo(start.x, start.y);
        context.lineTo(end.x, end.y);
        context.stroke();
        context.restore();
      }

      function beginStroke(event) {
        if (event.button !== 0 || finished) return;
        event.preventDefault();
        feedback.hidden = true;
        drawing = true;
        activeStroke = [pointerPosition(event)];
        strokes.push(activeStroke);
        canvas.setPointerCapture(event.pointerId);
        drawTracePoint(activeStroke[0]);
      }

      function continueStroke(event) {
        if (!drawing || finished || !activeStroke) return;
        event.preventDefault();
        const point = pointerPosition(event);
        const previous = activeStroke[activeStroke.length - 1];
        if (Math.hypot(point.x - previous.x, point.y - previous.y) < 1) return;
        activeStroke.push(point);
        drawTraceSegment(previous, point);
      }

      function endStroke(event) {
        if (!drawing) return;
        drawing = false;
        activeStroke = null;
        if (canvas.hasPointerCapture(event.pointerId)) canvas.releasePointerCapture(event.pointerId);
      }

      function pointToSegmentDistance(point, start, end) {
        const dx = end.x - start.x;
        const dy = end.y - start.y;
        const lengthSquared = (dx * dx) + (dy * dy);
        if (!lengthSquared) return Math.hypot(point.x - start.x, point.y - start.y);
        const progress = Math.max(0, Math.min(1, (((point.x - start.x) * dx) + ((point.y - start.y) * dy)) / lengthSquared));
        const nearestX = start.x + (dx * progress);
        const nearestY = start.y + (dy * progress);
        return Math.hypot(point.x - nearestX, point.y - nearestY);
      }

      function traceCoversPoint(point) {
        return strokes.some(stroke => {
          if (stroke.length === 1) {
            return Math.hypot(point.x - stroke[0].x, point.y - stroke[0].y) <= coverageRadius;
          }
          for (let index = 1; index < stroke.length; index += 1) {
            if (pointToSegmentDistance(point, stroke[index - 1], stroke[index]) <= coverageRadius) return true;
          }
          return false;
        });
      }

      function segmentCoverage(segment) {
        const length = Math.hypot(segment.end.x - segment.start.x, segment.end.y - segment.start.y);
        const sampleCount = Math.ceil(length / sampleSpacing);
        let covered = 0;
        for (let index = 0; index <= sampleCount; index += 1) {
          const progress = index / sampleCount;
          const point = {
            x: segment.start.x + ((segment.end.x - segment.start.x) * progress),
            y: segment.start.y + ((segment.end.y - segment.start.y) * progress)
          };
          if (traceCoversPoint(point)) covered += 1;
        }
        return covered / (sampleCount + 1);
      }

      function finishCranialGame() {
        if (finished) return;
        finished = true;
        drawing = false;
        activeStroke = null;
        setMinigameAutowin(null);
        submitButton.disabled = true;
        feedback.hidden = false;
        feedback.className = "cranial-feedback success";
        feedback.textContent = "The H pattern is covered. Extraocular movements are conjugate and complete.";
        playSfx("success");

        setTimeout(() => {
          if (!document.getElementById("cranialGame")) return;
          markCompleted("cranialNerveGame");
          addFinding("cranialNerves");
          closeModal();
          setMessage("Focused cranial nerve screen complete: visual fields are full, pupils are reactive, extraocular movements are intact, facial sensation and movement are symmetric, hearing is intact, palate elevation is symmetric, shoulder strength is full, and the tongue is midline.");
        }, 850);
      }

      function submitTrace() {
        if (finished) return;
        const coverage = targetSegments.map(segmentCoverage);
        const incompleteIndex = coverage.findIndex(value => value <= requiredCoverage);
        if (incompleteIndex === -1) {
          finishCranialGame();
          return;
        }

        feedback.hidden = false;
        feedback.className = "cranial-feedback warning";
        feedback.textContent = "Add more red tracing to the " + targetSegments[incompleteIndex].label + ", then submit again.";
        canvas.focus({ preventScroll: true });
      }

      canvas.addEventListener("pointerdown", beginStroke);
      canvas.addEventListener("pointermove", continueStroke);
      canvas.addEventListener("pointerup", endStroke);
      canvas.addEventListener("pointercancel", endStroke);
      submitButton.addEventListener("click", submitTrace);

      setMinigameAutowin(finishCranialGame);
      drawGuide();
      canvas.focus({ preventScroll: true });
    }

      }]));

      const boostPerClick = 20;
      const decayPerSecond = 8;

        <section class="modal-card sensory-card" id="sensoryGame" role="dialog" aria-modal="true" aria-labelledby="sensoryTitle">

          </div>

      `);

      const feedback = document.getElementById("sensoryFeedback");

      function renderSensoryMeters(now) {
        modalities.forEach(modality => {
          const meter = meters[modality.id];
          const value = Math.max(0, Math.min(100, meter.value));
          const lockedFor = Math.max(0, meter.lockedUntil - now);
          const column = document.getElementById("sensoryColumn-" + modality.id);
          const progress = document.getElementById("sensoryMeter-" + modality.id);
          document.getElementById("sensoryFill-" + modality.id).style.height = value + "%";
          document.getElementById("sensoryValue-" + modality.id).textContent = Math.round(value) + "%";
          document.getElementById("sensoryLock-" + modality.id).textContent = lockedFor > 0
            ? "LOCK " + (lockedFor / 1000).toFixed(1) + "s"
            : value > 0 ? "DECAYING" : "ACTIVE";
          column.classList.toggle("locked", lockedFor > 0);
          progress.setAttribute("aria-valuenow", String(Math.round(value)));
          progress.setAttribute("aria-valuetext", lockedFor > 0
            ? Math.round(value) + " percent, locked for " + (lockedFor / 1000).toFixed(1) + " seconds"
            : Math.round(value) + " percent");
        });
      }

      function finishSensoryGame() {
        if (finished) return;
        finished = true;
        if (state.sensoryFrame) {
          cancelAnimationFrame(state.sensoryFrame);
          state.sensoryFrame = null;
        }
        document.querySelectorAll("[data-sensory-tool]").forEach(button => { button.disabled = true; });
        feedback.className = "sensory-feedback success";
        feedback.textContent = "All five modalities are secured. The sensory examination is complete.";
        playSfx("success");

        setTimeout(() => {
          if (!document.getElementById("sensoryGame")) return;
          markCompleted("sensoryExam");
          addFinding("lightTouch");
          addFinding("dorsalColumn");
          addFinding("spinothalamic");
          logAction("Completed five-modality sensory examination");
          removeInventory("tuningFork");
          removeInventory("safetyPin");
          removeInventory("icePack");
          closeModal();
          setMessage("Sensory examination complete: light touch is perceived bilaterally; vibration and joint position are reduced on the left, while pinprick and cold are reduced on the right below the lower thoracic levels.");
        }, 850);
      }

      function checkSensoryWin() {
        if (modalities.every(modality => meters[modality.id].value >= 100)) finishSensoryGame();
      }

      function activateSensoryTool(toolId) {
        if (finished) return;
        const tool = toolById.get(toolId);
        if (!tool) return;
        const now = performance.now();

        if (!tool.modalityId) {
          modalities.forEach(modality => {
            const meter = meters[modality.id];
            if (meter.lockedUntil <= now) meter.value = Math.max(0, meter.value - distractorPenalty);
          });
          feedback.className = "sensory-feedback penalty";
          feedback.textContent = tool.response + " Unlocked meters lose " + distractorPenalty + "%.";
          renderSensoryMeters(now);
          return;
        }

        const modality = modalities.find(item => item.id === tool.modalityId);
        const meter = meters[tool.modalityId];
        if (meter.lockedUntil > now) {
          feedback.className = "sensory-feedback";
          feedback.textContent = modality.label + " is locked at 100%. Switch to another modality.";
          return;
        }

        meter.value = Math.min(100, meter.value + boostPerClick);
        feedback.className = "sensory-feedback";
        feedback.textContent = tool.response;
        if (meter.value >= 100) {
          meter.value = 100;
          meter.lockedUntil = now + lockDuration;
          feedback.className = "sensory-feedback success";
          feedback.textContent = modality.label + " secured for five seconds. Switch modalities.";
          playSfx("success");
        }
        renderSensoryMeters(now);
        checkSensoryWin();
      }

      function sensoryTick(frameTime) {
        if (finished) return;
        if (lastFrameTime === null) lastFrameTime = frameTime;
        const elapsedSeconds = Math.min((frameTime - lastFrameTime) / 1000, 0.1);
        lastFrameTime = frameTime;

        modalities.forEach(modality => {
          const meter = meters[modality.id];
          if (meter.lockedUntil > frameTime) {
            meter.value = 100;
            return;
          }
          if (meter.lockedUntil) meter.lockedUntil = 0;
          meter.value = Math.max(0, meter.value - decayPerSecond * elapsedSeconds);
        });
        renderSensoryMeters(frameTime);
        state.sensoryFrame = requestAnimationFrame(sensoryTick);
      }

      document.querySelectorAll("[data-sensory-tool]").forEach(button => {
        button.addEventListener("pointerdown", event => {
          if (event.button !== 0) return;
          event.preventDefault();
          activateSensoryTool(button.dataset.sensoryTool);
        });
        button.addEventListener("keydown", event => {
          if (event.repeat || (event.key !== "Enter" && event.key !== " ")) return;
          event.preventDefault();
          activateSensoryTool(button.dataset.sensoryTool);
        });
      });

      setMinigameAutowin(finishSensoryGame);
      renderSensoryMeters(performance.now());
      state.sensoryFrame = requestAnimationFrame(sensoryTick);
      document.querySelector("[data-sensory-tool]").focus();
    }
