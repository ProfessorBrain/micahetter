        return;
      }
      if (id === "ct") {
        if (!has(state.completed, "ctSafety")) {
          setMessage("Imaging order requires localization. Select THINK to start the imaging puzzle.");
          return;
        }
        openMRI();
        return;
      }
      if (id === "phone") {
        if (!finalReady()) {
          setMessage("You lift the wall phone, but the attending requests a confirmed imaging diagnosis before the big call.");
          return;
        }
        setMessage("You present the final diagnosis and disposition. Case 01 is complete.");
        return;
      }
      if (id === "door") {
        setMessage("The ward door is locked. Future specialty rooms are not available yet.");
      }
    }

    function inventoryName(itemId) {
      return inventoryCatalog[itemId] ? inventoryCatalog[itemId][0] : "That item";
    }

    function genericInventoryUse(itemId, hotspotId) {
      setMessage(inventoryName(itemId) + " is not useful with the " + (hotspotLabels[hotspotId] || "hotspot") + ".");
    }

    function handleInventoryUse(itemId, hotspotId) {
      if (!itemId || !has(state.inventory, itemId)) return;

      if (hotspotId === "door") {
        setMessage("Using " + inventoryName(itemId) + " on the ward door has no effect. Future specialty rooms are not available yet.");
        return;
      }

      if (hotspotId === "phone") {
        if (finalReady()) {
          setMessage("You bring the confirmed diagnosis to the attending phone. Case 01 is complete.");
        } else {
          setMessage("The attending wants a confirmed diagnosis from the imaging report first.");
        }
        return;
      }

      if (itemId === "soapRefill") {
        if (hotspotId === "sink") {
          installSoapRefill();
          removeInventory(itemId);
          return;
        }
        if (hotspotId === "patient") {
          setMessage("The patient declines to be examined with a soap cartridge. Try the sink.");
          return;
        }
      }

      if (itemId === "phoneCharger") {
        if (hotspotId === "cart") {
          if (!has(state.completed, "outletRevealed")) {
            markCompleted("outletRevealed");
            setMessage("You move the cart and reveal an outlet. Connect the charger to the phone.");
            return;
          }
          markCompleted("phoneCharged");
          addInventory("patientPhone");
          addFinding("collateralPhone");
          removeInventory(itemId);
          setMessage("You route the charger from the outlet to the bedside phone. The phone powers on and displays a walking video: the left foot catches and drags.");
          return;
        }
        if (hotspotId === "bedsideTable") {
          if (!has(state.completed, "outletRevealed")) {
            setMessage("The charger fits the phone, but the battery needs power. Move the exam cart to find the outlet.");
            return;
          }
          markCompleted("phoneCharged");
          addInventory("patientPhone");
          addFinding("collateralPhone");
          removeInventory(itemId);
          setMessage("You connect the charger to the bedside phone. The walking video shows the left foot catching and dragging.");
          return;
        }
      }

      if (itemId === "patientPhone") {
        if (hotspotId === "patient") {
          addFinding("collateralPhone");
          removeInventory(itemId);
          setMessage("The video shows left-foot catching that has progressed from stairs to flat ground. Collateral history is now charted.");
          return;
        }
      }

      if (itemId === "hammer") {
        if (hotspotId === "patient") {
          if (!requireHandHygiene()) return;
          runExam("reflex");
          return;
        }
        if (hotspotId === "cabinet") {
          setMessage("Use the reflex hammer on the patient, not the cabinet.");
          return;
        }
      }

      if (itemId === "tuningFork") {
        if (hotspotId === "patient") {
          if (!requireHandHygiene()) return;
          openSensoryGame();
          return;
        }
      }

      if (itemId === "neurotip" || itemId === "coldPack") {
        if (hotspotId === "patient") {
          if (!requireHandHygiene()) return;
          openSensoryGame();
          return;
        }
      }

      if (itemId === "coldPack") {
        if (hotspotId === "sink") {
          setMessage("The cold pack is not useful at the sink.");
          return;
        }
      }

      if (hotspotId === "ct") {
        if (!has(state.findings, "localization")) {
          setMessage("Imaging order requires localization before MRI review.");
          return;
        }
        if (!has(state.completed, "ctSafety")) {
          openQuiz("ctSafety");
          return;
        }
        openMRI();
        return;
      }

      genericInventoryUse(itemId, hotspotId);
    }

    function setInventoryDragTarget(target) {
      if (inventoryDrag.target === target) return;
      if (inventoryDrag.target) inventoryDrag.target.classList.remove("drop-target");
      inventoryDrag.target = target;
      if (inventoryDrag.target) inventoryDrag.target.classList.add("drop-target");
    }

    function hotspotFromPoint(x, y) {
      const element = document.elementFromPoint(x, y);
      return element ? element.closest("[data-hotspot]") : null;
    }

    function positionDragGhost(x, y) {
      const ghost = document.getElementById("dragGhost");
      ghost.style.left = x + "px";
      ghost.style.top = y + "px";
    }

    function startInventoryDragVisuals(itemId, source, x, y) {
      inventoryDrag.active = true;
      inventoryDrag.itemId = itemId;
      inventoryDrag.source = source;
      source.classList.add("dragging");
      document.querySelector(".game-root").classList.add("inventory-dragging");
      const ghost = document.getElementById("dragGhost");
      ghost.textContent = inventoryName(itemId);
      ghost.classList.add("visible");
      positionDragGhost(x, y);
    }

    function clearInventoryDragVisuals() {
      document.querySelector(".game-root").classList.remove("inventory-dragging");
      document.querySelectorAll(".inventory-item.dragging").forEach(item => item.classList.remove("dragging"));
      document.querySelectorAll(".hotspot.drop-target").forEach(item => item.classList.remove("drop-target"));
      const ghost = document.getElementById("dragGhost");
      ghost.classList.remove("visible");
      ghost.textContent = "";
      inventoryDrag.target = null;
    }

    function resetInventoryPointerDrag() {
      inventoryDrag.itemId = "";
      inventoryDrag.pointerId = null;
      inventoryDrag.source = null;
      inventoryDrag.startX = 0;
      inventoryDrag.startY = 0;
      inventoryDrag.active = false;
    }

    function beginInventoryPointer(event, itemId, source) {
      if (event.button !== undefined && event.button !== 0) return;
      inventoryDrag.itemId = itemId;
      inventoryDrag.pointerId = event.pointerId;
      inventoryDrag.source = source;
      inventoryDrag.startX = event.clientX;
      inventoryDrag.startY = event.clientY;
      inventoryDrag.active = false;
      source.setPointerCapture?.(event.pointerId);
      document.addEventListener("pointermove", moveInventoryPointer, { passive: false });
      document.addEventListener("pointerup", endInventoryPointer, { passive: false });
      document.addEventListener("pointercancel", cancelInventoryPointer, { passive: false });
    }

    function moveInventoryPointer(event) {
      if (event.pointerId !== inventoryDrag.pointerId || !inventoryDrag.itemId) return;
      const distance = Math.hypot(event.clientX - inventoryDrag.startX, event.clientY - inventoryDrag.startY);
      if (!inventoryDrag.active && distance < 6) return;
      event.preventDefault();
      if (!inventoryDrag.active) {
        startInventoryDragVisuals(inventoryDrag.itemId, inventoryDrag.source, event.clientX, event.clientY);
      }
      positionDragGhost(event.clientX, event.clientY);
      setInventoryDragTarget(hotspotFromPoint(event.clientX, event.clientY));
    }

    function endInventoryPointer(event) {
      if (event.pointerId !== inventoryDrag.pointerId) return;
      document.removeEventListener("pointermove", moveInventoryPointer);
      document.removeEventListener("pointerup", endInventoryPointer);
      document.removeEventListener("pointercancel", cancelInventoryPointer);
      const itemId = inventoryDrag.itemId;
      const target = inventoryDrag.active ? hotspotFromPoint(event.clientX, event.clientY) : null;
      if (inventoryDrag.active) {
        event.preventDefault();
        inventoryDrag.suppressClick = true;
        setTimeout(() => { inventoryDrag.suppressClick = false; }, 0);
        clearInventoryDragVisuals();
        if (target) handleInventoryUse(itemId, target.dataset.hotspot);
        else setMessage("You keep " + inventoryName(itemId) + " in the inventory shelf.");
      }
      resetInventoryPointerDrag();
    }

    function cancelInventoryPointer() {
      document.removeEventListener("pointermove", moveInventoryPointer);
      document.removeEventListener("pointerup", endInventoryPointer);
      document.removeEventListener("pointercancel", cancelInventoryPointer);
      clearInventoryDragVisuals();
      resetInventoryPointerDrag();
    }

    function beginNativeInventoryDrag(event, itemId, source) {
      inventoryDrag.itemId = itemId;
      inventoryDrag.source = source;
      inventoryDrag.suppressClick = true;
      event.dataTransfer.effectAllowed = "move";
      event.dataTransfer.setData("text/plain", itemId);
      startInventoryDragVisuals(itemId, source, event.clientX || inventoryDrag.startX, event.clientY || inventoryDrag.startY);
      setTimeout(() => { inventoryDrag.suppressClick = false; }, 0);
    }

    function handleHotspot(id) {
      if (state.mode === "grab") {
        handleGrab(id);
        return;
      }

      if (id === "patient") {
        if (state.mode === "talk") {
          openPatientHistory();
          return;
        }
        if (state.mode === "think") {
          requestPhysicalExam();
          return;
        }
        if (state.mode === "auscultate") {
          if (!requireHandHygiene()) return;
          addFinding("auscultation");
          setMessage("You auscultate the patient. Heart rhythm is regular and lungs are clear; this does not explain the progressive long-tract findings.");
          return;
        }
        setMessage("The patient is awake and worried about progressive left-leg weakness.");
        return;
      }

      if (state.mode === "auscultate") {
        setMessage("Use the stethoscope on the patient to auscultate.");
        return;
      }

      if (id === "bedsideTable") {
        if (state.mode === "talk") {
          setMessage("The bedside table holds a phone with a dead battery.");
          return;
        }
        if (state.mode === "think") {
          setMessage("Collateral history is locked until the phone is charged. Find power, then review the walking video.");
          return;
        }
        setMessage("An uncharged patient phone is on the bedside table. It may contain useful collateral history.");
        return;
      }

      if (id === "belongings") {
        if (state.mode === "talk") {
          setMessage("The patient says, \"My charger might be in there.\"");
          return;
        }
        if (state.mode === "think") {
          setMessage("The phone needs power before collateral history is available. Check the belongings bag for a charger.");
          return;
        }
        setMessage("A coat and leather bag sit on the chair. Select GRAB to search them for the phone charger.");
        return;
      }

      if (id === "sink") {
        if (state.mode === "talk") {
          setMessage("Use the sink for hand hygiene before the exam.");
          return;
        }
        if (state.mode === "think") {
          setMessage(has(state.completed, "soapInstalled")
            ? "Soap and water are available for hand hygiene before the neurologic exam."
            : "The dispenser is empty. Search the supply cabinet for a refill.");
          return;
        }
        washHands();
        return;
      }

      if (id === "cart") {
        if (state.mode === "think") {
          if (!has(state.completed, "examTools")) openCartQuiz();
          else {
            markCompleted("outletRevealed");
            setMessage("The exam cart is open. Reflex hammer and tuning fork are available; an outlet is visible behind the cart.");
          }
          return;
        }
        setMessage("The exam cart has tools inside, a rapid-fire quiz lock on its screen, and possibly an outlet behind it. This is a THINK or GRAB problem.");
        return;
      }

      if (id === "monitor") {
        addFinding("vitals");
        setMessage("The monitor shows stable vitals. Useful, but the mystery is written in long tracts.");
        return;
      }

      if (id === "cabinet") {
        if (!has(state.completed, "soapRefillFound")) {
          setMessage("The cabinet contains supply jars. Use GRAB to search for the soap refill.");
          return;
        }
        if (state.mode === "think") {
          if (!has(state.completed, "cabinet")) openQuiz("cabinet");
          else setMessage("The cabinet is open. Neurotip and cold pack are ready for spinothalamic testing.");
          return;
        }
        setMessage("The cabinet has a deeper drawer with a keypad. Select THINK to solve it.");
        return;
      }

      if (id === "ct") {
        if (!has(state.findings, "localization")) {
          setMessage("The imaging software displays: Localize first.");
          return;
        }
        if (state.mode === "think") {
          if (!has(state.completed, "ctSafety")) {
            openQuiz("ctSafety");
            return;
          }
          openMRI();
          return;
        }
        setMessage("Use THINK on the imaging software to make a localization-driven imaging decision.");
        return;
      }

      if (id === "phone") {
        if (!finalReady()) {
          setMessage("The attending says over the wall phone: 'Bring me the confirmed diagnosis from the imaging report.'");
          return;
        }
        setMessage("You present the final diagnosis and disposition. Case 01 is complete.");
        return;
      }

      if (id === "door") {
        setMessage("Future specialty rooms are not available yet.");
      }
    }

    function openExam() {
      const examButtons = [
        ["motor", "Motor Strength", "Check left-leg pyramidal weakness."],
        ["reflex", "Patellar Reflex", "Test the left knee jerk with the reflex hammer."],
        ["sensory", "Sensory Testing", "Test five modalities before the meters decay."],
        ["sensoryLevel", "Sensory Level", "Mark where sensation normalizes."],
        ["localization", "Localize Lesion", "Combine tracts into one cord lesion."]
      ];

      openModal(`
        <section class="modal-card" role="dialog" aria-modal="true">
          <div class="modal-header"><h2>Bedside Neuro Exam</h2><button type="button" data-close aria-label="Close">X</button></div>
          <p>Pick focused maneuvers. Normal findings matter; crossed findings matter more.</p>
          <div class="exam-grid">
            ${examButtons.map(([id, label, detail]) => {
              const sensoryDone = id === "sensory" && ["lightTouch", "dorsalColumn", "spinothalamic"].every(findingId => has(state.findings, findingId));
              const findingId = id === "motor" ? "motorWeakness" : id === "reflex" ? "reflexes" : id;
              const done = sensoryDone || has(state.findings, findingId) ? " done" : "";
              return `<button type="button" class="exam-card${done}" data-exam="${id}"><strong>${label}</strong><span>${detail}</span></button>`;
            }).join("")}
          </div>
        </section>
      `);

      document.querySelectorAll("[data-exam]").forEach(button => {
        button.addEventListener("click", () => runExam(button.dataset.exam));
      });
    }

    function runExam(exam) {
      if (!requireHandHygiene()) {
        closeModal();
        return;
      }

      if (exam === "motor") openTiming({
        title: "Left-Leg Strength Timing",
        prompt: "Catch the effort while the marker crosses the gold zone. Three clean observations document true weakness rather than hallway wobble.",
        zoneStart: 58,
        zoneEnd: 75,
        successText: "Left ankle dorsiflexion and hip flexion are weak; the arms and right leg stay strong.",
        onSuccess: () => {
          addFinding("motorWeakness");
          setMessage("Left-leg UMN weakness is documented, supporting corticospinal tract involvement.");
        }
      });
      if (exam === "reflex") {
        if (!has(state.inventory, "hammer")) {
          setMessage("Find the reflex hammer before testing reflexes.");
          closeModal();
          return;
        }
        openReflexGame();
      }
      if (exam === "sensory") openSensoryGame();
      if (exam === "sensoryLevel") {
        openSensoryLevel();
      }
      if (exam === "localization") {
        openLocalization();
      }
    }

    function openSensoryGame() {
      if (has(state.completed, "sensoryExam")) {
        setMessage("The five-modality sensory examination is already documented in the chart.");
        closeModal();
        return;
      }

      const requiredTools = ["tuningFork", "neurotip", "coldPack"];
      const missingTools = requiredTools.filter(id => !has(state.inventory, id));
      if (missingTools.length) {
        setMessage("Sensory testing requires the tuning fork from the exam cart plus the disposable neurotip and cold pack from the supply cabinet.");
        closeModal();
        return;
      }

      const modalities = [
        {
          id: "lightTouch",
          label: "Light touch",
          icon: "&#129718;",
          toolLabel: "Feather",
          color: "#4b9b91",
          response: "Feather applied lightly: the patient reports touch on both sides."
        },
        {
          id: "vibration",
          label: "Vibration",
          icon: "&#127925;",
          toolLabel: "Tuning fork",
          color: "#c4912f",
          response: "The vibrating fork is placed on a bony prominence and compared side to side."
        },
        {
          id: "pain",
          label: "Pain",
          icon: "&#128205;",
          toolLabel: "Neurotip",
          color: "#a63f4e",
          response: "The disposable neurotip tests pinprick with a safe, consistent stimulus."
        },
        {
          id: "temperature",
          label: "Temperature",
          icon: "&#129482;",
          toolLabel: "Cold stimulus",
          color: "#397eb0",
          response: "The cold stimulus is compared at matching points on both sides."
        },
        {
          id: "proprioception",
          label: "Position",
          icon: "&#129462;&#8597;",
          toolLabel: "Great toe",
          color: "#567f4b",
          response: "The great toe is held by its sides and moved slightly up or down with the patient's eyes closed."
        }
      ];

      const distractors = [
        {
          id: "apple",
          label: "Apple",
          icon: "&#127822;",
          response: "An apple can test appetite, but it is not a standardized sensory stimulus."
        },
        {
          id: "spoon",
          label: "Spoon",
          icon: "&#129348;",
          response: "A spoon does not isolate any of the five sensory modalities."
        },
        {
          id: "rubberBand",
          label: "Rubber band",
          icon: "&#10160;",
          response: "A snapped rubber band is neither calibrated nor appropriate bedside sensory testing."
        }
      ];

      const sensoryTools = modalities.map(modality => ({
        id: modality.id,
        label: modality.toolLabel,
        icon: modality.icon,
        modalityId: modality.id,
        response: modality.response
      })).concat(distractors.map(tool => ({ ...tool, modalityId: null })));

      for (let index = sensoryTools.length - 1; index > 0; index -= 1) {
        const swapIndex = Math.floor(Math.random() * (index + 1));
        [sensoryTools[index], sensoryTools[swapIndex]] = [sensoryTools[swapIndex], sensoryTools[index]];
      }

      const meters = Object.fromEntries(modalities.map(modality => [modality.id, {
        value: 0,
        lockedUntil: 0
      }]));
      const toolById = new Map(sensoryTools.map(tool => [tool.id, tool]));
      const boostPerClick = 20;
      const decayPerSecond = 8;
      const lockDuration = 5000;
      const distractorPenalty = 9;
      let finished = false;
      let lastFrameTime = null;

      openModal(`
        <section class="modal-card sensory-card" id="sensoryGame" role="dialog" aria-modal="true" aria-labelledby="sensoryTitle">
          <div class="modal-header"><h2 id="sensoryTitle">Five-Modality Sensory Testing</h2><button type="button" data-close aria-label="Close">X</button></div>
          <p>Build every modality to 100% at the same time. A full meter locks briefly; unlocked meters steadily decay.</p>
          <div class="sensory-board">
            <div class="sensory-meters">
              ${modalities.map(modality => `
                <section class="sensory-column" id="sensoryColumn-${modality.id}" style="--meter-color:${modality.color}">
                  <strong>${modality.label}</strong>
                  <div class="sensory-meter" id="sensoryMeter-${modality.id}" role="progressbar" aria-label="${modality.label}" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
                    <span class="sensory-fill" id="sensoryFill-${modality.id}"></span>
                    <span class="sensory-value" id="sensoryValue-${modality.id}">0%</span>
                  </div>
                  <span class="sensory-lock" id="sensoryLock-${modality.id}">ACTIVE</span>
                </section>
              `).join("")}
            </div>
            <div class="sensory-tools" aria-label="Sensory testing tools">
              ${sensoryTools.map(tool => `
                <button type="button" class="sensory-tool" data-sensory-tool="${tool.id}" aria-label="Use ${tool.label}" title="${tool.label}">
                  <span class="sensory-tool-icon" aria-hidden="true">${tool.icon}</span>
                  <span class="sensory-tool-label">${tool.label}</span>
                </button>
              `).join("")}
            </div>
            <p class="sensory-feedback" id="sensoryFeedback" aria-live="polite">Choose a bedside stimulus and work quickly across all five modalities.</p>
          </div>
        </section>
      `);

      const feedback = document.getElementById("sensoryFeedback");

      function renderSensoryMeters(now) {
        modalities.forEach(modality => {
          const meter = meters[modality.id];
          const value = Math.max(0, Math.min(100, meter.value));
          const lockedFor = Math.max(0, meter.lockedUntil - now);
          const column = document.getElementById("sensoryColumn-" + modality.id);
          const progress = document.getElementById("sensoryMeter-" + modality.id);
          document.getElementById("sensoryFill-" + modality.id).style.height = value + "%";
          document.getElementById("sensoryValue-" + modality.id).textContent = Math.round(value) + "%";
          document.getElementById("sensoryLock-" + modality.id).textContent = lockedFor > 0
            ? "LOCK " + (lockedFor / 1000).toFixed(1) + "s"
            : value > 0 ? "DECAYING" : "ACTIVE";
          column.classList.toggle("locked", lockedFor > 0);
          progress.setAttribute("aria-valuenow", String(Math.round(value)));
          progress.setAttribute("aria-valuetext", lockedFor > 0
            ? Math.round(value) + " percent, locked for " + (lockedFor / 1000).toFixed(1) + " seconds"
            : Math.round(value) + " percent");
        });
      }

      function finishSensoryGame() {
        if (finished) return;
        finished = true;
        if (state.sensoryFrame) {
          cancelAnimationFrame(state.sensoryFrame);
          state.sensoryFrame = null;
        }
        document.querySelectorAll("[data-sensory-tool]").forEach(button => { button.disabled = true; });
        feedback.className = "sensory-feedback success";
        feedback.textContent = "All five modalities are secured. The sensory examination is complete.";
        playSfx("success");

        setTimeout(() => {
          if (!document.getElementById("sensoryGame")) return;
          markCompleted("sensoryExam");
          addFinding("lightTouch");
          addFinding("dorsalColumn");
          addFinding("spinothalamic");
          logAction("Completed five-modality sensory examination");
          removeInventory("tuningFork");
          removeInventory("neurotip");
          removeInventory("coldPack");
          closeModal();
          setMessage("Sensory examination complete: light touch is perceived bilaterally; vibration and joint position are reduced on the left, while pinprick and cold are reduced on the right below the lower thoracic levels.");
        }, 850);
      }

      function checkSensoryWin() {
        if (modalities.every(modality => meters[modality.id].value >= 100)) finishSensoryGame();
      }

      function activateSensoryTool(toolId) {
        if (finished) return;
        const tool = toolById.get(toolId);
        if (!tool) return;
        const now = performance.now();

        if (!tool.modalityId) {
          modalities.forEach(modality => {
            const meter = meters[modality.id];
            if (meter.lockedUntil <= now) meter.value = Math.max(0, meter.value - distractorPenalty);
          });
          feedback.className = "sensory-feedback penalty";
          feedback.textContent = tool.response + " Unlocked meters lose " + distractorPenalty + "%.";
          renderSensoryMeters(now);
          return;
        }

        const modality = modalities.find(item => item.id === tool.modalityId);
        const meter = meters[tool.modalityId];
        if (meter.lockedUntil > now) {
          feedback.className = "sensory-feedback";
          feedback.textContent = modality.label + " is locked at 100%. Switch to another modality.";
          return;
        }

        meter.value = Math.min(100, meter.value + boostPerClick);
        feedback.className = "sensory-feedback";
        feedback.textContent = tool.response;
        if (meter.value >= 100) {
          meter.value = 100;
          meter.lockedUntil = now + lockDuration;
          feedback.className = "sensory-feedback success";
          feedback.textContent = modality.label + " secured for five seconds. Switch modalities.";
          playSfx("success");
        }
        renderSensoryMeters(now);
        checkSensoryWin();
      }

      function sensoryTick(frameTime) {
        if (finished) return;
        if (lastFrameTime === null) lastFrameTime = frameTime;
        const elapsedSeconds = Math.min((frameTime - lastFrameTime) / 1000, 0.1);
        lastFrameTime = frameTime;

        modalities.forEach(modality => {
          const meter = meters[modality.id];
          if (meter.lockedUntil > frameTime) {
            meter.value = 100;
            return;
          }
          if (meter.lockedUntil) meter.lockedUntil = 0;
          meter.value = Math.max(0, meter.value - decayPerSecond * elapsedSeconds);
        });
        renderSensoryMeters(frameTime);
        state.sensoryFrame = requestAnimationFrame(sensoryTick);
      }

      document.querySelectorAll("[data-sensory-tool]").forEach(button => {
        button.addEventListener("pointerdown", event => {
          if (event.button !== 0) return;
          event.preventDefault();
          activateSensoryTool(button.dataset.sensoryTool);
        });
        button.addEventListener("keydown", event => {
          if (event.repeat || (event.key !== "Enter" && event.key !== " ")) return;
          event.preventDefault();
          activateSensoryTool(button.dataset.sensoryTool);
        });
      });

      renderSensoryMeters(performance.now());
      state.sensoryFrame = requestAnimationFrame(sensoryTick);
      document.querySelector("[data-sensory-tool]").focus();
    }

    function openSensoryLevel() {
      if (!has(state.findings, "dorsalColumn") || !has(state.findings, "spinothalamic")) {
        setMessage("Map dorsal-column and pain-temperature findings before placing the sensory level.");
        closeModal();
        return;
      }

      openModal(`
        <section class="modal-card mini-card" role="dialog" aria-modal="true">
          <div class="modal-header"><h2>Sensory-Level Marker</h2><button type="button" data-close aria-label="Close">X</button></div>
          <p>Place the clinically useful marker for this case.</p>
          <div class="option-stack">
            <button type="button" class="option" data-level="tooHigh">C5: above the arms</button>
            <button type="button" class="option" data-level="correct">T8 left dorsal-column level, with right pain-temperature change around T10</button>
            <button type="button" class="option" data-level="tooLow">L5: isolated foot-level deficit</button>
            <button type="button" class="option" data-level="wrong">No sensory level</button>
          </div>
          <p class="hint" id="levelHint" style="display:none"></p>
        </section>
      `);

      document.querySelectorAll("[data-level]").forEach(button => {
        button.addEventListener("click", () => {
          if (button.dataset.level === "correct") {
            addFinding("sensoryLevel");
            setMessage("A thoracic sensory level is charted. The one-to-two-level spinothalamic offset supports hemicord localization.");
            closeModal();
          } else {
            const hint = document.getElementById("levelHint");
            hint.textContent = button.dataset.level === "tooHigh"
              ? "The arms and face are normal, so the lesion is not above the upper limb pathways."
              : button.dataset.level === "tooLow"
                ? "The abnormality begins on the trunk, not just the foot."
                : "A sensory level is present and is central to localizing the cord.";
            hint.style.display = "block";
          }
        });
      });
    }

    function openLocalization() {
      const ready = ["motorWeakness", "reflexes", "dorsalColumn", "spinothalamic", "sensoryLevel"].every(id => has(state.findings, id));
      if (!ready) {
        setMessage("Finish motor, reflex, dorsal-column, spinothalamic, and sensory-level findings before localizing.");
        closeModal();
        return;
      }

      openModal(`
        <section class="modal-card mini-card" role="dialog" aria-modal="true">
          <div class="modal-header"><h2>Localization Lock</h2><button type="button" data-close aria-label="Close">X</button></div>
          <p>Make every clue explain one lesion.</p>
          <div class="option-stack">
            <button type="button" class="option" data-localize="brain">Right cortical hemisphere</button>
            <button type="button" class="option" data-localize="root">Left lumbosacral root</button>
            <button type="button" class="option" data-localize="correct">Left thoracic hemicord</button>
            <button type="button" class="option" data-localize="nerve">Peripheral neuropathy</button>
          </div>
          <p class="hint" id="localizeHint" style="display:none"></p>
        </section>
      `);

      document.querySelectorAll("[data-localize]").forEach(button => {
        button.addEventListener("click", () => {
          if (button.dataset.localize === "correct") {
            addFinding("localization");
            setMessage("Localization solved: left thoracic hemicord. Left corticospinal and dorsal-column findings plus right spinothalamic loss indicate one lesion.");
            closeModal();
          } else {
            const hint = document.getElementById("localizeHint");
            hint.textContent = "The normal arms and face, thoracic level, ipsilateral UMN/dorsal-column loss, and contralateral pain-temperature loss point to hemicord.";
            hint.style.display = "block";
          }
        });
      });
    }

    function reflexContactAt(position) {
      if (position < 22) {
        return "You struck the distal quadriceps above the knee. Muscle is not the patellar tendon.";
      }
      if (position < 33) {
        return "You tapped the patella itself. Move just inferior to the kneecap to find the tendon.";
      }
      if (position <= 40) {
        return "Patellar tendon";
      }
      if (position < 50) {
        return "You struck the tibial tuberosity, the bony insertion below the tendon.";
      }
      if (position < 76) {
        return "You tapped the tibial shaft, commonly called the shin.";
      }
      return "You reached the ankle and foot, well below the knee reflex arc.";
    }

    function openReflexGame() {
      let direction = 1;
      let hitStreak = 0;
      let missStreak = 0;
      let strikeLocked = false;
      let lastFrameTime = null;

      state.timingMarker = 12;
      state.timingHits = 0;
      openModal(`
        <section class="modal-card reflex-card" role="dialog" aria-modal="true" aria-labelledby="reflexTitle">
          <div class="modal-header"><h2 id="reflexTitle">Patellar Reflex</h2><button type="button" data-close aria-label="Close">X</button></div>
          <p>Click when the moving hammer is aligned with the patellar tendon. Three accurate strikes in a row document the reflex; three consecutive misses end the attempt.</p>
          <div class="reflex-layout">
            <button type="button" class="reflex-stage" id="reflexStage" aria-label="Strike when the hammer aligns with the patellar tendon">
              <img class="reflex-leg" src="assets/reflex-leg.png" alt="Anterior view of the patient's left leg">
              <span class="reflex-target" id="reflexTarget" aria-hidden="true"><span>Patellar tendon</span></span>
              <span class="reflex-hammer" id="reflexHammer" aria-hidden="true"><span class="reflex-hammer-icon">&#128296;</span></span>
            </button>
            <section class="reflex-controls">
              <div class="reflex-streaks">
                <div class="reflex-streak">
                  <strong>Hit streak</strong>
                  <div class="reflex-pips reflex-hit-pips" id="reflexHitPips"><span></span><span></span><span></span></div>
                </div>
                <div class="reflex-streak">
                  <strong>Miss streak</strong>
                  <div class="reflex-pips reflex-miss-pips" id="reflexMissPips"><span></span><span></span><span></span></div>
                </div>
              </div>
              <p class="reflex-feedback" id="reflexFeedback" aria-live="polite">Follow the hammer vertically and strike as its head crosses the tendon just below the patella.</p>
              <button type="button" class="primary-action reflex-strike-button" id="reflexStrike">Strike &#128296;</button>
            </section>
          </div>
        </section>
      `);

      const hammer = document.getElementById("reflexHammer");
      const stage = document.getElementById("reflexStage");
      const target = document.getElementById("reflexTarget");
      const strikeButton = document.getElementById("reflexStrike");
      const feedback = document.getElementById("reflexFeedback");

      function renderReflexStreaks() {
        document.querySelectorAll("#reflexHitPips span").forEach((pip, index) => pip.classList.toggle("lit", index < hitStreak));
        document.querySelectorAll("#reflexMissPips span").forEach((pip, index) => pip.classList.toggle("lit", index < missStreak));
      }

      function stopReflexMotion() {
        if (state.timingFrame) {
          cancelAnimationFrame(state.timingFrame);
          state.timingFrame = null;
        }
        stage.disabled = true;
        strikeButton.disabled = true;
      }

      function measureReflexStrike() {
        const hammerRect = hammer.getBoundingClientRect();
        const targetRect = target.getBoundingClientRect();
        const stageRect = stage.getBoundingClientRect();
        const indicatorY = hammerRect.top + (hammerRect.height / 2);
        const trackTop = stageRect.top + stage.clientTop;
        const position = ((indicatorY - trackTop) / stage.clientHeight) * 100;

        return {
          position,
          accurate: indicatorY >= targetRect.top && indicatorY <= targetRect.bottom
        };
      }

      function finishReflexSuccess() {
        stopReflexMotion();
        feedback.className = "reflex-feedback hit";
        feedback.textContent = "Patellar tendon again. Three brisk responses in a row document left patellar hyperreflexia.";
        strikeButton.textContent = "Reflex documented";
        setTimeout(() => {
          if (!document.getElementById("reflexStage")) return;
          addFinding("reflexes");
          removeInventory("hammer");
          closeModal();
          setMessage("Repeated left patellar tendon strikes produce a brisk knee jerk, supporting corticospinal tract involvement.");
        }, 900);
      }

      function finishReflexFailure(lastContact) {
        stopReflexMotion();
        feedback.className = "reflex-feedback miss";
        feedback.textContent = lastContact + " Three misses in a row end this attempt.";
        strikeButton.textContent = "Attempt ended";
        setTimeout(() => {
          if (!document.getElementById("reflexStage")) return;
          closeModal();
          setMessage("\"Maybe try again later,\" the patient says. The reflex hammer remains available for another attempt.");
        }, 1150);
      }

      function strikeReflex() {
        if (strikeLocked || stage.disabled) return;
        strikeLocked = true;
        setTimeout(() => { strikeLocked = false; }, 240);

        const strike = measureReflexStrike();
        state.timingMarker = strike.position;
        const contact = reflexContactAt(strike.position);
        const accurate = strike.accurate;
        if (accurate) {
          hitStreak += 1;
          missStreak = 0;
          state.timingHits = hitStreak;
          feedback.className = "reflex-feedback hit";
          feedback.textContent = "Patellar tendon. The left lower leg extends briskly. Hit streak " + hitStreak + " of 3.";
          playSfx("success");
          renderReflexStreaks();
          if (hitStreak >= 3) finishReflexSuccess();
          return;
        }

        missStreak += 1;
        hitStreak = 0;
        state.timingHits = 0;
        feedback.className = "reflex-feedback miss";
        feedback.textContent = contact + " Miss streak " + missStreak + " of 3.";
        renderReflexStreaks();
        if (missStreak >= 3) finishReflexFailure(contact);
      }

      function moveReflexHammer(frameTime) {
        if (lastFrameTime === null) lastFrameTime = frameTime;
        const elapsedSeconds = Math.min((frameTime - lastFrameTime) / 1000, 0.1);
        lastFrameTime = frameTime;
        state.timingMarker += direction * 32.5 * elapsedSeconds;
        if (state.timingMarker >= 88) {
          state.timingMarker = 88;
          direction = -1;
        } else if (state.timingMarker <= 10) {
          state.timingMarker = 10;
          direction = 1;
        }
        hammer.style.top = state.timingMarker + "%";
        state.timingFrame = requestAnimationFrame(moveReflexHammer);
      }

      function strikeFromPointer(event) {
        event.preventDefault();
        strikeReflex();
      }

      function strikeFromKeyboard(event) {
        if (event.key !== "Enter" && event.key !== " ") return;
        event.preventDefault();
        strikeReflex();
      }

      hammer.style.top = state.timingMarker + "%";
      state.timingFrame = requestAnimationFrame(moveReflexHammer);

      stage.addEventListener("pointerdown", strikeFromPointer);
      strikeButton.addEventListener("pointerdown", strikeFromPointer);
      stage.addEventListener("keydown", strikeFromKeyboard);
      strikeButton.addEventListener("keydown", strikeFromKeyboard);
      strikeButton.focus();
    }

    function openTiming(config) {
      state.timingMarker = 0;
      state.timingHits = 0;
      openModal(`
        <section class="modal-card mini-card" role="dialog" aria-modal="true">
          <div class="modal-header"><h2>${escapeHtml(config.title)}</h2><button type="button" data-close aria-label="Close">X</button></div>
          <p>${escapeHtml(config.prompt)}</p>
          <div class="timing-meter">
            <div class="target-zone" style="left:${config.zoneStart}%;width:${config.zoneEnd - config.zoneStart}%"></div>
            <div class="meter-marker" id="meterMarker" style="left:0%"></div>
          </div>
          <div class="hit-pips" id="hitPips"><span></span><span></span><span></span></div>
          <p class="hint" id="timingHint" style="display:none"></p>
          <div class="modal-actions"><button type="button" class="primary-action" id="strikeButton">Record Moment</button></div>
        </section>
      `);

      state.timingTimer = setInterval(() => {
        state.timingMarker = (state.timingMarker + 5) % 101;
        const marker = document.getElementById("meterMarker");
        if (marker) marker.style.left = state.timingMarker + "%";
      }, 95);

      document.getElementById("strikeButton").addEventListener("click", () => {
        const hint = document.getElementById("timingHint");
        if (state.timingMarker >= config.zoneStart && state.timingMarker <= config.zoneEnd) {
          state.timingHits += 1;
          document.querySelectorAll("#hitPips span").forEach((pip, index) => pip.classList.toggle("lit", index < state.timingHits));
          hint.textContent = state.timingHits >= 3 ? config.successText : "Good catch. Repeat it to prove the finding.";
          hint.style.display = "block";
          if (state.timingHits >= 3) {
            setTimeout(() => {
              config.onSuccess();
              closeModal();
            }, 450);
          }
        } else {
          hint.textContent = "Missed the useful moment. Focus on the patient movement.";
          hint.style.display = "block";
        }
      });
    }

    function openMRI() {
      if (!has(state.completed, "imagingLesionFound")) {
        openMRIViewer();
        return;
      }
      if (!has(state.completed, "imagingInterpretation")) {
        openImagingInterpretation();
        return;
      }
      openImagingReport();
    }

    function openMRIViewer() {
      openModal(`
        <section class="modal-card mini-card" role="dialog" aria-modal="true">
          <div class="modal-header"><h2>Final Imaging Lock</h2><button type="button" data-close aria-label="Close">X</button></div>
          <p>The MRI is finally available. Click the left posterolateral cord compression before making the diagnosis.</p>
          <div class="ct-scan">
            <button type="button" class="ct-zone correct" data-ct="correct" aria-label="left posterolateral thoracic cord mass"></button>
            <button type="button" class="ct-zone ventricle" data-ct="cord" aria-label="central cord"></button>
            <button type="button" class="ct-zone artifact" data-ct="artifact" aria-label="posterior artifact"></button>
          </div>
          <p class="hint" id="ctHint" style="display:none"></p>
        </section>
      `);

      document.querySelectorAll("[data-ct]").forEach(button => {
        button.addEventListener("click", () => {
          if (button.dataset.ct === "correct") {
            markCompleted("imagingLesionFound");
            addFinding("mriMass");
            const hint = document.getElementById("ctHint");
            hint.textContent = "Lesion identified. Now interpret what the imaging means for this patient.";
            hint.style.display = "block";
            setTimeout(openImagingInterpretation, 500);
          } else {
            const hint = document.getElementById("ctHint");
            hint.textContent = button.dataset.ct === "cord"
              ? "The cord is the structure being compressed; the mass is eccentrically left and posterior-lateral."
              : "That streak is not the lesion. Look for asymmetric compression of the thoracic cord.";
            hint.style.display = "block";
          }
        });
      });
    }

    function openImagingInterpretation() {
      openModal(`
        <section class="modal-card mini-card" role="dialog" aria-modal="true">
          <div class="modal-header"><h2>Final Diagnosis Lock</h2><button type="button" data-close aria-label="Close">X</button></div>
          <p>The exam localizes to the left thoracic hemicord, and MRI shows a left posterolateral mass compressing the cord. What does this most likely represent?</p>
          <div class="option-stack">
            <button type="button" class="option" data-imaging-answer="correct">Brown-Sequard syndrome from left thoracic hemicord compression</button>
            <button type="button" class="option" data-imaging-answer="brain">Right MCA stroke with neglect</button>
            <button type="button" class="option" data-imaging-answer="root">Left lumbosacral radiculopathy</button>
            <button type="button" class="option" data-imaging-answer="nerve">Length-dependent peripheral neuropathy</button>
          </div>
          <p class="hint" id="imagingHint" style="display:none"></p>
        </section>
      `);

      document.querySelectorAll("[data-imaging-answer]").forEach(button => {
        button.addEventListener("click", () => {
          const hint = document.getElementById("imagingHint");
          if (button.dataset.imagingAnswer === "correct") {
            markCompleted("imagingInterpretation");
            hint.textContent = "Correct. Confirm the radiology impression to sign the diagnosis.";
            hint.style.display = "block";
            setTimeout(openImagingReport, 500);
            return;
          }
          hint.textContent = button.dataset.imagingAnswer === "brain"
            ? "A cortical stroke would not explain a thoracic sensory level with crossed body findings and normal face/arms."
            : button.dataset.imagingAnswer === "root"
              ? "A single root lesion would not produce ipsilateral UMN/dorsal-column signs plus contralateral pain-temperature loss."
              : "Peripheral neuropathy is usually distal and symmetric; this case has a focal hemicord pattern.";
          hint.style.display = "block";
        });
      });
    }

    function openImagingReport() {
      openModal(`
        <section class="modal-card mini-card" role="dialog" aria-modal="true">
          <div class="modal-header"><h2>Imaging Report</h2><button type="button" data-close aria-label="Close">X</button></div>
          <p>Confirm the report against your localization before closing the room.</p>
          <div class="report-sheet">
            <h3>MRI Thoracic Spine With and Without Contrast</h3>
            <dl>
              <div class="report-row"><dt>Level</dt><dd>Mid-thoracic cord, left posterolateral aspect.</dd></div>
              <div class="report-row"><dt>Finding</dt><dd>Enhancing intradural extramedullary mass with focal compression of the left hemicord.</dd></div>
              <div class="report-row"><dt>Correlation</dt><dd>Matches ipsilateral corticospinal and dorsal-column findings with contralateral pain-temperature loss.</dd></div>
            </dl>
            <p class="report-impression">Impression: left thoracic hemicord compression causing Brown-Sequard syndrome. Urgent neurosurgical evaluation is recommended.</p>
          </div>
          ${has(state.completed, "caseComplete") ? `<span class="case-complete-stamp">Case complete</span>` : ""}
          <div class="modal-actions">
            ${has(state.completed, "caseComplete")
              ? `<button type="button" class="primary-action" data-close>OK</button>`
              : `<button type="button" class="primary-action" id="confirmDiagnosis">Confirm Diagnosis</button>`}
          </div>
        </section>
      `);

      const confirmButton = document.getElementById("confirmDiagnosis");
      if (confirmButton) confirmButton.addEventListener("click", completeCase);
    }

    function completeCase() {
      if (!has(state.completed, "imagingReportConfirmed")) markCompleted("imagingReportConfirmed");
      if (!has(state.completed, "caseComplete")) markCompleted("caseComplete");
      addFinding("finalDiagnosis");
      addFinding("neurosurgery");
      logAction("Completed Case 01: confirmed Brown-Sequard syndrome from thoracic cord compression");
      closeModal();
      setMessage("Diagnosis confirmed: Brown-Sequard syndrome from left thoracic hemicord compression by a posterolateral mass. Urgent neurosurgical evaluation ends the room.");
    }

    document.addEventListener("pointerdown", event => {
      if (event.button !== 0) return;
      if (!(event.target instanceof Element)) return;
      if (event.target.closest("button, [data-hotspot], .inventory-item")) playSfx("click");
    }, true);

    document.querySelectorAll("[data-mode]").forEach(button => {
      button.addEventListener("click", () => {
        state.mode = button.dataset.mode;
        render();
      });
    });

    document.querySelectorAll("[data-hotspot]").forEach(button => {
      button.addEventListener("click", () => handleHotspot(button.dataset.hotspot));
      button.addEventListener("dragover", event => {
        const types = Array.from(event.dataTransfer.types || []);
        if (!inventoryDrag.itemId && !types.includes("text/plain")) return;
        event.preventDefault();
        event.dataTransfer.dropEffect = "move";
        setInventoryDragTarget(button);
      });
      button.addEventListener("dragleave", () => {
        if (inventoryDrag.target === button) setInventoryDragTarget(null);
      });
      button.addEventListener("drop", event => {
        event.preventDefault();
        const itemId = event.dataTransfer.getData("text/plain") || inventoryDrag.itemId;
        clearInventoryDragVisuals();
        resetInventoryPointerDrag();
        handleInventoryUse(itemId, button.dataset.hotspot);
      });
    });

    function closeToolbarMenus(except = null) {
      document.querySelectorAll(".toolbar-menu").forEach(menu => {
        if (menu === except) return;
        menu.classList.remove("open");
        menu.querySelector(".menu-panel").hidden = true;
        menu.querySelector(".toolbar-menu-button").setAttribute("aria-expanded", "false");
      });
    }

    document.querySelectorAll("[data-menu-toggle]").forEach(button => {
      button.addEventListener("click", event => {
        event.stopPropagation();
        const menu = button.closest(".toolbar-menu");
        const shouldOpen = !menu.classList.contains("open");
        closeToolbarMenus(shouldOpen ? menu : null);
        menu.classList.toggle("open", shouldOpen);
        menu.querySelector(".menu-panel").hidden = !shouldOpen;
        button.setAttribute("aria-expanded", String(shouldOpen));
      });
    });

    document.addEventListener("click", event => {
      if (!event.target.closest(".toolbar-menu")) closeToolbarMenus();
    });

    document.addEventListener("keydown", event => {
      if (event.key === "Escape") closeToolbarMenus();
    });

    document.querySelector("[data-help]").addEventListener("click", () => {
      closeToolbarMenus();
      openHelp();
    });
    document.querySelector("[data-level-select]").addEventListener("click", () => {
      closeToolbarMenus();
      openLevelSelect();
    });

    document.querySelector("[data-chart-review]").addEventListener("click", openChartReview);

    document.querySelector("[data-music-toggle]").addEventListener("click", event => {
      event.stopPropagation();
      toggleMusic();
    });

    document.querySelector("[data-music-volume]").addEventListener("input", event => {
      setMusicVolume(event.target.value);
    });

    document.querySelector("[data-sfx-volume]").addEventListener("input", event => {
      setSfxVolume(event.target.value);
    });

    document.querySelector("[data-sfx-test]").addEventListener("click", event => {
      event.stopPropagation();
      playSfx("success");
    });

    document.getElementById("messageOk").addEventListener("click", closeMessagePopup);

    document.addEventListener("keydown", event => {
      const popup = document.getElementById("messagePopup");
      if (popup.hidden) return;
      if (event.key === "Escape" || event.key === "Enter" || event.key === " ") {
        event.preventDefault();
        closeMessagePopup();
      }
    });

    document.getElementById("historyClose").addEventListener("click", closeHistoryDialogue);

    document.addEventListener("keydown", event => {
      if (document.getElementById("historyDialogue").hidden) return;
      if (event.key === "Escape") {
        closeHistoryDialogue();
        return;
      }
    });

    const cursor = document.getElementById("emojiCursor");
    document.querySelector(".game-root").addEventListener("pointermove", event => {
      cursor.style.left = event.clientX + "px";
      cursor.style.top = event.clientY + "px";
      cursor.classList.add("visible");
    });
    document.querySelector(".game-root").addEventListener("pointerleave", () => {
      cursor.classList.remove("visible");
    });

    render();
  </script>
</body>
</html>
