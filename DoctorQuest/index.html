<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Doctor Quest: The Curious Casebook of Dr. Click - Local HTML</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <style>
    :root {
      --ink: #211923;
      --paper: #f7edcf;
      --gold: #d7aa44;
      --maroon: #5c1f31;
      --teal: #1f6f78;
      --clinic-green: #7ea687;
      --brick: #9b4d45;
      --retro-font: "Courier New", Courier, "Lucida Console", Monaco, monospace;
      --emoji-font: "Segoe UI Emoji", "Apple Color Emoji", "Noto Color Emoji", sans-serif;
    }

    * { box-sizing: border-box; }

    html, body {
      height: 100%;
      min-height: 100%;
      overflow: hidden;
    }

    body {
      margin: 0;
      background:
        radial-gradient(circle at 20% 12%, rgba(215, 170, 68, 0.2), transparent 28rem),
        linear-gradient(135deg, #1d3f47 0%, #2d2034 48%, #5c2a32 100%);
      color: var(--paper);
      font-family: var(--retro-font);
    }

    button { font: inherit; }

    .game-root {
      --game-pad: clamp(6px, 1.5vh, 24px);
      height: 100dvh;
      min-height: 0;
      display: flex;
      align-items: stretch;
      justify-content: center;
      padding: var(--game-pad);
      overflow: hidden;
    }

    .game-root.cursor-active, .game-root.cursor-active * { cursor: none; }

    .emoji-cursor {
      position: fixed;
      z-index: 80;
      display: none;
      pointer-events: none;
      font-family: var(--emoji-font);
      font-size: 28px;
      line-height: 1;
      filter: drop-shadow(2px 3px 0 rgba(0,0,0,0.55));
      transform: translate(-50%, -50%);
    }

    .emoji-cursor.visible { display: block; }

    .game-cabinet {
      width: min(1180px, 100%);
      height: 100%;
      min-height: 0;
      margin: 0 auto;
      border: 5px solid #180f17;
      background: #2a1824;
      display: grid;
      grid-template-rows: auto auto minmax(0, 1fr);
      overflow: hidden;
      box-shadow:
        0 28px 80px rgba(0, 0, 0, 0.4),
        inset 0 0 0 4px #b58337,
        inset 0 0 0 8px #3a283a;
    }

    .game-header {
      padding: clamp(7px, 1.4vh, 16px) 20px clamp(5px, 1vh, 12px);
      border-bottom: 4px solid #130b12;
      background:
        linear-gradient(90deg, rgba(126, 166, 135, 0.36), transparent 32%),
        linear-gradient(180deg, #5c1f31 0%, #341927 100%);
    }

    .top-toolbar {
      position: relative;
      z-index: 10;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      padding: clamp(6px, 1vh, 10px) 12px;
      border-bottom: 4px solid #130b12;
      background: linear-gradient(180deg, #34213a, var(--ink));
    }

    .tool-strip {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: stretch;
      flex: 0 0 auto;
    }

    .tool-button {
      position: relative;
      min-height: 48px;
      min-width: 48px;
      width: 48px;
      height: 48px;
      flex: 0 0 48px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      margin: 0;
      border: 3px outset var(--gold);
      border-radius: 0;
      background: linear-gradient(180deg, #f6e2a6, #b98443);
      color: var(--ink);
      font-family: var(--retro-font);
      font-size: 1.25rem;
      line-height: 1;
      appearance: none;
      -webkit-appearance: none;
      touch-action: manipulation;
    }

    .tool-button > * { pointer-events: none; }

    .tool-button.selected {
      border-style: inset;
      background: linear-gradient(180deg, #91d8c5, var(--teal));
      color: var(--paper);
    }

    .tool-icon {
      font-family: var(--emoji-font);
      font-size: 1.35rem;
      line-height: 1;
    }

    .top-inventory {
      min-height: 40px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex: 1 1 260px;
      min-width: 220px;
      padding: 5px 8px;
      border: 3px ridge var(--gold);
      background: rgba(247, 237, 207, 0.12);
    }

    .toolbar-spacer { flex: 1 1 auto; }

    .toolbar-menu {
      position: relative;
      display: flex;
      align-items: stretch;
      flex: 0 1 172px;
    }

    .settings-menu {
      flex: 0 0 48px;
    }

    .toolbar-menu-button,
    .chart-review-button {
      position: relative;
      z-index: 30;
      min-height: 48px;
      height: 48px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      margin: 0;
      padding: 7px 12px;
      border: 3px outset var(--gold);
      border-radius: 0;
      background: linear-gradient(180deg, #fff0b8, var(--gold));
      color: var(--ink);
      font-family: var(--retro-font);
      font-size: 0.78rem;
      line-height: 1;
      user-select: none;
      appearance: none;
      -webkit-appearance: none;
      touch-action: manipulation;
    }

    .chart-review-button {
      flex: 0 1 172px;
    }

    .toolbar-menu-button:after { content: "\25BE"; margin-left: 8px; }

    .settings-menu .toolbar-menu-button {
      padding: 0;
      color: var(--ink);
      font-family: var(--retro-font);
      font-size: 1.45rem;
      font-weight: 900;
    }

    .settings-menu .toolbar-menu-button:after {
      content: "";
      margin-left: 0;
    }

    .toolbar-menu.open .toolbar-menu-button {
      border-style: inset;
      background: linear-gradient(180deg, #f7edcf, #d7aa44);
    }

    .menu-panel {
      position: absolute;
      right: 0;
      top: calc(100% + 8px);
      z-index: 24;
      width: 248px;
      padding: 10px;
      border: 4px ridge var(--gold);
      background: var(--ink);
      box-shadow: 0 14px 30px rgba(0,0,0,0.45);
    }

    .menu-panel[hidden] { display: none; }

    .menu-item {
      width: 100%;
      margin-bottom: 8px;
      padding: 9px;
      border: 3px ridge var(--gold);
      background: var(--paper);
      color: var(--ink);
      text-align: left;
    }

    .menu-item span {
      display: block;
      margin-top: 4px;
      color: var(--maroon);
      font-family: var(--retro-font);
      font-size: 0.66rem;
      text-transform: uppercase;
    }

    .menu-item.locked { filter: saturate(0.65); opacity: 0.78; }

    .menu-note {
      padding: 8px;
      border: 2px solid rgba(247,237,207,0.55);
      color: var(--paper);
      font-family: var(--retro-font);
      font-size: 0.68rem;
      line-height: 1.35;
    }

    .music-control {
      display: grid;
      gap: 8px;
      margin-bottom: 8px;
      padding: 8px;
      border: 2px solid rgba(247,237,207,0.55);
      background: rgba(247,237,207,0.08);
      color: var(--paper);
      font-family: var(--retro-font);
      font-size: 0.68rem;
    }

    .music-control label {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      text-transform: uppercase;
    }

    .music-control input[type="range"] {
      width: 100%;
      accent-color: var(--gold);
    }

    .music-control .menu-item { margin-bottom: 0; }

    .eyebrow, .game-header h1 { margin: 0; }

    .eyebrow {
      color: #f2ce77;
      font-family: var(--retro-font);
      font-size: 0.78rem;
      text-transform: uppercase;
    }

    .game-header h1 {
      color: #fff3bf;
      font-size: clamp(1.08rem, 2.4vw, 1.62rem);
      line-height: 1.08;
      text-shadow: 2px 2px 0 #1b1019;
    }

    .game-header .eyebrow { margin-top: 4px; }

    .adventure-frame {
      min-height: 0;
      display: grid;
      place-items: center;
      overflow: hidden;
      border-bottom: 4px solid #130b12;
      background: #09090a;
      container-type: size;
    }

    .room-scene {
      position: relative;
      width: 100%;
      max-height: 100%;
      aspect-ratio: 1448 / 1086;
      min-height: 0;
      overflow: hidden;
      background: #09090a;
      image-rendering: pixelated;
    }

    @supports (width: 1cqw) {
      .room-scene {
        width: min(100cqw, calc(100cqh * 1448 / 1086));
        height: min(100cqh, calc(100cqw * 1086 / 1448));
        max-height: none;
      }
    }

    .scene-art, .back-wall, .floor-shadow, .door-art, .bed-art,
    .tray-art, .cart-art, .cabinet-art, .ct-lightbox,
    .monitor-art, .phone-art { position: absolute; }

    .scene-art {
      inset: 0;
      width: 100%;
      height: 100%;
    }

    .scene-image {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: fill;
      image-rendering: pixelated;
    }

    .back-wall {
      inset: 0 0 28%;
      background:
        repeating-linear-gradient(90deg, rgba(255,255,255,0.08) 0 2px, transparent 2px 72px),
        linear-gradient(180deg, rgba(255,255,255,0.12), transparent 48%);
    }

    .floor-shadow {
      left: 12%; right: 7%; bottom: 9%; height: 15%;
      border-radius: 50%;
      background: rgba(19, 11, 18, 0.36);
    }

    .door-art {
      left: 0.8%; top: 27%; width: 8%; height: 49%;
      border: 5px solid #362230;
      background: linear-gradient(90deg, #34535c, #20343f);
      box-shadow: inset -8px 0 0 rgba(0,0,0,0.22);
    }

    .door-art:after {
      content: "";
      position: absolute;
      right: 12%; top: 48%;
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--gold);
    }

    .ct-lightbox {
      left: 9%; top: 16%; width: 17%; height: 25%;
      border: 5px ridge #6e7f8d;
      background: #d9e2d8;
      box-shadow: 0 8px 0 rgba(0,0,0,0.22);
    }

    .ct-lightbox span {
      position: absolute;
      top: 16%; width: 32%; height: 66%;
      border-radius: 48%;
      border: 7px solid #515b61;
      background: radial-gradient(circle, #777 0 18%, #b8bbb3 19% 34%, #444 35% 38%, #ddd 39%);
    }

    .ct-lightbox span:first-child { left: 14%; }
    .ct-lightbox span:last-child { right: 14%; }

    .monitor-art {
      right: 17%; top: 17%; width: 15%; height: 21%;
      border: 5px solid #26323a;
      background: #0e2220;
      box-shadow: 0 8px 0 rgba(0,0,0,0.24);
    }

    .monitor-line {
      position: absolute;
      left: 9%; right: 9%; top: 48%;
      height: 4px;
      background: linear-gradient(90deg, #78f0aa 0 18%, transparent 18% 24%, #78f0aa 24% 32%, transparent 32% 38%, #78f0aa 38% 100%);
    }

    .monitor-dot {
      position: absolute;
      right: 12%; bottom: 12%;
      width: 8px; height: 8px;
      background: #e4574f;
    }

    .phone-art {
      right: 5%; top: 16%; width: 7%; height: 9%;
      border-radius: 12px 12px 4px 4px;
      background: var(--ink);
      border: 3px solid var(--gold);
    }

    .bed-art {
      left: 37%; top: 43%; width: 30%; height: 31%;
      border-radius: 10px 24px 18px 12px;
      background: linear-gradient(180deg, #e8d9b5, #c69e68);
      box-shadow: inset 0 -18px 0 #6f3e3e, 0 14px 0 rgba(0,0,0,0.22);
    }

    .pillow {
      position: absolute;
      right: 12%; top: 8%;
      width: 28%; height: 30%;
      border-radius: 50% 35% 35% 50%;
      background: var(--paper);
    }

    .patient-head {
      position: absolute;
      right: 19%; top: 22%;
      width: 13%; height: 18%;
      border-radius: 50%;
      background: #b97958;
      box-shadow: inset -4px -2px 0 rgba(0,0,0,0.2);
    }

    .patient-body {
      position: absolute;
      left: 28%; top: 33%;
      width: 45%; height: 26%;
      border-radius: 18px;
      background: #456a8a;
    }

    .patient-arm {
      position: absolute;
      top: 38%;
      width: 26%; height: 7%;
      border-radius: 8px;
      background: #b97958;
    }

    .right-arm { right: 22%; transform: rotate(-10deg); }
    .left-arm { left: 25%; transform: rotate(17deg); filter: saturate(0.82); }

    .tray-art {
      left: 29%; top: 62%; width: 12%; height: 13%;
      border-radius: 8px;
      background: #8f9a99;
      border: 4px solid #3f4c50;
    }

    .plate {
      position: absolute;
      left: 16%; top: 20%;
      width: 64%; height: 58%;
      border-radius: 50%;
      background: #f5f0dd;
    }

    .sandwich {
      position: absolute;
      top: 34%;
      width: 26%; height: 25%;
      background: var(--gold);
      border: 2px solid #8b5a2b;
    }

    .right-half { right: 25%; clip-path: polygon(0 0, 100% 50%, 0 100%); }
    .left-half { left: 25%; opacity: 0.35; clip-path: polygon(100% 0, 0 50%, 100% 100%); }

    .cart-art {
      right: 15%; top: 52%; width: 12%; height: 24%;
      border: 4px solid #322432;
      background: #6b8391;
      box-shadow: 0 10px 0 rgba(0,0,0,0.22);
    }

    .cart-art span {
      display: block;
      height: 14%;
      margin: 11% 12%;
      background: #d8e0d2;
      border: 2px solid #34404a;
    }

    .cabinet-art {
      right: 3%; top: 35%; width: 11%; height: 39%;
      border: 5px solid #3a283a;
      background: linear-gradient(90deg, #82543f, #a36a51);
      box-shadow: inset 0 0 0 4px rgba(255,255,255,0.08);
    }

    .cabinet-art span {
      position: absolute;
      left: 16%; right: 16%;
      height: 3px;
      background: #2a1824;
    }

    .cabinet-art span:first-child { top: 35%; }
    .cabinet-art span:last-child { top: 65%; }

    .hotspot {
      position: absolute;
      z-index: 4;
      border: 2px solid transparent;
      background: transparent;
      color: transparent;
      cursor: pointer;
    }

    .hotspot span {
      position: absolute;
      left: 50%; bottom: 100%;
      min-width: max-content;
      padding: 4px 7px;
      border: 2px solid var(--ink);
      background: var(--paper);
      color: var(--ink);
      font-family: var(--retro-font);
      font-size: 0.68rem;
      opacity: 0;
      transform: translateX(-50%) translateY(-4px);
      transition: opacity 120ms ease;
    }

    .hotspot:hover, .hotspot:focus-visible {
      border-color: rgba(247,237,207,0.8);
      outline: none;
      background: rgba(247,237,207,0.1);
    }

    .game-root.inventory-dragging .hotspot {
      border-color: rgba(215,170,68,0.54);
      background: rgba(247,237,207,0.08);
    }

    .game-root.inventory-dragging .hotspot.drop-target {
      border-color: #fff0b8;
      background: rgba(215,170,68,0.28);
      box-shadow: inset 0 0 0 2px rgba(33,25,35,0.75), 0 0 18px rgba(247,237,207,0.6);
    }

    .hotspot:hover span, .hotspot:focus-visible span { opacity: 1; }

    .case-rail {
      padding: 14px 10px;
      border-left: 4px solid #130b12;
      background: linear-gradient(180deg, #3a283a, var(--ink));
    }

    .case-rail h2, .inventory-panel h2 {
      margin: 0 0 5px;
      color: #f2ce77;
      font-family: var(--retro-font);
      font-size: 0.78rem;
      text-transform: uppercase;
    }

    .case-file {
      width: 100%;
      margin-bottom: 8px;
      padding: 8px;
      border: 3px ridge var(--gold);
      background: var(--paper);
      color: var(--ink);
      text-align: left;
      cursor: pointer;
    }

    .case-file span {
      display: block;
      margin-top: 4px;
      color: var(--maroon);
      font-family: var(--retro-font);
      font-size: 0.66rem;
      text-transform: uppercase;
    }

    .case-file.locked { filter: saturate(0.65); opacity: 0.78; }

    .inventory-panel {
      border: 4px ridge var(--gold);
      background: var(--paper);
      color: var(--ink);
    }

    .help-button, .inventory-item, .primary-action, .option, .exam-card, .message-ok {
      border: 3px outset var(--gold);
      background: linear-gradient(180deg, #f6e2a6, #b98443);
      color: var(--ink);
      cursor: pointer;
    }

    .option.selected {
      border-style: inset;
      background: linear-gradient(180deg, #91d8c5, var(--teal));
      color: var(--paper);
    }

    .inventory-panel {
      min-height: 0;
      padding: clamp(7px, 1vh, 10px);
      overflow: hidden;
    }

    .inventory-list {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
      min-width: 0;
    }

    .top-inventory .inventory-list { flex: 1 1 auto; }

    .inventory-item {
      min-height: 30px;
      padding: 4px 8px;
      font-size: 0.72rem;
      font-family: var(--retro-font);
      white-space: nowrap;
      touch-action: none;
      user-select: none;
    }

    .inventory-item.dragging {
      border-style: inset;
      opacity: 0.55;
    }

    .drag-ghost {
      position: fixed;
      left: 0;
      top: 0;
      z-index: 120;
      display: none;
      max-width: 220px;
      padding: 6px 9px;
      border: 3px outset var(--gold);
      background: linear-gradient(180deg, #f6e2a6, #b98443);
      color: var(--ink);
      font-family: var(--retro-font);
      font-size: 0.72rem;
      line-height: 1.1;
      pointer-events: none;
      box-shadow: 0 10px 24px rgba(0,0,0,0.45);
      transform: translate(12px, 12px);
    }

    .drag-ghost.visible { display: block; }

    .game-root.inventory-dragging .emoji-cursor { display: none !important; }

    .message-popup {
      position: fixed;
      inset: 0;
      z-index: 35;
      display: grid;
      place-items: center;
      padding: clamp(18px, 4vw, 48px);
      background: rgba(15, 9, 18, 0.22);
    }

    .message-popup[hidden] { display: none; }

    .message-window {
      width: min(560px, calc(100vw - 36px));
      max-height: min(70dvh, 340px);
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) auto;
      border: 5px ridge var(--gold);
      background:
        linear-gradient(90deg, rgba(255,232,172,0.2), transparent 12px, transparent calc(100% - 12px), rgba(255,232,172,0.2)),
        var(--paper);
      color: var(--ink);
      box-shadow:
        inset 0 0 0 2px #6f3b57,
        0 18px 38px rgba(0, 0, 0, 0.52);
      font-family: var(--retro-font);
    }

    .message-window h2 {
      margin: 0;
      padding: 10px 14px;
      border-bottom: 4px solid #6f3b57;
      background: var(--maroon);
      color: #fff3bf;
      font-size: 1rem;
      line-height: 1.1;
      text-shadow: 1px 1px 0 #1b1019;
    }

    .message-window p {
      min-height: 86px;
      margin: 0;
      padding: 16px 18px;
      font-size: 1rem;
      line-height: 1.38;
      overflow: hidden;
    }

    .message-actions {
      display: flex;
      justify-content: flex-end;
      padding: 0 14px 14px;
    }

    .message-ok {
      min-width: 84px;
      min-height: 38px;
      font-family: var(--retro-font);
      font-size: 0.78rem;
      text-transform: uppercase;
    }

    .history-dialogue {
      position: absolute;
      z-index: 18;
      left: 1.1%;
      right: 1.1%;
      top: 2.2%;
      display: grid;
      grid-template-columns: clamp(86px, 12vw, 126px) 1fr;
      gap: 12px;
      align-items: start;
      color: #5b2f48;
      font-family: var(--retro-font);
      image-rendering: pixelated;
    }

    .history-dialogue[hidden] { display: none; }

    .history-portrait,
    .history-box {
      border: 4px ridge #f4cf72;
      box-shadow:
        inset 0 0 0 2px #6f3b57,
        0 6px 0 rgba(26, 12, 22, 0.46);
      background: #d49372;
    }

    .history-portrait {
      position: relative;
      aspect-ratio: 1 / 1.18;
      overflow: hidden;
      background: #365f8c;
    }

    .history-portrait img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
      image-rendering: pixelated;
    }

    .history-box {
      position: relative;
      min-height: clamp(82px, 13vw, 118px);
      padding: 15px 18px 20px;
      background:
        linear-gradient(90deg, rgba(255,232,172,0.24), transparent 10px, transparent calc(100% - 10px), rgba(255,232,172,0.24)),
        #d49372;
      font-size: clamp(0.82rem, 1.7vw, 1.2rem);
      line-height: 1.35;
      text-shadow: 1px 1px 0 rgba(255,230,184,0.24);
      text-align: left;
      cursor: default;
    }

    .history-speaker {
      display: block;
      margin-bottom: 5px;
      color: #2e2136;
      font-size: 0.62em;
      text-transform: uppercase;
      letter-spacing: 0;
    }

    .history-next {
      position: absolute;
      right: 12px;
      bottom: 5px;
      color: #f7edcf;
      text-shadow: 1px 1px 0 #5b2f48;
    }

    .history-text {
      min-height: 2.7em;
      margin-bottom: 10px;
    }

    .history-topics {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 6px;
    }

    .history-topic,
    .history-close {
      min-height: 34px;
      padding: 6px 8px;
      border: 2px outset #f4cf72;
      border-radius: 0;
      background: #f2c48f;
      color: #2e2136;
      font-family: var(--retro-font);
      font-size: 0.62em;
      line-height: 1.15;
      text-align: left;
      appearance: none;
      -webkit-appearance: none;
    }

    .history-topic.done {
      border-style: inset;
      background: #bb8e73;

      appearance: none;
      -webkit-appearance: none;
      image-rendering: pixelated;

    .wash-splat::before {
      content: "";
      position: absolute;
      inset: 3px;
      background:
        linear-gradient(#ffd47a, #ffd47a) 24% 20% / 18.75% 12.5% no-repeat,
        linear-gradient(#c96349, #c96349) 63% 24% / 18.75% 18.75% no-repeat,
        linear-gradient(#5c1d2a, #5c1d2a) 68% 68% / 25% 25% no-repeat,
        linear-gradient(#793229, #793229) 27% 72% / 25% 18.75% no-repeat,
        linear-gradient(135deg, #b54d3d 0 49%, #7f2732 50% 100%);
      pointer-events: none;
    }

    .wash-splat::after {
      content: "";
      position: absolute;
      left: 37.5%;
      top: 37.5%;
      width: 12.5%;
      height: 12.5%;
      background: #e17a4b;
      box-shadow:
        4px 0 0 #8f2d34,
        0 4px 0 #6a202d,
        8px 4px 0 #d06043,
        -4px 8px 0 #7a2b2b;
      pointer-events: none;
    }

    .wash-splat.hit {
      opacity: 0.46;
      filter: grayscale(0.6);
      pointer-events: none;
      transform: translate(-50%, -50%) rotate(var(--splat-rotation)) scale(0.92);
    }

      position: relative;
      width: min(420px, calc(100% - 40px));

      content: "";
      position: absolute;
      top: 38%;
      width: 16%; height: 24%;
      border-radius: 50%;
      background: rgba(25,32,34,0.46);
    }

    .ct-scan:before { left: 37%; }
    .ct-scan:after { right: 37%; }

    .ct-zone {
      position: absolute;
      border: 2px solid transparent;
      background: transparent;
      cursor: pointer;

    .help-modal {
      width: min(780px, 100%);
    }

    .help-layout {
      display: grid;
      gap: 16px;
      padding: 18px 20px 22px;

    .help-layout h3, .next-move h3 {

      background: rgba(31,111,120,0.12);

    .review-layout {
      display: grid;
      grid-template-columns: minmax(0, 1.35fr) minmax(280px, 0.8fr);

      gap: 18px;

    function updateMusicUi() {
      const value = document.getElementById("musicVolumeValue");
      const slider = document.querySelector("[data-music-volume]");
      const sfxValue = document.getElementById("sfxVolumeValue");
      const sfxSlider = document.querySelector("[data-sfx-volume]");

    function midiBytesFromBase64(value) {
      const binary = atob(value);
      const bytes = new Uint8Array(binary.length);
      for (let index = 0; index < binary.length; index += 1) {
        bytes[index] = binary.charCodeAt(index);
      }
      return bytes;
    }

    function readAscii(bytes, offset, length) {
      let text = "";
      for (let index = 0; index < length; index += 1) {
        text += String.fromCharCode(bytes[offset + index]);
      }
      return text;
    }

    function readUint16(bytes, offset) {
      return (bytes[offset] << 8) | bytes[offset + 1];
    }

    function readUint32(bytes, offset) {
      return ((bytes[offset] << 24) >>> 0) + (bytes[offset + 1] << 16) + (bytes[offset + 2] << 8) + bytes[offset + 3];
    }

    function readVariableLength(bytes, cursor) {
      let value = 0;
      while (cursor.position < bytes.length) {
        const byte = bytes[cursor.position];
        cursor.position += 1;
        value = (value << 7) | (byte & 0x7f);
        if ((byte & 0x80) === 0) break;
      }
      return value;
    }

    function parseMidi(base64) {
      const bytes = midiBytesFromBase64(base64);
      if (readAscii(bytes, 0, 4) !== "MThd") throw new Error("Missing MIDI header.");

      const headerLength = readUint32(bytes, 4);
      const trackCount = readUint16(bytes, 10);
      const division = readUint16(bytes, 12);
      if (division & 0x8000) throw new Error("SMPTE MIDI timing is not supported.");

      let offset = 8 + headerLength;
      const tempoEvents = [{ tick: 0, micros: 500000 }];
      const rawNotes = [];

      for (let trackIndex = 0; trackIndex < trackCount; trackIndex += 1) {
        if (readAscii(bytes, offset, 4) !== "MTrk") break;
        const trackLength = readUint32(bytes, offset + 4);
        const trackEnd = offset + 8 + trackLength;
        const cursor = { position: offset + 8 };
        const activeNotes = new Map();
        let tick = 0;
        let runningStatus = 0;

        while (cursor.position < trackEnd) {
          tick += readVariableLength(bytes, cursor);
          let status = bytes[cursor.position];
          cursor.position += 1;

          if (status < 0x80) {
            cursor.position -= 1;
            status = runningStatus;
          } else if (status < 0xf0) {
            runningStatus = status;
          }

          if (status === 0xff) {
            const metaType = bytes[cursor.position];
            cursor.position += 1;
            const length = readVariableLength(bytes, cursor);
            if (metaType === 0x51 && length === 3) {
              tempoEvents.push({
                tick,
                micros: (bytes[cursor.position] << 16) | (bytes[cursor.position + 1] << 8) | bytes[cursor.position + 2]
              });
            }
            cursor.position += length;
            continue;
          }

          if (status === 0xf0 || status === 0xf7) {
            cursor.position += readVariableLength(bytes, cursor);
            continue;
          }

          const eventType = status & 0xf0;
          const channel = status & 0x0f;
          const dataLength = eventType === 0xc0 || eventType === 0xd0 ? 1 : 2;
          const data1 = bytes[cursor.position];
          cursor.position += 1;
          const data2 = dataLength === 2 ? bytes[cursor.position] : 0;
          if (dataLength === 2) cursor.position += 1;

          if (eventType === 0x90 && data2 > 0) {
            const key = channel + ":" + data1;
            if (!activeNotes.has(key)) activeNotes.set(key, []);
            activeNotes.get(key).push({ tick, velocity: data2 / 127 });
          }

          if (eventType === 0x80 || (eventType === 0x90 && data2 === 0)) {
            const key = channel + ":" + data1;
            const stack = activeNotes.get(key);
            if (stack && stack.length) {
              const started = stack.shift();
              rawNotes.push({
                startTick: started.tick,
                endTick: tick,
                note: data1,
                channel,
                velocity: started.velocity
              });
            }
          }
        }

        offset = trackEnd;
      }

      tempoEvents.sort((left, right) => left.tick - right.tick);
      const tempos = [];
      tempoEvents.forEach(event => {
        const previous = tempos[tempos.length - 1];
        if (previous && previous.tick === event.tick) previous.micros = event.micros;
        else tempos.push({ ...event });
      });

      function tickToSeconds(targetTick) {
        let seconds = 0;
        let previousTick = 0;
        let micros = 500000;

        tempos.forEach(event => {
          if (event.tick <= previousTick) {
            micros = event.micros;
            return;
          }
          if (event.tick >= targetTick) return;
          seconds += ((event.tick - previousTick) * micros) / 1000000 / division;
          previousTick = event.tick;
          micros = event.micros;
        });

        return seconds + ((targetTick - previousTick) * micros) / 1000000 / division;
      }

      const notes = rawNotes
        .filter(note => note.endTick > note.startTick)
        .map(note => {
          const start = tickToSeconds(note.startTick);
          const end = tickToSeconds(note.endTick);
          return {
            start,
            duration: Math.max(0.05, end - start),
            midi: note.note,
            channel: note.channel,
            velocity: note.velocity
          };
        })
        .sort((left, right) => left.start - right.start);

      const loopDuration = Math.max(8, ...notes.map(note => note.start + note.duration)) + 0.75;
      return { notes, loopDuration };
    }

    function ensureMusicLoaded() {
      if (musicState.loaded) return true;
      const source = window.SCUMMNEURO_ER_MIDI_BASE64;
      if (!source) {
        setMusicStatus("Music data is missing.");
        return false;
      }

      try {
        const parsed = parseMidi(source);
        musicState.notes = parsed.notes;
        musicState.loopDuration = parsed.loopDuration;
        musicState.loaded = true;
        setMusicStatus("Music loaded.");
        return true;
      } catch (error) {
        setMusicStatus("Could not read music.");
        return false;
      }
    }

    function setMusicVolume(percent) {
      state.musicVolume = Math.max(0, Math.min(100, Number(percent) || 0));
      if (musicState.master && musicState.context) {
        const gain = musicState.playing ? (state.musicVolume / 100) * 0.042 : 0;
        musicState.master.gain.setTargetAtTime(gain, musicState.context.currentTime, 0.02);
      }
      updateMusicUi();
    }

    function sfxGainValue() {
      return (state.sfxVolume / 100) * 0.85;
    }

    function setSfxVolume(percent) {
      state.sfxVolume = Math.max(0, Math.min(100, Number(percent) || 0));
      if (musicState.sfxMaster && musicState.context) {
        musicState.sfxMaster.gain.setTargetAtTime(sfxGainValue(), musicState.context.currentTime, 0.02);
      }
      updateMusicUi();
    }

    function ensureAudioContext() {
      const AudioContextClass = window.AudioContext || window.webkitAudioContext;
      if (!AudioContextClass) {
        setMusicStatus("Web Audio is unavailable.");
        return false;
      }

      if (!musicState.context) {
        try {
          musicState.context = new AudioContextClass();
          musicState.master = musicState.context.createGain();
          musicState.master.gain.value = 0;
          musicState.master.connect(musicState.context.destination);
          musicState.sfxMaster = musicState.context.createGain();
          musicState.sfxMaster.gain.value = sfxGainValue();
          musicState.sfxMaster.connect(musicState.context.destination);
        } catch (error) {
          setMusicStatus("Web Audio is unavailable.");
          return false;
        }
      }

      if (!musicState.sfxMaster) {
        musicState.sfxMaster = musicState.context.createGain();
        musicState.sfxMaster.gain.value = sfxGainValue();
        musicState.sfxMaster.connect(musicState.context.destination);
      }

      return true;
    }

    function scheduleSfxTone(frequency, when, duration, volume, type = "triangle") {
      const context = musicState.context;
      if (!context || !musicState.sfxMaster) return;
      const oscillator = context.createOscillator();
      const gain = context.createGain();
      const end = when + duration;

      oscillator.type = type;
      oscillator.frequency.setValueAtTime(frequency, when);
      gain.gain.setValueAtTime(0.0001, when);
      gain.gain.exponentialRampToValueAtTime(volume, when + 0.006);
      gain.gain.exponentialRampToValueAtTime(0.0001, end);
      oscillator.connect(gain);
      gain.connect(musicState.sfxMaster);
      oscillator.start(when);
      oscillator.stop(end + 0.02);
    }

    function scheduleSfxPattern(kind) {
      const context = musicState.context;
      if (!context || !musicState.sfxMaster || state.sfxVolume <= 0) return;
      const now = context.currentTime;

      if (kind === "success") {
        if (now - musicState.lastSuccessSound < 0.14) return;
        musicState.lastSuccessSound = now;
        scheduleSfxTone(523.25, now + 0.005, 0.1, 0.24);
        scheduleSfxTone(659.25, now + 0.1, 0.11, 0.22);
        scheduleSfxTone(783.99, now + 0.205, 0.12, 0.2);
        return;
      }

      scheduleSfxTone(360, now + 0.003, 0.06, 0.18, "square");
      scheduleSfxTone(520, now + 0.032, 0.05, 0.12, "triangle");
    }

    function playSfx(kind) {
      if (!ensureAudioContext()) return;
      const context = musicState.context;
      if (context.state === "suspended") {
        context.resume()
          .then(() => scheduleSfxPattern(kind))
          .catch(() => {});
        return;
      }
      scheduleSfxPattern(kind);
    }

    function noteFrequency(midiNote) {
      return 440 * Math.pow(2, (midiNote - 69) / 12);
    }

    function scheduleSynthNote(note, when) {
      const context = musicState.context;
      const oscillator = context.createOscillator();
      const gain = context.createGain();
      const duration = Math.min(note.duration, 3.5);
      const end = when + duration;
      const attack = 0.008;
      const release = Math.min(0.08, duration / 2);
      const amplitude = Math.min(0.12, 0.025 + note.velocity * 0.08);
      const waveforms = ["square", "triangle", "sine", "sawtooth"];

      oscillator.type = note.channel === 9 ? "square" : waveforms[note.channel % waveforms.length];
      oscillator.frequency.setValueAtTime(noteFrequency(note.midi), when);
      gain.gain.setValueAtTime(0, when);
      gain.gain.linearRampToValueAtTime(amplitude, when + attack);
      gain.gain.setValueAtTime(amplitude, Math.max(when + attack, end - release));
      gain.gain.linearRampToValueAtTime(0, end);

      oscillator.connect(gain);
      gain.connect(musicState.master);
      oscillator.start(when);
      oscillator.stop(end + 0.05);
    }

    function scheduleMusic() {
      if (!musicState.playing || !musicState.context || !musicState.notes.length) return;
      const context = musicState.context;
      const now = context.currentTime;
      const lookAhead = 0.8;

      while (musicState.loopStart + musicState.loopDuration < now - 0.05) {
        musicState.loopStart += musicState.loopDuration;
        musicState.nextNote = 0;
      }

      while (musicState.nextNote < musicState.notes.length) {
        const note = musicState.notes[musicState.nextNote];
        const when = musicState.loopStart + note.start;
        if (when > now + lookAhead) break;
        if (when + note.duration > now) scheduleSynthNote(note, when);
        musicState.nextNote += 1;
      }

      if (musicState.nextNote >= musicState.notes.length && musicState.loopStart + musicState.loopDuration < now + lookAhead) {
        musicState.loopStart += musicState.loopDuration;
        musicState.nextNote = 0;
      }
    }

    async function startMusic() {
      if (!ensureMusicLoaded()) return;
      setMusicStatus("Starting music...");
      if (!ensureAudioContext()) return;
      try {
        const resumeAttempt = musicState.context.state === "suspended"
          ? musicState.context.resume()
          : Promise.resolve();
        musicState.playing = true;
        musicState.loopStart = musicState.context.currentTime + 0.08;
        musicState.nextNote = 0;
        setMusicVolume(state.musicVolume);
        clearInterval(musicState.timer);
        musicState.timer = setInterval(scheduleMusic, 120);
        scheduleMusic();
        setMusicStatus("Music playing.");
        updateMusicUi();
        resumeAttempt.catch(() => {
          if (musicState.playing) setMusicStatus("Browser blocked audio. Click START MUSIC again.");
        });
      } catch (error) {
        musicState.playing = false;
        setMusicStatus("Browser blocked audio. Click START MUSIC again.");
        updateMusicUi();
      }
    }

    function stopMusic() {
      musicState.playing = false;
      clearInterval(musicState.timer);
      musicState.timer = null;
      if (musicState.master && musicState.context) {
        musicState.master.gain.setTargetAtTime(0, musicState.context.currentTime, 0.03);
      }
      setMusicStatus("Music paused.");
      updateMusicUi();
    }

    function toggleMusic() {
      if (musicState.playing) stopMusic();
      else startMusic();
    }

    function shuffledCartQuestions() {
      const questions = cartQuestionBank.slice();
      for (let index = questions.length - 1; index > 0; index -= 1) {
        const swapIndex = Math.floor(Math.random() * (index + 1));
        [questions[index], questions[swapIndex]] = [questions[swapIndex], questions[index]];
      }
      return questions;
    }

    function cartConsoleMarkup(session, statusText, statusClass) {
      const codeSlots = Array.from({ length: 5 }, (_, index) => {
        const digit = session.code[index];
        return `<span class="cart-led-digit${digit ? " lit" : ""}">${digit || "-"}</span>`;
      }).join("");
      const strikeLights = Array.from({ length: 3 }, (_, index) => (
        `<span class="cart-strike-light${index < session.mistakes ? " hit" : ""}"></span>`
      )).join("");

      return `
        <div class="cart-console" aria-label="Exam cart access console">
          <div>
            <span class="cart-console-label">Neuro-Safe RX Cart / Access Code</span>
            <div class="cart-led-readout" aria-label="${session.code.length} of 5 code digits entered">${codeSlots}</div>
            <div class="cart-console-status ${statusClass || ""}" aria-live="polite">${escapeHtml(statusText)}</div>
          </div>
          <div class="cart-strikes">
            <strong>Errors ${session.mistakes} / 3</strong>
            <div class="cart-strike-lights" aria-label="${session.mistakes} of 3 errors">${strikeLights}</div>
          </div>
        </div>
      `;
    }

    function openCartQuiz() {
      const session = {
        questions: shuffledCartQuestions(),
        questionIndex: 0,
        correct: 0,
        mistakes: 0,
        code: [],
        locked: false
      };

      openModal(`
        <section class="modal-card cart-quiz-card" id="cartQuiz" role="dialog" aria-modal="true" aria-labelledby="cartQuizTitle">
          <div class="modal-header"><h2 id="cartQuizTitle">Exam Cart: Neuro Rapid-Fire Lock</h2><button type="button" data-close aria-label="Close">X</button></div>
          <div class="cart-quiz-body" id="cartQuizBody"></div>
        </section>
      `);

      const quizCard = document.getElementById("cartQuiz");
      const quizBody = document.getElementById("cartQuizBody");

      function renderQuestion(result) {
        const question = session.questions[session.questionIndex];
        const answeredIndex = result ? result.answeredIndex : null;
        const statusText = result
          ? result.status
          : "Choose 1-5. Five correct digits unlock the cart.";
        const statusClass = result ? result.statusClass : "";

        quizBody.innerHTML = `
          ${cartConsoleMarkup(session, statusText, statusClass)}
          <div class="cart-question-meta">
            <span>${result ? "Correct " + session.correct + " of 5" : "Digit " + (session.correct + 1) + " of 5"} / Bank question ${session.questionIndex + 1}</span>
            <span class="cart-difficulty">${escapeHtml(question.difficulty)}</span>
          </div>
          <p class="cart-question">${escapeHtml(question.prompt)}</p>
          <div class="cart-answer-grid">
            ${question.options.map((option, index) => {
              let resultClass = "";
              if (result && index === question.answer) resultClass = " correct-answer";
              else if (result && index === answeredIndex) resultClass = " wrong-answer";
              return `<button type="button" class="cart-answer${resultClass}" data-cart-answer="${index}"${result ? " disabled" : ""}>
                <span class="cart-answer-number">${index + 1}</span>
                <span class="cart-answer-text">${escapeHtml(option)}</span>
              </button>`;
            }).join("")}
          </div>
          ${result ? `<div class="cart-feedback-actions">
            <p class="cart-feedback ${result.correct ? "" : "error"}">${escapeHtml(result.feedback)}</p>
            <button type="button" class="primary-action" id="cartAdvance">${escapeHtml(result.advanceLabel)}</button>
          </div>` : ""}
        `;

        if (!result) {
          quizBody.querySelectorAll("[data-cart-answer]").forEach(button => {
            button.addEventListener("click", () => answerQuestion(Number(button.dataset.cartAnswer)));
          });
          const firstAnswer = quizBody.querySelector("[data-cart-answer]");
          if (firstAnswer) firstAnswer.focus();
        } else {
          const advanceButton = document.getElementById("cartAdvance");
          advanceButton.addEventListener("click", () => advanceAfterFeedback(result, question));
          advanceButton.focus();
        }
      }

      function advanceAfterFeedback(result, question) {
        if (result.advanceAction === "complete") {
          completeCartQuiz(session.code.join(""));
          return;
        }
        if (result.advanceAction === "lockout") {
          renderFailure(question.explanation);
          return;
        }
        session.questionIndex += 1;
        session.locked = false;
        renderQuestion();
      }

      function renderFailure(lastExplanation) {
        session.code = [];
        session.correct = 0;
        quizBody.innerHTML = `
          ${cartConsoleMarkup(session, "ERROR 3: ACCESS CODE CLEARED", "error")}
          <section class="cart-failure">
            <h3>LOCKOUT</h3>
            <p>${escapeHtml(lastExplanation)} Three errors cleared the code. Restart for a newly shuffled set of questions.</p>
            <button type="button" class="primary-action" id="restartCartQuiz">Restart Quiz</button>
          </section>
        `;
        document.getElementById("restartCartQuiz").addEventListener("click", restartQuiz);
        document.getElementById("restartCartQuiz").focus();
      }

      function restartQuiz() {
        session.questions = shuffledCartQuestions();
        session.questionIndex = 0;
        session.correct = 0;
        session.mistakes = 0;
        session.code = [];
        session.locked = false;
        renderQuestion();
      }

      function answerQuestion(answerIndex) {
        if (session.locked) return;
        session.locked = true;
        const question = session.questions[session.questionIndex];
        const isCorrect = answerIndex === question.answer;

        if (isCorrect) {
          session.correct += 1;
          session.code.push(answerIndex + 1);
          playSfx("success");
          const completesCode = session.correct === 5;
          renderQuestion({
            answeredIndex: answerIndex,
            correct: true,
            status: "DIGIT " + (answerIndex + 1) + " ACCEPTED",
            statusClass: "accepted",
            feedback: "Correct. " + question.explanation,
            advanceAction: completesCode ? "complete" : "next",
            advanceLabel: completesCode ? "Unlock Cart" : "Next Question"
          });
        } else {
          session.mistakes += 1;
          const triggersLockout = session.mistakes >= 3;
          renderQuestion({
            answeredIndex: answerIndex,
            correct: false,
            status: "ERROR " + session.mistakes + " OF 3",
            statusClass: "error",
            feedback: "Incorrect. " + question.explanation,
            advanceAction: triggersLockout ? "lockout" : "next",
            advanceLabel: triggersLockout ? "Continue to Lockout" : "Next Question"
          });
        }
      }

      quizCard.addEventListener("keydown", event => {
        if (event.key === "[") {
          event.preventDefault();
          completeCartQuiz("00000");
          return;
        }
        if (session.locked || !/^[1-5]$/.test(event.key)) return;
        const answerButton = quizBody.querySelector(`[data-cart-answer="${Number(event.key) - 1}"]`);
        if (!answerButton) return;
        event.preventDefault();
        answerButton.click();
      });

      renderQuestion();
    }
