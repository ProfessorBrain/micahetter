<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Run a fictional American hospital through five impossible shifts. Pay the staff, move the patients, fight the payers, and close anyway."
    />
    <title>HELLthcare Simulator — Hospital Administrator Disaster</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="game.js" defer></script>
  </head>
  <body>
    <main class="site-shell">
      <div class="noise" aria-hidden="true"></div>

      <header class="masthead">
        <button class="brand" id="brand-button" type="button" aria-label="Start a new session">
          <span class="brand-mark">H//</span>
          <span>
            <strong>HELLthcare Simulator</strong>
            <small>HOSPITAL ADMINISTRATOR DISASTER</small>
          </span>
        </button>
        <nav aria-label="Game information">
          <button type="button" data-panel="briefing">How to play</button>
          <button type="button" data-panel="assumptions">Model</button>
          <button type="button" data-panel="sources">Sources</button>
        </nav>
      </header>

      <div id="game-view"></div>

      <footer>
        <span>HELLthcare Simulator // ST. DYMPHNA MEMORIAL // FICTIONAL HOSPITAL, REAL PRESSURE POINTS</span>
      </footer>

      <div class="modal-backdrop" id="modal-backdrop" hidden>
        <section
          class="modal"
          role="dialog"
          aria-modal="true"
          aria-labelledby="modal-title"
          id="modal-content"
        ></section>
      </div>

      <noscript>
        <div class="noscript-message">
          HELLthcare Simulator needs JavaScript to operate. This is the only authorization request in the game.
        </div>
      </noscript>
    </main>
  </body>
</html>
