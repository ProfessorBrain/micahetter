<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="You survived the system. Now you run it. A fast healthcare policy nightmare set in the United States, 2026."
    />
    <title>BILLABLE — American Care Continuity Simulation</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="game.js" defer></script>
  </head>
  <body>
    <main class="site-shell">
      <div class="noise" aria-hidden="true"></div>

      <header class="masthead">
        <button class="brand" id="brand-button" type="button" aria-label="Return to title">
          <span class="brand-mark">B//</span>
          <span>
            <strong>BILLABLE</strong>
            <small>AMERICAN CARE CONTINUITY SIMULATION</small>
          </span>
        </button>
        <div class="header-status">
          <span class="pulse-dot" aria-hidden="true"></span>
          SYSTEM STATUS: LEGALLY OPERATIONAL
        </div>
        <nav aria-label="Game information">
          <button type="button" data-panel="briefing">Briefing</button>
          <button type="button" data-panel="assumptions">Assumptions</button>
          <button type="button" data-panel="sources">Sources</button>
        </nav>
      </header>

      <div id="game-view"></div>

      <footer>
        <span>BILLABLE // A FICTIONAL SYSTEM BUILT FROM REAL PRESSURE POINTS</span>
        <span>NO PATIENT DATA · NO PREDICTIONS · NO PRIOR AUTHORIZATION</span>
      </footer>

      <div class="modal-backdrop" id="modal-backdrop" hidden>
        <section
          class="modal"
          role="dialog"
          aria-modal="true"
          aria-labelledby="modal-title"
          id="modal-content"
        ></section>
      </div>

      <noscript>
        <div class="noscript-message">
          BILLABLE needs JavaScript to operate. This is the only authorization request in the game.
        </div>
      </noscript>
    </main>
  </body>
</html>
